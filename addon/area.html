<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circadian Light - Area</title>
  <style>
    :root {
      --bg: #000;
      --panel: #111;
      --card: #1a1a1a;
      --accent: #feac60;
      --accent-hover: #ffc078;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --muted2: #64748b;
      --line: #334155;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --font-hero: 1.4rem;
      --font-display: 1.1rem;
      --font-card-title: 0.95rem;
      --font-value: 0.85rem;
      --font-body: 0.78rem;
      --font-muted: 0.7rem;
      --font-caps: 0.65rem;
      --font-micro: 0.55rem;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Page header — 2-row CCT-tinted grid (Ship 1 redesign).
       Background + text color set per-frame by updateHeaderTint() so the
       header reads the room's current CCT. */
    .page-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 6px 12px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      grid-template-rows: auto auto;
      column-gap: 10px;
      row-gap: 4px;
      align-items: center;
      transition: background 0.12s, color 0.12s;
    }
    .page-header > .back-btn {
      grid-column: 1;
      grid-row: 1 / span 2;
      align-self: center;
    }
    .page-header > .page-header-title-row {
      grid-column: 2;
      grid-row: 1;
      align-self: center;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex-wrap: wrap;
    }
    .page-header > .page-header-meta {
      grid-column: 3;
      grid-row: 1;
      align-self: center;
      justify-self: end;
    }
    .page-header > .page-header-readout-cluster {
      grid-column: 2 / span 2;
      grid-row: 2;
      align-self: center;
      justify-self: stretch;  /* fill col 2 + col 3 so margin-left: auto on
                                 the right action group pushes circadian to
                                 the far right edge of row 2 (per spec —
                                 "burying" the rare-action toggle). */
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: inherit;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
      padding: 0;
    }

    .back-btn:hover {
      background: rgba(0, 0, 0, 0.18);
    }

    .back-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Demoted title — chrome label on row 1, not the page's visual headline.
       The row-2 readout (% · K) is the actual focal element. */
    .page-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: inherit;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin: 0;
    }

    /* Status chips that flow next to the title on row 1, wrapping below if
       many are active simultaneously. Each chip is a button so boost/freeze
       can cancel via tap. Motion + fade chips render disabled (TODO: wire
       once finish_fade / cancel_motion primitives land). */
    .page-header-chips {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      flex-shrink: 1;
      min-width: 0;
    }
    .area-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.18);
      color: inherit;
      font: inherit;
      font-size: var(--font-micro);
      font-weight: 600;
      letter-spacing: 0.02em;
      padding: 4px 10px;
      border-radius: 14px;
      min-height: 28px;
      line-height: 1;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .area-chip:hover {
      background: rgba(0,0,0,0.6);
      border-color: rgba(255,255,255,0.35);
    }
    .area-chip:disabled {
      cursor: default;
      opacity: 0.85;
    }
    .area-chip:disabled:hover {
      background: rgba(0,0,0,0.45);
      border-color: rgba(255,255,255,0.18);
    }
    .area-chip-icon {
      display: inline-flex;
      align-items: center;
      line-height: 1;
    }
    /* Per-state color treatments; mirror the prior timer-* class scheme. */
    .area-chip--frozen { color: #63b3ed; border-color: rgba(99,179,237,0.55); }
    .area-chip--motion { color: #e2e8f0; }
    .area-chip--boost  { color: #e2e8f0; }
    .area-chip--fade   { color: #e2e8f0; animation: fade-pulse 2.5s ease-in-out infinite; }
    .area-chip--warning { color: #e6a817; animation: timer-pulse 1s ease-in-out infinite; }
    .area-chip-arrow { opacity: 0.7; margin: 0 1px; }

    /* Row 2 readout cluster — state controls left, readout center, dirty
       reset + circadian-toggle right. The readout is the page's actual
       headline (largest, boldest element). */
    .page-header-power,
    .page-header-freeze,
    .page-header-circadian {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      padding: 0;
      background: transparent;
      border: none;
      color: inherit;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.15s, opacity 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .page-header-power:hover,
    .page-header-freeze:hover,
    .page-header-circadian:hover { background: rgba(0,0,0,0.18); }
    .page-header-power svg,
    .page-header-freeze svg,
    .page-header-circadian svg { width: 18px; height: 18px; }
    /* Power active = lights on. Subtle white pill — power state flips
       50/50 throughout the day so a noticeable active treatment would be
       visual noise. The pill just confirms the icon is "engaged". */
    .page-header-power.active { background: rgba(255, 255, 255, 0.12); }
    .page-header-power.active:hover { background: rgba(255, 255, 255, 0.22); }
    /* Freeze active = bright cyan icon on a tinted bg pill so the active
       state stays visible against any header tint (cool CCT bgs were
       washing out a color-only treatment). Stronger contrast than power
       since frozen state IS noteworthy. */
    .page-header-freeze.active {
      color: #8fcef0;
      background: rgba(40, 80, 120, 0.55);
    }
    .page-header-freeze.active:hover { background: rgba(40, 80, 120, 0.75); }
    /* Circadian: neutral icon when ON (default — full opacity, color
       inherits like the back chevron). The "burying" of this rare-action
       toggle is via right-edge position + absence of an active pill (power
       + freeze get pills when on; circadian doesn't), NOT via opacity —
       earlier dim-when-on treatment was reading as "off" because users
       hardwired bright = on. When OFF, the orange accent + bg pill makes
       the non-default state loud + obvious. */
    .page-header-circadian.is-off {
      color: var(--accent);
      background: rgba(254,172,96,0.14);
    }
    .page-header-circadian.is-off:hover {
      background: rgba(254,172,96,0.28);
      color: var(--accent-hover);
    }
    /* Right-side action group (reset + circadian) pushed to the far right
       so the left-side controls + readout flow naturally on the left. */
    .page-header-actions-right {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }

    .page-header-readout {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.01em;
      font-variant-numeric: tabular-nums;
      line-height: 1.05;
      white-space: nowrap;
    }

    /* Master reset (↺) — orange-on-dark so it stands out against any CCT
       tint. Visible only when the area has overrides applied (dirty). */
    .page-header-reset {
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(254,172,96,0.45);
      color: var(--accent);
      width: 26px;
      height: 26px;
      border-radius: 13px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .page-header-reset:hover {
      background: rgba(254,172,96,0.18);
      border-color: var(--accent);
      color: var(--accent-hover);
    }

    /* Main content */
    .main {
      max-width: 600px;
      margin: 0 auto;
      padding: 10px;
    }

    /* Header meta (zone link, right-aligned in page header) */
    .page-header-meta {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .page-header-meta a {
      color: inherit;
      text-decoration: none;
      font-size: var(--font-display);
      white-space: nowrap;
      opacity: 0.85;
    }

    .page-header-meta a:hover {
      text-decoration: underline;
      opacity: 1;
    }

    .page-header-meta-label {
      font-size: var(--font-micro);
      color: inherit;
      opacity: 0.55;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .zone-type-chip {
      font-size: var(--font-micro);
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 1px 6px;
      border: 1px solid currentColor;
      border-radius: 10px;
      opacity: 0.72;
      white-space: nowrap;
      line-height: 1.4;
    }

    /* Animations used by header chips (boost/freeze/motion/fade). Kept after
       the area-state tile + timer-status row were removed in the Ship 1
       redesign — chips reference fade-pulse and timer-pulse. */
    @keyframes fade-pulse { 0%,100% { opacity: 0.9; } 50% { opacity: 0.3; } }
    @keyframes timer-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Legacy row-slider thumb (used by JS in the legacy banner element). */
    .row-slider-track { height: 10px; position: relative; cursor: pointer; touch-action: none; border-radius: 5px; overflow: visible; }
    .row-slider-fill { display: none; }
    .row-slider-thumb { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 30px; height: 16px; border-radius: 8px 8px 5px 5px; background: rgba(255,255,255,0.9); box-shadow: 0 1px 4px rgba(0,0,0,0.4); pointer-events: none; transition: left 0.15s; }
    .row-slider-track.dragging .row-slider-thumb { transition: none; }

    /* Sliders muted when circadian is off — stay interactive (so the user
       can still pre-set overrides that take effect when circadian comes
       back on), dim opacity signals "not active right now". */
    .curve-controls-wrap.circadian-off-overlay .hslider-row {
      opacity: 0.5;
    }
    /* Stronger mute on color + phase sliders specifically when the room is
       OFF (power off, but circadian still on). Bright slider stays at full
       prominence — dragging it is the natural turn-on gesture. Color/phase
       are informational only when the room is dark, so they get pushed
       further into the background. */
    .hslider-row--power-off { opacity: 0.35; }

    /* Mini chart container (from modal) */
    #mini-chart {
      width: 100%;
      height: 120px;
      margin: 4px 0;
      touch-action: pan-x pan-y;
    }
    /* Suppress Plotly's default drag-layer cursors; JS sets grab/grabbing only near the handle */
    #mini-chart .nsewdrag,
    #mini-chart .drag,
    #mini-chart .draglayer,
    #mini-chart .cursor-pointer { cursor: default !important; }
    #mini-chart.handle-hover .nsewdrag,
    #mini-chart.handle-hover .drag,
    #mini-chart.handle-hover .draglayer { cursor: grab !important; }
    #mini-chart.dragging .nsewdrag,
    #mini-chart.dragging .drag,
    #mini-chart.dragging .draglayer { cursor: grabbing !important; }

    /* Adjust sliders (from modal - exact same styling) */
    .adjust-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 4px 4px 2px;
      -webkit-user-select: none;
      user-select: none;
    }
    .hslider-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .hslider-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .hslider-label {
      font-size: var(--font-caps);
      font-weight: 600;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      min-width: 42px;
    }
    .hslider-value {
      font-size: var(--font-card-title);
      font-weight: 500;
      color: var(--text);
    }
    .hslider-reset {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--muted2);
      width: 22px;
      height: 22px;
      border-radius: 11px;
      cursor: pointer;
      padding: 0;
      font-size: var(--font-value);
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, border-color 0.15s, opacity 0.15s;
    }
    .hslider-reset:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.35);
    }
    .hslider-reset.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .slider-track {
      position: relative;
      width: 100%;
      height: 8px;
      border-radius: 4px;
      cursor: pointer;
      touch-action: none;
      overflow: visible;
    }
    .slider-track-bg {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.08);
      border-radius: inherit;
      filter: saturate(0.55);
      transition: filter 0.2s ease;
      pointer-events: none;
      z-index: 0;
    }
    .slider-track:hover .slider-track-bg,
    .slider-track.dragging .slider-track-bg {
      filter: saturate(1);
    }
    .slider-thumb {
      position: absolute;
      top: 50%;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      border: 1.5px solid rgba(255,255,255,0.8);
      box-shadow: 0 1px 5px rgba(0,0,0,0.4);
      transform: translate(-50%, -50%);
      pointer-events: none;
      transition: left 0.15s ease, background 0.15s ease;
      z-index: 2;
    }
    .slider-track.dragging .slider-thumb {
      transition: none;
    }
    /* Ghost thumb: faint outlined duplicate at drag-start position; stays put
       while the live thumb follows the pointer. Mirrors the home page (areas.html)
       row-slider-thumb-ghost pattern so the user can see the delta they're dialing. */
    .slider-thumb-ghost {
      position: absolute;
      top: 50%;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.55);
      transform: translate(-50%, -50%);
      pointer-events: none;
      display: none;
      z-index: 1;
    }
    .slider-track.dragging .slider-thumb-ghost { display: block; }
    .hslider-ticks {
      position: relative;
      height: 28px;
      margin-top: 2px;
      pointer-events: none;
    }
    .hslider-tick {
      position: absolute;
      top: 0;
      transform: translateX(-50%);
      font-size: var(--font-micro);
      font-weight: 500;
      color: var(--muted2);
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .hslider-tick.is-edge {
      color: var(--muted);
      opacity: 0.75;
    }
    .hslider-default-marker {
      position: absolute;
      bottom: 0;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      font-size: var(--font-micro);
      font-weight: 500;
      color: rgba(255, 215, 120, 0.95);
      letter-spacing: 0.02em;
      white-space: nowrap;
      pointer-events: none;
      text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    }
    .hslider-default-marker::before {
      content: '';
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-bottom: 6px solid rgba(255, 215, 120, 0.95);
      filter: drop-shadow(0 1px 1px rgba(0,0,0,0.5));
    }
    .hslider-now-marker {
      position: absolute;
      top: 0;
      transform: translateX(-50%);
      font-size: var(--font-micro);
      font-weight: 600;
      color: rgba(140, 210, 255, 0.95);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
      pointer-events: none;
      text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    }
    /* Chart shell — lives inside the Adjust card body in Ship 2. No longer
       sticky; scrolls with the page. Positioned relative so absolutely-
       positioned children (NOW pill, sun-info chip, solar/phase labels)
       anchor correctly. Bottom padding holds the two below-axis label
       rows (sunrise/sunset just below axis, wake/bed one row lower).
       Tightened bottom + margin so the Bright slider sits closer to the
       chart without crowding the wake/bed label. */
    #chart-shell {
      position: relative;
      padding: 4px 0 32px;
      margin-bottom: 0;
    }
    #chart-shell #mini-chart { height: 120px; margin-top: 6px; }
    /* Sun-intensity chip — sits above the chart at solar noon (clamped to
       the visible phase window). Borderless, transparent bg so it reads as
       inline annotation rather than a clickable pill. Visible only when the
       room has any sun-exposure AND the cursor is between sunrise/sunset. */
    .chart-sun-info {
      position: absolute;
      top: 12px;
      display: none;
      align-items: center;
      gap: 4px;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 600;
      color: rgba(255, 225, 140, 0.92);
      background: transparent;
      border: none;
      padding: 0;
      z-index: 6;
      cursor: default;
      letter-spacing: 0.02em;
    }
    .chart-sun-info.visible { display: inline-flex; }
    .chart-sun-info-icon { font-size: 13px; line-height: 1; color: rgba(255, 225, 140, 0.95); }
    /* Below-axis labels — sunrise/sunset (yellow) + wake/bed (blue), ported
       from rhythm-design's .solar-label pattern. Sit ~6px below the chart's
       x-axis; a 1px connector bridges up to the axis line. Hover reveals a
       time chip in the dark popover style. Hidden until .visible flag is
       added by positionChartLabels(). */
    .area-solar-label,
    .area-phase-label {
      position: absolute;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      z-index: 4;
      cursor: default;
      user-select: none;
      -webkit-user-select: none;
      font-variant-numeric: tabular-nums;
      display: none;
    }
    /* sunrise/sunset (yellow) sit just below the x-axis with a short
       connector tick. wake/bed (blue) sit one row LOWER per spec — same
       visual treatment as rhythm-design's sleep pills, but as a label. */
    .area-solar-label { bottom: 22px; }
    .area-phase-label { bottom: 4px; }
    .area-solar-label.visible,
    .area-phase-label.visible { display: inline-block; }
    .area-solar-label { color: rgba(255,225,140,0.92); }
    .area-phase-label { color: rgba(140, 195, 255, 0.95); }
    .area-solar-label:hover { color: rgba(255,235,170,1); }
    .area-phase-label:hover { color: rgba(170, 215, 255, 1); }
    /* Connector tick from the label up to the chart x-axis line. Height set
       per-frame by positionChartLabels(). */
    .area-solar-label::before,
    .area-phase-label::before {
      content: '';
      position: absolute;
      bottom: 100%;
      left: 50%;
      width: 1px;
      height: var(--area-label-connector-h, 0px);
      margin-bottom: 1px;
      transform: translateX(-50%);
      pointer-events: none;
    }
    .area-solar-label::before { background: rgba(255,225,140,0.55); }
    .area-phase-label::before { background: rgba(140, 195, 255, 0.55); }
    /* Hover tooltip — time pill above the label. */
    .area-solar-label::after,
    .area-phase-label::after {
      content: attr(data-time);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      padding: 3px 7px;
      background: #3a3a3a;
      color: #fff;
      font-size: 11px;
      font-weight: 500;
      border-radius: 4px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s;
      margin-bottom: 5px;
      font-variant-numeric: tabular-nums;
    }
    .area-solar-label:hover::after,
    .area-phase-label:hover::after { opacity: 1; }
    /* Circadian-off overlay */
    .circadian-off-overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      border-radius: 8px;
      z-index: 10;
      pointer-events: none;
    }
    .enable-circadian-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 11;
      pointer-events: auto;
      color: var(--accent);
      border: 1px dashed rgba(254, 172, 96, 0.4);
      background: rgba(0,0,0,0.7);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: var(--font-value);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Loading state */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      color: var(--muted);
    }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      .adjust-section { gap: 8px; }
    }

    /* Auto schedule section */
    .auto-sched-section { margin: 8px 0 8px; display: flex; flex-direction: column; gap: 8px; }
    .auto-sched-card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; transition: border-color 0.2s; }
    /* Bonded Auto panel: now an inner container inside the outer Auto card */
    .auto-sched-bonded { background: transparent; border: none; border-radius: 0; overflow: visible; }
    .auto-sched-card--sub { background: transparent; border: none; border-radius: 0; transition: background 0.3s; }
    .auto-sched-card--sub + .auto-sched-card--sub { border-top: 1px solid var(--line); }
    /* Sub-card bodies are always visible (outer Auto controls collapse) */
    .auto-sched-card--sub > .auto-sched-body { max-height: none; opacity: 1; overflow: visible; transition: opacity 0.2s; }
    /* Disabled sub-card: body fades to signal the toggle is off without
       collapsing or disabling inputs (so users can still pre-configure). */
    .auto-sched-card.is-open .auto-sched-card--sub.is-disabled > .auto-sched-body { opacity: 0.5; }
    .auto-sched-card--sub.focus-flash,
    .tune-card.focus-flash { background: rgba(254, 172, 96, 0.12); box-shadow: inset 0 0 0 2px rgba(254, 172, 96, 0.85); transition: background 0.3s, box-shadow 0.3s; }
    /* Outer Auto card: holds both On and Off sub-sections. Large max-height so
       both subs fully expanded (including action bars) never clip. */
    .auto-sched-card--auto.is-open .auto-sched-body { max-height: 6000px; }
    /* Merged next-trigger header display (only visible when outer is collapsed —
       sub-header resolved times render it redundant when expanded) */
    .auto-outer-next { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 1px; font-size: var(--font-card-title); color: var(--text); font-weight: 600; white-space: nowrap; font-variant-numeric: tabular-nums; }
    .auto-outer-next a { color: inherit; text-decoration: none; padding: 2px 4px; border-radius: 4px; transition: background 0.15s; }
    .auto-outer-next a:hover { background: rgba(255,255,255,0.04); }
    .auto-outer-next .auto-outer-sep { color: var(--muted2); font-weight: 400; }
    .auto-outer-next .auto-outer-off-label { color: var(--muted); }
    .auto-sched-card--auto.is-open .auto-outer-next { display: none; }
    /* Adjust card: mirror merged header for live brightness/kelvin */
    .adjust-outer-next { margin-left: auto; display: flex; align-items: baseline; gap: 6px; font-size: var(--font-card-title); color: var(--text); font-weight: 600; white-space: nowrap; font-variant-numeric: tabular-nums; }
    .adjust-outer-next .adjust-outer-sep { color: var(--muted2); font-weight: 400; }
    .auto-sched-card--headline.is-open .adjust-outer-next { display: none; }
    /* Indent field rows inside On/Off sub-sections so labels sit under (not
       at the same x as) the sub-title "On"/"Off" — visual hierarchy cue. */
    .auto-sched-card--sub .auto-sched-field { padding-left: 28px; }
    .auto-sched-card--sub .auto-sched-conditions-header,
    .auto-sched-card--sub .section-action-bar { padding-left: 28px; }
    /* Inline × remove link for a 2nd custom schedule */
    .auto-sched-remove-link { font-size: var(--font-card-title); color: var(--muted2); text-decoration: none; cursor: pointer; line-height: 1; padding: 0 4px; flex-shrink: 0; }
    .auto-sched-remove-link:hover { color: var(--text); }
    .auto-sched-header { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 12px 14px; user-select: none; }
    .auto-sched-title { font-size: var(--font-card-title); font-weight: 600; color: var(--text); }
    .auto-sched-toggle { position: relative; width: 32px; height: 16px; }
    .auto-sched-toggle input { opacity: 0; width: 0; height: 0; }
    .auto-sched-toggle .slider { position: absolute; inset: 0; background: var(--line); border-radius: 8px; cursor: pointer; transition: background 0.2s; }
    .auto-sched-toggle .slider::before { content: ''; position: absolute; left: 3px; top: 3px; width: 10px; height: 10px; border-radius: 50%; background: var(--muted); transition: all 0.2s; }
    .auto-sched-toggle input:checked + .slider { background: var(--text); }
    .auto-sched-toggle input:checked + .slider::before { transform: translateX(16px); background: #000; }
    .auto-sched-body { max-height: 0; opacity: 0; overflow: hidden; transition: max-height 0.3s ease, opacity 0.25s ease; }
    .auto-sched-card.is-open .auto-sched-body { max-height: 600px; opacity: 1; }
    .auto-sched-body-inner { padding: 4px 0 14px 0; }
    .auto-sched-row { display: flex; align-items: center; margin-bottom: 4px; }
    .auto-sched-days { display: flex; gap: 6px; margin-bottom: 4px; }
    .auto-sched-days-time { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: nowrap; }
    .auto-sched-days-time .auto-sched-days { margin-bottom: 0; gap: 4px; }
    .auto-sched-days-time .auto-sched-day-col { gap: 0; }
    .auto-sched-days-time .auto-sched-day-btn { width: 19px; height: 19px; font-size: var(--font-micro); border-width: 1.25px; }
    .auto-sched-day-col { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .auto-sched-day-btn { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid var(--line); background: transparent; color: var(--muted); font-size: var(--font-micro); font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; line-height: 1; transition: all 0.15s; }
    .auto-sched-time-input--inline { padding: 3px 6px; font-size: var(--font-body); max-width: 108px; flex-shrink: 0; }
    .auto-sched-time-input--inline::-webkit-datetime-edit-ampm-field { text-transform: lowercase; font-size: var(--font-muted); padding: 0 1px; }
    .auto-sched-time-input--inline::-webkit-datetime-edit-hour-field,
    .auto-sched-time-input--inline::-webkit-datetime-edit-minute-field { padding: 0 1px; }
    .auto-sched-day-btn:hover { border-color: var(--text); color: var(--text); }
    .auto-sched-day-btn.active { background: #eef1f5; border-color: #eef1f5; color: #000; }
    .auto-sched-day-time { font-size: var(--font-caps); color: var(--muted2); height: 0.75rem; line-height: 0.75rem; font-variant-numeric: tabular-nums; }
    .auto-sched-day-time:empty { display: none; }
    .auto-sched-time-input { background: var(--panel); color: var(--text); border: 1px solid var(--line); border-radius: 6px; padding: 4px 8px; font-size: var(--font-value); outline: none; }
    .auto-sched-time-input:focus { border-color: var(--accent); }
    .auto-sched-offset { display: flex; align-items: center; gap: 6px; }
    .auto-sched-offset-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--line); background: transparent; color: var(--text); font-size: var(--font-card-title); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .auto-sched-offset-btn:hover { border-color: var(--accent); color: var(--accent); }
    .auto-sched-offset-val { font-size: var(--font-value); color: var(--text); min-width: 3.5em; text-align: center; font-variant-numeric: tabular-nums; }
    .auto-sched-next { font-size: var(--font-display); color: var(--text); font-weight: 700; white-space: nowrap; font-variant-numeric: tabular-nums; }
    /* Tint resolved time when an override is active — paired with the
       "clear override" link underneath to double-signal modified state. */
    .auto-sched-next.has-override { color: rgba(254, 172, 96, 0.95); }
    .auto-sched-chevron { display: inline-block; font-size: var(--font-display); line-height: 1; transform: rotate(0deg); transition: transform 0.25s; color: var(--muted2); flex-shrink: 0; }
    .auto-sched-card.is-open .auto-sched-chevron { transform: rotate(90deg); }

    /* Headline variant: always-open card, no chevron, static header */
    .auto-sched-card--headline.is-open .auto-sched-body { max-height: 1600px; }
    .auto-sched-header--static { cursor: default; }
    .curve-controls-wrap { position: relative; padding: 4px 14px 12px 14px; }
    .curve-controls-wrap .adjust-section { margin-bottom: 0; }

    /* Unified field row — label left, content right */
    .auto-sched-field { display: flex; align-items: flex-start; gap: 8px; padding: 5px 14px 5px 14px; }
    .auto-sched-field-label { font-size: var(--font-body); color: var(--muted); min-width: 5.5em; flex-shrink: 0; padding-top: 1px; line-height: 1.4; }
    .auto-sched-field-content { flex: 1; min-width: 0; }

    .auto-sched-radios { display: flex; gap: 10px; margin-bottom: 10px; }
    .auto-sched-radios label { display: flex; align-items: center; gap: 4px; font-size: var(--font-body); color: var(--muted); cursor: pointer; white-space: nowrap; }
    .auto-sched-radios input[type="radio"] { accent-color: var(--muted); margin: 0; cursor: pointer; }

    .auto-sched-custom-group { margin-top: 0; margin-bottom: 0; }
    .auto-sched-custom-group .auto-sched-days-time { margin-bottom: 0; }

    .auto-sched-fade-slider { width: 100%; }
    .auto-sched-fade-val { font-size: var(--font-value); color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }

    /* Auto-hide slider reveal pattern on Fade row — value sits left-aligned in
       the content column (matching Time/Light/If); slider collapses on a row
       below until the user taps to reveal. Mirrors rhythm-design.html
       night-warming/sun-cooling Start/End/Fade reveal-group pattern. */
    .auto-fade-row { cursor: pointer; }
    .auto-fade-row .auto-fade-slider-row {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height 0.25s ease, opacity 0.2s ease, margin-top 0.2s ease;
    }
    .auto-fade-row.is-revealing .auto-fade-slider-row {
      max-height: 32px;
      opacity: 1;
      margin-top: 6px;
    }

    .auto-sched-light-pills { display: flex; gap: 4px; }
    .auto-sched-light-pill { padding: 3px 10px; border-radius: 12px; border: 1px solid var(--line); background: transparent; color: var(--muted); font-size: var(--font-body); cursor: pointer; transition: all 0.15s; }
    .auto-sched-light-pill:hover { border-color: var(--text); color: var(--text); }
    .auto-sched-light-pill.active { background: #eef1f5; border-color: #eef1f5; color: #000; }
    .auto-sched-add-schedule { font-size: var(--font-body); color: var(--muted2); text-decoration: underline; cursor: pointer; padding: 2px 0 4px; }
    .auto-sched-add-schedule:hover { color: var(--text); }
    .auto-sched-trigger-select { background: var(--card); color: var(--text); border: 1px solid var(--line); border-radius: 4px; padding: 2px 4px; font-size: var(--font-body); }
    .auto-sched-conditions-header { font-size: var(--font-caps); color: var(--muted2); text-transform: uppercase; letter-spacing: 0.08em; padding: 10px 14px 4px; }
    .auto-sched-days-wrap { padding: 0 0 2px; }
    .auto-sched-days-summary { font-size: var(--font-muted); color: var(--muted2); font-variant-numeric: tabular-nums; }
    .auto-sched-days-summary:empty { display: none; }

    /* Temp override popover (auto schedule) */
    .auto-override-popover { position: fixed; z-index: 200; background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 0; min-width: 260px; max-width: 320px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); overflow: hidden; }
    .auto-override-popover .aop-title { font-weight: 600; font-size: var(--font-value); padding: 10px 14px 4px; }
    .auto-override-popover .aop-section-label { font-size: var(--font-muted); font-weight: 500; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 14px 4px; }
    .auto-override-popover .aop-options { padding: 0 14px 0 22px; }
    .auto-override-popover .aop-option { display: flex; align-items: center; gap: 6px; padding: 5px 0; font-size: var(--font-value); color: var(--muted); cursor: pointer; }
    .auto-override-popover .aop-option input[type="radio"] { accent-color: var(--muted); margin: 0; cursor: pointer; flex-shrink: 0; }
    .auto-override-popover .aop-info { font-size: var(--font-value); font-weight: 600; padding: 6px 14px; text-align: center; }
    .auto-override-popover .aop-clear { padding: 6px 14px 10px; text-align: center; }
    .auto-override-popover .aop-clear button { background: none; border: none; color: #ef4444; font-size: var(--font-body); cursor: pointer; opacity: 0.7; padding: 4px 8px; }
    .auto-override-popover .aop-clear button:hover { opacity: 1; }
    .auto-override-popover .aop-buttons { display: flex; justify-content: flex-end; gap: 8px; padding: 8px 14px 10px; border-top: 1px solid var(--line); margin-top: 6px; }
    .auto-override-popover .aop-btn-cancel { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--line); background: transparent; color: var(--muted); font-size: var(--font-body); cursor: pointer; }
    .auto-override-popover .aop-btn-cancel:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .auto-override-popover .aop-btn-save { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--accent); background: var(--accent); color: #000; font-size: var(--font-body); font-weight: 600; cursor: pointer; }
    .auto-override-popover .aop-btn-save:hover { opacity: 0.9; }

        /* Tune section — shared */
    .tune-card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; margin-bottom: 8px; overflow: hidden; font-size: 13px; }
    /* Inside the flex auto-sched-section, gap:8px already handles spacing —
       the tune-card margin-bottom would otherwise stack on top of the gap
       (16px visible) and break the 8px rhythm established by the other cards. */
    #auto-sched-section .tune-card { margin-bottom: 0; }
    .tune-card-title { padding: 10px 16px 2px; font-size: var(--font-body); font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .tune-section-header { padding: 10px 16px 6px; font-size: var(--font-body); font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .tune-save-status { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; background: var(--success); color: white; border-radius: 8px; font-size: var(--font-value); opacity: 0; transform: translateY(10px); transition: all 0.3s; z-index: 50; }
    .tune-save-status.visible { opacity: 1; transform: translateY(0); }

    .section-action-bar {
      display: flex; justify-content: flex-end; gap: 8px;
      padding: 10px 16px; animation: fadeSlideIn 0.2s ease;
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .section-cancel-btn {
      padding: 6px 16px; border-radius: 6px; border: 1px solid var(--line);
      background: transparent; color: var(--muted); font-size: var(--font-body);
      cursor: pointer; transition: all 0.15s;
    }
    .section-cancel-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); border-color: var(--muted); }
    .section-save-btn {
      padding: 6px 16px; border-radius: 6px; border: 1px solid var(--accent);
      background: var(--accent); color: #000; font-size: var(--font-body); font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .section-save-btn:hover { opacity: 0.9; }

    /* Sliders — custom minimal styling */
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 18px; padding: 0; margin: 0;
      background: transparent; cursor: pointer;
      --track-fill: rgba(255,255,255,0.5);
      --track-empty: rgba(255,255,255,0.12);
    }
    input[type=range]:focus { outline: none; }
    input[type=range]::-webkit-slider-runnable-track {
      height: 4px;
      background: linear-gradient(to right, var(--track-fill) var(--fill-pct, 50%), var(--track-empty) var(--fill-pct, 50%));
      border-radius: 2px;
    }
    input[type=range]::-moz-range-track {
      height: 4px; background: var(--track-empty); border-radius: 2px;
    }
    input[type=range]::-moz-range-progress {
      height: 4px; background: var(--track-fill); border-radius: 2px;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 30px; height: 18px; border-radius: 9px;
      background: #fff; border: 1px solid rgba(0,0,0,0.15); margin-top: -7px;
    }
    input[type=range]::-moz-range-thumb {
      width: 30px; height: 18px; border-radius: 9px;
      background: #fff; border: 1px solid rgba(0,0,0,0.15);
    }

    /* Room Balance / Solar sliders */
    .tune-control-row { display: grid; grid-template-columns: 1fr auto; align-items: baseline; padding: 8px 14px 2px 30px; gap: 0 12px; }
    .tune-control-left { display: flex; align-items: center; gap: 6px; }
    .tune-control-label { font-size: var(--font-value); color: var(--muted); }
    .tune-control-label.primary { color: var(--text); font-weight: 600; }
    .tune-control-reset { font-size: var(--font-muted); color: var(--muted2); cursor: pointer; opacity: 0; transition: opacity 0.15s; text-transform: uppercase; letter-spacing: 0.03em; pointer-events: none; }
    .tune-control-reset.is-dirty { pointer-events: auto; opacity: 0.6; }
    .tune-control-reset.is-dirty:hover { opacity: 1; }
    .tune-control-reset:hover { color: var(--accent); }
    .tune-slider-row { padding: 0px 22px 2px 52px; max-width: 70%; }
    .tune-slider-row input[type=range] { }
    .tune-slider-word { font-size: var(--font-body); color: var(--text); white-space: nowrap; display: flex; justify-content: space-between; margin-top: 0; }
    .tune-inline-slider { width: 100%; cursor: pointer; min-width: 80px; }
    .tune-inline-slider--light { }
    .tune-inline-slider--sun { }

    /* Lights card — collapsible like brightness/alarm */
    .tune-lights-header { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 12px 14px; user-select: none; }
    .tune-lights-title { font-size: var(--font-card-title); font-weight: 600; color: var(--text); }
    .tune-lights-chevron { display: inline-block; font-size: var(--font-display); line-height: 1; transform: rotate(0deg); transition: transform 0.25s; color: var(--muted2); flex-shrink: 0; }
    .tune-lights-card.is-open .tune-lights-chevron { transform: rotate(90deg); }
    .tune-lights-count { margin-left: auto; font-size: var(--font-value); font-weight: 500; color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; transition: opacity 0.25s; }
    .tune-lights-card.is-open .tune-lights-count { opacity: 0; }
    .tune-lights-body { max-height: 0; opacity: 0; overflow: hidden; transition: max-height 0.3s ease, opacity 0.25s ease; padding-bottom: 0; }
    .tune-lights-card.is-open .tune-lights-body { max-height: 1000px; opacity: 1; padding-bottom: 8px; }
    .tune-light-item { padding: 0 14px; border-bottom: 1px solid var(--line); }
    .tune-light-item:last-child { border-bottom: none; }
    .tune-light-summary { display: grid; grid-template-columns: 1fr 1fr 56px 56px; align-items: baseline; padding: 8px 0; gap: 0 4px; }
    .tune-light-name { font-size: var(--font-value); color: var(--text); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tune-light-behaviour { font-size: var(--font-body); color: var(--muted); cursor: pointer; white-space: nowrap; text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 2px; }
    .tune-light-behaviour:hover { color: var(--accent); }
    .tune-light-impact { font-size: var(--font-value); color: var(--muted); white-space: nowrap; text-align: right; font-variant-numeric: tabular-nums; }
    .tune-light-bri { font-size: var(--font-value); font-weight: 600; font-variant-numeric: tabular-nums; white-space: nowrap; text-align: right; color: var(--text); position: relative; }
    .tune-capped-star { position: absolute; font-size: var(--font-muted); font-weight: 400; color: var(--muted2); margin-left: 1px; }

    /* Brightness card — alarm-style collapsible */
    .tune-brightness-header { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 12px 14px; user-select: none; }
    .tune-brightness-title { font-size: var(--font-card-title); font-weight: 600; color: var(--text); }
    .tune-brightness-chevron { display: inline-block; font-size: var(--font-display); line-height: 1; transform: rotate(0deg); transition: transform 0.25s; color: var(--muted2); flex-shrink: 0; }
    .tune-brightness-card.is-open .tune-brightness-chevron { transform: rotate(90deg); }
    .tune-controls-card.is-open .tune-brightness-chevron { transform: rotate(90deg); }
    .tune-controls-card.is-open .tune-brightness-val { opacity: 0; }
    .tune-controls-card.is-open .tune-brightness-body { max-height: 800px; opacity: 1; padding-bottom: 8px; }

    /* Controls list inside Controls card */
    .ctrl-list-row { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-bottom: 1px solid var(--line); cursor: pointer; transition: background 0.1s; }
    .ctrl-list-row:last-child { border-bottom: none; }
    .ctrl-list-row:active { background: rgba(255,255,255,0.04); }
    .ctrl-list-icon { flex-shrink: 0; color: var(--muted); display: flex; align-items: center; }
    .ctrl-list-info { flex: 1; min-width: 0; }
    .ctrl-list-name { font-size: var(--font-value); font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ctrl-list-name .ctrl-paused-badge { font-size: var(--font-caps); font-weight: 400; color: #f90; background: rgba(255,153,0,0.12); padding: 1px 5px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
    .ctrl-list-impact { flex-shrink: 0; font-size: var(--font-body); color: var(--muted); text-align: right; white-space: nowrap; }
    .ctrl-list-chevron { flex-shrink: 0; color: var(--muted2); font-size: var(--font-value); }
    .ctrl-list-divider { border-top: 1px solid var(--line); margin: 0; }
    /* Recently active pinned strip */
    /* Section headers inside the Controls card body. Group rows into
       "In <area>" + "Reaches <area>" buckets — each header same caps-label
       treatment that the old Recent strip used. Headers are hidden when
       their group has zero rows. */
    .ctrl-section-label { font-size: var(--font-caps); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted2); padding: 10px 14px 4px; }
    .ctrl-section + .ctrl-section .ctrl-section-label { border-top: 1px solid var(--line); margin-top: 4px; }
    /* Recency dot — fixed-width slot on the LEFT of every row so all names
       align regardless of whether a row's dot is currently active.
       Bright green when just-triggered, fades down to dim green over 1h,
       disappears after that. */
    .ctrl-fresh-dot-slot { display: inline-flex; align-items: center; justify-content: center; width: 12px; height: 12px; flex-shrink: 0; }
    .ctrl-fresh-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .tune-brightness-val { margin-left: auto; font-size: var(--font-display); font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; white-space: nowrap; transition: opacity 0.25s; }
    .tune-brightness-card.is-open .tune-brightness-val { opacity: 0; }
    .tune-brightness-body { max-height: 0; opacity: 0; overflow: hidden; transition: max-height 0.3s ease, opacity 0.25s ease; padding-bottom: 0; }
    .tune-brightness-card.is-open .tune-brightness-body { max-height: 2000px; opacity: 1; padding-bottom: 8px; }
    .tune-detail-sub { padding: 0 22px 2px 52px; font-size: var(--font-muted); color: var(--muted2); }
    .tune-col-headers { display: grid; grid-template-columns: 1fr auto; padding: 0 14px 2px; gap: 0 12px; }
    .tune-col-header { font-size: 11px; color: var(--muted2); text-align: right; white-space: nowrap; }
    .tune-bk-row { display: grid; grid-template-columns: 1fr auto; align-items: baseline; padding: 5px 14px 5px 30px; gap: 0 12px; }
    .tune-bk-row .tune-bk-label { color: var(--muted); font-size: var(--font-value); }
    .tune-bk-row .tune-bk-label.primary { color: var(--text); font-weight: 600; }
    .tune-bk-row .tune-bk-total { text-align: right; white-space: nowrap; font-variant-numeric: tabular-nums; min-width: 3em; }
    .tune-bk-row .tune-bk-total.final { font-size: var(--font-display); font-weight: 700; }
    .tune-control-impact { font-size: var(--font-value); color: var(--text); text-align: right; white-space: nowrap; font-variant-numeric: tabular-nums; min-width: 3em; }
    .tune-group-label { font-size: var(--font-body); font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 14px 4px; }
    .tune-area-total { padding-top: 8px; margin-top: 4px; position: relative; }
    .tune-area-total::before { content: ''; position: absolute; top: 0; right: 14px; width: 3em; border-top: 1px solid rgba(255,255,255,0.15); }

    /* Custom behaviour dropdown */
    .tune-light-dropdown { position: absolute; z-index: 100; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.4); width: 320px; overflow: hidden; }
    .tune-light-dropdown-header { display: grid; grid-template-columns: 14px 1fr 44px 44px 36px 48px; gap: 8px; padding: 8px 12px 6px; font-size: var(--font-caps); color: var(--muted2); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--line); }
    .tune-light-dropdown-header > span:nth-child(3), .tune-light-dropdown-header > span:nth-child(4), .tune-light-dropdown-header > span:nth-child(5), .tune-light-dropdown-header > span:nth-child(6) { text-align: right; }
    .tune-light-dropdown-row { display: grid; grid-template-columns: 14px 1fr 44px 44px 36px 48px; gap: 8px; padding: 9px 12px; cursor: pointer; align-items: center; border-bottom: 1px solid var(--line); }
    .tune-light-dropdown-row:hover { background: rgba(255,255,255,0.05); }
    .tune-light-dropdown-row.selected { background: rgba(254,172,96,0.08); }
    .tune-light-dropdown-dot { color: #feac60; font-size: var(--font-muted); line-height: 1; }
    .tune-light-dropdown-name { font-size: var(--font-body); color: var(--text); text-transform: uppercase; letter-spacing: 0.04em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tune-light-dropdown-num { text-align: right; font-size: var(--font-body); color: var(--muted2); font-variant-numeric: tabular-nums; }
    .tune-light-dropdown-final { text-align: right; font-size: var(--font-value); color: var(--text); font-variant-numeric: tabular-nums; font-weight: 500; }
    .tune-light-dropdown-new { padding: 8px 12px; font-size: var(--font-body); color: var(--muted2); opacity: 0.5; cursor: not-allowed; border-top: 1px dashed var(--line); text-transform: uppercase; letter-spacing: 0.04em; }

    /* Light brightness column headers — same grid as data rows for alignment */
    .tune-light-col-super { display: grid; grid-template-columns: 1fr 1fr 56px 56px; padding: 6px 14px 0; gap: 0 4px; }
    .tune-light-super-label { grid-column: 3 / 5; text-align: center; font-size: var(--font-caps); color: var(--muted2); text-transform: uppercase; letter-spacing: 0.05em; }
    .tune-light-col-headers { display: grid; grid-template-columns: 1fr 1fr 56px 56px; padding: 4px 14px; gap: 0 4px; font-size: var(--font-caps); color: var(--muted2); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--line); }
    .tune-light-col-headers span:nth-child(n+3) { text-align: right; }
    .tune-light-sort { cursor: pointer; transition: color 0.15s; }
    .tune-light-sort:hover { color: var(--text); }
    /* Active sort: keep text neutral, show orange directional arrow after the label */
    .tune-light-sort.active-sort { color: var(--muted); }
    .tune-light-sort.active-sort.sort-asc::after { content: " \2191"; color: var(--accent); margin-left: 3px; font-size: 1.1em; vertical-align: -1px; line-height: 1; }
    .tune-light-sort.active-sort.sort-desc::after { content: " \2193"; color: var(--accent); margin-left: 3px; font-size: 1.1em; vertical-align: -1px; line-height: 1; }
    .tune-light-sort-final { /* no longer bold/white — value carries the weight */ }
    .tune-light-ct { font-size: var(--font-value); color: var(--muted); white-space: nowrap; text-align: right; font-variant-numeric: tabular-nums; }
    .tune-light-impact-info {
      display: inline-block;
      margin-left: 4px;
      font-size: var(--font-value);
      color: var(--muted2);
      cursor: pointer;
      user-select: none;
      vertical-align: -1px;
    }
    .tune-light-impact-info:hover { color: var(--accent); }
    .tune-light-impact-info.is-open { color: var(--accent); }
    .tune-light-impact-breakdown {
      grid-column: 1 / -1;
      padding: 0 0 8px 0;
      font-size: var(--font-muted);
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      animation: fadeInBreakdown 0.15s ease-out;
    }
    .tune-light-impact-breakdown-key { color: var(--muted2); margin-right: 4px; }
    .tune-light-impact-breakdown-key + .tune-light-impact-breakdown-key { margin-left: 10px; }
    @keyframes fadeInBreakdown {
      from { opacity: 0; transform: translateY(-2px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Purpose as a pill (drop the link-looking underline) */
    .tune-light-behaviour {
      display: inline-block;
      padding: 1px 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      text-decoration: none !important;
      color: var(--muted);
      font-size: var(--font-body);
      line-height: 1.3;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.15s, border-color 0.15s;
    }
    .tune-light-behaviour:hover { color: var(--text); border-color: var(--text); }

    /* Hide the redundant Adjustments super-label above per-light columns */
    .tune-light-col-super { display: none !important; }

    /* ── Lights card hero + zones ── */
    .tune-hero-block { padding: 4px 14px 6px; }
    .tune-hero-label {
      font-size: var(--font-caps); font-weight: 500; color: var(--muted2);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .tune-hero-val {
      font-size: var(--font-hero); font-weight: 700; color: var(--text);
      font-variant-numeric: tabular-nums; line-height: 1.1; margin-top: 1px;
    }
    /* Full-row tappable band — the whole breadcrumb reveals/hides the details */
    .tune-hero-breadcrumb {
      display: flex; align-items: center; justify-content: flex-start;
      font-size: var(--font-body); color: var(--muted); margin-top: 6px;
      font-variant-numeric: tabular-nums;
      padding: 6px 8px; margin-left: -8px; margin-right: -8px;
      border-radius: 6px; cursor: pointer; user-select: none;
      transition: background 0.15s, color 0.15s;
    }
    .tune-hero-breadcrumb:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .tune-hero-breadcrumb .tune-hero-dot { margin: 0 5px; color: var(--muted2); }
    .tune-adj-target { display: inline-flex; align-items: center; gap: 4px; }
    .tune-adj-chevron-inline {
      display: inline-block; margin-left: auto; padding-left: 8px;
      transform: rotate(0deg);
      transition: transform 0.25s;
      font-size: 1.1em; line-height: 1; color: var(--muted2);
    }

    /* ── Tune waterfall (math-equation layout) ── */
    .tune-wf { padding: 4px 0 6px; }
    .tune-wf-row {
      display: grid;
      grid-template-columns: 1.5em 1fr auto auto;
      align-items: baseline;
      padding: 5px 14px;
      gap: 0 10px;
      font-variant-numeric: tabular-nums;
    }
    .tune-wf-op { font-size: var(--font-value); color: var(--muted2); text-align: center; line-height: 1; }
    .tune-wf-label { font-size: var(--font-value); color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tune-wf-reset {
      font-size: var(--font-muted); color: var(--muted2); cursor: pointer; opacity: 0;
      transition: opacity 0.15s; text-transform: uppercase; letter-spacing: 0.03em;
      pointer-events: none;
    }
    .tune-wf-reset.is-dirty { pointer-events: auto; opacity: 0.6; }
    .tune-wf-reset.is-dirty:hover { opacity: 1; color: var(--accent); }
    .tune-wf-val { text-align: right; font-size: var(--font-value); color: var(--text); white-space: nowrap; min-width: 3.2em; }
    .tune-wf-total .tune-wf-op,
    .tune-wf-total .tune-wf-label { color: var(--text); font-weight: 600; }
    .tune-wf-total .tune-wf-val { font-size: var(--font-display); font-weight: 700; }
    .tune-wf-divider { border-top: 1px solid var(--line); margin: 6px 14px 4px; }
    /* Slider sits under its row, indented to align with the label column */
    .tune-wf-slider { padding: 2px 22px 6px 52px; max-width: 70%; }
    .tune-wf-slider input[type=range] { width: 100%; }
    .tune-wf-slider .tune-slider-word {
      font-size: var(--font-body); color: var(--text); white-space: nowrap;
      display: flex; justify-content: space-between; margin-top: 0;
    }
    .tune-slider-word .tune-solar-main { font-size: var(--font-body); font-weight: 600; color: var(--text); }
    .tune-slider-word .tune-solar-peak { color: var(--muted2); font-size: var(--font-muted); }

    /* Individual section: peer header to "Adjustments" with leading chevron */
    .tune-individual-toggle {
      display: flex; align-items: center; gap: 6px;
      padding: 9px 14px; cursor: pointer; user-select: none;
      font-size: var(--font-value); color: var(--muted);
      border-top: 1px solid var(--line); margin-top: 4px;
    }
    .tune-individual-toggle:hover { color: var(--text); }
    .tune-individual-chevron-el { transform: rotate(0deg); transition: transform 0.25s; display: inline-block; font-size: 0.95em; }
  </style>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="./shared.js"></script>
</head>
<body>
  <!-- Page Header — 2-row CCT-tinted (Ship 1 redesign).
       Row 1: chevron · entry name + status chips · zone link
       Row 2: power · % · K readout · reset (when dirty)
       Background tint follows the area's current CCT (set per-frame by
       updateHeaderTint(), invoked from updateContent()). -->
  <header class="page-header" id="page-header">
    <button class="back-btn" onclick="goBack()" title="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <div class="page-header-title-row">
      <h1 class="page-title" id="page-title">Loading...</h1>
      <div class="page-header-chips" id="page-header-chips"></div>
    </div>
    <div class="page-header-meta" id="page-header-meta">
      <span id="header-meta-rhythm"></span>
    </div>
    <div class="page-header-readout-cluster">
      <button type="button" class="page-header-power" id="toggle-power" onclick="powerToggleSmart()" title="Power">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18.36 6.64a9 9 0 1 1-12.73 0M12 2v10"/>
        </svg>
      </button>
      <button type="button" class="page-header-freeze" id="toggle-freeze" onclick="executeAction('freeze_toggle')" title="Freeze">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="2" x2="12" y2="22"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <line x1="5.6" y1="5.6" x2="18.4" y2="18.4"/>
          <line x1="18.4" y1="5.6" x2="5.6" y2="18.4"/>
          <line x1="12" y1="2" x2="9.5" y2="4.5"/><line x1="12" y1="2" x2="14.5" y2="4.5"/>
          <line x1="22" y1="12" x2="19.5" y2="9.5"/><line x1="22" y1="12" x2="19.5" y2="14.5"/>
          <line x1="12" y1="22" x2="14.5" y2="19.5"/><line x1="12" y1="22" x2="9.5" y2="19.5"/>
          <line x1="2" y1="12" x2="4.5" y2="14.5"/><line x1="2" y1="12" x2="4.5" y2="9.5"/>
        </svg>
      </button>
      <span class="page-header-readout" id="page-header-readout">--% &middot; ----K</span>
      <button type="button" class="page-header-reset" id="page-header-reset" onclick="resetAllOverrides()" title="Reset overrides" style="display:none;">&#x21BA;</button>
      <div class="page-header-actions-right">
        <button type="button" class="page-header-circadian" id="toggle-circadian" onclick="toggleCircadian()" title="Circadian Light">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="main">

    <!-- Cards Section (curve + auto schedule) -->
    <div id="auto-sched-section" class="auto-sched-section" style="display:none;">
    <div class="auto-sched-card auto-sched-card--headline is-open" id="chart-card">
      <div class="auto-sched-header" onclick="toggleChartCard()">
        <span class="auto-sched-chevron">&#x203A;</span>
        <span class="auto-sched-title">Adjust</span>
        <span class="adjust-outer-next" id="adjust-outer-next"></span>
      </div>
      <div class="auto-sched-body" id="chart-body">
        <div id="circadian-content-wrap" class="curve-controls-wrap">
          <!-- Mode toggles relocated to header row 2 (circadian + freeze).
               Adjust card body now starts directly with the chart. -->

          <!-- Chart relocated into the Adjust card body in Ship 2. Read-only:
               cursor is "now" (live ticking, not user-controllable). Single
               active phase only — see renderMiniChart for the windowing. -->
          <div id="chart-shell">
            <div id="mini-chart"></div>
            <div id="chart-sun-info" class="chart-sun-info" title="Current sun intensity">
              <span class="chart-sun-info-icon" id="chart-sun-info-icon">&#x2600;</span>
              <span id="chart-sun-info-pct">&mdash;</span>
            </div>
            <!-- Below-axis labels (Ship 2 polish) — yellow sunrise/sunset and
                 blue wake/bed, mirroring rhythm-design's .solar-label pattern.
                 Positioned per-frame by positionChartLabels() against
                 _fullLayout.xaxis offsets. Hidden until shown via .visible. -->
            <div class="area-solar-label" id="area-sunrise-label" data-time="">sunrise</div>
            <div class="area-solar-label" id="area-sunset-label" data-time="">sunset</div>
            <div class="area-phase-label" id="area-phase-label" data-time="">wake</div>
          </div>
          <div class="adjust-section">
            <div class="hslider-row">
              <div class="hslider-header">
                <span class="hslider-label">Bright</span>
                <span class="hslider-value" id="slider-hero-brightness">78%</span>
                <button class="hslider-reset hidden" id="reset-brightness" onclick="executeAction('reset_brightness_override')" title="Reset brightness">&#x21BA;</button>
              </div>
              <div class="slider-track" data-mode="brightness">
                <div class="slider-track-bg"></div>
                <div class="slider-thumb-ghost"></div>
                <div class="slider-thumb"></div>
              </div>
            </div>
            <div class="hslider-row">
              <div class="hslider-header">
                <span class="hslider-label">Color</span>
                <span class="hslider-value" id="slider-hero-color">2910K</span>
                <button class="hslider-reset hidden" id="reset-color" onclick="executeAction('reset_color_override')" title="Reset color">&#x21BA;</button>
              </div>
              <div class="slider-track" data-mode="color">
                <div class="slider-track-bg"></div>
                <div class="slider-thumb-ghost"></div>
                <div class="slider-thumb"></div>
              </div>
            </div>
            <!-- Phase-time slider (Wake when in ascend, Bed when in descend).
                 Auto-flips at the phase boundary. Constrained to phase bounds
                 with the existing narrowed-boundary buffer formula
                 (computePhaseSafeOffset). Drag-end calls set_phase_time. -->
            <div class="hslider-row">
              <div class="hslider-header">
                <span class="hslider-label" id="slider-phase-label">Wake</span>
                <span class="hslider-value" id="slider-hero-phase">—</span>
                <button class="hslider-reset hidden" id="reset-phase" onclick="executeAction('reset_phase')" title="Reset wake/bed time">&#x21BA;</button>
              </div>
              <div class="slider-track" data-mode="phase">
                <div class="slider-track-bg"></div>
                <div class="slider-thumb-ghost"></div>
                <div class="slider-thumb"></div>
              </div>
            </div>
          </div>
          <button class="enable-circadian-btn" id="enable-circadian-btn"
                  style="display:none;" onclick="executeAction('circadian_on')">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            Enable
          </button>
        </div>
      </div>
    </div>
    <div class="tune-card tune-controls-card" id="tune-controls-card" style="display:none;">
      <div class="tune-brightness-header" onclick="toggleControlsBody()">
        <span class="tune-brightness-chevron" id="tune-controls-chevron">&#x203A;</span>
        <span class="tune-brightness-title">Controls</span>
        <span class="tune-brightness-val" id="tune-controls-count" style="font-size:var(--font-value);font-weight:500;color:var(--muted);"></span>
      </div>
      <div class="tune-brightness-body" id="tune-controls-body">
      </div>
    </div>
    <div class="auto-sched-card auto-sched-card--auto" id="auto-outer-card">
      <div class="auto-sched-header" onclick="toggleAutoOuter(event)">
        <span class="auto-sched-chevron" id="auto-outer-chevron">&#x203A;</span>
        <span class="auto-sched-title">Schedule</span>
        <span class="auto-outer-next" id="auto-outer-next"></span>
      </div>
      <div class="auto-sched-body" id="auto-outer-body">
    <div class="auto-sched-bonded" id="auto-bonded-panel">
    <div class="auto-sched-card auto-sched-card--sub" id="auto-on-card">
        <div class="auto-sched-header auto-sched-header--static">
          <span class="auto-sched-title">On</span>
          <label class="auto-sched-toggle" onclick="event.stopPropagation()">
            <input type="checkbox" id="auto-on-enabled" onchange="onAutoToggleChanged('on')">
            <span class="slider"></span>
          </label>
          <span style="margin-left:auto; display:flex; flex-direction:column; align-items:flex-end;">
            <span class="auto-sched-next" id="auto-on-next"></span>
            <a id="auto-on-override-link" href="#" style="display:none; font-size:var(--font-caps); color:var(--muted2); text-decoration:underline; line-height:1;">set override</a>
          </span>
        </div>
        <div class="auto-sched-body" id="auto-on-body">
         <div class="auto-sched-body-inner">
          <div class="auto-sched-field">
            <span class="auto-sched-field-label">Light</span>
            <div class="auto-sched-field-content">
              <div class="auto-sched-light-pills" id="auto-on-light-pills">
                <button class="auto-sched-light-pill active" data-light="circadian" onclick="setAutoLight('on','circadian')">Circadian</button>
                <button class="auto-sched-light-pill" data-light="nitelite" onclick="setAutoLight('on','nitelite')">Nitelite</button>
                <button class="auto-sched-light-pill" data-light="britelite" onclick="setAutoLight('on','britelite')">Britelite</button>
              </div>
            </div>
          </div>
          <div class="auto-sched-field">
            <span class="auto-sched-field-label">Time</span>
            <div class="auto-sched-field-content">
              <div class="auto-sched-radios">
                <label onclick="setAutoSource('on','sunrise')"><input type="radio" name="auto-on-source" id="auto-on-src-sunrise"> Sunrise</label>
                <label onclick="setAutoSource('on','sunset')"><input type="radio" name="auto-on-source" id="auto-on-src-sunset"> Sunset</label>
                <label onclick="setAutoSource('on','custom')"><input type="radio" name="auto-on-source" id="auto-on-src-custom"> Custom</label>
              </div>
              <div class="auto-sched-days-time">
                <div class="auto-sched-days" id="auto-on-days">
