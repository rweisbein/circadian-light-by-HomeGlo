            const result = await response.clone().json();

              const toast = document.createElement('div');
              toast.id = 'action-hint-toast';
              toast.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(30,30,30,0.95);color:var(--text);padding:10px 16px;border-radius:8px;font-size:var(--font-value);z-index:300;border:1px solid var(--line);max-width:90%;text-align:center;';
              toast.textContent = result.hint;
              document.body.appendChild(toast);
              setTimeout(() => toast.remove(), 4000);

          // Optimistic UI: toggle button state immediately

              if (res.ok) {
                const singleStatus = await res.json();
                Object.assign(areaStatus, singleStatus);

    function formatImpact(val) {

    // Arrow-style delta for per-light rows: ↑N% / ↓N% / — when zero
    function formatImpactArrow(val) {
      if (val > 0) return '\u2191' + val + '%';
      if (val < 0) return '\u2193' + Math.abs(val) + '%';
      return '\u2014';
    }

    function renderImpactBreakdown(behav, ct) {
      return '<span class="tune-light-impact-breakdown-key">Purpose</span>'
        + '<span>' + formatImpactArrow(behav) + '</span>'
        + '<span class="tune-light-impact-breakdown-key">CT</span>'
        + '<span>' + formatImpactArrow(ct) + '</span>';
    }

    function toggleImpactBreakdown(idx, btn) {
      const elImpact = document.getElementById('tune-light-impact-' + idx);
      if (!elImpact) return;
      const item = elImpact.closest('.tune-light-item');
      if (!item) return;
      const existing = item.querySelector('.tune-light-impact-breakdown');
      if (existing) {
        existing.remove();
        btn.classList.remove('is-open');
        return;
      }
      const behav = parseInt(elImpact.dataset.behav || '0', 10);
      const ct = parseInt(elImpact.dataset.ct || '0', 10);
      const row = document.createElement('div');
      row.className = 'tune-light-impact-breakdown';
      row.innerHTML = renderImpactBreakdown(behav, ct);
      item.appendChild(row);
      btn.classList.add('is-open');
    }

    // Inverse — parses arrow notation for sorting
    function parseImpactArrow(s) {
      if (!s) return 0;
      s = s.trim();
      if (s === '\u2014') return 0;
      const c = s.charAt(0);
      const sign = c === '\u2193' ? -1 : 1;
      const num = parseFloat(s.replace(/[^\d.]/g, '')) || 0;
      return sign * num;
    }

        lumenStep: tuneState.lumenStep,
        solarStep: tuneState.solarStep,
        lightFilters: {}
      };
      for (const light of tuneState.lights) {

      const readDays = (sel) => { const d = []; document.querySelectorAll(sel).forEach(b => d.push(parseInt(b.dataset.day))); d.sort(); return d; };
      s.snapshot = {

        triggerMode: type === 'on' ? (document.getElementById('auto-on-trigger-mode')?.value || 'always') : 'always',
        untouched: type === 'off' ? (document.getElementById('auto-off-untouched')?.checked || false) : false,
        light: type === 'on' ? (s.light || 'circadian') : undefined,
        headerText: document.getElementById('auto-' + type + '-next')?.textContent || '',

    function isBrightnessDirty() {
      if (!tuneSnapshot) return false;
      if (tuneState.lumenStep !== tuneSnapshot.lumenStep) return true;
      if (tuneState.solarStep !== tuneSnapshot.solarStep) return true;
      return false;
    }

    function isLightsDirty() {
      if (!tuneSnapshot) return false;
      for (const light of tuneState.lights) {
        if (light.filterName !== (tuneSnapshot.lightFilters[light.entity_id] || 'Standard')) return true;
      }
      return false;
    }

    function isTuneDirty() {
      return isBrightnessDirty() || isLightsDirty();
    }

    function isAutoDirty(type) {
      const s = autoState[type];
      if (!s.snapshot) return false;
      if (s.source !== s.snapshot.source) return true;
      if (s.offset !== s.snapshot.offset) return true;
      if (type === 'on' && (s.light || 'circadian') !== (s.snapshot.light || 'circadian')) return true;
      const getDays = () => { const d = []; document.querySelectorAll('#auto-' + type + '-days .auto-sched-day-btn.active').forEach(b => d.push(parseInt(b.dataset.day))); d.sort(); return d; };
      if (JSON.stringify(getDays()) !== JSON.stringify(s.snapshot.days)) return true;
      if ((document.getElementById('auto-' + type + '-time-1')?.value || '') !== s.snapshot.time1) return true;
      if ((document.getElementById('auto-' + type + '-time-2')?.value || '') !== s.snapshot.time2) return true;
      const getDays2 = () => { const d = []; document.querySelectorAll('#auto-' + type + '-days-2 .auto-sched-day-btn.active').forEach(b => d.push(parseInt(b.dataset.day))); d.sort(); return d; };
      if (JSON.stringify(getDays2()) !== JSON.stringify(s.snapshot.days2)) return true;
      if (parseInt(document.getElementById('auto-' + type + '-fade')?.value || '0') !== s.snapshot.fade) return true;
      if (type === 'on' && (document.getElementById('auto-on-trigger-mode')?.value || 'always') !== s.snapshot.triggerMode) return true;
      if (type === 'off' && (document.getElementById('auto-off-untouched')?.checked || false) !== s.snapshot.untouched) return true;
      return false;
    }

          body: JSON.stringify({ area_id: areaId, filters: changed })

    // ---- Custom behaviour dropdown ----
    function closeBehaviourDropdown() {
      const existing = document.querySelector('.tune-light-dropdown');
      if (existing) existing.remove();

    function openBehaviourDropdown(idx, anchorEl) {
      closeBehaviourDropdown();
      const light = tuneState.lights[idx];
      if (!light) return;
      const ts = tuneState;
      const presets = ts.presets;
      const presetNames = Object.keys(presets);

      // Snapshot state for per-row impact preview (set by last recalcTune)
      const briRange = ts.maxBri - ts.minBri;
      const curvePos = briRange > 0 ? Math.max(0, Math.min(1, (ts.baseBri - ts.minBri) / briRange)) : 0;
      const areaBri = ts._lastAreaBri ?? ts.baseBri;
      const ctFactor = ts._lastCtFactor ?? 1.0;

      const fmtDelta = (v) => v === 0 ? '0' : (v > 0 ? '+' + v : String(v));
      const fmtOff = (t) => (t && t > 0) ? '&lt;' + t : '\u2212';

      const computeFinal = (pName) => {
        const p = presets[pName] || {};
        const atDim = p.at_dim ?? 100;
        const atBright = p.at_bright ?? 100;
        const offThresh = p.off_threshold ?? ts.globalOffThreshold;
        const filterMult = (atDim + (atBright - atDim) * curvePos) / 100;
        const afterFilter = areaBri * filterMult;
        const afterCt = afterFilter * ctFactor;
        const isOff = afterFilter < offThresh;
        return isOff ? 0 : Math.min(100, Math.round(afterCt));
      };

      const dropdown = document.createElement('div');
      dropdown.className = 'tune-light-dropdown';

      const header = document.createElement('div');
      header.className = 'tune-light-dropdown-header';
      header.innerHTML = '<span></span><span>Purpose</span><span>Dim</span><span>Bright</span><span>Off</span><span>Now</span>';
      dropdown.appendChild(header);

      for (const pName of presetNames) {
        const preset = presets[pName] || {};
        const atDim = preset.at_dim ?? 100;
        const atBright = preset.at_bright ?? 100;
        const offThresh = preset.off_threshold ?? ts.globalOffThreshold;
        const isSelected = pName === light.filterName;
        const finalVal = computeFinal(pName);

        const row = document.createElement('div');
        row.className = 'tune-light-dropdown-row' + (isSelected ? ' selected' : '');
        row.innerHTML =
          '<span class="tune-light-dropdown-dot">' + (isSelected ? '\u25CF' : '') + '</span>'
          + '<span class="tune-light-dropdown-name">' + pName + '</span>'
          + '<span class="tune-light-dropdown-num">' + fmtDelta(atDim - 100) + '</span>'
          + '<span class="tune-light-dropdown-num">' + fmtDelta(atBright - 100) + '</span>'
          + '<span class="tune-light-dropdown-num">' + fmtOff(offThresh) + '</span>'
          + '<span class="tune-light-dropdown-final">' + finalVal + '%</span>';
        row.addEventListener('click', () => {
          light.filterName = pName;
          if (!ts.areaInfo.light_filters) ts.areaInfo.light_filters = {};
          if (pName === 'Standard') {
            delete ts.areaInfo.light_filters[light.entity_id];
          } else {
            ts.areaInfo.light_filters[light.entity_id] = pName;
          }
          const labelEl = document.getElementById('tune-light-preset-label-' + idx);
          if (labelEl) labelEl.textContent = pName;
          recalcTune();
          updateTuneButtons();
          closeBehaviourDropdown();
        });
        dropdown.appendChild(row);
      }

      const newSlot = document.createElement('div');
      newSlot.className = 'tune-light-dropdown-new';
      newSlot.textContent = '+ New purpose\u2026';
      newSlot.title = 'Coming soon';
      dropdown.appendChild(newSlot);

      document.body.appendChild(dropdown);

      // Position relative to anchor
      const rect = anchorEl.getBoundingClientRect();
      let left = rect.left;
      let top = rect.bottom + 4;
      if (left + dropdown.offsetWidth > window.innerWidth - 8) left = window.innerWidth - dropdown.offsetWidth - 8;
      if (top + dropdown.offsetHeight > window.innerHeight - 8) top = rect.top - dropdown.offsetHeight - 4;
      dropdown.style.left = left + 'px';
      dropdown.style.top = top + 'px';
      dropdown.style.position = 'fixed';

      // Close on outside click
      setTimeout(() => {
        const closeHandler = (e) => {
          if (!dropdown.contains(e.target) && e.target !== anchorEl) {
            closeBehaviourDropdown();
            document.removeEventListener('click', closeHandler, true);
          }
        };
        document.addEventListener('click', closeHandler, true);
      }, 0);
    }

    // ---- recalcTune: pure client-side math, reads tuneState, writes to DOM ----
    function recalcTune() {
      if (!tuneState.initialized) return;
      const ts = tuneState;

      // -- Brightness cascade (matches backend: curve → sun bright → area×factor → +override → +boost) --
      const baseBriPct = ts.baseBri;
      let running = baseBriPct / 100;

      // Solar: client-side sun bright factor (mirrors brain.py:calculate_natural_light_factor)
      const exposure = SOLAR_STEPS[ts.solarStep].exposure;
      let sunBrightFactor = 1.0;
      if (exposure > 0 && ts.outdoorNormalized > 0) {
        // Use brightness-specific fade weight from backend (not color breakdown)
        const fadeWeight = (ts.brightnessFadeWeight != null)
          ? ts.brightnessFadeWeight : 1.0;
        const fadedOutdoor = ts.outdoorNormalized * fadeWeight;
        sunBrightFactor = Math.max(0.0, 1.0 - exposure * fadedOutdoor * ts.brightnessSensitivity);
      }
      const sunBrightFactorPct = Math.round(sunBrightFactor * 100);
      const beforeSolar = Math.round(running * 100);
      running *= sunBrightFactor;
      const afterSolar = Math.round(running * 100);
      const solarImpact = afterSolar - beforeSolar;

      // Lumen adjustment (area_factor)
      ts.areaFactor = LUMEN_STEPS[ts.lumenStep].factor;
      const areaFactorPct = Math.round(ts.areaFactor * 100);
      const beforeLumen = Math.round(running * 100);
      running *= ts.areaFactor;
      const afterLumen = Math.round(running * 100);
      const lumenImpact = afterLumen - beforeLumen;

      // Brightness override (additive, from slider/buttons, decaying)
      const briOverride = ts.briOverride || 0;
      if (briOverride) {
        running += briOverride / 100;
        running = Math.max(0, Math.min(1, running));
      }

      // Boost (additive, after area_factor — matching backend)
      const boostAmount = ts.boosted ? (ts.boostBrightness || 0) : 0;
      const beforeBoost = Math.round(running * 100);
      running += boostAmount / 100;
      const afterBoost = Math.round(running * 100);
      const boostImpact = afterBoost - beforeBoost;

      // Motion warning dim (multiplicative, from pipeline dim_factor)
      const dimFactor = ts.dimFactor ?? 1.0;
      const beforeDim = Math.round(running * 100);
      if (dimFactor < 1.0) {
        running = Math.max(0.01, running * dimFactor);
      }
      const afterDim = Math.round(running * 100);
      const dimImpact = afterDim - beforeDim;

      // Fade (uses actual_brightness from API to compute delta)
      const unfadedBri = Math.round(running * 100);
      let fadeDelta = 0;
      if (ts.fadeDirection && ts.actualBrightness != null) {
        fadeDelta = ts.actualBrightness - unfadedBri;
        running = ts.actualBrightness / 100;
      }

      // -- CT compensation factor (computed from actual delivered kelvin) --
      // Use api_kelvin which includes solar rules + color_override
      const adjustedK = selectedArea?.kelvin ?? ts.baseKelvin;
      let ctFactor = 1.0;
      if (ts.ctEnabled && adjustedK != null) {
        if (adjustedK <= ts.ctBegin) ctFactor = ts.ctMax;
        else if (adjustedK < ts.ctEnd) ctFactor = 1.0 + ((ts.ctEnd - adjustedK) / (ts.ctEnd - ts.ctBegin)) * (ts.ctMax - 1.0);
      }

      // Area brightness (no CT — CT is per-light, applied after filter multiplier)
      const areaBri = Math.round(running * 100);
      const netImpact = areaBri - baseBriPct;
      ts._lastAreaBri = areaBri;
      ts._lastCtFactor = ctFactor;

      // -- Brightness card: slider word labels --
      const elLumenWord = document.getElementById('tune-lumen-word');
      if (elLumenWord) {
        const lf = LUMEN_STEPS[ts.lumenStep].factor;
        const lfSuffix = Math.abs(lf - 1.0) < 0.005 ? '' : (Math.round((lf - 1.0) * 100) > 0 ? ' +' : ' ') + Math.round((lf - 1.0) * 100) + '%';
        elLumenWord.textContent = LUMEN_STEPS[ts.lumenStep].label + lfSuffix;
      }
      const elSolarWord = document.getElementById('tune-solar-word');
      if (elSolarWord) {
        const sLabel = SOLAR_STEPS[ts.solarStep].label;
        const sExposure = SOLAR_STEPS[ts.solarStep].exposure;
        let leftText = sExposure > 0 ? sLabel + ' ' + sExposure.toFixed(2) : sLabel;
        let rightText = '';
        if (sExposure > 0) {
          const peakNl = Math.max(0.0, 1.0 - sExposure * 1.0 * ts.brightnessSensitivity);
          const peakDrop = Math.round((1.0 - peakNl) * 100);
          rightText = 'peak sun \u2193 ' + Math.min(peakDrop, 100) + '%';
        }
        elSolarWord.innerHTML = '<span class="tune-solar-main">' + leftText + '</span>' + (rightText ? '<span class="tune-solar-peak">' + rightText + '</span>' : '');
      }

      // -- Card 3: Lights --
      const briRange = ts.maxBri - ts.minBri;
      const curvePos = briRange > 0 ? Math.max(0, Math.min(1, (ts.baseBri - ts.minBri) / briRange)) : 0;
      let anyCapped = false;

      for (const light of ts.lights) {
        const preset = ts.presets[light.filterName] || { at_bright: 100, at_dim: 100 };
        const atDim = preset.at_dim ?? 100;
        const atBright = preset.at_bright ?? 100;
        const offThresh = preset.off_threshold ?? ts.globalOffThreshold;
        const filterMult = (atDim + (atBright - atDim) * curvePos) / 100;
        // Pipeline order: area_brightness × filter → CT comp
        const afterFilter = areaBri * filterMult;
        const afterCt = afterFilter * ctFactor;
        const isOff = afterFilter < offThresh;
        const wasCapped = afterCt > 100;
        const finalVal = isOff ? 0 : Math.min(100, Math.round(afterCt));
        if (wasCapped && finalVal === 100) anyCapped = true;

        const elBri = document.getElementById('tune-light-bri-' + light.idx);
        if (elBri) {
          elBri.className = 'tune-light-bri';
          if (wasCapped && finalVal === 100) {
            elBri.innerHTML = finalVal + '%<span class="tune-capped-star">*</span>';
          } else {
            elBri.textContent = finalVal + '%';
          }
        }
        const behavImpact = Math.round(afterFilter) - areaBri;
        const ctImpact = (ts.ctEnabled && ctFactor !== 1.0) ? (Math.round(afterCt) - Math.round(afterFilter)) : 0;
        const totalImpact = behavImpact + ctImpact;
        const elImpact = document.getElementById('tune-light-impact-' + light.idx);
        if (elImpact) {
          if (totalImpact !== 0) {
            elImpact.innerHTML = formatImpactArrow(totalImpact)
              + '<span class="tune-light-impact-info" onclick="event.stopPropagation(); toggleImpactBreakdown(' + light.idx + ', this)" aria-label="Show breakdown">\u24D8</span>';
            elImpact.dataset.behav = behavImpact;
            elImpact.dataset.ct = ctImpact;
          } else {
            elImpact.textContent = formatImpactArrow(totalImpact);
            delete elImpact.dataset.behav;
            delete elImpact.dataset.ct;
          }
          elImpact.removeAttribute('title');
          const item = elImpact.closest('.tune-light-item');
          const openRow = item ? item.querySelector('.tune-light-impact-breakdown') : null;
          if (openRow) {
            if (totalImpact !== 0) {
              openRow.innerHTML = renderImpactBreakdown(behavImpact, ctImpact);
            } else {
              openRow.remove();
              const btn = elImpact.querySelector('.tune-light-impact-info');
              if (btn) btn.classList.remove('is-open');
            }
          }
        }
      }

      const legendEl = document.getElementById('tune-lights-legend');
      if (legendEl) {
        if (anyCapped) {
          legendEl.textContent = '* capped at 100%';
          legendEl.style.display = '';
        } else {
          legendEl.style.display = 'none';
        }
      }

      // -- Brightness card: cascade values --
      const elBaseBri = document.getElementById('tune-det-base-total');
      if (elBaseBri) elBaseBri.textContent = baseBriPct + '%';

      const elBoostVal = document.getElementById('tune-det-boost-val');
      if (elBoostVal) {
        elBoostVal.textContent = boostAmount > 0 ? '+' + boostAmount + '%' : '0%';
      }

      const elLumenImpact = document.getElementById('tune-det-lumen-val');
      if (elLumenImpact) elLumenImpact.textContent = formatImpact(lumenImpact) + '%';

      const elSolarImpact = document.getElementById('tune-det-solar-val');
      if (elSolarImpact) elSolarImpact.textContent = formatImpact(solarImpact) + '%';

      const elOverrideRow = document.getElementById('tune-det-override-row');
      const elOverrideVal = document.getElementById('tune-det-override-val');
      const elOverrideLabel = document.getElementById('tune-det-override-label');
      const overrideRounded = Math.round(briOverride);
      if (elOverrideRow) {
        if (elOverrideLabel) elOverrideLabel.textContent = overrideRounded < 0 ? 'User dimmed' : 'User brightened';
        if (elOverrideVal) elOverrideVal.textContent = formatImpact(overrideRounded) + '%';
      }

      // Dim row (motion warning)
      const elDimRow = document.getElementById('tune-det-dim-row');
      const elDimVal = document.getElementById('tune-det-dim-val');
      if (elDimVal) elDimVal.textContent = formatImpact(dimImpact) + '%';

      // Fade row
      const elFadeLabel = document.getElementById('tune-det-fade-label');
      const elFadeVal = document.getElementById('tune-det-fade-val');
      if (elFadeLabel) {
        elFadeLabel.textContent = ts.fadeDirection === 'out' ? 'Auto-off fade' : 'Auto-on fade';
      }
      if (elFadeVal) {
        elFadeVal.textContent = formatImpact(fadeDelta) + '%';
      }

      // Collapse zero-value activity rows; show placeholder when all are zero
      updateActivityVisibility({
        override: overrideRounded,
        boost: boostAmount,
        dim: dimImpact,
        fade: fadeDelta,
      });

      const elBriHeader = document.getElementById('tune-brightness-header-val');
      if (elBriHeader) elBriHeader.textContent = areaBri + '%';

      const elFinalVal = document.getElementById('tune-det-final-val');
      if (elFinalVal) elFinalVal.textContent = areaBri + '%';

      // Net adjustment row — arrow notation, but show "0%" (not "—") so the chevron stays anchored
      const netAdj = areaBri - baseBriPct;
      const elAdjNet = document.getElementById('tune-det-adj-net');
      if (elAdjNet) {
        if (netAdj === 0) elAdjNet.textContent = '0%';
        else elAdjNet.textContent = (netAdj > 0 ? '\u2191' : '\u2193') + Math.abs(netAdj) + '%';
      }

      sortLightsList();
    }

    function sortLightsList() {
      const list = document.getElementById('tune-lights-list');
      if (!list) return;
      const items = [...list.querySelectorAll('.tune-light-item')];
      if (items.length === 0) return;

      items.sort((a, b) => {
        let va, vb;
        if (lightSortOrder === 'name') {
          va = a.querySelector('.tune-light-name')?.textContent || '';
          vb = b.querySelector('.tune-light-name')?.textContent || '';
          return lightSortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
        }
        if (lightSortOrder === 'behaviour') {
          va = a.querySelector('.tune-light-behaviour')?.textContent || '';
          vb = b.querySelector('.tune-light-behaviour')?.textContent || '';
          const cmp = lightSortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
          if (cmp !== 0) return cmp;
          // Tiebreak by name (always ascending)
          const na = a.querySelector('.tune-light-name')?.textContent || '';
          const nb = b.querySelector('.tune-light-name')?.textContent || '';
          return na.localeCompare(nb);
        }
        const colMap = { impact: '.tune-light-impact', final: '.tune-light-bri' };
        const aText = a.querySelector(colMap[lightSortOrder])?.textContent || '';
        const bText = b.querySelector(colMap[lightSortOrder])?.textContent || '';
        if (lightSortOrder === 'impact') {
          va = parseImpactArrow(aText);
          vb = parseImpactArrow(bText);
        } else {
          va = parseFloat(aText) || 0;
          vb = parseFloat(bText) || 0;
        }
        return lightSortAsc ? va - vb : vb - va;
      });

      items.forEach(item => list.appendChild(item));

      // Update active-sort class + direction on headers
      const card = list.closest('.tune-lights-card');
      if (card) {
        card.querySelectorAll('.tune-light-sort').forEach(h => {
          const isActive = h.dataset.sort === lightSortOrder;
          h.classList.toggle('active-sort', isActive);
          h.classList.toggle('sort-asc', isActive && lightSortAsc);
          h.classList.toggle('sort-desc', isActive && !lightSortAsc);
        });
      }
    }

    // ---- renderUnifiedTune: builds the entire tune section (4 cards) ----
    function renderUnifiedTune(filtersData, config, statusData, areaId) {
      const section = document.getElementById('area-tune-section');
      if (!filtersData || !areaId) { section.style.display = 'none'; return; }

      // Find area in zones
      let areaInfo = null;
      for (const zone of Object.values(filtersData.zones || {})) {
        const found = (zone.areas || []).find(a => a.id === areaId);
        if (found) { areaInfo = found; break; }
      }
      if (!areaInfo) { section.style.display = 'none'; return; }

      section.style.display = 'block';

      const presets = filtersData.presets || {};
      const presetNames = Object.keys(presets);
      const areaLights = (filtersData.area_lights || {})[areaId] || [];
      const lightFilters = (areaInfo && areaInfo.light_filters) || {};
      const factor = areaInfo.brightness_factor ?? 1.0;
      const storedExposure = areaInfo.natural_light_exposure ?? 0.0;

      // Find closest lumen step from stored factor
      let lumenStep = 4;
      let closestDist = Infinity;
      for (let i = 0; i < LUMEN_STEPS.length; i++) {
        const dist = Math.abs(LUMEN_STEPS[i].factor - factor);
        if (dist < closestDist) { closestDist = dist; lumenStep = i; }
      }

      // Find closest solar step from stored exposure
      let solarStep = 0;
      closestDist = Infinity;
      for (let i = 0; i < SOLAR_STEPS.length; i++) {
        const dist = Math.abs(SOLAR_STEPS[i].exposure - storedExposure);
        if (dist < closestDist) { closestDist = dist; solarStep = i; }
      }

      const status = areaStatus[areaId] || {};
      const liveStatus = statusData[areaId] || {};
      const baseBri = status.curve_brightness || status.brightness || 50;
      const kelvin = status.kelvin || 4000;

      // Zone min/max
      const areaZoneName = selectedArea.zone_name;
      const zoneData = areaZoneName ? (cachedGlozones?.zones?.[areaZoneName] || {}) : {};
      const minBri = zoneData.min_brightness || (cachedConfig && cachedConfig.min_brightness) || 1;
      const maxBri = zoneData.max_brightness || (cachedConfig && cachedConfig.max_brightness) || 100;

      // Build lights array for tuneState
      const sortedLights = [...areaLights].sort((a, b) => a.name.localeCompare(b.name));
      const lightsArr = sortedLights.map((l, idx) => ({
        entity_id: l.entity_id,
        name: l.name,
        filterName: lightFilters[l.entity_id] || 'Standard',
        idx: idx,
      }));

      // Populate tuneState
      Object.assign(tuneState, {
        initialized: true,
        baseBri: baseBri,
        baseKelvin: liveStatus.base_kelvin ?? kelvin,
        sunElev: liveStatus.sun_elevation ?? 0,
        outdoorNormalized: liveStatus.outdoor_normalized ?? liveStatus.sun_factor ?? 0.0,
        outdoorSource: liveStatus.outdoor_source ?? 'none',
        outdoorSourceEntity: liveStatus.outdoor_source_entity ?? null,
        outdoorLastUpdate: liveStatus.outdoor_last_update ?? null,
        luxSmoothed: liveStatus.lux_smoothed ?? null,
        luxCeiling: liveStatus.lux_ceiling ?? null,
        luxFloor: liveStatus.lux_floor ?? null,
        weatherCondition: liveStatus.weather_condition ?? null,
        conditionMultiplier: liveStatus.condition_multiplier ?? null,
        angleFactor: liveStatus.angle_factor ?? null,
        ctEnabled: config.ct_comp_enabled || false,
        ctBegin: config.ct_comp_begin || 1650,
        ctEnd: config.ct_comp_end || 2250,
        ctMax: config.ct_comp_factor || 1.7,
        brightnessSensitivity: liveStatus.brightness_sensitivity ?? 5.0,
        backendSunBrightFactor: liveStatus.sun_bright_factor ?? null,
        brightnessFadeWeight: liveStatus.brightness_fade_weight ?? null,
        solarBreakdown: liveStatus.solar_breakdown ?? null,
        dimFactor: status.dim_factor ?? 1.0,
        areaFactor: LUMEN_STEPS[lumenStep].factor,
        lumenStep: lumenStep,
        solarStep: solarStep,
        lights: lightsArr,
        presets: presets,
        globalOffThreshold: filtersData.off_threshold ?? 3,
        minBri: minBri,
        maxBri: maxBri,
        areaId: areaId,
        areaInfo: areaInfo,
        areaName: selectedArea.name || '',
        boosted: status.boosted || false,
        boostBrightness: status.boost_brightness || 0,
      });

      // ── Tune card (waterfall equation) ──
      const brightnessCard = document.getElementById('tune-brightness-card');
      const briExpanded = _pageFocus === 'tune' || (_persistCards && localStorage.getItem('tune_collapsed') !== 'true');
      let bhtml = '<div class="tune-brightness-header" onclick="toggleBrightnessBody()">';
      bhtml += '<span class="tune-brightness-chevron" id="tune-brightness-chevron">&#x203A;</span>';
      bhtml += '<span class="tune-brightness-title">Tune</span>';
      bhtml += '<span class="tune-brightness-val" id="tune-brightness-header-val">--</span>';
      bhtml += '</div>';
      bhtml += '<div class="tune-brightness-body" id="tune-brightness-body">';
      bhtml += '<div class="tune-wf">';
      // Curve (starting value)
      bhtml += '<div class="tune-wf-row">'
        + '<span class="tune-wf-op"></span>'
        + '<span class="tune-wf-label">Curve</span>'
        + '<span class="tune-wf-reset"></span>'
        + '<span class="tune-wf-val" id="tune-det-base-total">' + baseBri + '%</span>'
        + '</div>';
      // + Sun exposure (with slider beneath)
      bhtml += '<div class="tune-wf-row">'
        + '<span class="tune-wf-op">+</span>'
        + '<span class="tune-wf-label">Sun exposure</span>'
        + '<span class="tune-wf-reset" id="tune-reset-solar">reset</span>'
        + '<span class="tune-wf-val" id="tune-det-solar-val">0%</span>'
        + '</div>';
      bhtml += '<div class="tune-wf-slider">'
        + '<input type="range" class="tune-inline-slider tune-inline-slider--sun" id="tune-slider-solar" min="0" max="9" step="1" value="' + solarStep + '">'
        + '<span class="tune-slider-word" id="tune-solar-word"><span class="tune-solar-main">' + SOLAR_STEPS[solarStep].label + '</span></span></div>';
      // + Room balance (with slider beneath)
      bhtml += '<div class="tune-wf-row">'
        + '<span class="tune-wf-op">+</span>'
        + '<span class="tune-wf-label">Room balance</span>'
        + '<span class="tune-wf-reset" id="tune-reset-lumen">reset</span>'
        + '<span class="tune-wf-val" id="tune-det-lumen-val">0%</span>'
        + '</div>';
      bhtml += '<div class="tune-wf-slider">'
        + '<input type="range" class="tune-inline-slider tune-inline-slider--light" id="tune-slider-lumen" min="0" max="8" step="1" value="' + lumenStep + '">'
        + '<span class="tune-slider-word" id="tune-lumen-word">' + LUMEN_STEPS[lumenStep].label + (function(f){ if(Math.abs(f-1)<0.005) return ''; var p=Math.round((f-1)*100); return (p>0?' +':' ')+p+'%'; })(factor) + '</span></div>';
      // + User override / Boost / Dimming / Fade (show 0% rows)
      bhtml += '<div class="tune-wf-row" id="tune-det-override-row">'
        + '<span class="tune-wf-op">+</span>'
        + '<span class="tune-wf-label" id="tune-det-override-label">User brightened</span>'
        + '<span class="tune-wf-reset"></span>'
        + '<span class="tune-wf-val" id="tune-det-override-val">0%</span>'
        + '</div>';
      bhtml += '<div class="tune-wf-row" id="tune-det-boost-row">'
        + '<span class="tune-wf-op">+</span>'
        + '<span class="tune-wf-label">Boost</span>'
        + '<span class="tune-wf-reset"></span>'
        + '<span class="tune-wf-val" id="tune-det-boost-val">0%</span>'
        + '</div>';
      bhtml += '<div class="tune-wf-row" id="tune-det-dim-row">'
        + '<span class="tune-wf-op">+</span>'
        + '<span class="tune-wf-label">Dimming</span>'
        + '<span class="tune-wf-reset"></span>'
        + '<span class="tune-wf-val" id="tune-det-dim-val">0%</span>'
        + '</div>';
      bhtml += '<div class="tune-wf-row" id="tune-det-fade-row">'
        + '<span class="tune-wf-op">+</span>'
        + '<span class="tune-wf-label" id="tune-det-fade-label">Auto-on fade</span>'
        + '<span class="tune-wf-reset"></span>'
        + '<span class="tune-wf-val" id="tune-det-fade-val">0%</span>'
        + '</div>';
      // Divider + total
      bhtml += '<div class="tune-wf-divider"></div>';
      bhtml += '<div class="tune-wf-row tune-wf-total">'
        + '<span class="tune-wf-op">=</span>'
        + '<span class="tune-wf-label">Area Brightness</span>'
        + '<span class="tune-wf-reset"></span>'
        + '<span class="tune-wf-val" id="tune-det-final-val">--</span>'
        + '</div>';
      bhtml += '</div>'; // end .tune-wf
      bhtml += '<div class="section-action-bar" id="tune-action-bar" style="display:none;">';
      bhtml += '<button class="section-cancel-btn" onclick="cancelBrightnessChanges()">Cancel</button>';
      bhtml += '<button class="section-save-btn" onclick="saveBrightnessChanges()">Save</button>';
      bhtml += '</div>';
      bhtml += '</div>';
      brightnessCard.innerHTML = bhtml;

      // Set initial expanded state
      if (briExpanded) brightnessCard.classList.add('is-open');

      // ── Lights card (separate, per-light list) ──
      const lightsCard = document.getElementById('tune-lights-card');
      const lightsExpanded = _pageFocus === 'lights' || (_persistCards && localStorage.getItem('lights_collapsed') !== 'true');
      let lhtml = '<div class="tune-lights-header" onclick="toggleLightsBody()">'
        + '<span class="tune-lights-chevron">&#x203A;</span>'
        + '<span class="tune-lights-title">Lights</span>'
        + '<span class="tune-lights-count" id="tune-lights-count">' + (sortedLights.length || '') + '</span>'
        + '</div>';
      lhtml += '<div class="tune-lights-body">';

      // Feedback target selector — top of Lights body
      const currentFeedback = areaInfo.feedback_target || null;
      const purposeCounts = {};
      for (const light of lightsArr) {
        purposeCounts[light.filterName] = (purposeCounts[light.filterName] || 0) + 1;
      }
      const mostPopular = Object.keys(purposeCounts).sort((a, b) => purposeCounts[b] - purposeCounts[a])[0] || 'Standard';
      const purposes = [...new Set(lightsArr.map(l => l.filterName))].sort();

      let fbhtml = '<div style="display:flex;align-items:center;gap:6px;padding:6px 14px;font-size:var(--font-body);color:var(--muted);">';
      fbhtml += '<span>Feedback light:</span>';
      fbhtml += '<select id="tune-feedback-target" onchange="saveFeedbackTarget()" style="background:var(--card);color:var(--text);border:1px solid var(--line);border-radius:4px;padding:2px 4px;font-size:var(--font-body);">';
      fbhtml += '<option value=""' + (!currentFeedback ? ' selected' : '') + '>Auto (' + mostPopular + ')</option>';
      fbhtml += '<optgroup label="Purposes">';
      for (const p of purposes) {
        fbhtml += '<option value="' + p + '"' + (currentFeedback === p ? ' selected' : '') + '>' + p + '</option>';
      }
      fbhtml += '</optgroup>';
      fbhtml += '<optgroup label="Individual lights">';
      for (const light of lightsArr) {
        const isSelected = currentFeedback === light.entity_id;
        fbhtml += '<option value="' + light.entity_id + '"' + (isSelected ? ' selected' : '') + '>' + light.name + '</option>';
      }
      fbhtml += '</optgroup>';
      fbhtml += '</select></div>';
      lhtml += fbhtml;
      const controlsBody = document.getElementById('tune-controls-body');
      const controlsListHtml = renderAreaControlsList();
      if (controlsBody) controlsBody.innerHTML = controlsListHtml;
      const controlsCard = document.getElementById('tune-controls-card');
      if (controlsCard) {
        controlsCard.style.display = '';
        if (_persistCards && localStorage.getItem('tune_controls_expanded') === 'true') {
          controlsCard.classList.add('is-open');
        }
      }
      const countEl = document.getElementById('tune-controls-count');
      if (countEl) countEl.textContent = areaControls.length > 0 ? areaControls.length : '';

      lhtml += '<div id="tune-lights-list">';
      if (sortedLights.length === 0) {
        lhtml += '<div style="padding:10px 14px;color:var(--muted2);font-size:var(--font-value);">No lights found</div>';
      } else {
        lhtml += '<div class="tune-light-col-headers">'
          + '<span class="tune-light-sort" data-sort="name">light</span>'
          + '<span class="tune-light-sort" data-sort="behaviour">purpose</span>'
          + '<span class="tune-light-sort" data-sort="impact">impact</span>'
          + '<span class="tune-light-sort tune-light-sort-final" data-sort="final">final</span>'
          + '</div>';
        for (const light of lightsArr) {
          lhtml += '<div class="tune-light-item" data-idx="' + light.idx + '">';
          lhtml += '<div class="tune-light-summary" data-idx="' + light.idx + '">'
            + '<span class="tune-light-name" title="' + light.entity_id + '">' + light.name + '</span>'
            + '<span class="tune-light-behaviour" id="tune-light-preset-label-' + light.idx + '" data-idx="' + light.idx + '">' + light.filterName + '</span>'
            + '<span class="tune-light-impact" id="tune-light-impact-' + light.idx + '"></span>'
            + '<span class="tune-light-bri" id="tune-light-bri-' + light.idx + '"></span>'
            + '</div>';
          lhtml += '</div>';
        }
      }
      lhtml += '</div>';
      lhtml += '<div id="tune-lights-legend" style="display:none; padding:4px 14px 6px; font-size:var(--font-caps); color:var(--muted2);"></div>';
      lhtml += '<div class="section-action-bar" id="lights-action-bar" style="display:none;">';
      lhtml += '<button class="section-cancel-btn" onclick="cancelLightsChanges()">Cancel</button>';
      lhtml += '<button class="section-save-btn" onclick="saveLightsChanges()">Save</button>';
      lhtml += '</div>';
      lhtml += '</div>'; // end .tune-lights-body
      lightsCard.innerHTML = lhtml;
      lightsCard.style.display = '';
      if (lightsExpanded) lightsCard.classList.add('is-open');
      else lightsCard.classList.remove('is-open');

      // ── Wire events ──

      // Lumen slider
      const lumenSlider = document.getElementById('tune-slider-lumen');
      if (lumenSlider) {
        updateSliderFill(lumenSlider);
        lumenSlider.addEventListener('input', () => {
          sliderInteracting = true;
          tuneState.lumenStep = parseInt(lumenSlider.value);
          recalcTune();
          updateTuneButtons();
          updateSliderFill(lumenSlider);
          if (selectedArea) renderMiniChartForArea(selectedArea.area_id);
          updateAllSliders();
        });
        lumenSlider.addEventListener('change', () => {
          sliderInteracting = false;
          updateTuneButtons();
        });
      }

      // Solar slider
      const solarSlider = document.getElementById('tune-slider-solar');
      if (solarSlider) {
        updateSliderFill(solarSlider);
        solarSlider.addEventListener('input', () => {
          sliderInteracting = true;
          tuneState.solarStep = parseInt(solarSlider.value);
          recalcTune();
          updateTuneButtons();
          updateSliderFill(solarSlider);
          if (selectedArea) renderMiniChartForArea(selectedArea.area_id);
          updateAllSliders();
        });
        solarSlider.addEventListener('change', () => {
          sliderInteracting = false;
          updateTuneButtons();
        });
      }

      // Reset lumen to last saved value
      const resetLumen = document.getElementById('tune-reset-lumen');
      if (resetLumen) {
        resetLumen.onclick = (e) => {
          e.stopPropagation();
          const savedStep = tuneSnapshot ? tuneSnapshot.lumenStep : 4;
          tuneState.lumenStep = savedStep;
          tuneState.areaFactor = LUMEN_STEPS[savedStep].factor;
          if (lumenSlider) { lumenSlider.value = savedStep; updateSliderFill(lumenSlider); }
          recalcTune();
          updateTuneButtons();
          if (selectedArea) renderMiniChartForArea(selectedArea.area_id);
          updateAllSliders();
        };
      }

      // Reset solar to last saved value
      const resetSolar = document.getElementById('tune-reset-solar');
      if (resetSolar) {
        resetSolar.onclick = (e) => {
          e.stopPropagation();
          const savedStep = tuneSnapshot ? tuneSnapshot.solarStep : 0;
          tuneState.solarStep = savedStep;
          if (solarSlider) { solarSlider.value = savedStep; updateSliderFill(solarSlider); }
          recalcTune();
          updateTuneButtons();
          if (selectedArea) renderMiniChartForArea(selectedArea.area_id);
          updateAllSliders();
        };
      }

      // Light accordion + preset selects
      const lightsList = document.getElementById('tune-lights-list');
      if (lightsList) {
        // Behaviour link clicks open purpose picker directly
        lightsList.querySelectorAll('.tune-light-behaviour').forEach(link => {
          link.addEventListener('click', (e) => {
            e.stopPropagation();
            const idx = parseInt(link.dataset.idx);
            openBehaviourDropdown(idx, link);
          });
        });
      }

      // Light column sort headers
      const lightsCardEl = document.getElementById('tune-lights-card');
      if (lightsCardEl) {
        lightsCardEl.querySelectorAll('.tune-light-sort').forEach(h => {
          h.addEventListener('click', () => {
            const sort = h.dataset.sort;
            if (lightSortOrder === sort) {
              lightSortAsc = !lightSortAsc;
            } else {
              lightSortOrder = sort;
              lightSortAsc = (sort === 'name' || sort === 'behaviour');
            }
            sortLightsList();
          });
        });
      }

      // Initial calc
      recalcTune();
      captureTuneSnapshot();
    }

    async function loadTuneSection() {
      if (!selectedArea) return;
      const section = document.getElementById('area-tune-section');

      try {
        const areaId = selectedArea.area_id;
        const [filtersRes, configRes, statusRes, controlsRes] = await Promise.all([
          fetch(basePath + '/api/light-filters'),
          fetch(basePath + '/api/config'),
          fetch(basePath + '/api/area-status?area_id=' + encodeURIComponent(areaId)),
          fetch(basePath + '/api/controls')
        ]);
        if (!filtersRes.ok || !configRes.ok) { section.style.display = 'none'; return; }
        const filtersData = await filtersRes.json();
        const config = await configRes.json();
        const statusData = statusRes.ok ? await statusRes.json() : {};

        // Parse controls that reach this area
        feedbackRestrictToPrimary = config.feedback_restrict_to_primary ?? false;
        if (controlsRes.ok) {
          const controlsData = await controlsRes.json();
          areaControls = filterControlsForArea(controlsData.controls || [], areaId);
        }

        renderUnifiedTune(filtersData, config, statusData, areaId);
      } catch (err) {
        section.style.display = 'none';
        console.error('Tune section error:', err);
      }
    }

    let areaControls = [];
    let feedbackRestrictToPrimary = false;

    function filterControlsForArea(controls, areaId) {
      const result = [];
      for (const ctrl of controls) {
        if (!ctrl.scopes || ctrl.scopes.length === 0) continue;
        // Collect scopes that include this area
        const matchingScopes = ctrl.scopes.filter(s => s.areas && s.areas.includes(areaId));
        if (matchingScopes.length > 0) {
          result.push({ ...ctrl, _matchingScopes: matchingScopes });
        }
      }
      return result;
    }

    function areaName(areaId) {
      const a = areas.find(x => x.area_id === areaId);
      return a ? a.name : areaId;
    }

    function switchImpactLabel(ctrl) {
      const scopes = ctrl._matchingScopes || [];
      const currentAreaId = selectedArea ? selectedArea.area_id : '';
      const parts = [];
      for (const scope of scopes) {
        const others = (scope.areas || []).filter(id => id !== currentAreaId);
        if (others.length === 0) {
          parts.push('Solo');
        } else {
          // Pick the "featured" area name
          let featured = null;
          if (feedbackRestrictToPrimary && scope.feedback_area && others.includes(scope.feedback_area)) {
            featured = scope.feedback_area;
          }
          if (!featured) {
            // First alphabetically by name
            featured = others.sort((a, b) => areaName(a).localeCompare(areaName(b)))[0];
          }
          const rest = others.length - 1;
          if (rest === 0) {
            parts.push('+ ' + areaName(featured));
          } else if (others.length <= 2) {
            parts.push('+ ' + others.sort((a, b) => areaName(a).localeCompare(areaName(b))).map(id => areaName(id)).join(', '));
          } else {
            parts.push(areaName(featured) + ' +' + rest);
          }
        }
      }
      return parts.join(' | ');
    }

    function sensorScopeToken(scope) {
      if (!scope.mode || scope.mode === 'disabled') return null;
      if (scope.mode === 'alert') return 'Alert';
      if (scope.mode === 'on_only') {
        return scope.boost_enabled ? 'On boost' : 'On';
      }
      // on_off — duration implies "turns on"
      const dur = formatDuration(scope.duration || 60);
      return scope.boost_enabled ? dur + ' boost' : dur;
    }

    function controlImpactLabel(ctrl) {
      const scopes = ctrl._matchingScopes || [];
      if (ctrl.category === 'switch') {
        return switchImpactLabel(ctrl);
      }
      if (!scopes.length) return '';
      const tokens = scopes.map(sensorScopeToken).filter(Boolean);
      if (tokens.length === 0) return '<span style="color:var(--muted2)">Disabled</span>';
      return tokens.join(' + ');
    }

    function formatDuration(seconds) {
      if (seconds < 60) return seconds + 's';
      const m = Math.round(seconds / 60);
      if (m < 60) return m + 'm';
      const h = Math.floor(m / 60);
      const rm = m % 60;
      return rm > 0 ? h + 'h ' + rm + 'm' : h + 'h';
    }

    function controlCategoryIcon(category) {
      const size = 16;
      const icons = {
        'switch': `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="2" width="10" height="20" rx="3"/><circle cx="12" cy="8" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="13" r="1.5" fill="currentColor" stroke="none"/><line x1="10" y1="18" x2="14" y2="18"/></svg>`,
        'motion_sensor': `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8 18 A8 8 0 0 1 8 6"/><path d="M5 20 A12 12 0 0 1 5 4"/><circle cx="14" cy="12" r="3" fill="currentColor" stroke="none" opacity="0.6"/><path d="M17 9 A5 5 0 0 1 17 15"/><path d="M20 7 A8 8 0 0 1 20 17"/></svg>`,
        'camera': `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>`,
        'contact_sensor': `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="8" height="12" rx="2"/><rect x="14" y="6" width="8" height="12" rx="2"/><line x1="10" y1="11" x2="14" y2="11" stroke-dasharray="2 2"/><line x1="10" y1="13" x2="14" y2="13" stroke-dasharray="2 2"/></svg>`,
      };
      return icons[category] || '';
    }

    function isAlertOnly(ctrl) {
      const scopes = ctrl._matchingScopes || [];
      return scopes.length > 0 && scopes.every(s => s.mode === 'alert');
    }

    function isAllDisabled(ctrl) {
      const scopes = ctrl._matchingScopes || [];
      return scopes.length > 0 && scopes.every(s => !s.mode || s.mode === 'disabled');
    }

    function isSwitchSolo(ctrl) {
      if (ctrl.category !== 'switch') return false;
      const scopes = ctrl._matchingScopes || [];
      return scopes.every(s => (s.areas || []).length <= 1);
    }

    function controlSortKey(ctrl) {
      // Paused/disabled sink to bottom
      if (ctrl.inactive) return [90, 0, ctrl.name.toLowerCase()];
      if (ctrl.category !== 'switch' && isAllDisabled(ctrl)) return [91, 0, ctrl.name.toLowerCase()];

      const catOrder = { 'switch': 0, 'motion_sensor': 1, 'camera': 2, 'contact_sensor': 3 };
      const cat = catOrder[ctrl.category] ?? 4;

      if (ctrl.category === 'switch') {
        // Solo switches first, then non-solo
        const solo = isSwitchSolo(ctrl) ? 0 : 1;
        return [cat, solo, ctrl.name.toLowerCase()];
      }
      // Sensors: alert-only last within category
      const alertLast = isAlertOnly(ctrl) ? 1 : 0;
      return [cat, alertLast, ctrl.name.toLowerCase()];
    }

    function sortAreaControls(controls) {
      return [...controls].sort((a, b) => {
        const ka = controlSortKey(a);
        const kb = controlSortKey(b);
        for (let i = 0; i < ka.length; i++) {
          if (ka[i] < kb[i]) return -1;
          if (ka[i] > kb[i]) return 1;
        }
        return 0;
      });
    }

    // Recency dot color — bright green at 0–1m, fades to a dim green by 1h
    // (no grey transition; user wanted "less bright" not "different hue").
    // Returns null when the timestamp is older than 1h or absent — caller
    // renders an empty slot in that case so row alignment stays stable.
    const FRESHNESS_WINDOW_MIN = 60;
    function freshnessDotColor(timestampMs) {
      if (timestampMs == null) return null;
      const ageMin = (Date.now() - timestampMs) / 60000;
      if (ageMin >= FRESHNESS_WINDOW_MIN) return null;
      if (ageMin <= 1) return 'rgba(80, 220, 140, 1)';
      const t = (ageMin - 1) / (FRESHNESS_WINDOW_MIN - 1);
      // Linear fade alpha 1.0 → 0.30 — same green hue throughout, just dimmer.
      const alpha = 1 - t * 0.7;
      return `rgba(80, 220, 140, ${alpha.toFixed(2)})`;
    }

    function controlLastActionMs(ctrl) {
      const ts = ctrl && ctrl.last_action && ctrl.last_action.timestamp;
      if (!ts) return null;
      const t = Date.parse(ts);
      return isNaN(t) ? null : t;
    }

    // Renders one row, with a fixed-width dot slot on the LEFT so names
    // align across rows regardless of whether the dot is currently active.
    function renderControlRow(ctrl) {
      const icon = controlCategoryIcon(ctrl.category);
      const impact = controlImpactLabel(ctrl);
      const pausedBadge = ctrl.inactive ? '<span class="ctrl-paused-badge">paused</span>' : '';
      const encodedId = encodeURIComponent(ctrl.id);
      const areaId = selectedArea ? encodeURIComponent(selectedArea.area_id) : '';
      const dotColor = freshnessDotColor(controlLastActionMs(ctrl));
      const dotHtml = dotColor
        ? `<span class="ctrl-fresh-dot" style="background:${dotColor};"></span>`
        : '';
      let row = `<div class="ctrl-list-row" onclick="window.location.href='${basePath}/control/${encodedId}?from=area&id=${areaId}'">`;
      row += `<span class="ctrl-list-icon">${icon}</span>`;
      row += `<span class="ctrl-fresh-dot-slot">${dotHtml}</span>`;
      row += `<span class="ctrl-list-info"><span class="ctrl-list-name">${ctrl.name}${pausedBadge}</span></span>`;
      row += `<span class="ctrl-list-impact">${impact}</span>`;
      row += `<span class="ctrl-list-chevron">&#x203A;</span>`;
      row += `</div>`;
      return row;
    }

    // Re-render the controls list every 60s so the freshness dots fade out
    // smoothly (bright → dim → gone) without waiting for a full status
    // refresh. No-op when the controls card hasn't been rendered yet.
    let _controlsRefreshTimer = null;
    function ensureControlsRefreshTimer() {
      if (_controlsRefreshTimer) return;
      _controlsRefreshTimer = setInterval(() => {
        const container = document.getElementById('ctrl-list-container');
        if (container && areaControls && areaControls.length) {
          container.innerHTML = renderAreaControlsBody();
        }
      }, 60000);
    }

    function renderAreaControlsBody() {
      if (!areaControls || areaControls.length === 0) return '';
      const currentAreaId = selectedArea ? selectedArea.area_id : '';
      const sorted = sortAreaControls(areaControls);
      const inGroup = sorted.filter(c => c.area_id === currentAreaId);
      const reachGroup = sorted.filter(c => c.area_id !== currentAreaId);
      const areaLabel = (selectedArea && selectedArea.name) ? selectedArea.name : 'this area';
      // Section headers only appear when there's something to differentiate
      // between (i.e. both groups populated). When only one group has rows,
      // it's just "the controls" — the card title already names that. Avoids
      // a redundant "In SunOffice" header above all controls when no
      // outside-area control targets this room.
      const showHeaders = inGroup.length > 0 && reachGroup.length > 0;
      const sections = [];
      if (inGroup.length) {
        let html = '<div class="ctrl-section">';
        if (showHeaders) html += `<div class="ctrl-section-label">In ${areaLabel}</div>`;
        for (const ctrl of inGroup) html += renderControlRow(ctrl);
        html += '</div>';
        sections.push(html);
      }
      if (reachGroup.length) {
        let html = '<div class="ctrl-section">';
        if (showHeaders) html += `<div class="ctrl-section-label">Reaches ${areaLabel}</div>`;
        for (const ctrl of reachGroup) html += renderControlRow(ctrl);
        html += '</div>';
        sections.push(html);
      }
      return sections.join('');
    }

    function renderAreaControlsList() {
      ensureControlsRefreshTimer();
      return `<div id="ctrl-list-container">${renderAreaControlsBody()}</div>`;
    }

    function toggleBrightnessBody() {
      const card = document.querySelector('.tune-brightness-card');
      if (!card) return;
      const isOpen = card.classList.toggle('is-open');
      if (_persistCards) localStorage.setItem('tune_collapsed', isOpen ? 'false' : 'true');
    }

    function toggleAdjustmentDetails(event) {
      if (event) event.stopPropagation();
      const details = document.getElementById('tune-adj-details');
      const chevron = document.getElementById('tune-adj-chevron');
      if (!details) return;
      const isHidden = details.style.display === 'none';
      details.style.display = isHidden ? '' : 'none';
      if (chevron) chevron.style.transform = isHidden ? 'rotate(90deg)' : '';
      if (_persistCards) localStorage.setItem('tune_adj_open', isHidden ? 'true' : 'false');
    }

    function toggleIndividualSection(event) {
      if (event) event.stopPropagation();
      const body = document.getElementById('tune-individual-body');
      const chevron = document.getElementById('tune-individual-chevron');
      if (!body) return;
      const isHidden = body.style.display === 'none';
      body.style.display = isHidden ? '' : 'none';
      if (chevron) chevron.style.transform = isHidden ? 'rotate(90deg)' : '';
      if (_persistCards) localStorage.setItem('tune_individual_open', isHidden ? 'true' : 'false');
    }

    function updateActivityVisibility(_vals) {
      // Waterfall shows all rows (including 0%) — no hiding.
    }

    function toggleControlsBody() {
      const card = document.querySelector('.tune-controls-card');
      if (!card) return;
      card.classList.toggle('is-open');
      if (_persistCards) localStorage.setItem('tune_controls_expanded', card.classList.contains('is-open') ? 'true' : 'false');
    }

    function toggleLightsBody() {
      const card = document.querySelector('.tune-lights-card');
      if (!card) return;
      const isOpen = card.classList.toggle('is-open');
      if (_persistCards) localStorage.setItem('lights_collapsed', isOpen ? 'false' : 'true');
    }

    // ============================================================
    // Auto Schedule (On / Off)
    // ============================================================
    const autoState = {
      on:  { source: 'sunrise', offset: 0, days: [0,1,2,3,4,5,6], days1: [], days2: [], light: 'circadian', snapshot: null },
      off: { source: 'sunset',  offset: 0, days: [0,1,2,3,4,5,6], days1: [], days2: [], snapshot: null },
    };

    function toggleChartCard() {
      const card = document.getElementById('chart-card');
      if (!card) return;
      card.classList.toggle('is-open');
      const isOpen = card.classList.contains('is-open');
      if (_persistCards) localStorage.setItem('chart_collapsed', isOpen ? 'false' : 'true');
      // Trigger chart resize when opening (Plotly needs this)
      if (isOpen) {
        setTimeout(() => {
          const chartEl = document.getElementById('mini-chart');
          if (chartEl && window.Plotly) Plotly.Plots.resize(chartEl);
        }, 350);
      }
    }

    function initChartCardState() {
      const card = document.getElementById('chart-card');
      if (!card) return;
      // Deep-linked elsewhere → collapse curve so target stays near top
      if (_pageFocus && _pageFocus !== 'chart') {
        card.classList.remove('is-open');
        return;
      }
      if (_persistCards) {
        const stored = localStorage.getItem('chart_collapsed');
        if (stored === 'true') card.classList.remove('is-open');
        else card.classList.add('is-open');
      }
    }

    function initAutoOuterState() {
      const card = document.getElementById('auto-outer-card');
      if (!card) return;
      // Deep-linked to an auto subsection → always open outer (focusAutoSub will run)
      if (_pageFocus === 'auto_on' || _pageFocus === 'auto_off') {
        card.classList.add('is-open');
        return;
      }
      // Deep-linked elsewhere → collapsed
      if (_pageFocus) {
        card.classList.remove('is-open');
        return;
      }
      if (_persistCards) {
        const stored = localStorage.getItem('auto_collapsed');
        if (stored === 'true') card.classList.remove('is-open');
        else card.classList.add('is-open');
      }
    }

    function handleDeepLink() {
      const params = new URLSearchParams(window.location.search);
      const focus = params.get('focus');
      if (!focus) return;

      // Wait for content to render
      setTimeout(() => {
        if (focus === 'auto_on' || focus === 'auto_off') {
          focusAutoSub(focus === 'auto_on' ? 'on' : 'off');
          return;
        }
        if (focus === 'tune') {
          const card = document.getElementById('tune-brightness-card');
          if (!card) return;
          card.classList.add('is-open');
          card.scrollIntoView({ behavior: 'smooth', block: 'start' });
          card.classList.add('focus-flash');
          setTimeout(() => card.classList.remove('focus-flash'), 2000);
          return;
        }
        if (focus === 'controls') {
          const card = document.getElementById('tune-controls-card');
          if (!card) return;
          card.classList.add('is-open');
          card.scrollIntoView({ behavior: 'smooth', block: 'start' });
          card.style.transition = 'border-color 0.3s';
          card.style.borderColor = 'var(--accent)';
          setTimeout(() => { card.style.borderColor = ''; }, 2000);
        }
      }, 500);
    }

    async function toggleAutoOuter(event) {
      // Don't toggle when click originated on a hit-zone anchor inside the merged header.
      if (event && event.target && event.target.closest('a[data-auto-hit]')) return;
      const card = document.getElementById('auto-outer-card');
      if (!card) return;
      const wasOpen = card.classList.contains('is-open');
      // Auto-save on collapse if either sub is dirty.
      if (wasOpen) {
        for (const t of ['on', 'off']) {
          if (isAutoDirty(t)) await saveAutoChanges(t);
        }
      }
      card.classList.toggle('is-open');
      const isOpen = card.classList.contains('is-open');
      if (_persistCards) localStorage.setItem('auto_collapsed', isOpen ? 'false' : 'true');
      updateAutoHeaderText('on');
      updateAutoHeaderText('off');
      updateAutoOverrideIndicator('on');
      updateAutoOverrideIndicator('off');
    }

    // Open outer Auto, scroll the target sub-section to the top of the viewport,
    // and flash its orange focus outline. Shared by merged-header hit zones and
    // the ?focus=auto_on|auto_off deep link.
    function focusAutoSub(type) {
      const outer = document.getElementById('auto-outer-card');
      const sub = document.getElementById('auto-' + type + '-card');
      if (!outer || !sub) return;
      outer.classList.add('is-open');
      updateAutoHeaderText('on');
      updateAutoHeaderText('off');
      // Scroll so the whole target sub-section is visible — block:'start' puts
      // the top of the sub-section near the top of the viewport, which keeps
      // the lower sub (auto-off) fully visible when targeted.
      setTimeout(() => {
        sub.scrollIntoView({ behavior: 'smooth', block: 'start' });
        sub.classList.add('focus-flash');
        setTimeout(() => sub.classList.remove('focus-flash'), 2000);
      }, 60);
    }

    async function loadAutoScheduleSettings() {
      if (!selectedArea) return;
      const section = document.getElementById('auto-sched-section');
      section.style.display = 'flex';

      try {
        const res = await fetch(basePath + '/api/area-settings/' + encodeURIComponent(selectedArea.area_id));
        if (!res.ok) return;
        const settings = await res.json();

        for (const type of ['on', 'off']) {
          const s = autoState[type];
          const prefix = 'auto_' + type;

          // Enabled toggle
          document.getElementById('auto-' + type + '-enabled').checked = settings[prefix + '_enabled'] || false;

          // Light preset (on only)
          if (type === 'on') {
            s.light = settings.auto_on_light || 'circadian';
            setAutoLightUI('on', s.light);
          }

          // Source
          s.source = settings[prefix + '_source'] || (type === 'on' ? 'sunset' : 'sunrise');
          setAutoSourceUI(type, s.source);

          // Unified days (shared between sunrise/sunset and custom schedule 1)
          // Migration: if _days is default but _days_1 has values (old custom config), use _days_1
          let loadedDays = settings[prefix + '_days'];
          if (s.source === 'custom' && (!loadedDays || loadedDays.length === 7)) {
            const days1 = settings[prefix + '_days_1'];
            if (days1 && days1.length > 0) loadedDays = days1;
          }
          s.days = loadedDays || [0,1,2,3,4,5,6];
          document.querySelectorAll('#auto-' + type + '-days .auto-sched-day-btn').forEach(btn => {
            btn.classList.toggle('active', s.days.includes(parseInt(btn.dataset.day)));
          });

          // Offset
          s.offset = settings[prefix + '_offset'] || 0;
          document.getElementById('auto-' + type + '-offset-val').textContent = formatOffset(s.offset);

          // Custom time 1
          if (settings[prefix + '_time_1'] != null) {
            const h = Math.floor(settings[prefix + '_time_1']);
            const m = Math.round((settings[prefix + '_time_1'] - h) * 60);
            document.getElementById('auto-' + type + '-time-1').value =
              String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
          }

          // Custom time 2
          if (settings[prefix + '_time_2'] != null) {
            const h = Math.floor(settings[prefix + '_time_2']);
            const m = Math.round((settings[prefix + '_time_2'] - h) * 60);
            document.getElementById('auto-' + type + '-time-2').value =
              String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
          }

          // Custom days 2
          s.days2 = settings[prefix + '_days_2'] || [];
          document.querySelectorAll('#auto-' + type + '-days-2 .auto-sched-day-btn').forEach(btn => {
            btn.classList.toggle('active', s.days2.includes(parseInt(btn.dataset.day)));
          });

          // Schedule 2 visibility
          updateAutoSchedule2Visibility(type);
          updateAutoDaysSummary(type);

          // Fade (stored as minutes, slider uses index)
          const fadeEl = document.getElementById('auto-' + type + '-fade');
          if (fadeEl) fadeEl.value = fadeMinutesToIndex(settings[prefix + '_fade'] || 0);
          updateAutoFadeDisplay(type);

          // Trigger mode (on only)
          if (type === 'on') {
            let mode = 'always';
            if (settings.auto_on_trigger_mode) mode = settings.auto_on_trigger_mode;
            else if (settings.auto_on_skip_if_brighter) mode = 'skip_brighter';
            setAutoTriggerUI(mode);
          }
          // Untouched (off only)
          if (type === 'off') {
            const untEl = document.getElementById('auto-off-untouched');
            if (untEl) untEl.checked = settings.auto_off_only_untouched || false;
          }

          // Override indicator
          const hasOverride = !!(settings[prefix + '_override']);
          updateAutoOverrideIndicator(type, hasOverride);
          updateAutoSubCardEnabledUI(type);

          showResolvedAutoTime(type);
          captureAutoSnapshot(type);
          fetchNextAutoSchedule(type);
        }
      } catch (err) {
        console.error('Error loading auto schedule settings:', err);
      }
    }

    // Cache fetched next auto data for collapsed/expanded switching
    const _cachedNextAuto = { on: null, off: null };

    async function fetchNextAutoSchedule(type) {
      if (!selectedArea) return;
      try {
        const res = await fetch(basePath + '/api/area-status?area_id=' + encodeURIComponent(selectedArea.area_id));
        if (!res.ok) return;
        const data = await res.json();
        const status = data[selectedArea.area_id];
        _cachedNextAuto[type] = status?.['next_auto_' + type] || null;
        updateAutoHeaderText(type);
        updateMergedAutoHeader();
      } catch (err) {
        // fall back to client-side display
      }
    }

    function _getAutoSourceLabel(type) {
      const srcSunrise = document.getElementById('auto-' + type + '-src-sunrise');
      const srcSunset = document.getElementById('auto-' + type + '-src-sunset');
      const offset = autoState[type]?.offset || 0;
      const offsetSuffix = offset === 0 ? '' : ' ' + formatOffset(offset);
      if (srcSunrise?.checked) return 'Sunrise' + offsetSuffix;
      if (srcSunset?.checked) return 'Sunset' + offsetSuffix;
      return '';
    }

    function updateAutoHeaderText(type) {
      const nextEl = document.getElementById('auto-' + type + '-next');
      if (!nextEl) return;
      const enabled = document.getElementById('auto-' + type + '-enabled')?.checked;
      if (!enabled) { nextEl.textContent = ''; return; }

      // When the user has pending edits, project the header from current UI state
      // so it responds live before save. When clean, show the backend-resolved
      // absolute time (includes day suffix).
      if (isAutoDirty(type)) {
        const projected = projectAutoHeaderFromUI(type);
        if (projected) { nextEl.textContent = projected; return; }
      }

      const nxt = _cachedNextAuto[type];
      if (nxt) {
        nextEl.textContent = nxt.time + (nxt.day ? ' ' + nxt.day : '');
      } else {
        nextEl.textContent = '';
      }
    }

    // Project the header's resolved-time from the current UI state (pre-save).
    function projectAutoHeaderFromUI(type) {
      const s = autoState[type];
      if (!s) return '';
      const source = s.source;
      if (source === 'sunrise' || source === 'sunset') {
        const base = getAutoSunBase(type);
        if (base == null) return '';
        return formatAutoTime(base + (s.offset || 0) / 60);
      }
      // Custom: use the first time input (time-1). If today maps to time-2 days,
      // we'd need day-routing logic — skip that edge case and show time-1.
      const t1 = document.getElementById('auto-' + type + '-time-1')?.value;
      if (!t1) return '';
      const [hh, mm] = t1.split(':').map(n => parseInt(n) || 0);
      return formatAutoTime(hh + mm / 60);
    }

    // Cache last-known override state per type so callers that don't know
    // (toggle flips, card expand/collapse) preserve the indicator instead of
    // reverting to "set override" until the next settings fetch.
    const _autoOverrideState = { on: false, off: false };
    function updateAutoOverrideIndicator(type, hasOverride) {
      // Single header link: reads "set override" when none, "clear override"
      // when active. Tints the resolved time orange when active.
      if (hasOverride === undefined) hasOverride = _autoOverrideState[type] || false;
      else _autoOverrideState[type] = !!hasOverride;
      const enabled = document.getElementById('auto-' + type + '-enabled')?.checked;
      const link = document.getElementById('auto-' + type + '-override-link');
      const timeEl = document.getElementById('auto-' + type + '-next');
      if (timeEl) timeEl.classList.toggle('has-override', !!hasOverride);
      if (link) {
        if (!enabled) {
          link.style.display = 'none';
        } else {
          link.style.display = '';
          link.textContent = hasOverride ? 'clear override' : 'set override';
          link.onclick = hasOverride
            ? (e) => { e.preventDefault(); e.stopPropagation(); clearAutoOverride(type); }
            : (e) => { e.preventDefault(); e.stopPropagation(); openAutoOverridePopup(type, link); };
        }
      }
    }

    async function saveAutoScheduleSettings(type) {
      if (!selectedArea) return;
      const s = autoState[type];
      const prefix = 'auto_' + type;

      // Gather unified days (shared between sunrise/sunset and custom schedule 1)
      const unifiedDays = [];
      document.querySelectorAll('#auto-' + type + '-days .auto-sched-day-btn.active').forEach(btn => {
        unifiedDays.push(parseInt(btn.dataset.day));
      });

      // Gather custom schedule 2 days
      const cDays2 = [];
      document.querySelectorAll('#auto-' + type + '-days-2 .auto-sched-day-btn.active').forEach(btn => {
        cDays2.push(parseInt(btn.dataset.day));
      });

      // Parse custom times
      let time1 = null, time2 = null;
      const t1Val = document.getElementById('auto-' + type + '-time-1')?.value;
      if (t1Val) { const [h, m] = t1Val.split(':').map(Number); time1 = h + m / 60.0; }
      const t2Val = document.getElementById('auto-' + type + '-time-2')?.value;
      if (t2Val) { const [h, m] = t2Val.split(':').map(Number); time2 = h + m / 60.0; }

      const payload = {};
      payload[prefix + '_source'] = s.source;
      payload[prefix + '_offset'] = s.offset;
      payload[prefix + '_days'] = unifiedDays;
      payload[prefix + '_time_1'] = time1;
      payload[prefix + '_days_1'] = unifiedDays;  // Unified days double as custom schedule 1
      payload[prefix + '_time_2'] = time2;
      payload[prefix + '_days_2'] = cDays2;
      payload[prefix + '_fade'] = fadeIndexToMinutes(parseInt(document.getElementById('auto-' + type + '-fade')?.value || '0'));
      if (type === 'on') {
        const mode = document.getElementById('auto-on-trigger-mode')?.value || 'always';
        payload.auto_on_trigger_mode = mode;
        // Keep backward-compat field
        payload.auto_on_skip_if_brighter = (mode === 'skip_brighter');
        payload.auto_on_light = autoState.on.light || 'circadian';
      }
      if (type === 'off') {
        payload.auto_off_only_untouched = document.getElementById('auto-off-untouched')?.checked || false;
      }

      try {
        await fetch(basePath + '/api/area-settings/' + encodeURIComponent(selectedArea.area_id), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        await fetchNextAutoSchedule(type);
      } catch (err) {
        console.error('Error saving auto schedule settings:', err);
      }
    }

    function setAutoSource(type, source) {
      autoState[type].source = source;
      setAutoSourceUI(type, source);
      onAutoFieldChanged(type);
    }

    function setAutoSourceUI(type, source) {
      document.getElementById('auto-' + type + '-src-sunrise').checked = (source === 'sunrise');
      document.getElementById('auto-' + type + '-src-sunset').checked = (source === 'sunset');
      document.getElementById('auto-' + type + '-src-custom').checked = (source === 'custom');
      document.getElementById('auto-' + type + '-sun-controls').style.display = source !== 'custom' ? '' : 'none';
      document.getElementById('auto-' + type + '-custom-controls').style.display = source === 'custom' ? '' : 'none';
      const t1 = document.getElementById('auto-' + type + '-time-1');
      if (t1) t1.style.display = source === 'custom' ? '' : 'none';
    }

    function adjustAutoOffset(type, delta) {
      autoState[type].offset += delta;
      document.getElementById('auto-' + type + '-offset-val').textContent = formatOffset(autoState[type].offset);
      onAutoFieldChanged(type);
    }

    function toggleAutoDay(type, btn) {
      // Mutual exclusivity: if selecting on schedule 1, remove from schedule 2
      if (!btn.classList.contains('active')) {
        const day = parseInt(btn.dataset.day);
        const sched2Btn = document.querySelector('#auto-' + type + '-days-2 .auto-sched-day-btn[data-day="' + day + '"]');
        if (sched2Btn) sched2Btn.classList.remove('active');
      }
      btn.classList.toggle('active');
      updateAutoDaysSummary(type);
      onAutoFieldChanged(type);
    }

    function toggleAutoCustomDay(type, schedNum, btn) {
      const day = parseInt(btn.dataset.day);
      // Mutual exclusivity: schedule 2 days remove from unified days (schedule 1)
      const otherBtn = document.querySelector('#auto-' + type + '-days .auto-sched-day-btn[data-day="' + day + '"]');
      if (otherBtn) otherBtn.classList.remove('active');
      btn.classList.toggle('active');
      updateAutoDaysSummary(type);
      onAutoFieldChanged(type);
    }

    function updateAutoDaysSummary(type) {
      const el = document.getElementById('auto-' + type + '-days-summary');
      if (!el) return;
      const activeBtns = document.querySelectorAll('#auto-' + type + '-days .auto-sched-day-btn.active');
      const days1 = new Set();
      activeBtns.forEach(b => days1.add(parseInt(b.dataset.day)));
      const hasDays2 = document.querySelectorAll('#auto-' + type + '-days-2 .auto-sched-day-btn.active').length > 0;
      // Show summary only for single-schedule case (no sibling days2)
      if (hasDays2) { el.textContent = ''; return; }
      const n = days1.size;
      if (n === 0) { el.textContent = 'No days'; return; }
      if (n === 7) { el.textContent = 'Every day'; return; }
      const weekdays = new Set([0,1,2,3,4]);
      const weekends = new Set([5,6]);
      const isWeekdays = n === 5 && [...days1].every(d => weekdays.has(d));
      const isWeekends = n === 2 && [...days1].every(d => weekends.has(d));
      if (isWeekdays) { el.textContent = 'Weekdays'; return; }
      if (isWeekends) { el.textContent = 'Weekends'; return; }
      el.textContent = n + ' day' + (n === 1 ? '' : 's');
    }

    function setAutoLight(type, light) {
      autoState[type].light = light;
      setAutoLightUI(type, light);
      onAutoFieldChanged(type);
    }

    function setAutoLightUI(type, light) {
      document.querySelectorAll('#auto-' + type + '-light-pills .auto-sched-light-pill').forEach(pill => {
        pill.classList.toggle('active', pill.dataset.light === light);
      });
    }

    function setAutoTrigger(mode) {
      setAutoTriggerUI(mode);
      onAutoFieldChanged('on');
    }

    function setAutoTriggerUI(mode) {
      const hidden = document.getElementById('auto-on-trigger-mode');
      if (hidden) hidden.value = mode;
      document.querySelectorAll('#auto-on-trigger-pills .auto-sched-light-pill').forEach(pill => {
        pill.classList.toggle('active', pill.dataset.mode === mode);
      });
    }

    function showAutoSchedule2(type) {
      const sched2 = document.getElementById('auto-' + type + '-sched-2');
      const addLink = document.getElementById('auto-' + type + '-add-sched');
      if (sched2) sched2.style.display = '';
      if (addLink) addLink.style.display = 'none';
    }

    function updateAutoSchedule2Visibility(type) {
      const sched2 = document.getElementById('auto-' + type + '-sched-2');
      const addLink = document.getElementById('auto-' + type + '-add-sched');
      // Show schedule 2 if it has any active days or a time set
      const hasDays2 = document.querySelectorAll('#auto-' + type + '-days-2 .auto-sched-day-btn.active').length > 0;
      if (sched2) sched2.style.display = hasDays2 ? '' : 'none';
      if (addLink) addLink.style.display = hasDays2 ? 'none' : '';
    }

    function removeAutoSchedule2(type) {
      // Clear schedule 2 days and hide it
      document.querySelectorAll('#auto-' + type + '-days-2 .auto-sched-day-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      const sched2 = document.getElementById('auto-' + type + '-sched-2');
      const addLink = document.getElementById('auto-' + type + '-add-sched');
      if (sched2) sched2.style.display = 'none';
      if (addLink) addLink.style.display = '';
      updateAutoDaysSummary(type);
      onAutoFieldChanged(type);
    }

    function formatOffset(minutes) {
      if (minutes === 0) return '0';
      const sign = minutes < 0 ? '−' : '+';
      const abs = Math.abs(minutes);
      if (abs < 60) return sign + abs + 'm';
      const h = Math.floor(abs / 60);
      const m = abs % 60;
      return sign + h + ':' + String(m).padStart(2, '0');
    }

    function formatAutoTime(decimalHours) {
      let h = Math.floor(((decimalHours % 24) + 24) % 24);
      let m = Math.round((decimalHours - Math.floor(decimalHours)) * 60);
      if (m >= 60) { h = (h + 1) % 24; m = 0; }
      const suffix = h < 12 ? 'a' : 'p';
      if (h === 0) h = 12;
      else if (h > 12) h -= 12;
      return h + ':' + String(m).padStart(2, '0') + suffix;
    }

    // Strip ":00" when the target is on the hour (e.g. "5:00p" → "5p").
    // Used for the compact merged header; expanded subsection headers keep full precision.
    function formatAutoTimeCompact(timeStr) {
      if (!timeStr) return '';
      return timeStr.replace(/:00([ap])$/, '$1');
    }

    // Day suffix matching home-page algorithm: bare within 24h, abbr 2-6 days out, date 7+.
    function formatAutoDaySuffix(nxt) {
      if (!nxt) return '';
      const offset = nxt.offset;
      if (offset == null || offset < 0) return '';
      if (offset <= 1) return '';
      if (offset <= 6) return nxt.day_abbr || '';
      return (nxt.date_short || '').replace(' ', '');
    }

    function getAutoSunBase(type) {
      const source = autoState[type].source;
      if (source === 'custom') return null;
      // Use cachedSunTimes if available (computed from lat/lon)
      if (cachedSunTimes) {
        return source === 'sunrise' ? cachedSunTimes.sunrise : cachedSunTimes.sunset;
      }
      return source === 'sunrise' ? 6.0 : 18.0;
    }

    // Build one side of the merged header: "Sunset +30m [Fri]" or "5p [Apr26]".
    // Sun-based triggers use the word form; clock-based use absolute time (with :00 stripped).
    function formatMergedAutoSide(type, nxt) {
      const enabled = document.getElementById('auto-' + type + '-enabled')?.checked;
      const label = type === 'on' ? 'On' : 'Off';
      if (!enabled) return { enabled: false, html: `<span class="auto-outer-off-label">${label} —</span>` };

      const s = autoState[type];
      const source = s?.source;
      let core;
      if (source === 'sunrise' || source === 'sunset') {
        const word = source === 'sunrise' ? 'Sunrise' : 'Sunset';
        const offStr = s.offset === 0 ? '' : ' ' + formatOffset(s.offset);
        core = word + offStr;
      } else if (isAutoDirty(type)) {
        const projected = projectAutoHeaderFromUI(type);
        core = projected ? formatAutoTimeCompact(projected) : (nxt?.time ? formatAutoTimeCompact(nxt.time) : '—');
      } else if (nxt && nxt.time) {
        core = formatAutoTimeCompact(nxt.time);
      } else {
        core = '—';
      }
      const daySuffix = formatAutoDaySuffix(nxt);
      const text = daySuffix ? core + ' ' + daySuffix : core;
      return {
        enabled: true,
