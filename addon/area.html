    function getRefreshInterval() {
      if (cachedConfig) {
        const val = cachedConfig.home_refresh_interval;
        if (val && val >= 1 && val <= 60) return val;
      }
      return 3;
    }

    function startRefresh() {
      tickInterval = setInterval(updateTimerStatus, 1000);
      const intervalMs = getRefreshInterval() * 1000;
      refreshInterval = setInterval(async () => {
        if (sliderInteracting) return;
        try {
          if (selectedArea) {
            const res = await fetch(basePath + `/api/area-status?area_id=${encodeURIComponent(selectedArea.area_id)}`);
            if (res.ok) {
              const singleStatus = await res.json();
              Object.assign(areaStatus, singleStatus);

              // Update cachedSunTimes with outdoor_normalized and condition multiplier
              const ls0 = singleStatus[selectedArea.area_id] || {};
              if (cachedSunTimes && cachedConfig) {
                const actualNorm = ls0.outdoor_normalized ?? ls0.sun_factor ?? 0;
                cachedSunTimes.outdoorNormalized = actualNorm;
                const now = new Date();
                const currentHour = now.getHours() + now.getMinutes() / 60;
                const lat = cachedConfig.latitude || 35.0;
                const lon = cachedConfig.longitude || -78.6;
                const clearSkyNow = elevationToOutdoorNorm(getSunElevationAtHour(currentHour, lat, lon));
                cachedSunTimes.conditionMultiplier = clearSkyNow > 0.01 ? Math.min(1.0, actualNorm / clearSkyNow) : 1.0;
              }

              // Update tuneState with fresh server data
              if (tuneState.initialized) {
                const ls = ls0;
                const _as = areaStatus[selectedArea.area_id] || {};
                tuneState.baseBri = _as.curve_brightness || _as.brightness || 50;
                tuneState.baseKelvin = ls.base_kelvin ?? ((areaStatus[selectedArea.area_id] || {}).kelvin || 4000);
                tuneState.sunElev = ls.sun_elevation ?? 0;
                tuneState.outdoorNormalized = ls.outdoor_normalized ?? ls.sun_factor ?? 0.0;
                tuneState.outdoorSource = ls.outdoor_source ?? 'none';
                tuneState.outdoorSourceEntity = ls.outdoor_source_entity ?? null;
                tuneState.outdoorLastUpdate = ls.outdoor_last_update ?? null;
                tuneState.brightnessSensitivity = ls.brightness_sensitivity ?? 5.0;
                tuneState.backendNlFactor = ls.nl_factor ?? null;
                tuneState.brightnessFadeWeight = ls.brightness_fade_weight ?? null;
                tuneState.luxSmoothed = ls.lux_smoothed ?? null;
                tuneState.luxCeiling = ls.lux_ceiling ?? null;
                tuneState.luxFloor = ls.lux_floor ?? null;
                tuneState.weatherCondition = ls.weather_condition ?? null;
                tuneState.conditionMultiplier = ls.condition_multiplier ?? null;
                tuneState.angleFactor = ls.angle_factor ?? null;
                tuneState.solarBreakdown = ls.solar_breakdown ?? null;
                tuneState.boosted = _as.boosted || false;
                tuneState.boostBrightness = _as.boost_brightness || 0;
                tuneState.briOverride = _as.effective_bri_override || 0;

                // Update base row display in details card
                const elDetBase = document.getElementById('tune-det-base-total');
                if (elDetBase) elDetBase.textContent = tuneState.baseBri + '%';

                recalcTune();
              }
            }
            updateContent();
            renderMiniChartForArea(selectedArea.area_id);
          }
          updateAllSliders();
        } catch (err) {
          console.error('Error refreshing:', err);
        }
      }, intervalMs);
    }

    function stopRefresh() {
      if (tickInterval) { clearInterval(tickInterval); tickInterval = null; }
      if (refreshInterval) { clearInterval(refreshInterval); refreshInterval = null; }
    }

    // ============================================================
    // Navigation
    // ============================================================
    function goBack() {
      if (isTuneDirty() || isAutoSchedDirty()) {
        if (!confirm('You have unsaved changes. Discard and leave?')) return;
      }
      stopRefresh();
      const params = new URLSearchParams(window.location.search);
      const from = params.get('from');
      if (from === 'tune') {
        window.location.href = basePath + '/tune';
      } else {
        window.location.href = basePath + '/';
      }
    }

    // Content Updates
    // ============================================================
    function updateContent() {
      if (!selectedArea) return;
      const status = areaStatus[selectedArea.area_id] || {};

      Object.assign(selectedArea, {
        is_on: status.is_on || false,
        brightness: status.curve_brightness || status.brightness || 0,
        actual_brightness: status.actual_brightness ?? (status.curve_brightness || status.brightness || 0),
        kelvin: status.kelvin || 4000,
        frozen: status.frozen || false,
        boosted: status.boosted || false,
        zone_name: status.zone_name || null,
        preset_name: status.preset_name || null,
        is_circadian: status.is_circadian !== false,
        boost_brightness: status.boost_brightness || null,
        boost_expires_at: status.boost_expires_at || null,
        boost_started_from_off: status.boost_started_from_off || false,
        is_motion_coupled: status.is_motion_coupled || false,
        motion_expires_at: status.motion_expires_at || null,

      });

      } else if (selectedArea.is_on) {

      // Values display
      const valuesEl = document.getElementById('state-values');
      if (selectedArea.is_on) {
        const cctColor = cctToRGB(selectedArea.kelvin);

        valuesEl.style.color = readableTextColor(tintedColor);
      } else {
        valuesEl.style.color = 'var(--muted)';

        metaZone.textContent = '';

      if (freezeBtn) freezeBtn.classList.toggle('active', selectedArea.frozen);
      if (boostBtn) boostBtn.classList.toggle('active', selectedArea.boosted);

      // Dynamic tooltips with zone/rhythm names
      const zoneName = selectedArea.zone_name;

      if (fullSendBtn) fullSendBtn.title = `Full Send --> to all areas in '${zoneName || 'Rhythm Zone'}'`;
      if (gloUpBtn) gloUpBtn.title = `GloUp: send to '${zoneName || 'Rhythm Zone'}'`;
      if (gloDownBtn) gloDownBtn.title = `GloDown: pull from '${zoneName || 'Rhythm Zone'}'`;
      if (gloResetBtn) gloResetBtn.title = `Reset Glo --> '${zoneName || 'zone'}'`;

      // Circadian-off overlay + header toggle
      const wrap = document.getElementById('circadian-content-wrap');

      const circToggle = document.getElementById('toggle-circadian');

      if (wrap && enableBtn) {
        if (selectedArea.is_circadian === false) {
          wrap.classList.add('circadian-off-overlay');
          enableBtn.style.display = 'flex';

          if (boostBtn) boostBtn.disabled = true;
          rightBtns.forEach(btn => btn.disabled = true);
        } else {

          enableBtn.style.display = 'none';
          if (freezeBtn) freezeBtn.disabled = false;
          if (boostBtn) boostBtn.disabled = false;
          rightBtns.forEach(btn => btn.disabled = false);
        }
      }
      if (circToggle) {
        circToggle.classList.toggle('active', selectedArea.is_circadian);
        circToggle.title = selectedArea.is_circadian ? 'Circadian Light: active' : 'Circadian Light: off';
      }

      updateTimerStatus();
    }


    function updateTimerStatus() {
      const el = document.getElementById('timer-status');
      if (!selectedArea) {
        el.innerHTML = '';
        return;
      }

      const parts = [];

      if (selectedArea) {
        const hasMotion = selectedArea.motion_expires_at && selectedArea.motion_expires_at !== 'forever';
        const hasBoostedMotion = selectedArea.boosted && selectedArea.is_motion_coupled;
        const warnClass = selectedArea.motion_warning_active ? ' timer-warning' : '';

        if (hasMotion && hasBoostedMotion) {
          const remaining = formatCountdown(selectedArea.motion_expires_at);
          if (remaining) {
            parts.push(`<span class="timer-motion${warnClass}">+${selectedArea.boost_brightness}%: ${remaining}<span class="timer-arrow">→</span>off</span>`);
          }
        } else {
          if (hasMotion) {
            const remaining = formatCountdown(selectedArea.motion_expires_at);
            if (remaining) {
              parts.push(`<span class="timer-motion${warnClass}">${remaining}<span class="timer-arrow">→</span>off</span>`);
            }
          }

          if (selectedArea.boosted && selectedArea.boost_brightness) {
            let text = `+${selectedArea.boost_brightness}%`;
            if (selectedArea.boost_expires_at === 'forever') {
              // No suffix — just show the boost percentage
            } else if (selectedArea.boost_expires_at === 'motion') {
              if (selectedArea.motion_expires_at) {
                const remaining = formatCountdown(selectedArea.motion_expires_at);
                if (remaining) {
                  text += ` · ${remaining}<span class="timer-arrow">→</span>circadian`;
                } else {
                  text += ' · ending';
                }
              } else {
                text += ' · until motion ends';
              }
            } else if (selectedArea.boost_expires_at) {
              const remaining = formatCountdown(selectedArea.boost_expires_at);
              if (remaining) {
                const outcome = selectedArea.boost_started_from_off ? 'off' : 'circadian';
                text += ` · ${remaining}<span class="timer-arrow">→</span>${outcome}`;
              }
            }
            parts.push(`<span class="timer-boost">Boost: ${text}</span>`);
          }
        }

        if (selectedArea.frozen) {
          parts.push(`<span class="timer-frozen">❄</span>`);
        }
      }

      el.innerHTML = parts.join('');
    }

    // ============================================================
    // Chart Rendering
    // ============================================================
    function renderMiniChartForArea(areaId) {
      const status = areaStatus[areaId] || {};
      if (!cachedConfig || !cachedSunTimes) return;

      // Use zone data as authoritative source
      const zoneName = status.zone_name;
      const zoneData = zoneName ? (cachedGlozones?.zones?.[zoneName] || {}) : {};
      let cfg = { ...cachedConfig, ...zoneData };
      cfg = resolveEffectiveCfg(cfg, zoneName, { skipOverride: true });

      const areaState = {
        brightness_mid: status.brightness_mid ?? null,
        color_mid: status.color_mid ?? null,
        color_override: status.color_override ?? null,
        frozen_at: status.frozen_at ?? null
      };

      let currentHour;
      if (status.frozen && status.frozen_at != null) {
        currentHour = status.frozen_at;
      } else {
        const now = new Date();
        currentHour = now.getHours() + now.getMinutes() / 60;
      }

      const isActive = (status.is_on || false) && (status.is_circadian !== false);
      const adjustedTimes = {
        wake: status.adjusted_wake_time ?? null,
        bed: status.adjusted_bed_time ?? null
      };
      renderMiniChart(cfg, areaState, cachedSunTimes, currentHour, isActive, adjustedTimes);
    }


    // ============================================================
    // Actions
    // ============================================================
    function toggleCircadian() {
      if (!selectedArea) return;
      const action = selectedArea.is_circadian ? 'circadian_off' : 'circadian_on';
      executeAction(action);
    }

    async function confirmFullSend() {
      if (!selectedArea) return;
      const zoneName = selectedArea.zone_name;
      if (!zoneName) { alert('This area is not in a Rhythm Zone.'); return; }

      if (cachedConfig?.confirm_zone_pushes) {
        const bri = Math.round(selectedArea.brightness);
        const kelvin = Math.round(selectedArea.kelvin);
        const affectedAreas = areas.filter(a => {
          const s = areaStatus[a.area_id] || {};
          if (s.zone_name !== zoneName || !s.is_on) return false;
          return Math.round(s.brightness || 0) !== bri || Math.round(s.kelvin || 4000) !== kelvin;
        });
        if (affectedAreas.length > 0) {
          const areaList = affectedAreas.map(a => a.name).join('\n');
          const msg = `Full Send ${bri}% / ${kelvin}K to "${zoneName}"? These areas will adjust:\n\n${areaList}`;
          if (!confirm(msg)) return;
        }
      }
      executeAction('full_send');
    }

    async function executeAction(action) {
      if (!selectedArea) return;

      try {
        const response = await fetch(basePath + '/api/area/action', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ area_id: selectedArea.area_id, action: action })
        });

        if (response.ok) {
          setTimeout(async () => {
            try {
              const areaId = selectedArea.area_id;
              const res = await fetch(basePath + `/api/area-status?area_id=${encodeURIComponent(areaId)}`);
              if (res.ok) {
                const singleStatus = await res.json();
                Object.assign(areaStatus, singleStatus);
              }
              // Update tuneState from fresh status so header+Starting stay in sync
              if (tuneState.initialized) {
                const _as = areaStatus[areaId] || {};
                tuneState.baseBri = _as.curve_brightness || _as.brightness || 50;
                tuneState.baseKelvin = _as.kelvin || 4000;
                tuneState.boosted = _as.boosted || false;
                tuneState.boostBrightness = _as.boost_brightness || 0;
                tuneState.briOverride = _as.effective_bri_override || 0;
                const elDetBase = document.getElementById('tune-det-base-total');
                if (elDetBase) elDetBase.textContent = tuneState.baseBri + '%';
                recalcTune();
              }
              updateContent();
              renderMiniChartForArea(areaId);
              updateAllSliders();
            } catch (err) {
              console.error('Error refreshing after action:', err);
            }
          }, 500);
        } else {
          const error = await response.json();
          console.error('Action failed:', error);
          alert(`Action failed: ${error.error || 'Unknown error'}`);
        }
      } catch (err) {
        console.error('Error executing action:', err);
        alert('Error executing action');
      }
    }

    async function executeCircadianAdjust(pct) {
      if (!selectedArea) return;
      const cfg = getSliderCfgAndState()?.cfg;
      const bMin = cfg?.min_brightness ?? 1;
      const bMax = cfg?.max_brightness ?? 100;
      const targetActual = Math.round(bMin + (bMax - bMin) * pct / 100);
      const payload = { area_id: selectedArea.area_id, action: 'set_circadian', value: targetActual };

      try {

    // ---- recalcTune: pure client-side math, reads tuneState, writes to DOM ----
    function recalcTune() {
      if (!tuneState.initialized) return;
      const ts = tuneState;

      // -- Brightness cascade (matches backend: curve → NL → area×factor → +override → +boost) --
      const baseBriPct = ts.baseBri;
      let running = baseBriPct / 100;

      // Solar: client-side NL factor (mirrors brain.py:calculate_natural_light_factor)
      const exposure = SOLAR_STEPS[ts.solarStep].exposure;
      let nlFactor = 1.0;
      if (exposure > 0 && ts.outdoorNormalized > 0) {
        // Use brightness-specific fade weight from backend (not color breakdown)
        const fadeWeight = (ts.brightnessFadeWeight != null)
          ? ts.brightnessFadeWeight : 1.0;
        const fadedOutdoor = ts.outdoorNormalized * fadeWeight;
        nlFactor = Math.max(0.0, 1.0 - exposure * fadedOutdoor * ts.brightnessSensitivity);
      }
      const nlFactorPct = Math.round(nlFactor * 100);
      const beforeSolar = Math.round(running * 100);
      running *= nlFactor;
      const afterSolar = Math.round(running * 100);
      const solarImpact = afterSolar - beforeSolar;

      // Lumen adjustment (area_factor)
      ts.areaFactor = LUMEN_STEPS[ts.lumenStep].factor;
      const areaFactorPct = Math.round(ts.areaFactor * 100);
      const beforeLumen = Math.round(running * 100);
      running *= ts.areaFactor;
      const afterLumen = Math.round(running * 100);
      const lumenImpact = afterLumen - beforeLumen;

      // Brightness override (additive, from slider/buttons, decaying)
      const briOverride = ts.briOverride || 0;
      if (briOverride) {
        running += briOverride / 100;
        running = Math.max(0, Math.min(1, running));
      }

      // Boost (additive, after area_factor — matching backend)
      const boostAmount = ts.boosted ? (ts.boostBrightness || 0) : 0;
      const beforeBoost = Math.round(running * 100);
      running += boostAmount / 100;
      const afterBoost = Math.round(running * 100);
      const boostImpact = afterBoost - beforeBoost;

      // -- Compute adjusted color temp (needed for CT compensation) --
      let adjustedK = ts.baseKelvin;
      const sb = ts.solarBreakdown;
      if (sb) {
        adjustedK += (sb.daylight_shift || 0);
        if (sb.warm_night_enabled) adjustedK -= (sb.night_shift || 0);
      }

      // Color temp adjustment — use rendered kelvin (after solar rules)
      let ctFactor = 1.0;
      if (ts.ctEnabled && adjustedK != null) {
        if (adjustedK <= ts.ctBegin) ctFactor = ts.ctMax;
        else if (adjustedK < ts.ctEnd) ctFactor = 1.0 + ((ts.ctEnd - adjustedK) / (ts.ctEnd - ts.ctBegin)) * (ts.ctMax - 1.0);
      }
      const ctFactorPct = Math.round(ctFactor * 100);
      const beforeCt = Math.round(running * 100);
      running *= ctFactor;
      const afterCt = Math.round(running * 100);
      const ctImpactAbs = afterCt - beforeCt;

      // Area brightness final (before CT — CT is per-light, shown in Light brightness)
      const areaBri = Math.round(running / ctFactor * 100);
      // Adjusted brightness including CT (used for per-light calculations)
      const adjustedBri = Math.round(running * 100);
      const netImpact = areaBri - baseBriPct;

      // -- Brightness card: slider word labels --
      const elLumenWord = document.getElementById('tune-lumen-word');
      if (elLumenWord) {
        const lf = LUMEN_STEPS[ts.lumenStep].factor;
        const lfSuffix = Math.abs(lf - 1.0) < 0.005 ? '' : (Math.round((lf - 1.0) * 100) > 0 ? ' +' : ' ') + Math.round((lf - 1.0) * 100) + '%';
        elLumenWord.textContent = LUMEN_STEPS[ts.lumenStep].label + lfSuffix;
      }
      const elSolarWord = document.getElementById('tune-solar-word');
      if (elSolarWord) {
        const sLabel = SOLAR_STEPS[ts.solarStep].label;
        const sExposure = SOLAR_STEPS[ts.solarStep].exposure;
        let leftText = sExposure > 0 ? sLabel + ' ' + sExposure.toFixed(1) : sLabel;
        let rightText = '';
        if (sExposure > 0) {
          const peakNl = Math.max(0.0, 1.0 - sExposure * 1.0 * ts.brightnessSensitivity);
          const peakDrop = Math.round((1.0 - peakNl) * 100);
          rightText = 'peak sun \u2193 ' + Math.min(peakDrop, 100) + '%';
        }
        elSolarWord.innerHTML = '<span>' + leftText + '</span>' + (rightText ? '<span>' + rightText + '</span>' : '');
      }

      // -- Card 3: Lights --
      const briRange = ts.maxBri - ts.minBri;
      const curvePos = briRange > 0 ? Math.max(0, Math.min(1, (ts.baseBri - ts.minBri) / briRange)) : 0;
      let anyCapped = false;

      for (const light of ts.lights) {
        const preset = ts.presets[light.filterName] || { at_bright: 100, at_dim: 100 };
        const atDim = preset.at_dim ?? 100;
        const atBright = preset.at_bright ?? 100;
        const offThresh = preset.off_threshold ?? ts.globalOffThreshold;
        const filterMult = (atDim + (atBright - atDim) * curvePos) / 100;
        const nowPct = Math.round(filterMult * 100);
        const rawFinal = running * 100 * filterMult;
        const isOff = rawFinal < offThresh;
        const wasCapped = rawFinal > 100;
        const finalVal = isOff ? 0 : Math.min(100, Math.round(rawFinal));
        if (wasCapped && finalVal === 100) anyCapped = true;

        const elBri = document.getElementById('tune-light-bri-' + light.idx);
        if (elBri) {
          elBri.className = 'tune-light-bri';
          if (wasCapped && finalVal === 100) {
            elBri.innerHTML = finalVal + '%<span class="tune-capped-star">*</span>';
          } else {
            elBri.textContent = finalVal + '%';
          }
        }
        const elImpact = document.getElementById('tune-light-impact-' + light.idx);
        if (elImpact) {
          const behavImpact = Math.round(rawFinal) - adjustedBri;
          elImpact.textContent = formatImpact(behavImpact) + '%';
        }
        const elCt = document.getElementById('tune-light-ct-' + light.idx);
        if (elCt) {
          if (!ts.ctEnabled || ctFactor === 1.0) {
            elCt.textContent = '0%';
          } else {
            const rawWithoutCt = rawFinal / ctFactor;
            const ctImpact = Math.round(rawFinal) - Math.round(rawWithoutCt);
            elCt.textContent = formatImpact(ctImpact) + '%';
          }
        }
        const elMeta = document.getElementById('tune-meta-' + light.idx);
        if (elMeta) elMeta.innerHTML = tunePresetMeta(ts.presets, light.filterName);
      }

      const legendEl = document.getElementById('tune-lights-legend');
      if (legendEl) {
        if (anyCapped) {
          legendEl.textContent = '* capped at 100%';
          legendEl.style.display = '';
        } else {
          legendEl.style.display = 'none';
        }
      }

      // -- Brightness card: cascade values --
      const elBaseBri = document.getElementById('tune-det-base-total');
      if (elBaseBri) elBaseBri.textContent = baseBriPct + '%';

      const elBoostVal = document.getElementById('tune-det-boost-val');
      if (elBoostVal) {
        elBoostVal.textContent = boostAmount > 0 ? '+' + boostAmount + '%' : '0%';
      }

      const elLumenImpact = document.getElementById('tune-det-lumen-val');
      if (elLumenImpact) elLumenImpact.textContent = formatImpact(lumenImpact) + '%';

      const elSolarImpact = document.getElementById('tune-det-solar-val');
      if (elSolarImpact) elSolarImpact.textContent = formatImpact(solarImpact) + '%';

      const elOverrideRow = document.getElementById('tune-det-override-row');
      const elOverrideVal = document.getElementById('tune-det-override-val');
      const elOverrideLabel = document.getElementById('tune-det-override-label');
      if (elOverrideRow) {
        const rounded = Math.round(briOverride);
        if (elOverrideLabel) elOverrideLabel.textContent = rounded < 0 ? 'User dimmed' : 'User brightened';
        if (elOverrideVal) elOverrideVal.textContent = formatImpact(rounded) + '%';
      }

      const elBriHeader = document.getElementById('tune-brightness-header-val');
      if (elBriHeader) elBriHeader.textContent = areaBri + '%';

      const elFinalVal = document.getElementById('tune-det-final-val');
      if (elFinalVal) elFinalVal.textContent = areaBri + '%';

      // -- Solar source info (above slider) --
      const sourceInfo = document.getElementById('tune-source-info');
      if (sourceInfo) {
        const sunIntPct = Math.round(ts.outdoorNormalized * 100);
        sourceInfo.innerHTML = 'outdoor brightness: ' + sunIntPct + '%'
          + ' <button class="tune-refresh-btn" id="tune-refresh-outdoor" title="Refresh">&#x21bb;</button>';
        const refreshBtn = document.getElementById('tune-refresh-outdoor');
        if (refreshBtn && !refreshBtn._bound) {
          refreshBtn._bound = true;
          refreshBtn.addEventListener('click', async () => {
            refreshBtn.textContent = '\u22ef';
            try {
              await fetch('./api/refresh-outdoor', { method: 'POST' });
            } catch (e) {}
            setTimeout(() => { refreshBtn.innerHTML = '&#x21bb;'; }, 1500);
          });
        }
      }

      sortLightsList();
    }

    function sortLightsList() {
      const list = document.getElementById('tune-lights-list');
      if (!list) return;
      const items = [...list.querySelectorAll('.tune-light-item')];
      if (items.length === 0) return;

      items.sort((a, b) => {
        let va, vb;
        if (lightSortOrder === 'name') {
          va = a.querySelector('.tune-light-name')?.textContent || '';
          vb = b.querySelector('.tune-light-name')?.textContent || '';
          return lightSortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
        }
        if (lightSortOrder === 'behaviour') {
          va = a.querySelector('.tune-light-behaviour')?.textContent || '';
          vb = b.querySelector('.tune-light-behaviour')?.textContent || '';
          return lightSortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
        }
        const colMap = { impact: '.tune-light-impact', ct: '.tune-light-ct', final: '.tune-light-bri' };
        va = parseFloat(a.querySelector(colMap[lightSortOrder])?.textContent) || 0;
        vb = parseFloat(b.querySelector(colMap[lightSortOrder])?.textContent) || 0;
        return lightSortAsc ? va - vb : vb - va;
      });

      items.forEach(item => list.appendChild(item));

      // Update active-sort class on headers
      const card = list.closest('.tune-lights-card') || list.closest('.tune-lights-body')?.parentElement;
      if (card) {
        card.querySelectorAll('.tune-light-sort').forEach(h => {
          h.classList.toggle('active-sort', h.dataset.sort === lightSortOrder);
        });
      }
    }

    // ---- renderUnifiedTune: builds the entire tune section (4 cards) ----
    function renderUnifiedTune(filtersData, config, statusData, areaId) {
      const section = document.getElementById('area-tune-section');
      if (!filtersData || !areaId) { section.style.display = 'none'; return; }

      // Find area in zones
      let areaInfo = null;
      for (const zone of Object.values(filtersData.zones || {})) {
        const found = (zone.areas || []).find(a => a.id === areaId);
        if (found) { areaInfo = found; break; }
      }
      if (!areaInfo) { section.style.display = 'none'; return; }

      section.style.display = 'block';

      const presets = filtersData.presets || {};
      const presetNames = Object.keys(presets);
      const areaLights = (filtersData.area_lights || {})[areaId] || [];
      const lightFilters = (areaInfo && areaInfo.light_filters) || {};
      const factor = areaInfo.brightness_factor ?? 1.0;
      const storedExposure = areaInfo.natural_light_exposure ?? 0.0;

      // Find closest lumen step from stored factor
      let lumenStep = 4;
      let closestDist = Infinity;
      for (let i = 0; i < LUMEN_STEPS.length; i++) {
        const dist = Math.abs(LUMEN_STEPS[i].factor - factor);
        if (dist < closestDist) { closestDist = dist; lumenStep = i; }
      }

      // Find closest solar step from stored exposure
      let solarStep = 0;
      closestDist = Infinity;
      for (let i = 0; i < SOLAR_STEPS.length; i++) {
        const dist = Math.abs(SOLAR_STEPS[i].exposure - storedExposure);
        if (dist < closestDist) { closestDist = dist; solarStep = i; }
      }

      const status = areaStatus[areaId] || {};
      const liveStatus = statusData[areaId] || {};
      const baseBri = status.curve_brightness || status.brightness || 50;
      const kelvin = status.kelvin || 4000;

      // Zone min/max
      const areaZoneName = selectedArea.zone_name;
      const zoneData = areaZoneName ? (cachedGlozones?.zones?.[areaZoneName] || {}) : {};
      const minBri = zoneData.min_brightness || (cachedConfig && cachedConfig.min_brightness) || 1;
      const maxBri = zoneData.max_brightness || (cachedConfig && cachedConfig.max_brightness) || 100;

      // Build lights array for tuneState
      const sortedLights = [...areaLights].sort((a, b) => a.name.localeCompare(b.name));
      const lightsArr = sortedLights.map((l, idx) => ({
        entity_id: l.entity_id,
        name: l.name,
        filterName: lightFilters[l.entity_id] || 'Standard',
        idx: idx,
      }));

      // Populate tuneState
      Object.assign(tuneState, {
        initialized: true,
        baseBri: baseBri,
        baseKelvin: liveStatus.base_kelvin ?? kelvin,
        sunElev: liveStatus.sun_elevation ?? 0,
        outdoorNormalized: liveStatus.outdoor_normalized ?? liveStatus.sun_factor ?? 0.0,
        outdoorSource: liveStatus.outdoor_source ?? 'none',
        outdoorSourceEntity: liveStatus.outdoor_source_entity ?? null,
        outdoorLastUpdate: liveStatus.outdoor_last_update ?? null,
        luxSmoothed: liveStatus.lux_smoothed ?? null,
        luxCeiling: liveStatus.lux_ceiling ?? null,
        luxFloor: liveStatus.lux_floor ?? null,
        weatherCondition: liveStatus.weather_condition ?? null,
        conditionMultiplier: liveStatus.condition_multiplier ?? null,
        angleFactor: liveStatus.angle_factor ?? null,
        ctEnabled: config.ct_comp_enabled || false,
        ctBegin: config.ct_comp_begin || 1650,
        ctEnd: config.ct_comp_end || 2250,
        ctMax: config.ct_comp_factor || 1.7,
        brightnessSensitivity: liveStatus.brightness_sensitivity ?? 5.0,
        backendNlFactor: liveStatus.nl_factor ?? null,
        brightnessFadeWeight: liveStatus.brightness_fade_weight ?? null,
        solarBreakdown: liveStatus.solar_breakdown ?? null,
        areaFactor: LUMEN_STEPS[lumenStep].factor,
        lumenStep: lumenStep,
        solarStep: solarStep,
        lights: lightsArr,
        presets: presets,
        globalOffThreshold: filtersData.off_threshold ?? 3,
        minBri: minBri,
        maxBri: maxBri,
        areaId: areaId,
        areaInfo: areaInfo,
        areaName: selectedArea.name || '',
        expandedLightIdx: null,
        boosted: status.boosted || false,
        boostBrightness: status.boost_brightness || 0,
      });

      // ── Card 3: Lights ──
      const lightsCard = document.getElementById('tune-lights-card');
      const lightsExpanded = localStorage.getItem('tune_lights_expanded') !== 'false';
      let lhtml = '<div class="tune-lights-header" onclick="toggleLightsBody()">';
      lhtml += '<span class="tune-lights-chevron" id="tune-lights-chevron">&#x203A;</span>';
      lhtml += '<span class="tune-lights-title">Light brightness</span>';
      lhtml += '</div>';
      lhtml += '<div class="tune-lights-body" id="tune-lights-body">';
      lhtml += '<div id="tune-lights-list">';
      if (sortedLights.length === 0) {
        lhtml += '<div style="padding:10px 14px;color:var(--muted2);font-size:0.82rem;">No lights found</div>';
      } else {
        lhtml += '<div class="tune-light-col-super"><span></span><span></span><span class="tune-light-super-label">Adjustments</span></div>';
        lhtml += '<div class="tune-light-col-headers">'
          + '<span class="tune-light-sort" data-sort="name">light name</span>'
          + '<span class="tune-light-sort" data-sort="behaviour">purpose</span>'
          + '<span class="tune-light-sort" data-sort="impact">purpose</span>'
          + '<span class="tune-light-sort" data-sort="ct">CT</span>'
          + '<span class="tune-light-sort tune-light-sort-final" data-sort="final">final</span>'
          + '</div>';
        for (const light of lightsArr) {
          const meta = tunePresetMeta(presets, light.filterName);
          const triggerHtml = '<button class="tune-light-select" data-light-idx="' + light.idx + '" onclick="openBehaviourDropdown(' + light.idx + ', this)">' + light.filterName + ' &#x25BE;</button>';

          lhtml += '<div class="tune-light-item" data-idx="' + light.idx + '">';
          lhtml += '<div class="tune-light-summary" data-idx="' + light.idx + '">'
            + '<span class="tune-light-name" title="' + light.entity_id + '">' + light.name + '</span>'
            + '<span class="tune-light-behaviour" id="tune-light-preset-label-' + light.idx + '" data-idx="' + light.idx + '">' + light.filterName + '</span>'
            + '<span class="tune-light-impact" id="tune-light-impact-' + light.idx + '"></span>'
            + '<span class="tune-light-ct" id="tune-light-ct-' + light.idx + '"></span>'
            + '<span class="tune-light-bri" id="tune-light-bri-' + light.idx + '"></span>'
            + '</div>';
          lhtml += '<div class="tune-light-expanded" id="tune-light-exp-' + light.idx + '" style="display:none;">'
            + triggerHtml
            + '<span class="tune-light-meta" id="tune-meta-' + light.idx + '">' + meta + '</span>'
            + '</div>';
          lhtml += '</div>';
        }
      }
      lhtml += '</div>';
      lhtml += '<div id="tune-lights-legend" style="display:none; padding:4px 14px 6px; font-size:0.65rem; color:var(--muted2);"></div>';
      lhtml += '<div class="section-action-bar" id="lights-action-bar" style="display:none;">';
      lhtml += '<button class="section-cancel-btn" onclick="cancelLightsChanges()">Cancel</button>';
      lhtml += '<button class="section-save-btn" onclick="saveLightsChanges()">Save</button>';
      lhtml += '</div>';
      lhtml += '</div>'; // close tune-lights-body
      lightsCard.innerHTML = lhtml;
      if (lightsExpanded) lightsCard.classList.add('is-open');

      // ── Brightness card (merged) ──
      const brightnessCard = document.getElementById('tune-brightness-card');
      const briExpanded = false; // always start collapsed
      let bhtml = '<div class="tune-brightness-header" onclick="toggleBrightnessBody()">';
      bhtml += '<span class="tune-brightness-chevron" id="tune-brightness-chevron">&#x203A;</span>';
      bhtml += '<span class="tune-brightness-title">Area brightness</span>';
      bhtml += '<span class="tune-brightness-val" id="tune-brightness-header-val">--</span>';
      bhtml += '</div>';
      bhtml += '<div class="tune-brightness-body" id="tune-brightness-body">';
      bhtml += '<div class="tune-bk-row" style="padding-left:14px;"><span class="tune-bk-label primary">Circadian</span>'
        + '<span class="tune-bk-total" id="tune-det-base-total">' + baseBri + '%</span></div>';
      bhtml += '<div class="tune-group-label">Adjustments</div>';
      // Solar exposure with inline slider
      bhtml += '<div class="tune-control-row"><span class="tune-control-left"><span class="tune-control-label">Solar exposure</span>'
        + '<span class="tune-control-reset" id="tune-reset-solar">reset</span></span>'
        + '<span class="tune-control-impact" id="tune-det-solar-val"></span></div>';
      bhtml += '<div class="tune-source-info" id="tune-source-info"></div>';
      bhtml += '<div class="tune-slider-row">'
        + '<input type="range" class="tune-inline-slider tune-inline-slider--sun" id="tune-slider-solar" min="0" max="8" step="1" value="' + solarStep + '">'
        + '<span class="tune-slider-word" id="tune-solar-word"><span>' + SOLAR_STEPS[solarStep].label + '</span></span></div>';
      // Room Balance with inline slider
      bhtml += '<div class="tune-control-row"><span class="tune-control-left"><span class="tune-control-label">Room balance</span>'
        + '<span class="tune-control-reset" id="tune-reset-lumen">reset</span></span>'
        + '<span class="tune-control-impact" id="tune-det-lumen-val"></span></div>';
      bhtml += '<div class="tune-slider-row">'
        + '<input type="range" class="tune-inline-slider tune-inline-slider--light" id="tune-slider-lumen" min="0" max="8" step="1" value="' + lumenStep + '">'
        + '<span class="tune-slider-word" id="tune-lumen-word">' + LUMEN_STEPS[lumenStep].label + (function(f){ if(Math.abs(f-1)<0.005) return ''; var p=Math.round((f-1)*100); return (p>0?' +':' ')+p+'%'; })(factor) + '</span></div>';
      bhtml += '<div class="tune-bk-row" id="tune-det-override-row"><span class="tune-bk-label" id="tune-det-override-label">User brightened</span>'
        + '<span class="tune-bk-total" id="tune-det-override-val">0%</span></div>';
      bhtml += '<div class="tune-bk-row"><span class="tune-bk-label">Boost</span>'
        + '<span class="tune-bk-total" id="tune-det-boost-val">0%</span></div>';
      bhtml += '<div class="tune-area-total"><div class="tune-bk-row" style="padding-left:14px;"><span class="tune-bk-label primary">Final</span>'
        + '<span class="tune-bk-total final" id="tune-det-final-val">--</span></div></div>';
      bhtml += '<div class="section-action-bar" id="tune-action-bar" style="display:none;">';
      bhtml += '<button class="section-cancel-btn" onclick="cancelBrightnessChanges()">Cancel</button>';
      bhtml += '<button class="section-save-btn" onclick="saveBrightnessChanges()">Save</button>';
      bhtml += '</div>';
      bhtml += '</div>';
      brightnessCard.innerHTML = bhtml;

      // Set initial expanded state
      if (briExpanded) brightnessCard.classList.add('is-open');

      // ── Wire events ──

      // Lumen slider
      const lumenSlider = document.getElementById('tune-slider-lumen');
      if (lumenSlider) {
        updateSliderFill(lumenSlider);
        lumenSlider.addEventListener('input', () => {
          sliderInteracting = true;
          tuneState.lumenStep = parseInt(lumenSlider.value);
          recalcTune();
          updateTuneButtons();
          updateSliderFill(lumenSlider);
        });
        lumenSlider.addEventListener('change', () => {
          sliderInteracting = false;
          updateTuneButtons();
        });
      }

      // Solar slider
      const solarSlider = document.getElementById('tune-slider-solar');
      if (solarSlider) {
        updateSliderFill(solarSlider);
        solarSlider.addEventListener('input', () => {
          sliderInteracting = true;
          tuneState.solarStep = parseInt(solarSlider.value);
          recalcTune();
          updateTuneButtons();
          updateSliderFill(solarSlider);
        });
        solarSlider.addEventListener('change', () => {
          sliderInteracting = false;
          updateTuneButtons();
        });
      }

      // Reset lumen to last saved value
      const resetLumen = document.getElementById('tune-reset-lumen');
      if (resetLumen) {
        resetLumen.onclick = (e) => {
          e.stopPropagation();
          const savedStep = tuneSnapshot ? tuneSnapshot.lumenStep : 4;
          tuneState.lumenStep = savedStep;
          tuneState.areaFactor = LUMEN_STEPS[savedStep].factor;
          if (lumenSlider) { lumenSlider.value = savedStep; updateSliderFill(lumenSlider); }
          recalcTune();
          updateTuneButtons();
        };
      }

      // Reset solar to last saved value
      const resetSolar = document.getElementById('tune-reset-solar');
      if (resetSolar) {
        resetSolar.onclick = (e) => {
          e.stopPropagation();
          const savedStep = tuneSnapshot ? tuneSnapshot.solarStep : 0;
          tuneState.solarStep = savedStep;
          if (solarSlider) { solarSlider.value = savedStep; updateSliderFill(solarSlider); }
          recalcTune();
          updateTuneButtons();
        };
      }

      // Light accordion + preset selects
      const lightsList = document.getElementById('tune-lights-list');
      if (lightsList) {
        // Behaviour link clicks toggle expanded area
        lightsList.querySelectorAll('.tune-light-behaviour').forEach(link => {
          link.addEventListener('click', (e) => {
            e.stopPropagation();
            const idx = parseInt(link.dataset.idx);
            const wasExpanded = tuneState.expandedLightIdx === idx;
            // Collapse current
            if (tuneState.expandedLightIdx !== null) {
              const prev = document.getElementById('tune-light-exp-' + tuneState.expandedLightIdx);
              if (prev) prev.style.display = 'none';
            }
            if (wasExpanded) {
              tuneState.expandedLightIdx = null;
            } else {
              tuneState.expandedLightIdx = idx;
              const exp = document.getElementById('tune-light-exp-' + idx);
              if (exp) exp.style.display = 'block';
            }
          });
        });
      }

      // Light column sort headers
      const lightsCardEl = document.getElementById('tune-lights-card');
      if (lightsCardEl) {
        lightsCardEl.querySelectorAll('.tune-light-sort').forEach(h => {
          h.addEventListener('click', () => {
            const sort = h.dataset.sort;
            if (lightSortOrder === sort) {
              lightSortAsc = !lightSortAsc;
            } else {
              lightSortOrder = sort;
              lightSortAsc = (sort === 'name' || sort === 'behaviour');
            }
            sortLightsList();
          });
        });
      }

      // Initial calc
      recalcTune();
      captureTuneSnapshot();
    }

    async function loadTuneSection() {
      if (!selectedArea) return;
      const section = document.getElementById('area-tune-section');

      try {
        const areaId = selectedArea.area_id;
        const [filtersRes, configRes, statusRes] = await Promise.all([
          fetch(basePath + '/api/light-filters'),
          fetch(basePath + '/api/config'),
          fetch(basePath + '/api/area-status?area_id=' + encodeURIComponent(areaId))
        ]);
        if (!filtersRes.ok || !configRes.ok) { section.style.display = 'none'; return; }
        const filtersData = await filtersRes.json();
        const config = await configRes.json();
        const statusData = statusRes.ok ? await statusRes.json() : {};

        renderUnifiedTune(filtersData, config, statusData, areaId);
      } catch (err) {
        section.style.display = 'none';
        console.error('Tune section error:', err);
      }
    }

    function toggleBrightnessBody() {
      const card = document.querySelector('.tune-brightness-card');
      if (!card) return;
      const isOpen = card.classList.toggle('is-open');
      localStorage.setItem('tune_details_expanded', isOpen ? 'true' : 'false');
    }

    function toggleLightsBody() {
      const card = document.querySelector('.tune-lights-card');
      if (!card) return;
      const isOpen = card.classList.toggle('is-open');
      localStorage.setItem('tune_lights_expanded', isOpen ? 'true' : 'false');
    }

    // ============================================================
    // Auto Schedule (On / Off)
    // ============================================================
    const autoState = {
      on:  { source: 'sunrise', offset: 0, days: [0,1,2,3,4,5,6], days1: [], days2: [], snapshot: null },
      off: { source: 'sunset',  offset: 0, days: [0,1,2,3,4,5,6], days1: [], days2: [], snapshot: null },
    };

    function toggleAutoBody(type) {
      const card = document.getElementById('auto-' + type + '-card');
      if (!card) return;
      const isOpen = card.classList.toggle('is-open');
      localStorage.setItem('auto_' + type + '_collapsed', isOpen ? 'false' : 'true');
      updateAutoOverrideIndicator(type);
    }

    async function loadAutoScheduleSettings() {
      if (!selectedArea) return;
      const section = document.getElementById('auto-sched-section');
      section.style.display = 'flex';

      try {
        const res = await fetch(basePath + '/api/area-settings/' + encodeURIComponent(selectedArea.area_id));
        if (!res.ok) return;
        const settings = await res.json();

        for (const type of ['on', 'off']) {
          const s = autoState[type];
          const prefix = 'auto_' + type;

          // Enabled toggle
          document.getElementById('auto-' + type + '-enabled').checked = settings[prefix + '_enabled'] || false;

          // Always start closed
          const card = document.getElementById('auto-' + type + '-card');
          card?.classList.remove('is-open');

          // Source
          s.source = settings[prefix + '_source'] || (type === 'on' ? 'sunrise' : 'sunset');
          setAutoSourceUI(type, s.source);

          // Sun days
          s.days = settings[prefix + '_days'] || [0,1,2,3,4,5,6];
          document.querySelectorAll('#auto-' + type + '-days .auto-sched-day-btn').forEach(btn => {
            btn.classList.toggle('active', s.days.includes(parseInt(btn.dataset.day)));
          });

          // Offset
          s.offset = settings[prefix + '_offset'] || 0;
          document.getElementById('auto-' + type + '-offset-val').textContent = formatOffset(s.offset);

          // Custom time 1
          if (settings[prefix + '_time_1'] != null) {
            const h = Math.floor(settings[prefix + '_time_1']);
            const m = Math.round((settings[prefix + '_time_1'] - h) * 60);
            document.getElementById('auto-' + type + '-time-1').value =
              String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
          }

          // Custom days 1
          s.days1 = settings[prefix + '_days_1'] || [];
          document.querySelectorAll('#auto-' + type + '-days-1 .auto-sched-day-btn').forEach(btn => {
            btn.classList.toggle('active', s.days1.includes(parseInt(btn.dataset.day)));
          });

          // Custom time 2
          if (settings[prefix + '_time_2'] != null) {
            const h = Math.floor(settings[prefix + '_time_2']);
            const m = Math.round((settings[prefix + '_time_2'] - h) * 60);
            document.getElementById('auto-' + type + '-time-2').value =
              String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
          }

          // Custom days 2
          s.days2 = settings[prefix + '_days_2'] || [];
          document.querySelectorAll('#auto-' + type + '-days-2 .auto-sched-day-btn').forEach(btn => {
            btn.classList.toggle('active', s.days2.includes(parseInt(btn.dataset.day)));
          });

          // Fade
          const fadeEl = document.getElementById('auto-' + type + '-fade');
          if (fadeEl) fadeEl.value = settings[prefix + '_fade'] || 0;
          updateAutoFadeDisplay(type);

          // Skip if brighter (on only)
          if (type === 'on') {
            const skipEl = document.getElementById('auto-on-skip');
            if (skipEl) skipEl.checked = settings.auto_on_skip_if_brighter || false;
          }

          // Override indicator
          const hasOverride = !!(settings[prefix + '_override']);
          updateAutoOverrideIndicator(type, hasOverride);

          showResolvedAutoTime(type);
          captureAutoSnapshot(type);
          fetchNextAutoSchedule(type);
        }
      } catch (err) {
        console.error('Error loading auto schedule settings:', err);
      }
    }

    async function fetchNextAutoSchedule(type) {
      if (!selectedArea) return;
      try {
        const res = await fetch(basePath + '/api/area-status?area_id=' + encodeURIComponent(selectedArea.area_id));
        if (!res.ok) return;
        const data = await res.json();
        const status = data[selectedArea.area_id];
        const nextEl = document.getElementById('auto-' + type + '-next');
        if (!nextEl) return;
        const enabled = document.getElementById('auto-' + type + '-enabled')?.checked;
        if (!enabled) { nextEl.textContent = ''; return; }
        const nxt = status?.['next_auto_' + type];
        if (nxt) {
          nextEl.textContent = nxt.time + (nxt.day ? ' ' + nxt.day : '');
        } else {
          nextEl.textContent = '';
        }
      } catch (err) {
        // fall back to client-side display
      }
    }

    function updateAutoOverrideIndicator(type, hasOverride) {
      // If hasOverride not passed, check from settings cache
      if (hasOverride === undefined) hasOverride = false;
      const clearEl = document.getElementById('auto-' + type + '-override-clear');
      const overrideLink = document.getElementById('auto-' + type + '-override-link');
      const bodyVisible = document.getElementById('auto-' + type + '-card')?.classList.contains('is-open');
      if (clearEl) clearEl.style.display = hasOverride ? '' : 'none';
      if (overrideLink) overrideLink.style.display = (!hasOverride && bodyVisible) ? '' : 'none';
    }

    async function saveAutoScheduleSettings(type) {
      if (!selectedArea) return;
      const s = autoState[type];
      const prefix = 'auto_' + type;

      // Gather sun days
      const sunDays = [];
      document.querySelectorAll('#auto-' + type + '-days .auto-sched-day-btn.active').forEach(btn => {
        sunDays.push(parseInt(btn.dataset.day));
      });

      // Gather custom days
      const cDays1 = [];
      document.querySelectorAll('#auto-' + type + '-days-1 .auto-sched-day-btn.active').forEach(btn => {
        cDays1.push(parseInt(btn.dataset.day));
      });
      const cDays2 = [];
      document.querySelectorAll('#auto-' + type + '-days-2 .auto-sched-day-btn.active').forEach(btn => {
        cDays2.push(parseInt(btn.dataset.day));
      });

      // Parse custom times
      let time1 = null, time2 = null;
      const t1Val = document.getElementById('auto-' + type + '-time-1')?.value;
      if (t1Val) { const [h, m] = t1Val.split(':').map(Number); time1 = h + m / 60.0; }
      const t2Val = document.getElementById('auto-' + type + '-time-2')?.value;
      if (t2Val) { const [h, m] = t2Val.split(':').map(Number); time2 = h + m / 60.0; }

      const payload = {};
      payload[prefix + '_source'] = s.source;
      payload[prefix + '_offset'] = s.offset;
      payload[prefix + '_days'] = sunDays;
      payload[prefix + '_time_1'] = time1;
      payload[prefix + '_days_1'] = cDays1;
      payload[prefix + '_time_2'] = time2;
      payload[prefix + '_days_2'] = cDays2;
      payload[prefix + '_fade'] = parseInt(document.getElementById('auto-' + type + '-fade')?.value || '0');
      if (type === 'on') {
        payload.auto_on_skip_if_brighter = document.getElementById('auto-on-skip')?.checked || false;
      }

      try {
        await fetch(basePath + '/api/area-settings/' + encodeURIComponent(selectedArea.area_id), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        fetchNextAutoSchedule(type);
      } catch (err) {
        console.error('Error saving auto schedule settings:', err);
      }
    }

    function setAutoSource(type, source) {
      autoState[type].source = source;
      setAutoSourceUI(type, source);
      showResolvedAutoTime(type);
      updateAutoButtons(type);
    }

    function setAutoSourceUI(type, source) {
      document.getElementById('auto-' + type + '-src-sunrise').checked = (source === 'sunrise');
      document.getElementById('auto-' + type + '-src-sunset').checked = (source === 'sunset');
      document.getElementById('auto-' + type + '-src-custom').checked = (source === 'custom');
      document.getElementById('auto-' + type + '-sun-controls').style.display = source !== 'custom' ? 'block' : 'none';
      document.getElementById('auto-' + type + '-custom-controls').style.display = source === 'custom' ? 'block' : 'none';
    }

    function adjustAutoOffset(type, delta) {
      autoState[type].offset += delta;
      document.getElementById('auto-' + type + '-offset-val').textContent = formatOffset(autoState[type].offset);
      showResolvedAutoTime(type);
      updateAutoButtons(type);
    }

    function toggleAutoDay(type, btn) {
      btn.classList.toggle('active');
      showResolvedAutoTime(type);
      updateAutoButtons(type);
    }

    function toggleAutoCustomDay(type, schedNum, btn) {
      const day = parseInt(btn.dataset.day);
      const otherSched = schedNum === 1 ? 2 : 1;
      // Mutual exclusivity: remove from other schedule
      const otherBtn = document.querySelector('#auto-' + type + '-days-' + otherSched + ' .auto-sched-day-btn[data-day="' + day + '"]');
      if (otherBtn) otherBtn.classList.remove('active');
      btn.classList.toggle('active');
      showResolvedAutoTime(type);
      updateAutoButtons(type);
    }

    function formatOffset(minutes) {
      if (minutes === 0) return '0 min';
      return (minutes > 0 ? '+' : '') + minutes + ' min';
    }

    function formatAutoTime(decimalHours) {
      let h = Math.floor(((decimalHours % 24) + 24) % 24);
      const m = Math.round((decimalHours - Math.floor(decimalHours)) * 60);
      const suffix = h < 12 ? 'a' : 'p';
      if (h === 0) h = 12;
      else if (h > 12) h -= 12;
      return h + ':' + String(m).padStart(2, '0') + suffix;
    }

    function getAutoSunBase(type) {
      const source = autoState[type].source;
      if (source === 'custom') return null;
      // Use cachedSunTimes if available (computed from lat/lon)
      if (cachedSunTimes) {
        return source === 'sunrise' ? cachedSunTimes.sunrise : cachedSunTimes.sunset;
      }
      return source === 'sunrise' ? 6.0 : 18.0;
    }

    function showResolvedAutoTime(type) {
      const s = autoState[type];
      if (s.source === 'custom') {
        // Show times under custom day buttons for schedule 1 and 2
        const t1Val = document.getElementById('auto-' + type + '-time-1')?.value;
        const t2Val = document.getElementById('auto-' + type + '-time-2')?.value;
        let t1 = null, t2 = null;
        if (t1Val) { const [h, m] = t1Val.split(':').map(Number); t1 = h + m / 60.0; }
        if (t2Val) { const [h, m] = t2Val.split(':').map(Number); t2 = h + m / 60.0; }
        // No per-day times to show for sun mode when in custom
        document.querySelectorAll('#auto-' + type + '-days .auto-sched-day-time').forEach(sp => sp.textContent = '');
        return;
      }
      // Sun mode: show resolved time per active day
      const base = getAutoSunBase(type);
      if (base == null) return;
      const resolvedTime = base + s.offset / 60.0;
      const activeDays = [];
      document.querySelectorAll('#auto-' + type + '-days .auto-sched-day-btn.active').forEach(btn => {
        activeDays.push(parseInt(btn.dataset.day));
      });
      for (let d = 0; d < 7; d++) {
        const span = document.querySelector('#auto-' + type + '-days .auto-sched-day-time[data-daytime="' + d + '"]');
        if (!span) continue;
        span.textContent = activeDays.includes(d) ? formatAutoTime(resolvedTime) : '';
      }
    }

    function updateAutoFadeDisplay(type) {
      const val = document.getElementById('auto-' + type + '-fade')?.value || '0';
      document.getElementById('auto-' + type + '-fade-val').textContent = val + ' min';
    }

    // ---- Override popover ----
    function openAutoOverridePopup(type, anchorEl) {
      closeAutoOverridePopup();
      if (!selectedArea) return;

      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      const untilDate = tomorrow.toISOString().split('T')[0];
      const customTime = type === 'on' ? 7.0 : 22.0;

      const popover = document.createElement('div');
      popover.className = 'auto-override-popover';
      popover.id = 'auto-override-popover';
      popover.onclick = (e) => e.stopPropagation();

      popover.innerHTML = `
        <div class="aop-title">Override: Auto ${type === 'on' ? 'On' : 'Off'}</div>
        <div class="aop-section-label">Temp. time</div>
        <div class="aop-options">
          <label class="aop-option" onclick="document.getElementById('aop-pause').checked=true">
            <input type="radio" id="aop-pause" name="aop-mode" value="pause">
            <span>pause (skip)</span>
          </label>
          <label class="aop-option" onclick="document.getElementById('aop-custom').checked=true">
            <input type="radio" id="aop-custom" name="aop-mode" value="custom" checked>
            <span style="display:flex; align-items:center; gap:8px; flex:1;">
              <span id="aop-time-display" style="min-width:3.5em;">${formatAutoTime(customTime)}</span>
              <input type="range" id="aop-time-slider" min="0" max="24" step="0.25" value="${customTime}" style="flex:1;">
            </span>
          </label>
        </div>
        <div class="aop-section-label">Through</div>
        <div class="aop-options">
          <label class="aop-option"><input type="radio" name="aop-through" value="today" onchange="aopThroughChanged()"> <span>today</span></label>
          <label class="aop-option"><input type="radio" name="aop-through" value="tomorrow" checked onchange="aopThroughChanged()"> <span>tomorrow</span></label>
          <label class="aop-option"><input type="radio" name="aop-through" value="forever" onchange="aopThroughChanged()"> <span>forever</span></label>
          <label class="aop-option"><input type="radio" name="aop-through" value="pick" onchange="aopThroughChanged()"> <span>pick date</span></label>
          <input type="date" id="aop-until-date" value="${untilDate}" style="display:none; margin-left:22px; margin-top:2px; width:130px;">
        </div>
        <div class="aop-buttons">
          <button class="aop-btn-cancel" onclick="closeAutoOverridePopup()">Cancel</button>
          <button class="aop-btn-save" onclick="applyAutoOverride('${type}')">Save</button>
        </div>
      `;

      document.body.appendChild(popover);

      // Position
      const rect = anchorEl.getBoundingClientRect();
      const popW = popover.offsetWidth;
      const popH = popover.offsetHeight;
      let left = rect.left + rect.width / 2 - popW / 2;
      let top = rect.bottom + 6;
      if (left < 8) left = 8;
      if (left + popW > window.innerWidth - 8) left = window.innerWidth - popW - 8;
      if (top + popH > window.innerHeight - 8) top = rect.top - popH - 6;
      popover.style.left = left + 'px';
      popover.style.top = top + 'px';

      // Wire slider
      const slider = document.getElementById('aop-time-slider');
      if (slider) {
        const display = document.getElementById('aop-time-display');
        updateSliderFill(slider);
        slider.addEventListener('input', () => {
          document.getElementById('aop-custom').checked = true;
          display.textContent = formatAutoTime(parseFloat(slider.value) % 24);
          updateSliderFill(slider);
        });
        slider.addEventListener('pointerdown', (e) => {
          e.stopPropagation();
          document.getElementById('aop-custom').checked = true;
        });
      }

      setTimeout(() => document.addEventListener('click', closeAutoOverrideOnOutsideClick), 0);
    }

    function closeAutoOverridePopup() {
      const el = document.getElementById('auto-override-popover');
      if (el) el.remove();
      document.removeEventListener('click', closeAutoOverrideOnOutsideClick);
    }

    function closeAutoOverrideOnOutsideClick(e) {
      const popover = document.getElementById('auto-override-popover');
      if (popover && !popover.contains(e.target)) closeAutoOverridePopup();
    }

    function aopThroughChanged() {
      const val = document.querySelector('input[name="aop-through"]:checked')?.value;
      const datePicker = document.getElementById('aop-until-date');
      if (!datePicker) return;
      const today = new Date();
      if (val === 'today') {
        datePicker.value = today.toISOString().split('T')[0];
        datePicker.style.display = 'none';
      } else if (val === 'tomorrow') {
        today.setDate(today.getDate() + 1);
        datePicker.value = today.toISOString().split('T')[0];
        datePicker.style.display = 'none';
      } else if (val === 'forever') {
        datePicker.value = '2099-12-31';
        datePicker.style.display = 'none';
      } else {
        datePicker.style.display = '';
        setTimeout(() => { try { datePicker.showPicker(); } catch(e) {} }, 50);
      }
    }

    async function applyAutoOverride(type) {
      if (!selectedArea) return;
      const prefix = 'auto_' + type;
      const mode = document.querySelector('input[name="aop-mode"]:checked')?.value;
      if (!mode) return;

      const throughVal = document.querySelector('input[name="aop-through"]:checked')?.value || 'tomorrow';
      let untilDate;
      const today = new Date();
      if (throughVal === 'today') untilDate = today.toISOString().split('T')[0];
      else if (throughVal === 'tomorrow') { today.setDate(today.getDate() + 1); untilDate = today.toISOString().split('T')[0]; }
      else if (throughVal === 'forever') untilDate = '2099-12-31';
      else untilDate = document.getElementById('aop-until-date').value;

      const override = { mode: mode, until_date: untilDate };
      if (mode !== 'pause') {
        override.mode = throughVal;  // today/tomorrow/forever/date
        override.time = parseFloat(document.getElementById('aop-time-slider').value) % 24;
      }

      const payload = {};
      payload[prefix + '_override'] = override;

      try {
        await fetch(basePath + '/api/area-settings/' + encodeURIComponent(selectedArea.area_id), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        closeAutoOverridePopup();
        updateAutoOverrideIndicator(type, true);
        fetchNextAutoSchedule(type);
      } catch (err) {
        console.error('Error applying auto override:', err);
      }
    }

    async function clearAutoOverride(type) {
      if (!selectedArea) return;
      const prefix = 'auto_' + type;
      const payload = {};
      payload[prefix + '_override'] = null;

      try {
        await fetch(basePath + '/api/area-settings/' + encodeURIComponent(selectedArea.area_id), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        updateAutoOverrideIndicator(type, false);
        fetchNextAutoSchedule(type);
      } catch (err) {
        console.error('Error clearing auto override:', err);
      }
    }

    </script>
</body>
</html>
