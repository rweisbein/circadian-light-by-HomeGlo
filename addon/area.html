          hoverinfo: 'text',
          showlegend: false,
        });
      }
      */ // end RETIRED handle marker block

      // NOW dot — sits on the bulb curve at the current cursor position so
      // the NOW anchor gets the same on-curve callout as wake/bed. Styled
      // in the NOW pill's cyan to tie the dot + pill + cursor line together.
      // Legacy cyan NOW dot trace removed \u2014 the CCT-tinted dot drawn below
      // (with white outline when lights on) is the cursor; this older one
      // was duplicating it and carrying a redundant `% \u00B7 K` tooltip.
      const cursorHourForDot = shiftIntoWindow(currentHour);

      const sunrise = sunTimes.sunrise;
      const sunset = sunTimes.sunset;
      const sunriseX = shiftIntoWindow(sunrise);
      const sunsetX = shiftIntoWindow(sunset);

      const effectiveWake = hasAdjWake ? shiftIntoWindow(adjustedTimes.wake) : wakeTime;
      const effectiveBed = hasAdjBed ? shiftIntoWindow(adjustedTimes.bed) : bedTime;

      // Sunrise/sunset above-axis sun + moon images dropped in Ship 2 polish —
      // labels move below the x-axis as HTML overlays (mirroring rhythm-design's
      // .solar-label treatment).
      const cursorHour = shiftIntoWindow(currentHour);
      const images = [];
      // Sunrise/sunset hover targets — invisible markers along the x-axis at
      // sunrise/sunset hours so users can see the time chip on hover.
      // Above-axis sun + moon images and SVG icons replaced by HTML
      // .area-solar-label overlays positioned below the x-axis (see
      // positionChartLabels). Hover targets retained for chart tooltips.
      if (Number.isFinite(sunrise)) {
        traces.push({
          type: 'scatter', mode: 'markers',
          x: [sunriseX], y: [100],
          marker: { size: 18, color: 'rgba(0,0,0,0)' },
          hovertext: 'sunrise \u00B7 ' + formatHourLabel(sunrise),
          hoverinfo: 'text', showlegend: false, cliponaxis: false
        });
      }
      if (Number.isFinite(sunset)) {
        traces.push({
          type: 'scatter', mode: 'markers',
          x: [sunsetX], y: [100],
          marker: { size: 18, color: 'rgba(0,0,0,0)' },
          hovertext: 'sunset \u00B7 ' + formatHourLabel(sunset),
          hoverinfo: 'text', showlegend: false, cliponaxis: false
        });
      }

      // Cursor: NOW dot only, no dashed vertical line (Ship 2 chart simplification).
      const isFrozen = state && state.frozen_at != null;

      // Compute where the bulb curve is at cursorHour so the dot lands on the curve
      const cursorBulbY = (() => {
        for (let i = 1; i < hours.length; i++) {
          if (hours[i] >= cursorHour) {
            const span = hours[i] - hours[i - 1];
            const t = span > 0 ? (cursorHour - hours[i - 1]) / span : 0;
            return bulbPct[i - 1] + t * (bulbPct[i] - bulbPct[i - 1]);
          }
        }
        return bulbPct[bulbPct.length - 1];
      })();

      // NOW dot stays CCT-tinted regardless of frozen state — the freeze
      // status is signaled by the header freeze icon (active styling).
      // Earlier code recolored the dot blue when frozen, which masked the
      // current bulb color and was redundant chrome.
      const nowDotFill = tintColorByBrightness(cctToRGB(markerCCT), Math.round(markerBri));
      // White outline (2px) when lights are on — matches rhythm-design's NOW
      // dot styling so the cursor reads as the same focal element across both
      // pages. Falls back to near-black when the room is off (or circadian
      // off) since white-on-dark would over-emphasize a non-active state.
      // Outline: white when room is on (matches rhythm-design styling),
      // near-black when off so the dot doesn't over-emphasize an inactive
      // state. `state` here doesn't carry is_on — that lives on
      // selectedArea — so read it from there. Circadian-off also drops
      // back to the muted black outline since the room isn't being driven.
      const liveAreaForDot = (selectedArea && areaStatus) ? (areaStatus[selectedArea.area_id] || {}) : {};
      const isOnForDot = liveAreaForDot.is_on === true && liveAreaForDot.is_circadian !== false;
      const nowDotBorder = isOnForDot ? '#fff' : '#0a0a0a';

      // NOW vertical line — most-prominent vertical element on the chart.
      // CCT-tinted to match the cursor dot + page-header readout, so the
      // dot + line + header all read as one continuous "current moment"
      // cluster. Two segments with a y-gap around the dot so the line
      // doesn't overdraw it. Solid line, width 1.5, layer above so it
      // sits over the wake/bed line during phase drag.
      const nowLineColor = colorWithAlpha(cctToRGB(markerCCT), 0.85);
      const nowLineStyle = { color: nowLineColor, width: 1.5 };
      const cursorDotPaperY = cursorBulbY / 110;
      const dotGap = 0.05;  // ~5% of plot height above/below the dot
      shapes.push({
        type: 'line', xref: 'x', yref: 'paper',
        x0: cursorHour, x1: cursorHour,
        y0: 0, y1: Math.max(0, cursorDotPaperY - dotGap),
        line: nowLineStyle, layer: 'above',
      });
      shapes.push({
        type: 'line', xref: 'x', yref: 'paper',
        x0: cursorHour, x1: cursorHour,
        y0: Math.min(vLineTop, cursorDotPaperY + dotGap), y1: vLineTop,
        line: nowLineStyle, layer: 'above',
      });

      traces.push({
        type: 'scatter', mode: 'markers',
        x: [cursorHour], y: [cursorBulbY],
        marker: { size: 16, color: nowDotFill, symbol: 'circle', line: { width: 2, color: nowDotBorder } },
        cliponaxis: false,
        hovertext: 'now · ' + formatHourLabel(currentHour),
        hoverinfo: 'text',
        hoverlabel: {
          bgcolor: 'rgba(40, 40, 40, 0.95)',
          bordercolor: 'rgba(255, 255, 255, 0.2)',
          font: { color: '#fff', size: 12 },
        },
        showlegend: false,
      });
      // (Earlier "now" text annotation above the dot dropped — redundant
      // with the hover tooltip and added visual noise to the chart.)

      // Stash NOW pill data for the HTML overlay (positioned after Plotly render).
      // HTML overlay path used instead of a Plotly annotation so we get crisp
      // rounded corners (Plotly annotations don't natively support border-radius)
      // NOW chart pill retired in Ship 2 — the % · K readout in the
      // page-header carries this info now, including during slider drag (the
      // drag handler updates the header readout in real time). The chart
      // surfaces "now" via the dot + tiny `now` annotation only.

      // "sun contribution" annotation dropped in Ship 2 simplification —
      // dotted natural-light line stays but is unlabeled.

      // Active-phase visible range (Ship 2 chart simplification): show only
      // the half of the day the cursor is currently in. Ascend phase →
      // [ascend_start, descend_start]; descend phase → [descend_start,
      // ascend_start+24]. Curves still computed across full 24h; xaxis.range
      // just clips what the user sees.
      const phaseVisStart = curInAscend ? tAscAnchor : tDescAnchor;
      const phaseVisEnd = curInAscend ? tDescAnchor : tAscAnchor + 24;
      const layout = {
        paper_bgcolor: '#0a0a0a',
        plot_bgcolor: '#0a0a0a',
        // Margins tightened in Ship 2: top down from 50 (which held the old
        // sun + moon icons above the chart) to 22 (just enough for the
        // sun-intensity chip). Bottom from 86 to 28 (was sized for the old
        // chart-hero overlay; below-axis labels live OUTSIDE the plot area
        // in chart-shell padding now, so the plot doesn't need that space).
        margin: { t: 22, r: 12, l: 36, b: 28 },
        hovermode: 'closest',
        xaxis: (() => {
          const tickvals = [];
          const ticktext = [];
          // Tick every 3h within the visible phase window.
          const phaseSpan = phaseVisEnd - phaseVisStart;
          const tickStep = 3;
          const firstTick = Math.ceil(phaseVisStart / tickStep) * tickStep;
          for (let t = firstTick; t <= phaseVisEnd; t += tickStep) {
            tickvals.push(t);
            ticktext.push(formatHourLabel(t));
          }
          return {
            range: [phaseVisStart, phaseVisEnd],
            fixedrange: true,
            dtick: tickStep,
            tickvals,
            ticktext,
            gridcolor: 'rgba(80,100,130,0.22)',
            tickfont: { color: '#c8c8c8', size: 10 },
            ticklen: 3,
            tickcolor: 'rgba(160,190,220,0.2)'
          };
        })(),
        yaxis: {
          range: [0, 110],
          fixedrange: true,
          gridcolor: 'rgba(80,100,130,0.22)',
          tickfont: { color: '#c8c8c8', size: 10 },
          ticklen: 3,
          title: '',
          showticklabels: true,
          tickvals: [50, 100],
          ticktext: ['50%', '100%']
        },
        shapes,
        annotations,
        images,
        showlegend: false
      };

      Plotly.react('mini-chart', traces, layout, {
        displayModeBar: false,
        doubleClick: false,
        responsive: true,
        scrollZoom: false
      });
      // Stash sunrise/sunset/wake/bed positions for the HTML overlay labels.
      try {
        // Phase label position tracks the adjusted time when shifted — so
        // dragging the bed/wake slider moves the line AND the label together.
        const phaseHour = cursorInAscendGeom
          ? (hasAdjWake ? shiftIntoWindow(adjustedTimes.wake) : wakeTime)
          : (hasAdjBed ? shiftIntoWindow(adjustedTimes.bed)  : bedTime);
        const phaseTimeRaw = cursorInAscendGeom
          ? (hasAdjWake ? adjustedTimes.wake : cfg.wake_time)
          : (hasAdjBed  ? adjustedTimes.bed  : cfg.bed_time);
        positionChartLabels({
          sunrise: Number.isFinite(sunrise) ? sunriseX : null,
          sunset: Number.isFinite(sunset) ? sunsetX : null,
          phaseHour,
          phaseLabel: cursorInAscendGeom ? 'wake' : 'bed',
          phaseTime: phaseTimeRaw,
          phaseVisStart, phaseVisEnd,
          sunriseRaw: sunrise, sunsetRaw: sunset,
        });
      } catch (e) {}
    }

    // Position the four below-axis HTML overlay labels (sunrise, sunset,
    // wake/bed) at their corresponding x-pixels inside chart-shell, with a
    // dynamic connector bar bridging up to the chart x-axis line. Hide any
    // label whose anchor falls outside the active phase visible window.
    function positionChartLabels(opts) {
      const shellEl = document.getElementById('chart-shell');
      const chartDiv = document.getElementById('mini-chart');
      if (!shellEl || !chartDiv) return;
      const fl = chartDiv._fullLayout;
      if (!fl || !fl.xaxis || !fl.yaxis) return;
      const chartLeftInShell = chartDiv.getBoundingClientRect().left - shellEl.getBoundingClientRect().left;
      const xOffset = fl.xaxis._offset;
      const xLength = fl.xaxis._length;
      const xRange = fl.xaxis.range;
      const visSpan = (xRange && xRange.length === 2) ? (xRange[1] - xRange[0]) : 24;
      const xStart = (xRange && xRange.length === 2) ? xRange[0] : 0;
      const dataXToShellPx = (h) => chartLeftInShell + xOffset + ((h - xStart) / visSpan) * xLength;
      // Connector height = chart-shell-bottom (label is 4px from bottom) up
      // to the x-axis line. mirrors rhythm-design's solar-connector math.
      const axisFromShellBottom = shellEl.offsetHeight - chartDiv.offsetTop - fl.yaxis._offset - fl.yaxis._length;
      const labelTopGap = 4; // matches `.area-solar-label { bottom: 4px }`
      const connectorH = Math.max(0, axisFromShellBottom - labelTopGap - 14 /* approx label height */);

      const inWindow = (h) => h != null && h >= xRange[0] && h <= xRange[1];
      // Connector should bridge from the TOP of each label up to (but not
      // past) the chart's x-axis. Per-label `bottom` differs (solar 22, phase
      // 4), so we read it from CSS rather than hardcoding — keeps the line
      // landing exactly on the axis instead of overshooting into the chart.
      const placeLabel = (el, h, time, suffixText) => {
        if (!el) return;
        if (!inWindow(h)) { el.classList.remove('visible'); return; }
        const px = dataXToShellPx(h);
        el.style.left = px + 'px';
        const elBottom = parseFloat(getComputedStyle(el).bottom) || 0;
        const elHeight = el.offsetHeight || 14;
        const connH = Math.max(0, axisFromShellBottom - elBottom - elHeight);
        el.style.setProperty('--area-label-connector-h', connH + 'px');
        if (time != null) el.dataset.time = formatHourLabel(time);
        if (suffixText) el.textContent = suffixText;
        el.classList.add('visible');
      };
      placeLabel(document.getElementById('area-sunrise-label'), opts.sunrise, opts.sunriseRaw, 'sunrise');
      placeLabel(document.getElementById('area-sunset-label'),  opts.sunset,  opts.sunsetRaw,  'sunset');
      placeLabel(document.getElementById('area-phase-label'),   opts.phaseHour, opts.phaseTime, opts.phaseLabel);
    }

    // updateChartNowPill retired in Ship 2 — chart NOW pill removed (was
    // duplicating the page-header readout). The cursor on the chart is now
    // just the dot + tiny "now" annotation.

    // ============================================================
    // Slider Functions (from areas.html modal)
    // ============================================================

    function getSliderCfgAndState() {
      if (selectedArea) {
        const status = areaStatus[selectedArea.area_id] || {};
        if (!cachedConfig || !cachedSunTimes) return null;
        const zoneName = status.zone_name;
        const zs = zoneName ? (zoneStates[zoneName] || {}) : {};
        const zoneData = zoneName ? (cachedGlozones?.zones?.[zoneName] || {}) : {};
        let cfg = { ...cachedConfig, ...zoneData };
        cfg = resolveEffectiveCfg(cfg, zoneName, { skipOverride: true });
        const areaState = {
          brightness_mid: status.brightness_mid ?? null,
          color_mid: status.color_mid ?? null,
          color_override: status.color_override ?? null,
          color_override_set_at: status.color_override_set_at ?? null,
          brightness_override: status.brightness_override ?? null,
          brightness_override_set_at: status.brightness_override_set_at ?? null,
          frozen_at: status.frozen_at ?? null,
          actual_brightness: status.actual_brightness ?? null,
          area_factor: status.area_factor ?? 1.0,
          fade_direction: status.fade_direction ?? null,
          fade_progress: status.fade_progress ?? null,
          eff_wake_time: status.eff_wake_time ?? null,
          eff_bed_time: status.eff_bed_time ?? null,
          adjusted_wake_time: status.adjusted_wake_time ?? null,
          adjusted_bed_time: status.adjusted_bed_time ?? null,
          api_kelvin: status.kelvin ?? null,
        };
        let currentHour;
        if (status.frozen && status.frozen_at != null) {
          currentHour = status.frozen_at;
        } else {
          const now = new Date();
          currentHour = now.getHours() + now.getMinutes() / 60;
        }
        return { cfg, areaState, currentHour };
      }
      return null;
    }

    function updateAllSliders() {
      const ctx = getSliderCfgAndState();
      if (!ctx) return;
      const { cfg, areaState, currentHour } = ctx;
      // Overlay live tuneState so unsaved Sun-exposure / Room-balance edits
      // drive the Bright slider thumb + hero pill in real time.
      applyTuneStateOverlay(areaState);
      // When Tune brightness sliders are dirty, replace actual_brightness with
      // the live-projected bulb value so the Bright slider tracks the chart
      // curve as the user drags Sun-exposure or Room-balance.
      if (tuneState && tuneState.initialized && typeof isBrightnessDirty === 'function' && isBrightnessDirty()) {
        const pureRoom = calcMiniBrightness(currentHour, cfg, areaState, currentHour, { skipOverride: true }) * 100;
        const overridePct = calcOverrideDecay(currentHour, cfg, areaState) * 100;
        const sbfNow = areaState.live_sbf
          ?? areaStatus[selectedArea?.area_id]?.sun_bright_factor
          ?? cachedSunTimes?.sunBrightFactorNow
          ?? 1.0;
        areaState.actual_brightness = Math.max(0, Math.min(100, pureRoom * sbfNow + overridePct));
      }
      const currentBri = calcMiniBrightness(currentHour, cfg, areaState, currentHour) * 100;
      const currentCCT = calcMiniColor(currentHour, cfg, areaState, cachedSunTimes, currentHour);
      const bMin = cfg.min_brightness, bMax = cfg.max_brightness;
      const cMin = cfg.min_color_temp, cMax = cfg.max_color_temp;

      const curveFrac = bMax > bMin ? Math.max(0, Math.min(100, (currentBri - bMin) / (bMax - bMin) * 100)) : 50;
      const effectiveCCT = areaState.api_kelvin != null ? areaState.api_kelvin : currentCCT;
      const cctFrac = cMax > cMin ? Math.max(0, Math.min(100, (effectiveCCT - cMin) / (cMax - cMin) * 100)) : 50;
      const briFrac = areaState.actual_brightness != null ? areaState.actual_brightness : curveFrac;

      const effRange = getEffectiveColorRange(cfg, currentHour, areaState.color_override);

      const phaseCtx = buildPhaseCtx(cfg, areaState, currentHour);

      // When the room is OFF (lights off), the bright slider thumb falls
      // to 0% — reflects the bulb's actual output. Color + bed sliders get
      // a stronger mute (extra dim) since they're informational only when
      // the room is dark. Sliders stay interactive: dragging brightness
      // up sets a starting brightness for the next turn-on.
      const isRoomOff = selectedArea && selectedArea.is_on === false;

      document.querySelectorAll('.slider-track').forEach(track => {
        if (track.classList.contains('dragging')) return;
        const mode = track.dataset.mode;
        let pct, thumbBri, thumbCCT;
        if (mode === 'brightness') {
          pct = isRoomOff ? 0 : briFrac;
          thumbBri = isRoomOff ? 0 : (areaState.actual_brightness ?? currentBri);
          thumbCCT = currentCCT;
        } else if (mode === 'color') {
          pct = cctFrac;
          thumbBri = currentBri;
          thumbCCT = effectiveCCT;
        } else if (mode === 'phase') {
          if (!phaseCtx) return;
          pct = phaseCtx.currentTargetPct;
          thumbBri = currentBri;
          thumbCCT = currentCCT;
        } else {
          return;
        }
        (track.querySelector('.slider-track-bg') || track).style.background = buildTrackGradient(mode, cfg, currentBri, currentCCT, effRange, phaseCtx);
        applyOneSlider(track, pct, thumbBri, thumbCCT, mode);
        // Stronger mute on color + phase sliders when room is off; bright
        // stays at full visual prominence so the user can drag it to turn
        // the room on at a desired brightness.
        const row = track.closest('.hslider-row');
        if (row) {
          row.classList.toggle('hslider-row--power-off', !!isRoomOff && mode !== 'brightness');
        }
      });

      const heroBri = document.getElementById('slider-hero-brightness');
      const briDisp = Math.round(areaState.actual_brightness ?? currentBri);
      if (heroBri) heroBri.textContent = briDisp + '%';

      const heroColor = document.getElementById('slider-hero-color');
      const kDisp = Math.round(effectiveCCT);
      if (heroColor) heroColor.textContent = kDisp + 'K';

      // Phase slider: label flips Wake↔Bed at the phase boundary, value
      // shows the active phase target time (live-replaced during drag).
      const heroPhase = document.getElementById('slider-hero-phase');
      const phaseLabelEl = document.getElementById('slider-phase-label');
      if (phaseCtx) {
        if (phaseLabelEl) phaseLabelEl.textContent = phaseCtx.cursorInAscend ? 'Wake' : 'Bed';
        if (heroPhase) heroPhase.textContent = formatPhaseTime(phaseCtx.currentTargetTime);
      }

      // Collapsed Adjust card header mirror — live brightness + kelvin
      const adjHeader = document.getElementById('adjust-outer-next');
      if (adjHeader) {
        const kColor = cctToRGB(kDisp);
        adjHeader.innerHTML = briDisp + '%'
          + '<span class="adjust-outer-sep">\u00B7</span>'
          + '<span style="color:' + kColor + '">' + kDisp + 'K</span>';
      }

      // Toggle reset buttons visibility based on override/mid state.
      // The phase reset surfaces when the wake/bed midpoint has been shifted.
      const rBri = document.getElementById('reset-brightness');
      if (rBri) rBri.classList.toggle('hidden', areaState.brightness_override == null);
      const rCol = document.getElementById('reset-color');
      if (rCol) rCol.classList.toggle('hidden', areaState.color_override == null);
      const rPhase = document.getElementById('reset-phase');
      if (rPhase) {
        const phaseDirty = areaState.brightness_mid != null || areaState.color_mid != null;
        rPhase.classList.toggle('hidden', !phaseDirty);
      }
    }

    // updateChartHero + chartHeroStep retired in Ship 2 — the chart-hero
    // overlay (WAKE / 6:45a / ◀▶) was removed and the wake/bed slider in the
    // Adjust card body now covers phase-time editing. Slider drag posts
    // directly to set_phase_time via executeSetPhaseTime; reset uses the
    // .hslider-reset button next to the slider value.

    // How far the shifted midpoint will be pushed from the user's target time,
    // given the zone's brightness/slope config. Used to narrow the phase slider
    // so the user can't land on a target whose shifted mid would escape the
    // phase window (and then wrap via `% 24` on the server into the wrong day).
    // Returns { minOffset, maxOffset } in hours to add to phaseMin / subtract
    // from phaseMax.
    function computePhaseSafeOffset(cfg, cursorInAscend) {
      const brightnessPct = cursorInAscend
        ? (cfg.wake_brightness || 50)
        : (cfg.bed_brightness || 50);
      if (brightnessPct === 50) return { minOffset: 0, maxOffset: 0 };
      const speed = cursorInAscend ? cfg.wake_speed : cfg.bed_speed;
      const slopeMag = SPEED_TO_SLOPE[Math.max(1, Math.min(12, speed))];
      if (!(slopeMag > 0)) return { minOffset: 0, maxOffset: 0 };
      const bMin = (cfg.min_brightness || 2) / 100;
      const bMax = (cfg.max_brightness || 100) / 100;
      const targetNorm = bMin + (bMax - bMin) * (brightnessPct / 100);
      const eps = 0.001;
      const clamped = Math.max(bMin + eps, Math.min(bMax - eps, targetNorm));
      const ratio = (clamped - bMin) / (bMax - bMin);
      const logTerm = Math.log((1 - ratio) / ratio);
      // Ascend slope is +k; descend slope is -k. The inverse-midpoint formula
      // returns `target + logTerm / slopeSigned`. For the shifted mid to stay
      // inside [phaseMin, phaseMax], the target itself must be offset from the
      // phase boundaries by the magnitude of that shift.
      const slopeSigned = cursorInAscend ? slopeMag : -slopeMag;
      const offset = logTerm / slopeSigned;
      const margin = 0.25; // 15-min buffer past the strict minimum
      return {
        minOffset: Math.max(0, -offset) + margin,
        maxOffset: Math.max(0, offset) + margin,
      };
    }

    function buildPhaseCtx(cfg, areaState, currentHour) {
      const tAscend = cfg.ascend_start;
      let tDescend = cfg.descend_start;
      if (tDescend <= tAscend) tDescend += 24;
      const h48 = currentHour < tAscend ? currentHour + 24 : currentHour;
      const cursorInAscend = h48 >= tAscend && h48 < tDescend;
      const phaseMinRaw = cursorInAscend ? tAscend : tDescend;
      const phaseMaxRaw = cursorInAscend ? tDescend : tAscend + 24;
      const { minOffset, maxOffset } = computePhaseSafeOffset(cfg, cursorInAscend);
      let phaseMin = phaseMinRaw + minOffset;
      let phaseMax = phaseMaxRaw - maxOffset;
      // Fall back to raw bounds if narrowing inverted the window (extreme
      // brightness + shallow slope); better to let the shift escape than to
      // hand the user an empty slider.
      if (phaseMax - phaseMin < 0.5) {
        phaseMin = phaseMinRaw;
        phaseMax = phaseMaxRaw;
      }
      const status = areaStatus[selectedArea?.area_id] || {};
      const adj = cursorInAscend ? status.adjusted_wake_time : status.adjusted_bed_time;
      const base = cursorInAscend ? cfg.wake_time : cfg.bed_time;
      let targetH48 = adj != null ? adj : base;
      // Normalize into the RAW window first so the while-loops can't get stuck
      // when the saved target predates today's narrowing.
      while (targetH48 < phaseMinRaw) targetH48 += 24;
      while (targetH48 > phaseMaxRaw) targetH48 -= 24;
      const span = phaseMax - phaseMin;
      const currentTargetPct = span > 0
        ? Math.max(0, Math.min(100, (targetH48 - phaseMin) / span * 100))
        : 0;
      const currentTargetTime = ((targetH48 % 24) + 24) % 24;
      return { cursorInAscend, phaseMin, phaseMax, currentTargetPct, currentTargetTime, areaState, currentHour };
    }

    function formatPhaseTime(h) {
      if (h == null) return '—';
      h = ((h % 24) + 24) % 24;
      let hr = Math.floor(h);
      const min = Math.round((h - hr) * 60);
      const suffix = hr < 12 ? 'a' : 'p';
      if (hr === 0) hr = 12; else if (hr > 12) hr -= 12;
      return min === 0 ? `${hr}${suffix}` : `${hr}:${String(min).padStart(2,'0')}${suffix}`;
    }

    function renderPhaseSliderTicks(phaseCtx, cfg) {
      const el = document.getElementById('slider-ticks-phase');
      if (!el) return;
      el.innerHTML = '';
      if (!phaseCtx) return;
      const { phaseMin, phaseMax, cursorInAscend } = phaseCtx;
      const span = phaseMax - phaseMin;
      if (!(span > 0)) return;

      // Compute default-marker pct first so we can skip any tick that would
      // collide horizontally with the marker's "default wake/bed X" label.
      let markerPct = null;
      let markerDefaultH = null;
      if (cfg) {
        const defaultH = cursorInAscend ? cfg.wake_time : cfg.bed_time;
        if (Number.isFinite(defaultH)) {
          let defaultH48 = defaultH;
          while (defaultH48 < phaseMin) defaultH48 += 24;
          while (defaultH48 > phaseMax) defaultH48 -= 24;
          const pct = (defaultH48 - phaseMin) / span * 100;
          if (pct >= 0 && pct <= 100) {
            markerPct = pct;
            markerDefaultH = defaultH;
          }
        }
      }

      // NOW marker — anchor user to the current time on the phase timeline
      let nowPct = null;
      if (cfg && Number.isFinite(phaseCtx.currentHour)) {
        const tAscendCfg = cfg.ascend_start;
        const now48 = phaseCtx.currentHour < tAscendCfg ? phaseCtx.currentHour + 24 : phaseCtx.currentHour;
        const pct = (now48 - phaseMin) / span * 100;
        if (pct >= 0 && pct <= 100) nowPct = pct;
      }

      // Only the NOW marker shares the top row with hour ticks, so only NOW
      // needs horizontal-collision suppression. The daily-bed/wake marker
      // sits at the bottom of the tick row and doesn't overlap hour ticks
      // vertically, so hour ticks can render right above it.
      const tickHidePct = 12;
      const collides = (pct) =>
        nowPct != null && Math.abs(pct - nowPct) < tickHidePct;

      // Hour ticks — 4h interval for wide spans, 2h for narrow
      const step = span >= 12 ? 4 : (span >= 6 ? 2 : 1);
      const firstTick = Math.ceil(phaseMin / step) * step;
      const placed = new Set();
      for (let t = firstTick; t < phaseMax; t += step) {
        const pct = (t - phaseMin) / span * 100;
        if (pct < 0 || pct > 100) continue;
        if (collides(pct)) continue;
        const tick = document.createElement('span');
        tick.className = 'hslider-tick';
        tick.style.left = pct + '%';
        tick.textContent = formatPhaseTime(t);
        el.appendChild(tick);
        placed.add(Math.round(pct));
      }
      // Edge tick at phaseMax — shows boundary of how far user can shift
      if (!collides(100)) {
        const edgeTick = document.createElement('span');
        edgeTick.className = 'hslider-tick is-edge';
        edgeTick.style.left = '100%';
        edgeTick.textContent = formatPhaseTime(phaseMax);
        el.appendChild(edgeTick);
        placed.add(100);
      }
      // NOW marker — top-row triangle pointing down, "now" label above
      if (nowPct != null) {
        const nowEl = document.createElement('span');
        nowEl.className = 'hslider-now-marker';
        nowEl.style.left = nowPct + '%';
        nowEl.textContent = 'now';
        el.appendChild(nowEl);
      }
      // Default-bed/wake marker — anchors user to home position
      if (markerPct != null) {
        const marker = document.createElement('span');
        marker.className = 'hslider-default-marker';
        marker.style.left = markerPct + '%';
        marker.textContent = (cursorInAscend ? 'daily wake' : 'daily bed') + ' ' + formatPhaseTime(markerDefaultH);
        el.appendChild(marker);
      }
    }

    function pctToPhaseTargetTime(pct, phaseCtx) {
      if (!phaseCtx) return null;
      const h48 = phaseCtx.phaseMin + (phaseCtx.phaseMax - phaseCtx.phaseMin) * pct / 100;
      return ((h48 % 24) + 24) % 24;
    }

    function formatHourToTime(h) {
      if (h == null) return '';
      h = ((h % 24) + 24) % 24;
      const hr = Math.floor(h);
      const min = Math.round((h - hr) * 60);
      const ampm = hr >= 12 ? 'pm' : 'am';
      const hr12 = hr === 0 ? 12 : hr > 12 ? hr - 12 : hr;
      return min === 0 ? hr12 + ampm : hr12 + ':' + String(min).padStart(2, '0') + ampm;
    }

    function updateAdjustedScheduleLabel(areaState, cfg) {
      const el = document.getElementById('adjusted-schedule-label');
      if (!el) return;
      // Determine phase: use ascend/descend from config + current hour
      const now = new Date();
      const h = now.getHours() + now.getMinutes() / 60;
      const tAsc = cfg.ascend_start, tDesc = cfg.descend_start;
      const h48 = h < tAsc ? h + 24 : h;
      const tDesc48 = tDesc <= tAsc ? tDesc + 24 : tDesc;
      const inAscend = h48 >= tAsc && h48 < tDesc48;

      if (inAscend) {
        const baseWake = areaState.eff_wake_time ?? cfg.wake_time;
        const adjusted = areaState.adjusted_wake_time;
        if (adjusted != null) {
          el.innerHTML = '<span style="color:#5cb3ff">Adjusted wake ' + formatHourToTime(adjusted) + '</span>';
        } else {
          el.innerHTML = '<span style="color:#5cb3ff">Wake ' + formatHourToTime(baseWake) + '</span>';
        }
      } else {
        const baseBed = areaState.eff_bed_time ?? cfg.bed_time;
        const adjusted = areaState.adjusted_bed_time;
        if (adjusted != null) {
          el.innerHTML = '<span style="color:#ffe680">Adjusted bed ' + formatHourToTime(adjusted) + '</span>';
        } else {
          el.innerHTML = '<span style="color:#ffe680">Bed ' + formatHourToTime(baseBed) + '</span>';
        }
      }
      el.style.display = '';
    }

    async function fetchSliderPreview(areaId) {
      try {
        const res = await fetch(basePath + `/api/area/slider-preview?area_id=${encodeURIComponent(areaId)}`);
        if (res.ok) {
          const data = await res.json();
          sliderPreviewPoints = data.points || [];
          return sliderPreviewPoints;
        }
      } catch (err) {
        console.error('Error fetching slider preview:', err);
      }
      return null;
    }

    function kelvinAtBrightness(brightness, points) {
      if (!points || points.length < 2) return 4000;
      if (brightness <= points[0].brightness) return points[0].kelvin;
      const last = points[points.length - 1];
      if (brightness >= last.brightness) return last.kelvin;
      for (let i = 1; i < points.length; i++) {
        const prev = points[i - 1];
        const curr = points[i];
        if (brightness <= curr.brightness) {
          const frac = (brightness - prev.brightness) / (curr.brightness - prev.brightness);
          return prev.kelvin + (curr.kelvin - prev.kelvin) * frac;
        }
      }
      return last.kelvin;
    }

    function buildHorizontalGradient(cfg, currentCCT) {
      const bMin = cfg.min_brightness, bMax = cfg.max_brightness;
      const stops = [];
      const n = 10;
      for (let i = 0; i <= n; i++) {
        const frac = i / n;
        const b = bMin + (bMax - bMin) * frac;
        const k = sliderPreviewPoints ? kelvinAtBrightness(b, sliderPreviewPoints) : currentCCT;
        const color = tintColorByBrightness(cctToRGB(k), b);
        stops.push(color + ' ' + Math.round(frac * 100) + '%');
      }
      return 'linear-gradient(to right, ' + stops.join(', ') + ')';
    }

    function updateBannerSlider(pct, cfg, currentCCT) {
      const banner = document.getElementById('area-banner-slider');
      if (!banner || banner.classList.contains('dragging')) return;
      if (cfg) {
        banner.style.background = buildHorizontalGradient(cfg, currentCCT);
      }
      const thumb = banner.querySelector('.row-slider-thumb');
      if (thumb) {
        thumb.style.left = pct + '%';
      }
    }

    function getEffectiveColorRange(cfg, currentHour, colorOverride) {
      // Compute the effective CCT range after solar rules clamp at the current hour
      const cMin = cfg.min_color_temp, cMax = cfg.max_color_temp;
      if (!cachedSunTimes) return { effMin: cMin, effMax: cMax };
      const effMin = applySolarRule(cMin, currentHour, cfg, cachedSunTimes, colorOverride);
      const effMax = applySolarRule(cMax, currentHour, cfg, cachedSunTimes, colorOverride);
      return { effMin, effMax };
    }

    function buildTrackGradient(mode, cfg, currentBri, currentCCT, effectiveColorRange, phaseCtx) {
      const bMin = cfg.min_brightness, bMax = cfg.max_brightness;
      const cMin = cfg.min_color_temp, cMax = cfg.max_color_temp;
      const stops = [];
      if (mode === 'phase' && phaseCtx) {
        // Sample across phase window: for each candidate wake/bed time, compute
        // what brightness+color the bulbs would hit at NOW via direct logistic
        // (skip calcMiniBrightness — its liftMidpointToPhase wraps misbehave at edges).
        const n = 10;
        const { currentHour, phaseMin, phaseMax, cursorInAscend } = phaseCtx;
        const kAscend = SPEED_TO_SLOPE[Math.max(1, Math.min(12, cfg.wake_speed))];
        const kDescend = SPEED_TO_SLOPE[Math.max(1, Math.min(12, cfg.bed_speed))];
        const slopeSigned = cursorInAscend ? kAscend : -kDescend;
        const bMinNorm = bMin / 100, bMaxNorm = bMax / 100;
        const now48 = currentHour < cfg.ascend_start ? currentHour + 24 : currentHour;
        // Pull active overrides off the live area state so the gradient
        // shows the actual colors/brightnesses the lights would hit at NOW
        // for each candidate phase-time. Without this, dialing color
        // override warmer left the gradient unchanged — confusing because
        // moving the slider would land on a position whose gradient stop
        // didn't match the bulb's real output.
        const liveStatus = (selectedArea && areaStatus) ? (areaStatus[selectedArea.area_id] || {}) : {};
        const briOv = liveStatus.brightness_override ?? 0;
        const colorOv = liveStatus.color_override ?? 0;
        for (let i = 0; i <= n; i++) {
          const frac = i / n;
          const candidateTargetH48 = phaseMin + (phaseMax - phaseMin) * frac;
          const shiftedMid = computeCandidateShiftedMid(candidateTargetH48, cfg, cursorInAscend);
          const briNorm = bMinNorm + (bMaxNorm - bMinNorm) / (1 + Math.exp(-slopeSigned * (now48 - shiftedMid)));
          let b = Math.max(0, Math.min(100, briNorm * 100 + briOv));
          // Color follows same midpoint: normalized 0..1 logistic, mapped to [cMin, cMax]
          const ct = 1 / (1 + Math.exp(-slopeSigned * (now48 - shiftedMid)));
          let k = cMin + (cMax - cMin) * ct + colorOv;
          // Clamp K to a perceptually-sensible range so the gradient
          // doesn't flatten when overrides push past min/max.
          k = Math.max(1000, Math.min(10000, k));
          const color = tintColorByBrightness(cctToRGB(k), b);
          stops.push(color + ' ' + Math.round(frac * 100) + '%');
        }
      } else {
        const n = 8;
        for (let i = 0; i <= n; i++) {
          const frac = i / n;
          let color;
          if (mode === 'color') {
            const k = cMin + (cMax - cMin) * frac;
            color = cctToRGB(k);
          } else {
            const b = frac * 100;
            color = tintColorByBrightness(cctToRGB(currentCCT), b);
          }
          stops.push(color + ' ' + Math.round(frac * 100) + '%');
        }
      }
      return 'linear-gradient(to right, ' + stops.join(', ') + ')';
    }

    function computeCandidateShiftedMid(targetH48, cfg, inAscend) {
      const kAscend = SPEED_TO_SLOPE[Math.max(1, Math.min(12, cfg.wake_speed))];
      const kDescend = SPEED_TO_SLOPE[Math.max(1, Math.min(12, cfg.bed_speed))];
      const bMinNorm = cfg.min_brightness / 100;
      const bMaxNorm = cfg.max_brightness / 100;
      const briPct = inAscend ? cfg.wake_brightness : cfg.bed_brightness;
      const slope = inAscend ? kAscend : -kDescend;
      return computeShiftedMidpoint(targetH48, briPct, slope, bMinNorm, bMaxNorm);
    }

    function applyOneSlider(track, pct, bri, cct, mode) {
      const thumb = track.querySelector('.slider-thumb');
      if (!thumb) return;
      thumb.style.left = pct + '%';
      const color = cctToRGB(cct);
      const tinted = mode === 'color' ? color : tintColorByBrightness(color, bri);
      thumb.style.background = tinted;
      thumb.style.borderColor = color;
    }

    function getPositionFromPointer(track, e) {
      const rect = track.getBoundingClientRect();
      const x = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      return x * 100;
    }

    function updateSliderFill(el) {
      const pct = (el.value - el.min) / (el.max - el.min) * 100;
      el.style.setProperty('--fill-pct', pct + '%');
    }
    function updateAllSliderFills() {
      document.querySelectorAll('input[type=range]').forEach(updateSliderFill);
    }

    function initSliderHandlers() {
      document.querySelectorAll('.slider-track').forEach(track => {
        let lastPos = null;
        const mode = track.dataset.mode;

        function onDown(e) {
          e.preventDefault();
          sliderInteracting = true;
          // Anchor ghost at the pre-drag thumb position for the life of the drag.
          // CSS reveals it via .slider-track.dragging.
          const thumb = track.querySelector('.slider-thumb');
          const ghost = track.querySelector('.slider-thumb-ghost');
          if (ghost && thumb) {
            const startPct = parseFloat(thumb.style.left) || 0;
            ghost.style.left = startPct + '%';
            // Inherit the live thumb's tinted border so the ghost reads as a
            // faint duplicate of the same control rather than a generic ring.
            const borderColor = thumb.style.borderColor;
            if (borderColor) ghost.style.borderColor = borderColor;
          }
          // Snapshot the current bulb curve as a "before" reference for the
          // chart drag ghost. renderMiniChart picks up window._chartDragGhostCurve
          // and renders it as a dotted line for the duration of the drag.
          // Cleared on pointerup so the ghost vanishes the moment the user
          // commits the new value. Applies to all three sliders (brightness,
          // color, phase) — for phase, the ghost shows the original wake/bed
          // shape so the user can see how the time shift bends the curve.
          if (mode === 'brightness' || mode === 'color' || mode === 'phase') {
            const ctx = getSliderCfgAndState();
            if (ctx) {
              try {
                const snap = calcMiniCurveData(ctx.cfg, ctx.areaState, cachedSunTimes, ctx.currentHour, ctx.cfg.ascend_start);
                window._chartDragGhostCurve = { bulbPct: snap.bulbPct };
              } catch (_) { window._chartDragGhostCurve = null; }
            }
          }
          track.classList.add('dragging');
          track.setPointerCapture(e.pointerId);
          lastPos = getPositionFromPointer(track, e);
          previewSlider(track, lastPos);
        }
        function onMove(e) {
          if (!track.classList.contains('dragging')) return;
          e.preventDefault();
          lastPos = getPositionFromPointer(track, e);
          previewSlider(track, lastPos);
        }
        function onUp(e) {
          if (!track.classList.contains('dragging')) return;
          e.preventDefault();
          track.classList.remove('dragging');
          // Drag ghost disappears the instant the user commits a value.
          window._chartDragGhostCurve = null;
          // Re-render once WITHOUT the ghost but WITH the dragged values.
          // Using areaState here would snap the curve back to the pre-drag
          // shape until the post-drop status fetch lands (~500ms later),
          // which the user saw as a brief flicker. The stashed preview state
          // carries the dragged override → chart stays put.
          const lp = window._lastDragPreview;
          if (lp) {
            try {
              renderMiniChart(lp.cfg, lp.state, lp.sunTimes, lp.currentHour, lp.isActive, lp.adjustedTimes ?? null, lp.markerOverride);
            } catch (_) {}
            window._lastDragPreview = null;
          } else if (selectedArea) {
            renderMiniChartForArea(selectedArea.area_id);
          }
          // Keep sliderInteracting=true through the post-drop window so the
          // periodic 3s refresh doesn't fire with stale state and snap the
          // thumb back to the pre-drop value before the server's set_position
          // result lands. executeSetPosition / executeSetPhaseTime each clear
          // it ~700ms later, after their fresh-status fetch completes.
          if (lastPos === null) { sliderInteracting = false; return; }
          if (mode === 'phase') {
            const ctx = getSliderCfgAndState();
            const phaseCtx = ctx ? buildPhaseCtx(ctx.cfg, ctx.areaState, ctx.currentHour) : null;
            const targetTime = pctToPhaseTargetTime(lastPos, phaseCtx);
            if (targetTime != null) executeSetPhaseTime(targetTime);
            else sliderInteracting = false;
          } else {
            executeSetPosition(Math.round(lastPos), mode);
          }
        }

        track.addEventListener('pointerdown', onDown);
        track.addEventListener('pointermove', onMove);
        track.addEventListener('pointerup', onUp);
        track.addEventListener('pointercancel', onUp);
      });

      // Banner slider (horizontal)
      const banner = document.getElementById('area-banner-slider');
      if (banner) {
        let bannerLastPos = null;
        function bannerPos(e) {
          const rect = banner.getBoundingClientRect();
          return Math.max(0, Math.min(100, (e.clientX - rect.left) / rect.width * 100));
        }
        banner.addEventListener('pointerdown', (e) => {
          e.preventDefault();
          sliderInteracting = true;
          banner.classList.add('dragging');
          banner.setPointerCapture(e.pointerId);
          bannerLastPos = bannerPos(e);
          const thumb = banner.querySelector('.row-slider-thumb');
          if (thumb) thumb.style.left = bannerLastPos + '%';
          previewSlider(banner, bannerLastPos);
        });
        banner.addEventListener('pointermove', (e) => {
          if (!banner.classList.contains('dragging')) return;
          e.preventDefault();
          bannerLastPos = bannerPos(e);
          const thumb = banner.querySelector('.row-slider-thumb');
          if (thumb) thumb.style.left = bannerLastPos + '%';
          previewSlider(banner, bannerLastPos);
        });
        function bannerUp(e) {
          if (!banner.classList.contains('dragging')) return;
          e.preventDefault();
          banner.classList.remove('dragging');
          sliderInteracting = false;
          if (bannerLastPos !== null) {
            executeCircadianAdjust(bannerLastPos);
          }
        }
        banner.addEventListener('pointerup', bannerUp);
        banner.addEventListener('pointercancel', bannerUp);
      }
    }

    function previewSlider(track, position) {
      const dragMode = track.dataset.mode;
      const ctx = getSliderCfgAndState();
      if (!ctx) return;
      const { cfg, areaState, currentHour } = ctx;

      const bMin = cfg.min_brightness, bMax = cfg.max_brightness;
      const cMin = cfg.min_color_temp, cMax = cfg.max_color_temp;
      const currentBri = calcMiniBrightness(currentHour, cfg, areaState, currentHour) * 100;
      const currentCCT = calcMiniColor(currentHour, cfg, areaState, cachedSunTimes, currentHour);

      const effRange = getEffectiveColorRange(cfg, currentHour, areaState.color_override);
      const phaseCtx = buildPhaseCtx(cfg, areaState, currentHour);

      if (dragMode === 'phase') {
        if (!phaseCtx) return;
        const targetH48 = phaseCtx.phaseMin + (phaseCtx.phaseMax - phaseCtx.phaseMin) * position / 100;
        const shiftedMid = computeCandidateShiftedMid(targetH48, cfg, phaseCtx.cursorInAscend);
        const kAscend = SPEED_TO_SLOPE[Math.max(1, Math.min(12, cfg.wake_speed))];
        const kDescend = SPEED_TO_SLOPE[Math.max(1, Math.min(12, cfg.bed_speed))];
        const slopeSigned = phaseCtx.cursorInAscend ? kAscend : -kDescend;
        const bMinNorm = bMin / 100, bMaxNorm = bMax / 100;
        const now48 = currentHour < cfg.ascend_start ? currentHour + 24 : currentHour;
        const ct = 1 / (1 + Math.exp(-slopeSigned * (now48 - shiftedMid)));
        const previewBri = Math.max(0, Math.min(100, (bMinNorm + (bMaxNorm - bMinNorm) * ct) * 100));
        const previewCCT = cMin + (cMax - cMin) * ct;
        (track.querySelector('.slider-track-bg') || track).style.background = buildTrackGradient(dragMode, cfg, previewBri, previewCCT, effRange, phaseCtx);
        applyOneSlider(track, position, previewBri, previewCCT, dragMode);
        const targetTime24 = ((targetH48 % 24) + 24) % 24;
        const heroPhase = document.getElementById('slider-hero-phase');
        if (heroPhase) heroPhase.textContent = formatPhaseTime(targetTime24);

        // Live-update Bright/Color hero readouts AND the page-header readout
        // so they track the curve shift during phase drag — same treatment
        // brightness/color drag got. Without this, dragging bed earlier shifts
        // the curve visually but the displayed `% · K` stay frozen.
        const phHeroBri = document.getElementById('slider-hero-brightness');
        if (phHeroBri) phHeroBri.textContent = Math.round(previewBri) + '%';
        const phHeroColor = document.getElementById('slider-hero-color');
        if (phHeroColor) phHeroColor.textContent = Math.round(previewCCT) + 'K';
        const phHeaderReadout = document.getElementById('page-header-readout');
        if (phHeaderReadout) {
          phHeaderReadout.textContent = `${Math.round(previewBri)}% · ${Math.round(previewCCT)}K`;
        }
        const phHeaderEl = document.getElementById('page-header');
        if (phHeaderEl) {
          const phTinted = tintColorByBrightness(cctToRGB(previewCCT), Math.round(previewBri));
          phHeaderEl.style.background = phTinted;
          phHeaderEl.style.color = readableTextColor(phTinted);
        }

        // Live-sync the chart: shift the curve using the previewed midpoint
        // and move the wake/bed vertical line to the dragged target.
        if (selectedArea) {
          const shiftedMid24 = ((shiftedMid % 24) + 24) % 24;
          const previewAreaState = applyTuneStateOverlay({ ...areaState, brightness_mid: shiftedMid24, color_mid: shiftedMid24 });
          const isActive = selectedArea.is_on || selectedArea.is_circadian;
          const adjustedTimes = {
            wake: phaseCtx.cursorInAscend ? targetTime24 : null,
            bed: phaseCtx.cursorInAscend ? null : targetTime24,
          };
          // Stash so onUp can re-render without the ghost using the dragged
          // state (avoids snap-back to areaState during the post-drop window).
          window._lastDragPreview = {
            cfg, state: previewAreaState, sunTimes: cachedSunTimes, currentHour, isActive,
            adjustedTimes,
            markerOverride: { bri: previewBri, cct: previewCCT },
          };
          renderMiniChart(cfg, previewAreaState, cachedSunTimes, currentHour, isActive, adjustedTimes, { bri: previewBri, cct: previewCCT });
        }
        return;
      }

      let previewBri, previewCCT;
      if (dragMode === 'brightness') {
        previewBri = bMin + (bMax - bMin) * position / 100;
        previewCCT = currentCCT;
      } else if (dragMode === 'color') {
        previewBri = currentBri;
        previewCCT = cMin + (cMax - cMin) * position / 100;
      } else {
        return;
      }

      const briFrac = bMax > bMin ? Math.max(0, Math.min(100, (previewBri - bMin) / (bMax - bMin) * 100)) : 50;
      const cctFrac = cMax > cMin ? Math.max(0, Math.min(100, (previewCCT - cMin) / (cMax - cMin) * 100)) : 50;
      const pct = dragMode === 'brightness' ? briFrac : cctFrac;
      (track.querySelector('.slider-track-bg') || track).style.background = buildTrackGradient(dragMode, cfg, previewBri, previewCCT, effRange, phaseCtx);
      applyOneSlider(track, pct, previewBri, previewCCT, dragMode);

      // Live-update the hero readouts AND the page-header `% · K` readout as
      // the user drags so both displayed values track the thumb in real time.
      // Without this, "78%" / "2910K" stay frozen until pointerup triggers a
      // state refresh, and the header readout stays at the pre-drag value.
      const headerReadout = document.getElementById('page-header-readout');
      const headerEl = document.getElementById('page-header');
      if (dragMode === 'brightness') {
        const heroBri = document.getElementById('slider-hero-brightness');
        if (heroBri) heroBri.textContent = Math.round(previewBri) + '%';
        if (headerReadout) {
          const k = Math.round(previewCCT);
          headerReadout.textContent = `${Math.round(previewBri)}% · ${k}K`;
        }
        // Also live-tint the header background so dragging brightness
        // visibly affects the header tint (matches the tint pipeline that
        // runs on every status refresh via updateHeaderTint).
        if (headerEl) {
          const tinted = tintColorByBrightness(cctToRGB(previewCCT), Math.round(previewBri));
          headerEl.style.background = tinted;
          headerEl.style.color = readableTextColor(tinted);
        }
      } else if (dragMode === 'color') {
        const heroColor = document.getElementById('slider-hero-color');
        if (heroColor) heroColor.textContent = Math.round(previewCCT) + 'K';
        if (headerReadout) {
          const k = Math.round(previewCCT);
          headerReadout.textContent = `${Math.round(previewBri)}% · ${k}K`;
        }
        if (headerEl) {
          const tinted = tintColorByBrightness(cctToRGB(previewCCT), Math.round(previewBri));
          headerEl.style.background = tinted;
          headerEl.style.color = readableTextColor(tinted);
        }
      }

      // Build a preview state that injects the new override as if it were just
      // set at NOW. calcMiniBrightness / calcMiniColor already handle linear
      // decay from set_at forward to the next phase boundary, so the curve
      // will rise (or fall) at NOW and taper back to pure circadian by the
      // Wake/Bed edge — matching what the lights will do after release.
      if (selectedArea) {
        const isActive = selectedArea.is_on || selectedArea.is_circadian;
        // Overlay live tuneState (sun_exposure / area_factor / live_sbf) so
        // unsaved Tune edits stay reflected in the curve while the user
        // drags the Bright/Color slider — otherwise the curve would snap
        // back to the saved status values.
        const previewState = applyTuneStateOverlay({ ...areaState });
        if (dragMode === 'brightness') {
          // Compute pure bulb at NOW (room × sun_factor with no override) so the
          // override delta is in bulb-space — matches calcMiniCurveData where
          // override is now applied at bulb level.
          const pureState = { ...previewState, brightness_override: null, brightness_override_set_at: null };
          const pureRoomAtNow = calcMiniBrightness(currentHour, cfg, pureState, currentHour, { skipOverride: true }) * 100;
          const sbfNow = previewState.live_sbf
            ?? (areaStatus[selectedArea.area_id]?.sun_bright_factor)
            ?? cachedSunTimes.sunBrightFactorNow ?? 1.0;
          const previewSunTimes = Object.assign({}, cachedSunTimes, { sunBrightFactorNow: sbfNow });
          const pureBulbAtNow = calcBulbBrightnessAt(currentHour, previewSunTimes, currentHour, pureRoomAtNow);
          previewState.brightness_override = previewBri - pureBulbAtNow;
          previewState.brightness_override_set_at = currentHour;
        } else if (dragMode === 'color') {
          const pureColorState = { ...previewState, color_override: null, color_override_set_at: null };
          const pureCCTAtNow = calcMiniColor(currentHour, cfg, pureColorState, cachedSunTimes, currentHour);
          previewState.color_override = previewCCT - pureCCTAtNow;
          previewState.color_override_set_at = currentHour;
        }
        // Stash the last preview state so onUp can re-render WITHOUT the
        // ghost but WITH the dragged values, instead of re-rendering from
        // areaState (which still carries the pre-drag values until the 500ms
        // status fetch lands). Avoids the snap-back flicker the user reported.
        window._lastDragPreview = {
          cfg, state: previewState, sunTimes: cachedSunTimes, currentHour, isActive,
          markerOverride: { bri: previewBri, cct: previewCCT },
        };
        renderMiniChart(cfg, previewState, cachedSunTimes, currentHour, isActive, null, { bri: previewBri, cct: previewCCT });
      }
    }

    // ============================================================
    // Initialization
    // ============================================================
    document.addEventListener('DOMContentLoaded', async () => {
      // Compute base path for API calls (handles ingress prefix)
      const path = window.location.pathname;
      const areaMatch = path.match(/^(.*)\/area\/[^/]+\/?$/);
      if (areaMatch) {
        basePath = areaMatch[1] || '';
      }

      // Get selected area from injected data
      const data = window.circadianData || {};
      const selectedAreaId = data.selectedAreaId;
      cachedConfig = data.config;

      // Compute sun times client-side from config lat/lon
      if (cachedConfig) {
        const lat = cachedConfig.latitude || 35.0;
        const lon = cachedConfig.longitude || -78.6;
        cachedSunTimes = getSunTimes(lat, lon);
      }

      // Fetch initial data
      await loadInitialData();

      // Determine if area page
      if (selectedAreaId) {
        setupAreaPage(selectedAreaId);
      } else {
        document.getElementById('page-title').textContent = 'Not Found';
      }

      // Start refresh intervals
      startRefresh();
      initSliderHandlers();
      initChartCardState();
      initAutoOuterState();
      initAutoHideSliders();
      handleDeepLink();

    });

    // Document-level handler: tap to toggle the reveal-group; collapse all others.
    // Tapping the same group again closes it.
    function initAutoHideSliders() {
      document.addEventListener('click', (e) => {
        // Don't toggle when the click originated on a range input — mouseup on a slider
        // dispatches a click that would otherwise close the row the user just dragged.
        if (e.target.tagName === 'INPUT' && e.target.type === 'range') return;
        const rg = e.target.closest('.reveal-group');
        const wasOpen = rg && rg.classList.contains('is-revealing');
        document.querySelectorAll('.reveal-group.is-revealing').forEach(g => {
          if (g !== rg) g.classList.remove('is-revealing');
        });
        if (rg) rg.classList.toggle('is-revealing', !wasOpen);
      });
    }

    async function loadInitialData() {
      try {
        const [statusRes, zsRes, areasRes, gzRes] = await Promise.all([
          fetch(basePath + '/api/area-status'),
          fetch(basePath + '/api/zone-states'),
          fetch(basePath + '/api/areas'),
          fetch(basePath + '/api/glozones')
        ]);
        if (gzRes.ok) cachedGlozones = await gzRes.json();
        if (statusRes.ok) areaStatus = await statusRes.json();
        // Compute condition multiplier: ratio of actual outdoor reading to clear-sky model
        if (cachedSunTimes && cachedConfig) {
          const firstStatus = Object.values(areaStatus)[0];
          if (firstStatus) {
            const actualNorm = firstStatus.outdoor_normalized ?? firstStatus.sun_factor ?? 0;
            cachedSunTimes.outdoorNormalized = actualNorm;
            cachedSunTimes.sunSaturation = firstStatus.sun_saturation ?? 40;
            cachedSunTimes.maxSummerElevation = firstStatus.max_summer_elevation ?? 78.0;
            cachedSunTimes.sunBrightFactorNow = firstStatus.sun_bright_factor ?? 1.0;
            // Derive condition multiplier from current reading vs clear-sky at current hour
            const now = new Date();
            const currentHour = now.getHours() + now.getMinutes() / 60;
            const lat = cachedConfig.latitude || 35.0;
            const lon = cachedConfig.longitude || -78.6;
            const clearSkyNow = elevationToOutdoorNorm(getSunElevationAtHour(currentHour, lat, lon));
            cachedSunTimes.conditionMultiplier = clearSkyNow > 0.01 ? Math.min(1.0, actualNorm / clearSkyNow) : 1.0;
          }
        }
        if (zsRes.ok) {
          const zs = await zsRes.json();
          zoneStates = zs.zone_states || {};
        }
        if (areasRes.ok) areas = await areasRes.json();
      } catch (err) {
        console.error('Error loading initial data:', err);
      }
    }

    function setupAreaPage(areaId) {
      const area = areas.find(a => a.area_id === areaId);
      const status = areaStatus[areaId] || {};

      if (!area) {
        document.getElementById('page-title').textContent = 'Area not found';
        return;
      }

      selectedArea = {
        ...area,
        area_id: areaId,
        is_on: status.is_on || false,
        brightness: status.curve_brightness || status.brightness || 0,
        actual_brightness: status.actual_brightness ?? (status.curve_brightness || status.brightness || 0),
        kelvin: status.kelvin || 4000,
        frozen: status.frozen || false,
        boosted: status.boosted || false,
        zone_name: status.zone_name || null,
        preset_name: status.preset_name || null,
        is_circadian: status.is_circadian !== false,
        boost_brightness: status.boost_brightness || null,
        boost_expires_at: status.boost_expires_at || null,
        boost_started_from_off: status.boost_started_from_off || false,
        is_motion_coupled: status.is_motion_coupled || false,
        motion_expires_at: status.motion_expires_at || null,
        motion_warning_active: status.motion_warning_active || false,
        fade_direction: status.fade_direction || null,
        fade_target_preset: status.fade_target_preset || null,
        fade_remaining: status.fade_remaining ?? null
      };

      document.getElementById('page-title').textContent = area.name;

      updateContent();
      // Fetch slider preview points for gradient
      fetchSliderPreview(areaId).then(() => updateAllSliders());
      setTimeout(() => {
        renderMiniChartForArea(areaId);
        updateAllSliders();
      }, 50);
      loadTuneSection();
      loadAutoScheduleSettings();
    }


    function getRefreshInterval() {
      if (cachedConfig) {
        const val = cachedConfig.home_refresh_interval;
        if (val && val >= 1 && val <= 60) return val;
      }
      return 3;
    }

    function startRefresh() {
      tickInterval = setInterval(updateTimerStatus, 1000);
      const intervalMs = getRefreshInterval() * 1000;
      refreshInterval = setInterval(async () => {
        if (sliderInteracting) return;
        try {
          if (selectedArea) {
            const res = await fetch(basePath + `/api/area-status?area_id=${encodeURIComponent(selectedArea.area_id)}`);
            if (res.ok) {
              const singleStatus = await res.json();
              Object.assign(areaStatus, singleStatus);

              // Update cachedSunTimes with outdoor_normalized and condition multiplier
              const ls0 = singleStatus[selectedArea.area_id] || {};
              if (cachedSunTimes && cachedConfig) {
                const actualNorm = ls0.outdoor_normalized ?? ls0.sun_factor ?? 0;
                cachedSunTimes.outdoorNormalized = actualNorm;
                cachedSunTimes.sunSaturation = ls0.sun_saturation ?? 40;
                cachedSunTimes.maxSummerElevation = ls0.max_summer_elevation ?? 78.0;
                cachedSunTimes.sunBrightFactorNow = ls0.sun_bright_factor ?? 1.0;
                const now = new Date();
                const currentHour = now.getHours() + now.getMinutes() / 60;
                const lat = cachedConfig.latitude || 35.0;
                const lon = cachedConfig.longitude || -78.6;
                const clearSkyNow = elevationToOutdoorNorm(getSunElevationAtHour(currentHour, lat, lon));
                cachedSunTimes.conditionMultiplier = clearSkyNow > 0.01 ? Math.min(1.0, actualNorm / clearSkyNow) : 1.0;
              }

              // Update tuneState with fresh server data
              if (tuneState.initialized) {
                const ls = ls0;
                const _as = areaStatus[selectedArea.area_id] || {};
                tuneState.baseBri = _as.curve_brightness || _as.brightness || 50;
                tuneState.baseKelvin = ls.base_kelvin ?? ((areaStatus[selectedArea.area_id] || {}).kelvin || 4000);
                tuneState.sunElev = ls.sun_elevation ?? 0;
                tuneState.outdoorNormalized = ls.outdoor_normalized ?? ls.sun_factor ?? 0.0;
                tuneState.outdoorSource = ls.outdoor_source ?? 'none';
                tuneState.outdoorSourceEntity = ls.outdoor_source_entity ?? null;
                tuneState.outdoorLastUpdate = ls.outdoor_last_update ?? null;
                tuneState.brightnessSensitivity = ls.brightness_sensitivity ?? 5.0;
                tuneState.backendSunBrightFactor = ls.sun_bright_factor ?? null;
                tuneState.brightnessFadeWeight = ls.brightness_fade_weight ?? null;
                tuneState.luxSmoothed = ls.lux_smoothed ?? null;
                tuneState.luxCeiling = ls.lux_ceiling ?? null;
                tuneState.luxFloor = ls.lux_floor ?? null;
                tuneState.weatherCondition = ls.weather_condition ?? null;
                tuneState.conditionMultiplier = ls.condition_multiplier ?? null;
                tuneState.angleFactor = ls.angle_factor ?? null;
                tuneState.solarBreakdown = ls.solar_breakdown ?? null;
                tuneState.boosted = _as.boosted || false;
                tuneState.boostBrightness = _as.boost_brightness || 0;
                tuneState.briOverride = _as.effective_bri_override || 0;
                tuneState.fadeDirection = _as.fade_direction || null;
                tuneState.dimFactor = _as.dim_factor ?? 1.0;
                tuneState.fadeProgress = _as.fade_progress ?? null;
                tuneState.actualBrightness = _as.actual_brightness ?? null;

                // Update base row display in details card
                const elDetBase = document.getElementById('tune-det-base-total');
                if (elDetBase) elDetBase.textContent = tuneState.baseBri + '%';

                recalcTune();
              }
            }
            updateContent();
            renderMiniChartForArea(selectedArea.area_id);
            // Re-fetch controls so the Recent strip picks up newly-pressed switches
            // (last_action.timestamp on each control). Filter for current area.
            try {
              const cres = await fetch(basePath + '/api/controls');
              if (cres.ok) {
                const cd = await cres.json();
                areaControls = filterControlsForArea(cd.controls || [], selectedArea.area_id);
                refreshRecentControlsStrip();
              }
            } catch (_) { /* non-fatal */ }
          }
          updateAllSliders();
        } catch (err) {
          console.error('Error refreshing:', err);
        }
      }, intervalMs);
    }

    function stopRefresh() {
      if (tickInterval) { clearInterval(tickInterval); tickInterval = null; }
      if (refreshInterval) { clearInterval(refreshInterval); refreshInterval = null; }
    }

    // ============================================================
    // Navigation
    // ============================================================
    function goBack() {
      if (isTuneDirty() || isAutoSchedDirty()) {
        if (!confirm('You have unsaved changes. Discard and leave?')) return;
      }
      stopRefresh();
      const params = new URLSearchParams(window.location.search);
      const from = params.get('from');
      if (from === 'tune') {
        window.location.href = basePath + '/tune';
      } else {
        window.location.href = basePath + '/';
      }
    }

    // ============================================================
    // Content Updates
    // ============================================================
    function updateContent() {
      if (!selectedArea) return;
      const status = areaStatus[selectedArea.area_id] || {};

      Object.assign(selectedArea, {
        is_on: status.is_on || false,
        brightness: status.curve_brightness || status.brightness || 0,
        actual_brightness: status.actual_brightness ?? (status.curve_brightness || status.brightness || 0),
        kelvin: status.kelvin || 4000,
        frozen: status.frozen || false,
        boosted: status.boosted || false,
        zone_name: status.zone_name || null,
        preset_name: status.preset_name || null,
        is_circadian: status.is_circadian !== false,
        boost_brightness: status.boost_brightness || null,
        boost_expires_at: status.boost_expires_at || null,
        boost_started_from_off: status.boost_started_from_off || false,
        is_motion_coupled: status.is_motion_coupled || false,
        motion_expires_at: status.motion_expires_at || null,
        motion_warning_active: status.motion_warning_active || false,
        fade_direction: status.fade_direction || null
      });

      // CCT-tint the page-header background per current room state, plus
      // refresh the row-2 readout (% · K) and the dirty-reset visibility.
      updateHeaderTint();
      updateHeaderResetVisibility();

      // Header meta — just the zone link now (the "Rhythm Zone" caps label was
      // dropped as redundant chrome). color: inherit so it tracks the
      // readableTextColor that updateHeaderTint sets on .page-header.
      const metaRhythm = document.getElementById('header-meta-rhythm');
      const areaZoneName = selectedArea.zone_name;
      if (areaZoneName) {
        metaRhythm.innerHTML = `<a href="${basePath}/zone/${encodeURIComponent(areaZoneName)}?back=area/${encodeURIComponent(selectedArea.area_id)}">${areaZoneName}</a>`;
        metaRhythm.style.display = '';
      } else {
        metaRhythm.innerHTML = '';
        metaRhythm.style.display = 'none';
      }

      // Power, freeze, circadian — three header row 2 toggles. Power active
      // when lights are on (no special styling — readout shows 0% when off).
      // Freeze active when frozen (cyan tint via .active). Circadian uses
      // the inverse — `.is-off` flag flips it from de-emphasized (default)
      // to full-prominence (the noteworthy state).
      const powerBtn = document.getElementById('toggle-power');
      if (powerBtn) powerBtn.classList.toggle('active', selectedArea.is_on);

      const freezeBtn = document.getElementById('toggle-freeze');
      if (freezeBtn) freezeBtn.classList.toggle('active', selectedArea.frozen);

      // Circadian-off overlay (greys chart + sliders, surfaces "Enable"
      // button on the chart card) + header circadian icon prominence.
      const wrap = document.getElementById('circadian-content-wrap');
      const enableBtn = document.getElementById('enable-circadian-btn');
      const circToggle = document.getElementById('toggle-circadian');
      if (wrap && enableBtn) {
        if (selectedArea.is_circadian === false) {
          wrap.classList.add('circadian-off-overlay');
          enableBtn.style.display = 'flex';
        } else {
          wrap.classList.remove('circadian-off-overlay');
          enableBtn.style.display = 'none';
        }
      }

    // CCT-tint the page-header to reflect the area's current bulb color.
    // Mirrors rhythm-design.html positionOverlays(): tinted bg + readable text
    // color flow inheriting through .page-title, .page-header-meta a, chips,
    // power icon, and back button. When the room is off or circadian-disabled,
    // fall back to the neutral panel color so the header doesn't lie about
    // current state.
    function updateHeaderTint() {
      const headerEl = document.getElementById('page-header');
      const readoutEl = document.getElementById('page-header-readout');
      if (!headerEl || !selectedArea) return;
      // actual_brightness reflects what the bulb WOULD emit at current
      // settings — it doesn't drop to 0 when the room is off (the bulb's
      // power state is is_on). Force brightness to 0 for both the tint
      // and the readout when off so the header darkens and 0% shows.
      const effectiveBri = selectedArea.is_on
        ? (selectedArea.actual_brightness ?? 0)
        : 0;
      // Match home-page area-card treatment (areas.html getRowStyle): tint
      // with CCT only when on; when off (or circadian off), fall back to
      // var(--card) — same near-black the area cards use, so the two
      // surfaces stay visually consistent.
      let bg, color;
      if (selectedArea.is_on && selectedArea.is_circadian !== false) {
        const cctColor = cctToRGB(selectedArea.kelvin);
        const tintedColor = tintColorByBrightness(cctColor, effectiveBri);
        bg = tintedColor;
        color = readableTextColor(tintedColor);
      } else {
        bg = 'var(--card)';
        color = 'var(--text)';
      }
      headerEl.style.background = bg;
      headerEl.style.color = color;
      // Readout always shows current K — color stays informative when off,
      // brightness reads 0% as the off indicator. Power button has no
      // on/off styling; the % readout IS the off indicator.
      if (readoutEl) {
        const k = Math.round(selectedArea.kelvin ?? 0);

            } else if (selectedArea.boost_expires_at === 'motion') {
              if (selectedArea.motion_expires_at) {

    // ============================================================
    // Chart Rendering
    // ============================================================
    // Map weather_condition string + condition multiplier to a small icon.
    // Returns a single-glyph string suitable for the chart-sun-info chip.
    function chartConditionIcon(weatherCondition, condMultiplier) {
      const c = (weatherCondition || '').toLowerCase();
      if (c.includes('lightning') || c.includes('storm')) return '\u26C8';      // ⛈
      if (c.includes('snow') || c.includes('hail') || c.includes('sleet')) return '\u2744'; // ❄
      if (c.includes('rain') || c.includes('drizzle') || c.includes('pour')) return '\u2614'; // ☔
      if (c.includes('fog') || c.includes('haze') || c.includes('mist')) return '\u2601';   // ☁ fallback
      if (c.includes('partly') || c.includes('partial')) return '\u26C5';        // ⛅
      if (c.includes('cloud')) return '\u2601';                                  // ☁
      if (c.includes('sun') || c.includes('clear')) return '\u2600';             // ☀
      // Fallback by conditionMultiplier (1.0 = clear sky, lower = cloudier)
      if (condMultiplier != null) {
        if (condMultiplier > 0.85) return '\u2600';
        if (condMultiplier > 0.55) return '\u26C5';
        return '\u2601';
      }
      return '\u2600';
    }

    // Updates the sun-intensity chip above the chart. Visible only when the
    // room has sun-exposure > 0 AND the cursor is between sunrise/sunset.
    // Position: solar noon if it falls inside the active phase window;
    // otherwise clamp to whichever phase edge is closer to solar noon (so the
    // chip lands at the brightest visible time). Sun glyph only — the % does
    // the cloudiness signaling without needing a weather icon.
    function updateChartSunInfo(currentHour, sunTimes, status) {
      const el = document.getElementById('chart-sun-info');
      if (!el) return;
      let exposure = status?.natural_light_exposure ?? 0;
      let sensitivity = status?.brightness_sensitivity ?? 5.0;
      if (tuneState && tuneState.initialized) {
        if (typeof SOLAR_STEPS !== 'undefined' && SOLAR_STEPS[tuneState.solarStep]) {
          exposure = SOLAR_STEPS[tuneState.solarStep].exposure;
        }
        if (tuneState.brightnessSensitivity != null) {
          sensitivity = tuneState.brightnessSensitivity;
        }
      }
      if (exposure <= 0 || sensitivity <= 0) { el.classList.remove('visible'); return; }
      const sunrise = sunTimes?.sunrise;
      const sunset = sunTimes?.sunset;
      const isDay = Number.isFinite(sunrise) && Number.isFinite(sunset)
        && currentHour >= sunrise && currentHour < sunset;
      if (!isDay) { el.classList.remove('visible'); return; }
      const norm = sunTimes?.outdoorNormalized ?? 0;
      const pct = Math.round(norm * 100);
      const iconEl = document.getElementById('chart-sun-info-icon');
      const pctEl = document.getElementById('chart-sun-info-pct');
      if (iconEl) iconEl.textContent = '☀';  // sun glyph; % conveys cloudiness
      if (pctEl) pctEl.textContent = pct + '%';
      el.classList.add('visible');
      const chartDiv = document.getElementById('mini-chart');
      const shell = document.getElementById('chart-shell');
      const fl = chartDiv && chartDiv._fullLayout;
      if (fl && fl.xaxis && fl.yaxis && shell) {
        const xRange = fl.xaxis.range;  // [phaseVisStart, phaseVisEnd]
        const xStart = xRange[0], xEnd = xRange[1];
        const xLen = fl.xaxis._length;
        // Solar noon — try the natural noon position first; if it falls
        // outside the visible phase window, clamp to the nearest visible
        // edge (so chip sits at the brightest time of what's shown).
        const noonHour = (sunrise + sunset) / 2;
        let visNoon = noonHour;
        while (visNoon < xStart - 12) visNoon += 24;
        while (visNoon > xEnd + 12) visNoon -= 24;
        const clampedNoon = Math.max(xStart, Math.min(xEnd, visNoon));
        const chartLeftInShell = chartDiv.getBoundingClientRect().left - shell.getBoundingClientRect().left;
        const px = chartLeftInShell + fl.xaxis._offset + ((clampedNoon - xStart) / (xEnd - xStart)) * xLen;
        el.style.left = px + 'px';
        el.style.right = 'auto';
      }
    }

    // Mutates areaState in place, overlaying live tuneState pipeline factors so
    // unsaved Sun-exposure / Room-balance edits reshape the chart pre-save. Used
    // by both the auto-render path and the Bright/Color slider drag preview, so
    // dragging the Bright slider while Tune has unsaved changes doesn't snap the
    // curve back to saved values.
    function applyTuneStateOverlay(areaState) {
      if (!areaState || !tuneState || !tuneState.initialized) return areaState;
      if (tuneState.areaFactor != null) areaState.area_factor = tuneState.areaFactor;
      if (typeof SOLAR_STEPS !== 'undefined' && SOLAR_STEPS[tuneState.solarStep]) {
        areaState.sun_exposure = SOLAR_STEPS[tuneState.solarStep].exposure;
      }
      if (tuneState.brightnessSensitivity != null) {
        areaState.brightness_sensitivity = tuneState.brightnessSensitivity;
      }
      // Project sun_bright_factor for the live exposure so Sun-exposure slider
      // drags reshape the sun-dimming curve pre-save. Backend formula:
      // sbf = max(0, 1 − exposure × intensity × sensitivity). We only have
      // backend sbf (computed with the saved exposure), so recover the
      // intensity×sensitivity product from it and reapply with live exposure.
      if (tuneSnapshot && tuneState.backendSunBrightFactor != null &&
          typeof SOLAR_STEPS !== 'undefined' &&
          SOLAR_STEPS[tuneState.solarStep] && SOLAR_STEPS[tuneSnapshot.solarStep]) {
        const savedExp = SOLAR_STEPS[tuneSnapshot.solarStep].exposure;
        const liveExp = SOLAR_STEPS[tuneState.solarStep].exposure;
        if (liveExp !== savedExp && savedExp > 0) {
          const intensityProd = (1 - tuneState.backendSunBrightFactor) / savedExp;
          areaState.live_sbf = Math.max(0, 1 - liveExp * intensityProd);
        }
      }
      return areaState;
    }

    function renderMiniChartForArea(areaId) {
      const status = areaStatus[areaId] || {};
      if (!cachedConfig || !cachedSunTimes) return;

      // Use zone data as authoritative source
      const zoneName = status.zone_name;
      const zoneData = zoneName ? (cachedGlozones?.zones?.[zoneName] || {}) : {};
      let cfg = { ...cachedConfig, ...zoneData };
      cfg = resolveEffectiveCfg(cfg, zoneName, { skipOverride: true });

      const areaState = {
        brightness_mid: status.brightness_mid ?? null,
        color_mid: status.color_mid ?? null,
        color_override: status.color_override ?? null,
        color_override_set_at: status.color_override_set_at ?? null,
        brightness_override: status.brightness_override ?? null,
        brightness_override_set_at: status.brightness_override_set_at ?? null,
        frozen_at: status.frozen_at ?? null,
        // Pipeline factors for chart
        area_factor: status.area_factor ?? 1.0,
        sun_exposure: status.natural_light_exposure ?? 0,
        brightness_sensitivity: status.brightness_sensitivity ?? 5.0,
        outdoor_condition_mult: cachedSunTimes.conditionMultiplier ?? 1.0,
      };

      applyTuneStateOverlay(areaState);

      let currentHour;
      if (status.frozen && status.frozen_at != null) {
        currentHour = status.frozen_at;
      } else {
        const now = new Date();
        currentHour = now.getHours() + now.getMinutes() / 60;
      }

      const isActive = (status.is_on || false) && (status.is_circadian !== false);
      // Chart drag retired in Ship 2 — adjusted times come straight from
      // server status now. Live phase-slider drag is handled by the existing
      // slider drag pipeline (no chart-side live-sync needed).
      const adjustedTimes = {
        wake: status.adjusted_wake_time ?? null,
        bed: status.adjusted_bed_time ?? null,
      };
      renderMiniChart(cfg, areaState, cachedSunTimes, currentHour, isActive, adjustedTimes);
      updateChartSunInfo(currentHour, cachedSunTimes, status);
    }

      if (!selectedArea) return;

      try {
        const response = await fetch(basePath + '/api/area/action', {

          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ area_id: selectedArea.area_id, action: action })
