  <script>
    // ============================================================
    // State
    // ============================================================
    let selectedArea = null;
    let areaStatus = {};
    let zoneStates = {};

    // Page entry mode — determines card persistence behavior
    // 'home': restore from localStorage, save toggles
    // 'focused': force target card open, rest collapsed, no persistence
    const _pageParams = new URLSearchParams(window.location.search);
    const _pageFrom = _pageParams.get('from');
    const _pageFocus = _pageParams.get('focus');
    const _pageMode = (!_pageFrom && !_pageFocus) ? 'home' : 'focused';
    const _persistCards = _pageMode === 'home';
    let cachedConfig = null;
    let cachedSunTimes = null;
    let cachedGlozones = {};
    let areas = [];
    let refreshInterval = null;
    let tickInterval = null;
    let basePath = '';
    let sliderInteracting = false;
    let sliderPreviewPoints = null;  // [{brightness, kelvin}, ...] from backend
    let tuneSnapshot = null;

    // ============================================================
    // Circadian Curve Calculation (from areas.html modal)
    // ============================================================

    // Slopes chosen so 5%→95% transition width = 2*ln(19)/k hours lands on:
    // 10h, 7.5h, 5.5h, 4h, 3h, 2.25h, 1.5h, 1h, 30min, 15min, 5min, 2min.
    // MUST stay in sync with brain.py SPEED_TO_SLOPE.
    const SPEED_TO_SLOPE = [0, 0.5889, 0.7852, 1.0708, 1.4722, 1.9630, 2.6173, 3.9260, 5.8890, 11.778, 23.556, 70.668, 176.67];

    function logistic(x, midpoint, slope, y0, y1) {
      try {
        const expVal = Math.exp(-slope * (x - midpoint));
        return y0 + (y1 - y0) / (1 + expVal);
      } catch {
        return slope * (x - midpoint) > 0 ? y1 : y0;
      }
    }

    function wrap24(x) {
      return ((x % 24) + 24) % 24;
    }

    function inverseMidpoint(x, targetValue, slope, y0, y1) {
      const epsilon = 0.001;
      const clamped = Math.max(y0 + epsilon, Math.min(y1 - epsilon, targetValue));
      const ratio = (clamped - y0) / (y1 - y0);
      try {
        return x + Math.log((1 - ratio) / ratio) / slope;
      } catch (e) {
        return x;
      }
    }

    function computeShiftedMidpoint(targetTimeH48, brightnessPct, slope, bMinNorm, bMaxNorm) {
      if (brightnessPct === 50) return targetTimeH48;
      const targetNorm = bMinNorm + (bMaxNorm - bMinNorm) * (brightnessPct / 100);
      return inverseMidpoint(targetTimeH48, targetNorm, slope, bMinNorm, bMaxNorm);
    }

    function getWindowWeight(hour, windowStart, windowEnd, fadeHrs) {
      const h = wrap24(hour);
      let inWindow = false;
      let distFromStart = 0;
      let distToEnd = 0;

      if (windowStart > windowEnd) {
        inWindow = h >= windowStart || h <= windowEnd;
        if (inWindow) {
          distFromStart = h >= windowStart ? (h - windowStart) : (h + 24 - windowStart);
          distToEnd = h <= windowEnd ? (windowEnd - h) : (windowEnd + 24 - h);
        }
      } else {
        inWindow = h >= windowStart && h <= windowEnd;
        if (inWindow) {
          distFromStart = h - windowStart;
          distToEnd = windowEnd - h;
        }
      }

      if (!inWindow) {
        return { inWindow: false, weight: 0 };
      }

      let weight = 1;
      if (fadeHrs > 0.01) {
        if (distFromStart < fadeHrs) {
          weight = Math.min(weight, distFromStart / fadeHrs);
        }
        if (distToEnd < fadeHrs) {
          weight = Math.min(weight, distToEnd / fadeHrs);
        }
      }

      return { inWindow: true, weight };
    }

    function rad(d) { return d * Math.PI / 180; }

    function solarDeclination(doy) {
      return (23.44 * Math.PI / 180) * Math.sin(2 * Math.PI * (284 + doy) / 365);
    }

    function getSunElevationAtHour(hour, lat, lon) {
      const date = new Date();
      const doy = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / 86400000);
      const decl = solarDeclination(doy);
      const latRad = lat * Math.PI / 180;
      const tz = -date.getTimezoneOffset() / 60;
      const solarNoon = 12 + tz - (lon / 15);
      const hourAngle = (hour - solarNoon) * 15 * Math.PI / 180;
      const sinElev = Math.sin(latRad) * Math.sin(decl) + Math.cos(latRad) * Math.cos(decl) * Math.cos(hourAngle);
      return Math.max(0, Math.asin(sinElev) * 180 / Math.PI);
    }

    function elevationToOutdoorNorm(elevDeg) {
      if (elevDeg <= 0) return 0;
      const FULL_SUN_INTENSITY = 8.4;
      const clearSkyLux = 120000 * Math.sin(elevDeg * Math.PI / 180);
      if (clearSkyLux <= 300) return 0;
      return Math.min(1.0, Math.log2(clearSkyLux / 300) / FULL_SUN_INTENSITY);
    }

    function getSunTimes(lat, lon, forDate) {
      const date = forDate || new Date();
      const n = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / 86400000);
      const J = n + ((lon < 0 ? 360 + lon : lon) / 360);
      const M = (357.5291 + 0.9856 * J) % 360;
      const C = 1.9148 * Math.sin(rad(M)) + 0.02 * Math.sin(rad(2 * M)) + 0.0003 * Math.sin(rad(3 * M));
      const L = (M + 102.9372 + C + 180) % 360;
      const D = Math.asin(Math.sin(rad(L)) * Math.sin(rad(23.44)));
      const cosH0 = (Math.cos(rad(90.833)) - Math.sin(rad(lat)) * Math.sin(D)) / (Math.cos(rad(lat)) * Math.cos(D));

      if (cosH0 < -1 || cosH0 > 1) {
        const sn = 12 - date.getTimezoneOffset() / 60 - (lon / 15);
        return { sunrise: sn - 6, sunset: sn + 6, solarNoon: sn, solarMid: (sn + 12) % 24 };
      }

      const H0 = Math.acos(cosH0);
      const dl = (2 * H0 * 180 / Math.PI) / 15;
      const tz = -date.getTimezoneOffset() / 60;
      const sn = 12 + tz - (lon / 15);
      return { sunrise: sn - dl / 2, sunset: sn + dl / 2, solarNoon: sn, solarMid: (sn + 12) % 24 };
    }

    function liftMidpointToPhase(midpoint, phaseStart, phaseEnd) {
      const phaseCenter = (phaseStart + phaseEnd) / 2;
      let mid = midpoint;
      while (mid < phaseCenter - 12) mid += 24;
      while (mid > phaseCenter + 12) mid -= 24;
      const margin = 0.01;
      return Math.max(phaseStart + margin, Math.min(phaseEnd - margin, mid));
    }

    function applySolarRule(baseCCT, hour, cfg, sunTimes, colorOverride, sunCoolingStrength, sliderColor) {
      if (!sunTimes) return baseCCT;

      let cct = baseCCT;
      const sunrise = sunTimes.sunrise;
      const sunset = sunTimes.sunset;
      const solarMid = sunTimes.solarMid;
      // Warm night — ceiling
      if (cfg.warm_night_enabled) {
        let warmTarget = cfg.warm_night_target;
        if (colorOverride && colorOverride > 0 && !sliderColor) {
          warmTarget += colorOverride;
        }

        if (cct > warmTarget) {
          const fadeHrs = cfg.warm_night_fade / 60;
          const startOffsetHrs = cfg.warm_night_start / 60;
          const endOffsetHrs = cfg.warm_night_end / 60;
          const mode = cfg.warm_night_mode;

          let windowStart, windowEnd;
          if (mode === 'sunrise') {
            windowStart = wrap24(solarMid);
            windowEnd = wrap24(sunrise + endOffsetHrs);
          } else if (mode === 'sunset') {
            windowStart = wrap24(sunset + startOffsetHrs);
            windowEnd = wrap24(solarMid);
          } else {
            windowStart = wrap24(sunset + startOffsetHrs);
            windowEnd = wrap24(sunrise + endOffsetHrs);
          }

          const { inWindow, weight } = getWindowWeight(hour, windowStart, windowEnd, fadeHrs);
          if (inWindow && weight > 0) {
            cct = cct + (warmTarget - cct) * weight;
          }
        }
      }

      // Daylight color blend — per-hour elevation scaled by current conditions
      const lat = cachedConfig ? cachedConfig.latitude || 35.0 : 35.0;
      const lon = cachedConfig ? cachedConfig.longitude || -78.6 : -78.6;
      const clearSkyAtHour = elevationToOutdoorNorm(getSunElevationAtHour(hour, lat, lon));
      const condMult = sunTimes.conditionMultiplier ?? 1.0;
      const outdoorNorm = clearSkyAtHour * condMult;
      const daylightCct = cfg.daylight_cct || 0;
      const colorSensitivity = cfg.color_sensitivity ?? 1.0;
      if (cfg.daylight_enabled !== false && daylightCct > 0 && outdoorNorm > 0) {
        let blend = Math.min(1.0, outdoorNorm * colorSensitivity);
        // Apply daylight window (start/end offsets) + fade
        const startOffsetHrs = (cfg.daylight_start ?? 60) / 60;
        const endOffsetHrs = (cfg.daylight_end ?? -60) / 60;
        const fadeHrs = (cfg.daylight_fade ?? 60) / 60;
        const ds = wrap24(sunrise + startOffsetHrs);
        const de = wrap24(sunset + endOffsetHrs);
        const dw = getWindowWeight(hour, ds, de, fadeHrs);
        blend *= dw.weight;
        // Sun cooling strength: 1.0 = full, < 1.0 when user has stepped down
        blend *= sunCoolingStrength;
        let daylightTarget = daylightCct;
        if (colorOverride && colorOverride < 0 && !sliderColor) {
          daylightTarget += colorOverride;
        }
        if (daylightTarget > cct && blend > 0) {
          cct += (daylightTarget - cct) * blend;
        }
      }

      // Direct additive for slider-originated color override
      if (sliderColor && colorOverride) {
        cct += colorOverride;
      }

      return cct;
    }

    // Resolve effective wake/bed times considering schedule override and alt days.
    // Uses phase-aware logic: the graph needs the wake/bed for the current phase
    // and the next phase, which may fall on different weekdays.
    function resolveEffectiveCfg(cfg, zoneName, opts) {
      const resolved = { ...cfg };
      const skipOverride = opts?.skipOverride;

      // 1. Schedule override takes priority (forces specific times for all days)
      // Skipped for graph rendering — overrides affect alarm only, not circadian rhythm
      if (!skipOverride) {
        const zoneData = cachedGlozones?.zones?.[zoneName];
        const override = zoneData?.schedule_override;
        if (override) {
          if (override.mode === 'main') {
            resolved.wake_alt_time = null;
            resolved.bed_alt_time = null;
            return resolved;
          } else if (override.mode === 'alt') {
            if (resolved.wake_alt_time != null) resolved.wake_time = resolved.wake_alt_time;
            if (resolved.bed_alt_time != null) resolved.bed_time = resolved.bed_alt_time;
            resolved.wake_alt_time = null;
            resolved.bed_alt_time = null;
            return resolved;
          } else if (override.mode === 'custom') {
            if (override.custom_wake != null) resolved.wake_time = override.custom_wake;
            if (override.custom_bed != null) resolved.bed_time = override.custom_bed;
            resolved.wake_alt_time = null;
            resolved.bed_alt_time = null;
            return resolved;
          }
        }
      }

      // 2. Phase-aware alt day resolution
      const now = new Date();
      const weekday = now.getDay() === 0 ? 6 : now.getDay() - 1; // JS Sun=0 → Mon=0..Sun=6
      const hour = now.getHours() + now.getMinutes() / 60;
      const ascendStart = resolved.ascend_start ?? 3;
      let descendStart = resolved.descend_start ?? 12;
      if (descendStart <= ascendStart) descendStart += 24;
      const h48 = hour < ascendStart ? hour + 24 : hour;
      const inAscend = h48 >= ascendStart && h48 < descendStart;

      if (inAscend) {
        // Currently ascending: wake = today, bed = today
        const wakeWeekday = weekday;
        const bedWeekday = weekday;
        if (resolved.wake_alt_time != null && resolved.wake_alt_days?.includes(wakeWeekday)) {
          resolved.wake_time = resolved.wake_alt_time;
        }
        if (resolved.bed_alt_time != null && resolved.bed_alt_days?.includes(bedWeekday)) {
          resolved.bed_time = resolved.bed_alt_time;
        }
      } else {
        // Currently descending: bed = today (or yesterday if post-midnight),
        // wake = tomorrow (next ascend phase)
        let bedWeekday = weekday;
        if (hour < ascendStart) {
          bedWeekday = (weekday - 1 + 7) % 7;
        }
        const wakeWeekday = hour < ascendStart ? weekday : (weekday + 1) % 7;
        if (resolved.bed_alt_time != null && resolved.bed_alt_days?.includes(bedWeekday)) {
          resolved.bed_time = resolved.bed_alt_time;
        }
        if (resolved.wake_alt_time != null && resolved.wake_alt_days?.includes(wakeWeekday)) {
          resolved.wake_time = resolved.wake_alt_time;
        }
      }
      return resolved;
    }

    // Returns the brightness-override delta (as a 0..1 fraction) at hour h,
    // accounting for linear decay from set_at to the next phase boundary.
    // Returns 0 when no override is active or h is outside the override's window.
    function calcOverrideDecay(hour, cfg, state) {
      const briOverride = state?.brightness_override;
      const briSetAt = state?.brightness_override_set_at;
      if (briOverride == null || briSetAt == null) return 0;
      const tAscend = cfg.ascend_start;
      let tDescend = cfg.descend_start;
      if (tDescend <= tAscend) tDescend += 24;
      const h48 = hour < tAscend ? hour + 24 : hour;
      const setAt48 = briSetAt < tAscend ? briSetAt + 24 : briSetAt;
      const setInAscend = setAt48 >= tAscend && setAt48 < tDescend;
      const expiresAt = setInAscend ? tDescend : tAscend + 24;
      const total = expiresAt - setAt48;
      if (total <= 0 || h48 < setAt48 || h48 >= expiresAt) return 0;
      const remaining = expiresAt - h48;
      const decay = Math.max(0, Math.min(1, remaining / total));
      return (briOverride / 100) * decay;
    }

    function calcMiniBrightness(hour, cfg, state, currentHour, opts) {
      const tAscend = cfg.ascend_start;
      let tDescend = cfg.descend_start;
      if (tDescend <= tAscend) tDescend += 24;

      const kAscend = SPEED_TO_SLOPE[Math.max(1, Math.min(12, cfg.wake_speed))];
      const kDescend = SPEED_TO_SLOPE[Math.max(1, Math.min(12, cfg.bed_speed))];
      const bMin = cfg.min_brightness / 100;
      const bMax = cfg.max_brightness / 100;

      const cursorH48 = currentHour < tAscend ? currentHour + 24 : currentHour;
      const cursorInAscend = cursorH48 >= tAscend && cursorH48 < tDescend;

      let wakeMid = cursorInAscend ? (state.brightness_mid ?? cfg.wake_time) : cfg.wake_time;
      let bedMid = !cursorInAscend ? (state.brightness_mid ?? cfg.bed_time) : cfg.bed_time;

      // Apply brightness target shift — shift both midpoints so the full
      // 24h chart is correct regardless of which phase we're currently in.
      if (state.brightness_mid == null) {
        const wakeBrightPct = cfg.wake_brightness || 50;
        if (wakeBrightPct !== 50) {
          let mid48 = wakeMid;
          while (mid48 < tAscend) mid48 += 24;
          while (mid48 > tDescend) mid48 -= 24;
          const shifted = computeShiftedMidpoint(mid48, wakeBrightPct, kAscend, bMin, bMax);
          wakeMid = Math.max(tAscend + 0.01, Math.min(tDescend - 0.01, shifted));
        }
        const bedBrightPct = cfg.bed_brightness || 50;
        if (bedBrightPct !== 50) {
          let mid48 = bedMid;
          while (mid48 < tDescend) mid48 += 24;
          while (mid48 > tDescend + 24) mid48 -= 24;
          const shifted = computeShiftedMidpoint(mid48, bedBrightPct, -kDescend, bMin, bMax);
          // Clamp to phase bounds rather than % 24 wrapping — prevents shifted midpoint
          // that crosses phaseStart from getting re-wrapped to the next day by liftMidpointToPhase.
          bedMid = Math.max(tDescend + 0.01, Math.min(tDescend + 24 - 0.01, shifted));
        }
      }

      const h48 = hour < tAscend ? hour + 24 : hour;
      const inAscend = h48 >= tAscend && h48 < tDescend;

      const mid48 = inAscend
        ? liftMidpointToPhase(wakeMid, tAscend, tDescend)
        : liftMidpointToPhase(bedMid, tDescend, tDescend + 24);

      let value;
      if (inAscend) {
        value = logistic(h48, mid48, kAscend, bMin, bMax);
      } else {
        const hDescend48 = (h48 < tDescend) ? h48 + 24 : h48;
        value = logistic(hDescend48, mid48, -kDescend, bMin, bMax);
      }
      let curveBri = Math.max(bMin, Math.min(bMax, value));

      // --- Pipeline factors (excludes sun_bright — graph shows total room light) ---
      // Area factor
      const areaFactor = state.area_factor ?? 1.0;
      curveBri *= areaFactor;

      // Brightness override is added in room-space here for callers that
      // want the room-target including the user's adjustment (slider thumbs,
      // hero pill fallback). Chart rendering passes { skipOverride: true } so
      // the override can be applied at bulb-level instead — the override is
      // stored by the backend in bulb-space (target − last_sent_bulb), so
      // re-applying it at bulb-level avoids the documented accounting drift
      // where a large override gets squished by sun_bright_factor.
      if (!(opts && opts.skipOverride)) {
        curveBri += calcOverrideDecay(hour, cfg, state);
      }

      return Math.max(0, Math.min(1, curveBri));
    }

    function calcMiniColor(hour, cfg, state, sunTimes, currentHour) {
      const tAscend = cfg.ascend_start;
      let tDescend = cfg.descend_start;
      if (tDescend <= tAscend) tDescend += 24;

      const kAscend = SPEED_TO_SLOPE[Math.max(1, Math.min(12, cfg.wake_speed))];
      const kDescend = SPEED_TO_SLOPE[Math.max(1, Math.min(12, cfg.bed_speed))];
      const bMin = cfg.min_brightness / 100;
      const bMax = cfg.max_brightness / 100;
      const cLow = cfg.min_color_temp;
      const cHigh = cfg.max_color_temp;

      const cursorH48 = currentHour < tAscend ? currentHour + 24 : currentHour;
      const cursorInAscend = cursorH48 >= tAscend && cursorH48 < tDescend;

      // Color uses same midpoint as brightness (single midpoint design)
      let colorWakeMid = cursorInAscend ? (state.brightness_mid ?? cfg.wake_time) : cfg.wake_time;
      let colorBedMid = !cursorInAscend ? (state.brightness_mid ?? cfg.bed_time) : cfg.bed_time;

      // Apply brightness target shift for color
      if (state.brightness_mid == null) {
        const wakeBrightPct = cfg.wake_brightness || 50;
        if (wakeBrightPct !== 50) {
          let cMid48 = colorWakeMid;
          while (cMid48 < tAscend) cMid48 += 24;
          while (cMid48 > tDescend) cMid48 -= 24;
          colorWakeMid = computeShiftedMidpoint(cMid48, wakeBrightPct, kAscend, bMin, bMax) % 24;
        }
        const bedBrightPct = cfg.bed_brightness || 50;
        if (bedBrightPct !== 50) {
          let cMid48 = colorBedMid;
          while (cMid48 < tDescend) cMid48 += 24;
          while (cMid48 > tDescend + 24) cMid48 -= 24;
          colorBedMid = computeShiftedMidpoint(cMid48, bedBrightPct, -kDescend, bMin, bMax) % 24;
        }
      }

      const h48 = hour < tAscend ? hour + 24 : hour;
      const inAscend = h48 >= tAscend && h48 < tDescend;

      const mid48 = inAscend
        ? liftMidpointToPhase(colorWakeMid, tAscend, tDescend)
        : liftMidpointToPhase(colorBedMid, tDescend, tDescend + 24);

      let normalized;
      if (inAscend) {
        normalized = logistic(h48, mid48, kAscend, 0, 1);
      } else {
        const hDescend48 = (h48 < tDescend) ? h48 + 24 : h48;
        normalized = logistic(hDescend48, mid48, -kDescend, 0, 1);
      }
      normalized = Math.max(0, Math.min(1, normalized));

      // Compute sun_cooling_strength for this hour.
      // 1.0 = full sun cooling; decreases as user steps below natural curve.
      let sunCoolingStrength = 1.0;
      if (state.brightness_mid != null) {
        const defaultWakeMid48 = liftMidpointToPhase(cfg.wake_time, tAscend, tDescend);
        const defaultBedMid48 = liftMidpointToPhase(cfg.bed_time, tDescend, tDescend + 24);
        const defaultMid48 = inAscend ? defaultWakeMid48 : defaultBedMid48;
        const defaultSlope = inAscend ? kAscend : -kDescend;
        const calcH = inAscend ? h48 : ((h48 < tDescend) ? h48 + 24 : h48);
        const naturalBri = logistic(calcH, defaultMid48, defaultSlope, bMin, bMax);
        const steppedBri = Math.max(bMin, Math.min(bMax, inAscend
          ? logistic(h48, mid48, kAscend, bMin, bMax)
          : logistic(calcH, mid48, -kDescend, bMin, bMax)));
        if (steppedBri < naturalBri && naturalBri > bMin) {
          const stepBelow = (naturalBri - steppedBri) / (naturalBri - bMin);
          sunCoolingStrength = Math.max(0.0, 1.0 - stepBelow);
        }
      }

      // Compute effective color override with decay projection — only applies from when
      // it was set forward, within the active phase (no leak across the next phase boundary)
      let effectiveColorOverride = null;
      const colorOverride = state.color_override;
      const colorSetAt = state.color_override_set_at;
      if (colorOverride != null && colorSetAt != null) {
        const setAt48 = colorSetAt < tAscend ? colorSetAt + 24 : colorSetAt;
        const setInAscend = setAt48 >= tAscend && setAt48 < tDescend;
        const expiresAt = setInAscend ? tDescend : tAscend + 24;
        const total = expiresAt - setAt48;
        if (total > 0 && h48 >= setAt48 && h48 < expiresAt) {
          const remaining = expiresAt - h48;
          const decay = Math.max(0, Math.min(1, remaining / total));
          effectiveColorOverride = colorOverride * decay;
        }
      } else if (colorOverride != null) {
        effectiveColorOverride = colorOverride;
      }

      let cct = cLow + (cHigh - cLow) * normalized;
      const sliderColor = colorSetAt != null;
      cct = applySolarRule(cct, hour, cfg, sunTimes, effectiveColorOverride, sunCoolingStrength, sliderColor);

      return cct;
    }

    // Backend-matching sun angle factor (mirrors lux_tracker._compute_elev_factor).
    // smoothstep over raw^0.75 — tangent-flat at both 0 and 1.
    function computeSunBrightAngleAt(hour, sunTimes) {
      if (!sunTimes) return 0;
      const lat = cachedConfig?.latitude ?? 35.0;
      const lon = cachedConfig?.longitude ?? -78.6;
      const elev = getSunElevationAtHour(hour, lat, lon);
      if (elev <= 0) return 0;
      const maxElev = sunTimes.maxSummerElevation ?? 78.0;
      const sat = sunTimes.sunSaturation ?? 40;
      const threshold = maxElev * sat / 100.0;
      if (threshold <= 0) return 1.0;
      const raw = Math.min(1.0, elev / threshold);
      const x = Math.pow(raw, 0.75);
      return x * x * (3 - 2 * x);
    }

    // Bulb output = room target × projected sun_bright_factor at hour.
    // Anchor "now" to backend's live sun_bright_factor; shape across day via sun angle.
    function calcBulbBrightnessAt(hour, sunTimes, currentHour, roomPct) {
      if (!sunTimes) return roomPct;
      const sbfNow = sunTimes.sunBrightFactorNow ?? 1.0;
      if (sbfNow >= 0.99) return roomPct;   // no dimming now → bulbs = room
      const angleNow = computeSunBrightAngleAt(currentHour, sunTimes);
      if (angleNow < 0.01) return roomPct;  // night now → can't calibrate
      const angleH = computeSunBrightAngleAt(hour, sunTimes);
      const dimmingNow = 1.0 - sbfNow;
      const dimmingH = dimmingNow * (angleH / angleNow);
      const factor = Math.max(0, 1.0 - dimmingH);
      return roomPct * factor;
    }

    function calcMiniCurveData(cfg, state, sunTimes, currentHour, xAnchor) {
      xAnchor = xAnchor ?? 0;
      const numSamples = 240;
      const hours = [];
      const brightnessPct = [];
      const bulbPct = [];
      const cct = [];

      // Flat override (Ship 2 chart): apply both brightness and color
      // overrides uniformly across the whole day instead of decaying from
      // set_at to the phase boundary. Visualizes "what the curve would look
      // like if this setting applied all day" — easier to read than the
      // previous live-decay model which produced a sharp NOW cliff. The
      // actual lights still apply forward-only on the server; this is a
      // chart-only what-if rendering.
      const flatBriOverride = state?.brightness_override ?? 0;
      // Color flat: compute the natural CCT (no override) via a state with
      // both override fields nulled, then add the override delta directly
      // on top. Going through `calcMiniColor` with the override+null-set-at
      // path routes through `applySolarRule` which only adds the override
      // additively when sliderColor=true (i.e. set_at is non-null) — so the
      // simplest way to apply it flatly is to re-add it ourselves here.
      const colorOv = state?.color_override ?? 0;
      const noColorOvState = state ? { ...state, color_override: null, color_override_set_at: null } : state;

      for (let i = 0; i < numSamples; i++) {
        const h = xAnchor + (i / numSamples) * 24;
        const hMod = ((h % 24) + 24) % 24;
        hours.push(h);
        // Pure room target (natural circadian curve, no override, no sun dimming).
        const pureRoom = calcMiniBrightness(hMod, cfg, state, currentHour, { skipOverride: true }) * 100;
        // Sun-dimming reference dotted line: pureRoom + flat brightness
        // override. Same override the solid bulb curve gets, just without the
        // sun-dimming reduction. Gap between dotted and solid = sun-dimming
        // amount only — so dragging brightness slider down moves BOTH lines
        // down by the same delta and the gap stays equal to the sun-dimming.
        brightnessPct.push(Math.max(0, Math.min(100, pureRoom + flatBriOverride)));
        // Bulb output = pure_room × sun_factor + flat override delta. Override
        // is added in bulb-space, not pre-sun, so it doesn't get squished by
        // sun_bright_factor — matching backend's set_position accounting.
        const bulbNatural = calcBulbBrightnessAt(hMod, sunTimes, currentHour, pureRoom);
        bulbPct.push(Math.max(0, Math.min(100, bulbNatural + flatBriOverride)));
        const naturalCct = calcMiniColor(hMod, cfg, noColorOvState, sunTimes, currentHour);
        cct.push(naturalCct + colorOv);
      }

      return { hours, brightnessPct, bulbPct, cct };
    }

    // ============================================================
    // Mini Circadian Graph — Rendering (from areas.html modal)
    // ============================================================

    function formatHourLabel(h) {
      const h24 = ((h % 24) + 24) % 24;
      let hr = Math.floor(h24);
      let min = Math.round((h24 - hr) * 60);
      if (min === 60) { min = 0; hr = (hr + 1) % 24; }
      const suffix = hr < 12 ? 'a' : 'p';
      const hr12 = hr === 0 ? 12 : (hr > 12 ? hr - 12 : hr);
      return min === 0 ? `${hr12}${suffix}` : `${hr12}:${min.toString().padStart(2, '0')}${suffix}`;
    }

    function formatCountdown(isoTimestamp) {
      if (!isoTimestamp) return null;
      const expires = new Date(isoTimestamp);
      if (isNaN(expires.getTime())) return null;
      const now = new Date();
      const diffMs = expires - now;
      if (diffMs <= 0) return null;
      const totalSec = Math.floor(diffMs / 1000);
      if (totalSec < 60) return `${totalSec}s`;
      const min = Math.floor(totalSec / 60);
      const sec = totalSec % 60;
      if (min < 60) return sec > 0 ? `${min}m ${sec}s` : `${min}m`;
      const hr = Math.floor(min / 60);
      const remMin = min % 60;
      return remMin > 0 ? `${hr}h ${remMin}m` : `${hr}h`;
    }

    // Stub kept for back-compat: chart drag was retired in Ship 2 (chart is
    // now read-only — wake/bed time is changed via the dedicated phase
    // slider in the Adjust card body). Code paths that read `_chartDrag.active`
    // still exist but never see `active=true` since nothing flips it.
    const _chartDrag = { active: false, dragHour: null, cursorInAscend: null };

    // Active-phase geometry stashed by renderMiniChart for updateChartNowPill
    // (positions the cursor pill at the cursor x-pixel inside chart-shell).
    let _chartGeom = { activeMidHour: null, phaseMin: null, phaseMax: null, phaseSlopeSigned: null, nowHour: null, cursorInAscend: null };

    // NOW pill stash retired in Ship 2 — header readout carries this now.

    function renderMiniChart(cfg, state, sunTimes, currentHour, isActive, adjustedTimes, markerOverride) {
      if (!cfg || !sunTimes) return;

      // Source per-area sun_bright_factor from live status (not cached globally).
      // state.live_sbf, when set, is a pre-save projection derived from the
      // Sun-exposure slider — takes priority over backend value so the chart
      // reflects the live slider position.
      const areaLive = (selectedArea && areaStatus) ? (areaStatus[selectedArea.area_id] || {}) : {};
      const sbfNow = state.live_sbf ?? areaLive.sun_bright_factor ?? sunTimes.sunBrightFactorNow ?? 1.0;
      const curveSunTimes = Object.assign({}, sunTimes, { sunBrightFactorNow: sbfNow });

      // Always anchor at ascend_start so the full day reads left-to-right
      // starting at the morning inflection regardless of current phase.
      const tAscAnchor = cfg.ascend_start;
      let tDescAnchor = cfg.descend_start;
      if (tDescAnchor <= tAscAnchor) tDescAnchor += 24;
      const curH48 = currentHour < tAscAnchor ? currentHour + 24 : currentHour;
      const curInAscend = curH48 >= tAscAnchor && curH48 < tDescAnchor;
      const xAnchor = tAscAnchor;
      const xEnd = xAnchor + 24;
      const shiftIntoWindow = (h) => {
        if (h == null || !Number.isFinite(h)) return h;
        let r = ((h % 24) + 24) % 24;
        if (r < xAnchor) r += 24;
        return r;
      };

      const data = calcMiniCurveData(cfg, state, curveSunTimes, currentHour, xAnchor);
      const { hours, brightnessPct, bulbPct, cct } = data;

      // Divergence detector: is there a meaningful bulb/natural gap anywhere today?
      let maxDivergence = 0;
      let maxDivergenceIdx = 0;
      for (let i = 0; i < hours.length; i++) {
        const d = brightnessPct[i] - bulbPct[i];
        if (d > maxDivergence) {
          maxDivergence = d;
          maxDivergenceIdx = i;
        }
      }
      const hasDivergence = maxDivergence > 1.0;

      const traces = [];
      // Declare shapes + annotations early so any trace-emit block (the
      // sun-dimming label, the wake/bed lines, etc.) can push into them.
      const shapes = [];
      const annotations = [];

      // Color-gradient BULB curve (filled + line segments) — what bulbs output after sun dimming
      const step = 2;
      for (let i = step; i < hours.length; i += step) {
        const color = cctToRGB(cct[i]);
        const fillColor = colorWithAlpha(color, 0.5);
        const x0 = hours[i - step];
        const x1 = hours[i];
        const y0 = bulbPct[i - step];
        const y1 = bulbPct[i];

        // Filled area under curve
        traces.push({
          type: 'scatter', mode: 'lines',
          x: [x0, x1, x1, x0], y: [y0, y1, 0, 0],
          fill: 'toself', line: { width: 0 }, fillcolor: fillColor,
          hoverinfo: 'skip', showlegend: false
        });

        // Colored line segment
        traces.push({
          type: 'scatter', mode: 'lines',
          x: [x0, x1], y: [y0, y1],
          line: { width: 3, color },
          hoverinfo: 'skip', showlegend: false
        });
      }

      // Two dotted-line modes — only one renders at a time:
      //   1. Drag ghost: pre-drag bulb curve, shown while a slider is being
      //      dragged so the user can compare before/after.
      //   2. Sun-dimming reference: natural-light target (pre-sun-dimming),
      //      shown when bulb output is being reduced by sun dimming. Mirrors
      //      rhythm-details' "sun dimming" treatment — the gap between solid
      //      bulb curve and dotted reference visualizes how much the sun is
      //      cutting into the rhythm.
      const dragGhostActive = !!(window._chartDragGhostCurve
        && Array.isArray(window._chartDragGhostCurve.bulbPct)
        && window._chartDragGhostCurve.bulbPct.length === hours.length);
      if (dragGhostActive) {
        // Drag ghost as a solid line (not dotted) — visually distinct from
        // the sun-dimming dotted reference, and reads as a "previous state"
        // without the dashed treatment that the dotted line owns.
        traces.push({
          type: 'scatter', mode: 'lines',
          x: hours, y: window._chartDragGhostCurve.bulbPct,
          line: { width: 1.5, color: 'rgba(220, 220, 220, 0.45)' },
          hoverinfo: 'skip', showlegend: false,
        });
      } else if (hasDivergence && maxDivergence >= 8.0) {
        // Mask the natural curve to null where it's identical to the bulb
        // curve (so the dotted line doesn't render outside the sun-dimming
        // window — pre-sunrise / post-sunset). connectgaps=false breaks the
        // line at the null gaps. Label only renders when the peak gap is
        // ≥8% — at smaller gaps the label cramps against the lines.
        const maskedNatural = hours.map((h, i) =>
          (brightnessPct[i] - bulbPct[i]) >= 1.0 ? brightnessPct[i] : null
        );
        traces.push({
          type: 'scatter', mode: 'lines',
          x: hours, y: maskedNatural,
          line: { width: 1.5, color: 'rgba(220, 220, 220, 0.55)', dash: 'dot' },
          connectgaps: false,
          hoverinfo: 'skip', showlegend: false,
        });
        // "sun dimming" label — anchor at the FIRST divergent sample WITHIN
        // the visible phase window (the chart only renders the active half
        // of the day, so a divergent sample outside that range — e.g.
        // morning sun dimming when we're rendering the descend phase —
        // would clip off-canvas). Pinning to the leading edge (vs peak
        // divergence) keeps the label clear of the cursor and wake/bed
        // line, which both tend to sit near peak.
        const visStart = curInAscend ? tAscAnchor : tDescAnchor;
        const visEnd = curInAscend ? tDescAnchor : tAscAnchor + 24;
        let firstDivIdx = -1;
        for (let i = 0; i < hours.length; i++) {
          if (hours[i] < visStart || hours[i] > visEnd) continue;
          if (brightnessPct[i] - bulbPct[i] >= 1.0) { firstDivIdx = i; break; }
        }
        if (firstDivIdx >= 0) {
          const divX = hours[firstDivIdx];
          const divY = (brightnessPct[firstDivIdx] + bulbPct[firstDivIdx]) / 2;
          annotations.push({
            x: divX, y: divY, xref: 'x', yref: 'y',
            text: 'sun dimming', showarrow: false, xshift: 4,
            xanchor: 'left',
            font: { size: 10, color: 'rgba(220, 220, 220, 0.6)' },
          });
        }
      } else if (hasDivergence) {
        // Small-gap case: render the dotted line without the label.
        const maskedNatural = hours.map((h, i) =>
          (brightnessPct[i] - bulbPct[i]) >= 1.0 ? brightnessPct[i] : null
        );
        traces.push({
          type: 'scatter', mode: 'lines',
          x: hours, y: maskedNatural,
          line: { width: 1.5, color: 'rgba(220, 220, 220, 0.55)', dash: 'dot' },
          connectgaps: false,
          hoverinfo: 'skip', showlegend: false,
        });
      }

      // Hover trace — CCT-colored tooltips showing time, bulb brightness, color.
      // Anchored to the BULB curve (what bulbs actually output) so the hover
      // surface matches what the user is pointing at. The dotted natural-light
      // line is decorative only — it shows the pre-sun-dimming target shape
      // without inviting interaction.
      const hoverDetails = hours.map((h, i) => {
        const bulbV = Math.round(bulbPct[i]);
        const k = Math.round(cct[i]);
        return `${formatHourLabel(h)} • ${bulbV}% • ${k}K`;
      });
      const hoverBgColors = cct.map(k => colorWithAlpha(cctToRGB(k), 0.92));
      const hoverTextColors = cct.map(k => readableTextColor(cctToRGB(k)));
      const hoverBorderColors = cct.map(k => colorWithAlpha(cctToRGB(k), 0.65));

      traces.push({
        type: 'scatter', mode: 'lines',
        x: hours, y: bulbPct,
        line: { width: 0 }, showlegend: false,
        text: hoverDetails,
        hovertemplate: '%{text}<extra></extra>',
        hoverlabel: {
          bgcolor: hoverBgColors,
          bordercolor: hoverBorderColors,
          font: { color: hoverTextColors, size: 13 }
        }
      });

      // Live position values (drives now-pill + cursor styling).
      // Prefer server-truth fields (actual_brightness / api_kelvin) — the same
      // sources the Bright/Color slider headers and the Lights section read.
      // This sidesteps two known client-vs-server mismatches that otherwise
      // make the NOW pill disagree with the slider for ~30s after a drag:
      //   (a) clock-precision race: server writes override_set_at with
      //       second-precision wall clock, client's currentHour is
      //       minute-floored, so h48 >= setAt48 fails for the NOW sample
      //       while curve samples 6 min later succeed.
      //   (b) accounting mismatch: server's set_position(brightness) stores
      //       override = target - last_sent_brightness (post-everything),
      //       while client renders room = pure_logistic × area_factor +
      //       override (pre-everything) — ~2% drift on steep descend.
      // Fall back to the computed (pure + override) values only when the
      // server-truth fields aren't populated (cold start / mode switch).
      const markerPureRoom = calcMiniBrightness(currentHour, cfg, state, currentHour, { skipOverride: true }) * 100;
      const markerOverridePct = calcOverrideDecay(currentHour, cfg, state) * 100;
      let markerBri = Math.max(0, Math.min(100,
        calcBulbBrightnessAt(currentHour, curveSunTimes, currentHour, markerPureRoom) + markerOverridePct));
      let markerCCT = calcMiniColor(currentHour, cfg, state, sunTimes, currentHour);
      if (Number.isFinite(areaLive.actual_brightness)) markerBri = areaLive.actual_brightness;
      if (Number.isFinite(areaLive.api_kelvin)) markerCCT = areaLive.api_kelvin;
      if (markerOverride) {
        if (Number.isFinite(markerOverride.bri)) markerBri = markerOverride.bri;
        if (Number.isFinite(markerOverride.cct)) markerCCT = markerOverride.cct;
      }

      // (shapes + annotations declared earlier so the sun-dimming label
      //  block can push into them.)

      // Wake/bed vertical lines
      const wakeTime = shiftIntoWindow(cfg.wake_time);
      const bedTime = shiftIntoWindow(cfg.bed_time);
      const hasAdjWake = adjustedTimes && adjustedTimes.wake != null;
      const hasAdjBed = adjustedTimes && adjustedTimes.bed != null;

      // Determine which phase is currently active so the active line reads as primary
      const tAscendGeom_ = cfg.ascend_start;
      let tDescendGeom_ = cfg.descend_start;
      if (tDescendGeom_ <= tAscendGeom_) tDescendGeom_ += 24;
      const cursorH48Geom_ = currentHour < tAscendGeom_ ? currentHour + 24 : currentHour;
      const wakeIsActive = cursorH48Geom_ >= tAscendGeom_ && cursorH48Geom_ < tDescendGeom_;
      const bedIsActive = !wakeIsActive;

      // Find curve y-value at a given hour (for capping inactive line at curve top)
      const curveYAt = (h) => {
        const hh = ((h % 24) + 24) % 24;
        let lo = 0, hi = hours.length - 1;
        while (lo < hi - 1) {
          const mid = (lo + hi) >> 1;
          if (hours[mid] <= hh) lo = mid; else hi = mid;
        }
        const span = hours[hi] - hours[lo] || 1;
        const t = (hh - hours[lo]) / span;
        return brightnessPct[lo] + (brightnessPct[hi] - brightnessPct[lo]) * t;
      };
      // Convert curve y (0–100) to paper y (chart range 0–110, plus paper offset)
      const yToPaper = (y) => Math.max(0, Math.min(0.91, (y / 110) * 0.91));

      // Wake/bed line is normally NOT drawn inside the plot — the below-
      // axis label's connector tick (rendered by positionChartLabels) is
      // enough to mark the time. Only when the user is actively dragging
      // the phase slider does the line extend up through the chart, so
      // they can see how the shift bends the curve at every y. Once they
      // release, the line collapses back to just the connector tick.
      const vLineTop = 0.91;  // ≈ y=100 in data coords (range 0-110)
      const wakeColor = 'rgba(92, 179, 255, 0.55)';
      const bedColor = 'rgba(111, 169, 255, 0.55)';
      const phaseTrack = document.querySelector('.slider-track[data-mode="phase"]');
      const phaseDragging = !!(phaseTrack && phaseTrack.classList.contains('dragging'));
      if (phaseDragging) {
        if (wakeIsActive) {
          const wakeX = hasAdjWake ? shiftIntoWindow(adjustedTimes.wake) : wakeTime;
          shapes.push({
            type: 'line', xref: 'x', yref: 'paper', layer: 'below',
            x0: wakeX, x1: wakeX, y0: 0, y1: vLineTop,
            line: { color: wakeColor, width: 1.5 },
          });
        }
        if (bedIsActive) {
          const bedX = hasAdjBed ? shiftIntoWindow(adjustedTimes.bed) : bedTime;
          shapes.push({
            type: 'line', xref: 'x', yref: 'paper', layer: 'below',
            x0: bedX, x1: bedX, y0: 0, y1: vLineTop,
            line: { color: bedColor, width: 1.5 },
          });
        }
      }


      // Active-phase geometry + draggable handle
      const tAscendGeom = cfg.ascend_start;
      let tDescendGeom = cfg.descend_start;
      if (tDescendGeom <= tAscendGeom) tDescendGeom += 24;
      const kAscendGeom = SPEED_TO_SLOPE[Math.max(1, Math.min(12, cfg.wake_speed))];
      const kDescendGeom = SPEED_TO_SLOPE[Math.max(1, Math.min(12, cfg.bed_speed))];
      const cursorH48Geom = currentHour < tAscendGeom ? currentHour + 24 : currentHour;
      const cursorInAscendGeom = cursorH48Geom >= tAscendGeom && cursorH48Geom < tDescendGeom;

      let activeMidHour, phaseMin, phaseMax, phaseSlopeSigned, handleFill;
      if (cursorInAscendGeom) {
        activeMidHour = hasAdjWake ? shiftIntoWindow(adjustedTimes.wake) : wakeTime;
        phaseMin = tAscendGeom;
        phaseMax = tDescendGeom;
        phaseSlopeSigned = kAscendGeom;
        handleFill = '#5cb3ff';
      } else {
        activeMidHour = hasAdjBed ? shiftIntoWindow(adjustedTimes.bed) : bedTime;
        phaseMin = tDescendGeom;
        phaseMax = tAscendGeom + 24;
        phaseSlopeSigned = -kDescendGeom;
        handleFill = '#ffe680';
      }
      // Apply the same v1.2.128 narrowed-boundary treatment to the chart drag
      // clamp that the phase slider already uses. Without this, the chart
      // handle could drag to a target that the slider won't allow, and on
      // release trigger the % 24 wrap bug via executeSetPhaseTime.
      const { minOffset: phaseMinOffset, maxOffset: phaseMaxOffset } =
        computePhaseSafeOffset(cfg, cursorInAscendGeom);
      let phaseMinSafe = phaseMin + phaseMinOffset;
      let phaseMaxSafe = phaseMax - phaseMaxOffset;
      if (phaseMaxSafe - phaseMinSafe < 0.5) {
        phaseMinSafe = phaseMin;
        phaseMaxSafe = phaseMax;
      }
      _chartGeom = { activeMidHour, phaseMin: phaseMinSafe, phaseMax: phaseMaxSafe, phaseSlopeSigned, nowHour: shiftIntoWindow(currentHour), cursorInAscend: cursorInAscendGeom, xAnchor };

      // Interpolate handle y-position onto the bulb curve so the handle sits on the line
      const handleY = (() => {
        for (let i = 1; i < hours.length; i++) {
          if (hours[i] >= activeMidHour) {
            const span = hours[i] - hours[i - 1];
            const t = span > 0 ? (activeMidHour - hours[i - 1]) / span : 0;
            return bulbPct[i - 1] + t * (bulbPct[i] - bulbPct[i - 1]);
          }
        }
        return bulbPct[bulbPct.length - 1];
      })();

      // Wake/bed handle dot retired in Ship 2 — chart is read-only; the
      // wake/bed slider in the Adjust card body owns phase-time editing.
      const defaultMidHour = cursorInAscendGeom ? wakeTime : bedTime;
      const isHandleShifted = cursorInAscendGeom ? hasAdjWake : hasAdjBed;

      // Helper: interpolate bulb-curve y at any hour along the sample grid.
      // Used by the NOW dot below.
      const bulbYAt = (hr) => {
        for (let i = 1; i < hours.length; i++) {
          if (hours[i] >= hr) {
            const span = hours[i] - hours[i - 1];
            const t = span > 0 ? (hr - hours[i - 1]) / span : 0;
            return bulbPct[i - 1] + t * (bulbPct[i] - bulbPct[i - 1]);
          }
        }
        return bulbPct[bulbPct.length - 1];
      };

      // (handle marker + daily-hover pseudo-marker dropped; vertical line +
      //  below-axis label carry the visual; no on-curve dot needed.)
      /* RETIRED:
      const handleLabel = (cursorInAscendGeom ? 'wake' : 'bed') + ' \u00B7 ' + formatHourLabel(activeMidHour)
        + '<br><span style="font-size:10px; opacity:0.7;">drag to shift</span>';
      traces.push({
        type: 'scatter', mode: 'markers',
        x: [activeMidHour], y: [handleY],
        marker: {
          size: 16, color: handleFill, symbol: 'circle',
          line: { width: 2, color: '#0a0a0a' },
        },
        cliponaxis: false,
        hovertext: handleLabel,
        hoverinfo: 'text',
        showlegend: false,
      });

      // Helper: interpolate bulb-curve y at any hour along the sample grid.
      const bulbYAt = (hr) => {
        for (let i = 1; i < hours.length; i++) {
          if (hours[i] >= hr) {
            const span = hours[i] - hours[i - 1];
            const t = span > 0 ? (hr - hours[i - 1]) / span : 0;
            return bulbPct[i - 1] + t * (bulbPct[i] - bulbPct[i - 1]);
          }
        }
        return bulbPct[bulbPct.length - 1];
      };

      // When the handle is shifted, the daily wake/bed line stays drawn as a thin muted
      // line; expose hover text on it so users can read "daily wake · 8a" without a circle.
      // Plotly shapes don't support hover, so we add an invisible scatter trace stacked
      // along the daily-line x with a fat marker to give a generous hit zone.
      if (isHandleShifted) {
        const dailyX = defaultMidHour;
        const dailyHoverY = [];
        const dailyHoverX = [];
        for (let i = 0; i <= 4; i++) {
          dailyHoverY.push(20 + i * 20);
          dailyHoverX.push(dailyX);
        }
        traces.push({

          cliponaxis: false,
