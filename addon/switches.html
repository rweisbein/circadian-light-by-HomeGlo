      showDurationPicker(anchorEl, currentVal, async (newVal) => {
        if (c.inactive) {
          const mins = durationValueToMinutes(newVal);
          const newUntil = mins === null
            ? 'forever'
            : new Date(Date.now() + mins * 60000).toISOString();
          c.inactive_until = newUntil;
          renderControls();
          try {
            const key = _pauseEndpointKey(c);
            await fetch('./api/controls/' + encodeURIComponent(key) + '/pause', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ inactive: true, inactive_until: newUntil }),
            });
          } catch (err) {
            console.error('Pause extend failed:', err);
          }
        } else {
          // Per-card next-pause duration override. Stored on window so
          // re-renders preserve it across data refreshes.
          if (!window._pendingPauseDurations) window._pendingPauseDurations = {};
          window._pendingPauseDurations[controlId] = newVal;
          renderControls();
        }
      });
    }

    // (Duration picker now lives in shared.js as showDurationPicker /
    // hideDurationPicker — reused by switches, area-details, etc.)

    // Bucket collapse/expand state — generic across bucket types
    // (recency time-buckets, battery percentage buckets, future
    // bucket types). One localStorage namespace `ctrl_bucket_*`,
    // one shared freshness timestamp. Bucket keys must be unique
    // across types — convention: time-buckets use plain keys
    // ('today', 'yesterday'); other bucket types use a type prefix
    // ('battery_critical', 'battery_low').
    const _BUCKET_TS_KEY = 'ctrl_bucket_ts';
    function _maybeResetBucketStateIfStale() {
      const ts = parseInt(localStorage.getItem(_BUCKET_TS_KEY) || '0', 10);
      if (!ts || Date.now() - ts > cardFreshnessMs()) {
        Object.keys(localStorage).forEach(k => {
          if (k.startsWith('ctrl_bucket_') && k !== _BUCKET_TS_KEY) {
            localStorage.removeItem(k);
          }
        });
        localStorage.setItem(_BUCKET_TS_KEY, String(Date.now()));
      }
    }
    function _bucketCollapsed(key) {
      return localStorage.getItem('ctrl_bucket_' + key + '_collapsed') === 'true';
    }
    function _toggleBucket(key) {
      const cur = _bucketCollapsed(key);
      if (cur) localStorage.removeItem('ctrl_bucket_' + key + '_collapsed');
      else localStorage.setItem('ctrl_bucket_' + key + '_collapsed', 'true');
      localStorage.setItem(_BUCKET_TS_KEY, String(Date.now()));
    }

    // Count phrase reflects active filters. Reads as a single English
    // sentence: "<n> <type-noun> [in <area> | without an area] [<verb>]".
    //   ALL view, unfiltered:        "12 controls"
    //   BATTERY + type=motion + area: "4 motion sensors in Kitchen have battery"
    //   PAUSED + unassigned:          "1 control without an area is paused"
    // Search isn't reflected — the user is actively typing and sees the
    // search box; adding "matching X" would jitter on every keystroke.
    function buildCountPhrase(n) {
      const isOne = n === 1;
      const typeNouns = {
        switch: ['switch', 'switches'],
        motion_sensor: ['motion sensor', 'motion sensors'],
        contact_sensor: ['contact sensor', 'contact sensors'],
        camera: ['camera', 'cameras'],
      };
      const nouns = typeNouns[categoryFilter] || ['control', 'controls'];
      const noun = isOne ? nouns[0] : nouns[1];
      const areaPart = (areaFilter === 'all') ? ''
        : (areaFilter === 'unassigned') ? ' without an area'
        : (areaFilter.startsWith('zone:'))
          ? ' in zone ' + ((allGlozones.find(z => z.id === areaFilter.slice(5)) || {}).name || areaFilter.slice(5))
          : ' in ' + areaFilter;
      let verb = '';
      if (currentView === 'setup') verb = isOne ? ' needs setup' : ' need setup';
      else if (currentView === 'batteries') verb = isOne ? ' has battery' : ' have battery';
      else if (currentView === 'paused') verb = isOne ? ' is paused' : ' are paused';
      return n + ' ' + noun + areaPart + verb;
    }

    // controlSummary + summary helpers + bucketControlsForArea live in
    // shared.js (used by both /switches and the area-details Controls
    // card). Page-local wrapper to thread allAreas + the active filter.
    function getFilterAreaId() {
      if (areaFilter === 'all' || areaFilter === 'unassigned') return null;
      if (areaFilter.startsWith('zone:')) return null;  // zone filter has no single highlight target
      const a = (allAreas || []).find(x => x.name === areaFilter);
      return a ? a.area_id : null;
    }
    function pageControlSummary(c) {
      return controlSummary(c, {
        allAreas: allAreas,
        filterAreaId: getFilterAreaId(),
        deviceAreaId: c.area_id,

    function getStatusSubtitle(ctrl) {

      } else if (ctrl.status === 'not_configured') {

    function getGlozoneForArea(areaId) {
      if (!areaId) return null;
      for (const zone of allGlozones) {

    function formatController(integration) {
      const labels = {
        'zha': 'ZHA',

    // Smart relative-time formatting for the cards.
    //   Today:        "3:42p"
    //   Yesterday:    "Yest 3:42p"
    //   This week:    "Tue 3:42p"
    //   Older:        "5/17"   (or "5/17/24" if a different year)
    // Control detail page uses a separate, fuller format (always includes
    // time even for older entries).
    function formatRelativeTime(timestamp) {
      if (!timestamp) return '';
      const date = new Date(timestamp);
      const now = new Date();
      let hours = date.getHours();
      const mins = date.getMinutes().toString().padStart(2, '0');
      const ampm = hours >= 12 ? 'p' : 'a';
      hours = hours % 12 || 12;
      const timeOnly = hours + ':' + mins + ampm;
      // Same calendar day → time only.
      if (date.toDateString() === now.toDateString()) return timeOnly;
      // Yesterday (calendar-day check, not 24h-rolling).
      const yest = new Date(now);
      yest.setDate(yest.getDate() - 1);
      if (date.toDateString() === yest.toDateString()) return 'Yest ' + timeOnly;
      // Within the last 7 days → day-of-week + time.
      const ms = now - date;
      if (ms < 7 * 86400000) {
        const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        return days[date.getDay()] + ' ' + timeOnly;
      }
      // Older — date only.
      const m = date.getMonth() + 1;
      const d = date.getDate();
      if (date.getFullYear() !== now.getFullYear()) {
        return m + '/' + d + '/' + (date.getFullYear() % 100);
      }
      return m + '/' + d;
    }

    // Returns just the action label (no timestamp). Mirrors formatLastAction's
    // per-action mapping but without the time prefix — used for the 2-line
    // right-side primary on cards (line 1 = relative time, line 2 = action).
    function formatActionLabel(ctrl) {
      if (!ctrl.last_action) return '';
      let action;
      if (typeof ctrl.last_action === 'object') action = ctrl.last_action.action;
      else action = ctrl.last_action;
      if (!action) return '';
      if (action === 'motion_detected') return 'Motion';
      if (action === 'motion_cleared') return 'Cleared';
      if (action === 'contact_opened') return 'Opened';
      if (action === 'contact_closed') return 'Closed';
      // Switch button events: e.g. "on_short_press" → "On 1×"
      const parts = action.split('_');
      const button = parts[0].charAt(0).toUpperCase() + parts[0].slice(1);
      const pressType = parts.find(p => ['short', 'long', 'double', 'triple', 'quadruple', 'quintuple'].includes(p));
      const pressMap = { short: '1×', long: 'hold', double: '2×', triple: '3×', quadruple: '4×', quintuple: '5×' };
      const press = pressMap[pressType] || '';
      return press ? (button + ' ' + press) : button;
    }

    function formatLastAction(ctrl) {
      if (!ctrl.last_action) return '—';

      // Handle new dict format with timestamp, or legacy string format
      let action, timestamp;
      if (typeof ctrl.last_action === 'object') {
        action = ctrl.last_action.action;
        timestamp = ctrl.last_action.timestamp;
      } else {
        action = ctrl.last_action;
        timestamp = null;
      }

      if (!action) return '—';

      // Format timestamp for display (and sorting - ISO format sorts correctly)
      let timeStr = '';
      if (timestamp) {
        const date = new Date(timestamp);
        // Format: "1/21 4:32p" (compact)
        const month = date.getMonth() + 1;
        const day = date.getDate();
        let hours = date.getHours();
        const mins = date.getMinutes().toString().padStart(2, '0');
        const ampm = hours >= 12 ? 'p' : 'a';
        hours = hours % 12 || 12;
        timeStr = `${month}/${day} ${hours}:${mins}${ampm}`;
      }

      // Handle motion sensor actions (show cooldown for both detected and cleared)
      if (action === 'motion_detected' || action === 'motion_cleared') {
        const sortVal = timestamp || '';
        const label = action === 'motion_detected' ? 'Motion' : 'Cleared';
        let cooldownStr = '';
        if (ctrl.cooldown > 0 && ctrl.last_action?.cooldown_until) {
          const cdUntil = new Date(ctrl.last_action.cooldown_until).getTime();
          const remaining = Math.max(0, Math.ceil((cdUntil - Date.now()) / 1000));
          if (remaining > 0) {
            cooldownStr = ` <span class="cooldown-tick" data-cooldown-until="${cdUntil}" style="color:var(--accent);font-size:0.75rem;">(${remaining}s)</span>`;
          }
        }
        return `<span class="last-action" data-sort="${sortVal}">${timeStr ? timeStr + ' ' : ''}${label}${cooldownStr}</span>`;
      }

      // Handle contact sensor actions
      if (action === 'contact_opened') {
        const sortVal = timestamp || '';
        return `<span class="last-action" data-sort="${sortVal}">${timeStr ? timeStr + ' ' : ''}Opened</span>`;
      }
      if (action === 'contact_closed') {
        const sortVal = timestamp || '';
        return `<span class="last-action" data-sort="${sortVal}">${timeStr ? timeStr + ' ' : ''}Closed</span>`;
      }

      // Format button name (e.g., "bottom_quadruple_press" -> "Bottom 4x")
      const parts = action.split('_');
      const button = parts[0].charAt(0).toUpperCase() + parts[0].slice(1);
      const pressType = parts.find(p => ['short', 'long', 'double', 'triple', 'quadruple', 'quintuple'].includes(p));
      const pressMap = { short: '1x', long: 'hold', double: '2x', triple: '3x', quadruple: '4x', quintuple: '5x' };
      const press = pressMap[pressType] || '';

      // data-sort attribute for sorting by timestamp
      const sortVal = timestamp || '';
      return `<span class="last-action" data-sort="${sortVal}">${timeStr ? timeStr + ' ' : ''}${button} ${press}</span>`;
    }

    function sortBy(column) {
      if (sortColumn === column) {
        sortAsc = !sortAsc;

        sortColumn = column;
        sortAsc = true;

      savePreferences();

    async function toggleInactive(controlId, category, inactive) {
      // Find the control to get its current config
      const ctrl = controls.find(c => c.id === controlId);
      if (!ctrl) return;

      try {
        let payload;
        if (category === 'switch') {
          payload = {
            name: ctrl.name,
            category: category,
            type: ctrl.type,
            scopes: ctrl.scopes || [],
            device_id: ctrl.device_id,
            indicator_light: ctrl.indicator_light,
            inactive: inactive,
          };
        } else {
          payload = {
            name: ctrl.name,
            category: category,
            areas: ctrl.areas || [],
            device_id: ctrl.device_id,
            inactive: inactive,
          };
        }

        const response = await fetch(`./api/controls/${encodeURIComponent(controlId)}/configure`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          const data = await response.json();
          alert(data.error || 'Failed to update');
          renderControls();
          return;
        }

        // Update locally and re-render without full reload
        ctrl.inactive = inactive;
        renderControls();
      } catch (err) {
        console.error('Error toggling inactive:', err);
        alert('Error updating control');
        renderControls();
      }
    }

    async function removeStaleControl(controlId, category) {
      if (!confirm('Remove this control?')) return;
      try {
        const res = await fetch(`./api/controls/${encodeURIComponent(controlId)}/configure`, {
          method: 'DELETE'
        });
        if (res.ok) {
          loadData();
        }
      } catch (err) {
        console.error('Error removing control:', err);
      }
    }



    function setupEventListeners() {
      // Wire the action-pill (mode dropdown). State was loaded earlier.
      initControlsModePill();

      // Toolbar (search + area + sort) and search-clear button — wired
      // via event delegation since the toolbar is re-rendered each
      // renderControls() call.
      document.getElementById('controls-container').addEventListener('change', (e) => {
        if (e.target.id === 'ctrl-area-filter') {
          areaFilter = e.target.value;
          savePreferences();
          renderControls();
        } else if (e.target.id === 'ctrl-type-filter') {
          categoryFilter = e.target.value;
          savePreferences();
          renderControls();
        } else if (e.target.id === 'ctrl-state-filter') {
          // PAUSE-mode state filter (Active|Paused). Lives on the
          // filter row alongside area/type so sort can stay on its own
          // row even in Pause mode.
          pauseSubView = e.target.value;
          _pauseModeSnapshot = null;
          savePreferences();
          renderControls();
        }
      });

      // Segmented sort bar (Recent / Location / Name) — click handler.
      document.getElementById('controls-container').addEventListener('click', (e) => {
        const seg = e.target.closest('#ctrl-sort-seg .view-segment');
        if (seg && seg.dataset.ctrlSort) {
          const v = seg.dataset.ctrlSort;
          if (v === 'recent') {
            sortColumn = 'fourth';
            fourthField = 'lastAction';
            sortAsc = false;
          } else if (v === 'name') {
            sortColumn = 'name';
            sortAsc = true;
          } else if (v === 'area') {
            sortColumn = 'area';
            sortAsc = true;
          }
          // PAUSE mode: invalidate the sticky-order snapshot so the new
          // sort is captured. Without this, the snapshot would freeze
          // the old order and the sort click would do nothing visible.
          // The pause-state toggle still keeps cards in place because
          // that flow doesn't change the snapshot signature.
          if (currentView === 'paused') _pauseModeSnapshot = null;
          savePreferences();
          renderControls();
          return;
        }
        // PAUSE-mode state sub-segment (Active | Paused) — flip pauseSubView,
        // invalidate the sticky snapshot so the new side re-renders fresh.
        const pauseSeg = e.target.closest('#ctrl-pause-sub-seg .view-segment');
        if (pauseSeg && pauseSeg.dataset.pauseSub) {
          pauseSubView = pauseSeg.dataset.pauseSub;
          _pauseModeSnapshot = null;
          savePreferences();
          renderControls();
          return;
        }
        // PAUSE-mode per-card toggle (⏸/▶). Lightweight pause endpoint
        // mutates just the inactive fields and returns ok — no full
        // configure_control round trip.
        const pauseToggleBtn = e.target.closest('.ctrl-pause-switch');
        if (pauseToggleBtn) {
          e.stopPropagation();
          const cardEl = pauseToggleBtn.closest('[data-pause-card]');
          const cid = cardEl ? cardEl.dataset.pauseCard : null;
          if (cid) handlePauseToggleClick(cid);
          return;
        }
        // PAUSE-mode per-card duration label — opens the global duration
        // picker. Updates either the live inactive_until (when paused) or
        // the per-card "next pause" override (when active).
        const pauseDurEl = e.target.closest('.ctrl-pause-dur');
        if (pauseDurEl) {
          e.stopPropagation();
          const cardEl = pauseDurEl.closest('[data-pause-card]');
          const cid = cardEl ? cardEl.dataset.pauseCard : null;
          if (cid) handlePauseDurClick(cid, pauseDurEl);
          return;
        }
        // Collapsible time-bucket header (Today / Yesterday / etc).
        // Toggle the divider's chevron + the matching body's animated
        // collapse, persist to localStorage with the freshness window.
        const bucketDiv = e.target.closest('.group-divider.is-collapsible');
        if (bucketDiv) {
          const key = bucketDiv.dataset.bucketKey;
          if (key) {
            const body = document.querySelector('.ctrl-bucket-body[data-bucket-key="' + key + '"]');
            bucketDiv.classList.toggle('is-collapsed');
            if (body) body.classList.toggle('is-collapsed');
            _toggleBucket(key);
            return;
          }
        }
        if (e.target.closest('#ctrl-area-clear')) {
          areaFilter = 'all';
          savePreferences();
          renderControls();
          return;
        }
        if (e.target.closest('#ctrl-type-clear')) {
          categoryFilter = 'all';
          savePreferences();
          renderControls();
          return;
        }
      });
    }

    function editControl(id) {
      window.location.href = './control/' + encodeURIComponent(id);

    // Row-level click guard. The row uses an inline onclick to navigate
    // to the detail page; that fires BEFORE the delegated click handler at
    // controls-container can call stopPropagation, so clicks inside the
    // PAUSE-mode action cluster were also opening detail. This helper
    // short-circuits when the click came from inside the action cluster.
    function onCardRowClick(e, id) {
      if (e.target.closest('.ctrl-pause-action')) return;
      editControl(id);
    }

    // Live cooldown countdown — tick every second to update visible "(Ns)" spans
    setInterval(() => {
      document.querySelectorAll('.cooldown-tick').forEach(el => {
        const until = parseFloat(el.dataset.cooldownUntil);
        const remaining = Math.max(0, Math.ceil((until - Date.now()) / 1000));
        if (remaining > 0) {
          el.textContent = `(${remaining}s)`;
        } else {
          el.textContent = '';
        }
      });
    }, 1000);

    // Background poll — lightweight refresh (last_actions + pause states)
    setInterval(async () => {
      try {
        const res = await fetch(`./api/controls/refresh`);
        if (!res.ok) return;
        const data = await res.json();
        const actions = data.last_actions || {};
        const pauses = data.pause_states || {};
        let needsRender = false;
        for (const ctrl of controls) {
          const key = (ctrl.category === 'motion_sensor' || ctrl.category === 'contact_sensor')
            ? ctrl.device_id : ctrl.id;
          // Patch last_action
          const fresh = actions[key] || actions[ctrl.id] || actions[ctrl.device_id];
          if (fresh) {
            const oldAction = JSON.stringify(ctrl.last_action);
            if (oldAction !== JSON.stringify(fresh)) {
              ctrl.last_action = fresh;
              needsRender = true;
            }
          }
          // Patch pause state
          const pauseData = pauses[key] || pauses[ctrl.id] || pauses[ctrl.device_id];
          if (pauseData) {
            if (ctrl.inactive !== pauseData.inactive || ctrl.inactive_until !== pauseData.inactive_until) {
              ctrl.inactive = pauseData.inactive;
              ctrl.inactive_until = pauseData.inactive_until;
              if (pauseData.inactive && ctrl.status === 'active') ctrl.status = 'inactive';
              else if (!pauseData.inactive && ctrl.status === 'inactive') ctrl.status = 'active';
              needsRender = true;
            }
          } else if (ctrl.inactive) {
            ctrl.inactive = false;
            ctrl.inactive_until = null;
            if (ctrl.status === 'inactive') ctrl.status = 'active';
            needsRender = true;
          }
        }
        if (needsRender) renderControls();
      } catch (e) { /* ignore poll errors */ }
    }, refreshIntervalMs);

    // ---- Add Control Source Picker ----
    let acpSelectedDevice = null;
    let acpSelectedEntities = new Set();

    async function openAddControlPicker() {
      // Create overlay
      const overlay = document.createElement('div');
      overlay.className = 'acp-overlay';
      overlay.id = 'acp-overlay';
      overlay.onclick = (e) => { if (e.target === overlay) closeAddControlPicker(); };

      overlay.innerHTML = `
        <div class="acp-modal">
          <div class="acp-header">
            <div class="acp-title">Add control source</div>
            <input type="text" class="acp-search" id="acp-search" placeholder="Search devices..." oninput="searchDevices(this.value)">
          </div>
          <div class="acp-list" id="acp-list">
            <div class="acp-empty">Searching...</div>
          </div>
          <div class="acp-footer" id="acp-footer" style="display:none;">
            <button class="acp-btn" onclick="closeAddControlPicker()">Cancel</button>
            <button class="acp-btn acp-btn-add" id="acp-add-btn" disabled onclick="addSelectedControl()">Add</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      acpSelectedDevice = null;
      acpSelectedEntities.clear();
      document.getElementById('acp-search').focus();
      searchDevices('');
    }

    function closeAddControlPicker() {
      const el = document.getElementById('acp-overlay');
      if (el) el.remove();
    }

    let _acpSearchTimer = null;
    function searchDevices(query) {
      clearTimeout(_acpSearchTimer);
      _acpSearchTimer = setTimeout(async () => {
        try {
          const res = await fetch('./api/devices/search?q=' + encodeURIComponent(query));
          if (!res.ok) return;
          const devices = await res.json();
          renderDeviceList(devices);
        } catch (e) {}
      }, 200);
    }

    function renderDeviceList(devices) {
      const list = document.getElementById('acp-list');
      const footer = document.getElementById('acp-footer');
      if (!list) return;

      if (devices.length === 0) {
        list.innerHTML = '<div class="acp-empty">No devices found</div>';
        if (footer) footer.style.display = 'none';
        return;
      }

      // If a device is already selected, show its entity picker
      if (acpSelectedDevice) {
        const dev = devices.find(d => d.device_id === acpSelectedDevice.device_id);
        if (dev) {
          renderEntityPicker(dev);
          return;
        }
      }

      // Show device list
      if (footer) footer.style.display = 'none';
      let html = '';
      for (const dev of devices) {
        const sensorCount = (dev.binary_sensors || []).length;
        const area = dev.area_name ? ' · ' + dev.area_name : '';
        const mfr = dev.manufacturer || '';
        html += `<div class="acp-device" style="position:relative;" onclick="selectDevice('${dev.device_id}')">
          <div class="acp-device-name">${dev.name || 'Unknown'}</div>
          <div class="acp-device-meta">${mfr}${area} · ${sensorCount} sensor${sensorCount !== 1 ? 's' : ''}</div>
          <button class="acp-report-btn" onclick="event.stopPropagation(); reportDevice('${dev.device_id}', this)" title="Tell HomeGlo about this device so we can add support">Report</button>
        </div>`;
      }
      list.innerHTML = html;
    }

    async function reportDevice(deviceId, btn) {
      const original = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Sending...';
      try {
        const res = await fetch('./api/devices/report', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ device_id: deviceId }),
        });
        if (res.ok) {
          btn.textContent = 'Thanks!';
          setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 2500);
        } else {
          btn.textContent = 'Failed';
          setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 2500);
        }
      } catch (e) {
        btn.textContent = 'Failed';
        setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 2500);
      }
    }

    let _acpDevices = [];
    async function selectDevice(deviceId) {
      try {
        const res = await fetch('./api/devices/search');
        if (!res.ok) return;
        _acpDevices = await res.json();
        const dev = _acpDevices.find(d => d.device_id === deviceId);
        if (!dev) return;
        acpSelectedDevice = dev;
        acpSelectedEntities.clear();
        renderEntityPicker(dev);
      } catch (e) {}
    }

    function renderEntityPicker(dev) {
      const list = document.getElementById('acp-list');
      const footer = document.getElementById('acp-footer');
      if (!list) return;
      if (footer) footer.style.display = 'flex';

      // Suggest relevant entities first
      const relevant = ['motion', 'person', 'human', 'pet', 'animal', 'vehicle', 'ringing', 'package', 'presence', 'occupancy'];
      const sensors = [...(dev.binary_sensors || [])].sort((a, b) => {
        const aRel = relevant.some(kw => a.entity_id.includes(kw)) ? 0 : 1;
        const bRel = relevant.some(kw => b.entity_id.includes(kw)) ? 0 : 1;
        return aRel - bRel || a.name.localeCompare(b.name);
      });

      let html = `<div style="padding:8px 16px 4px;">
        <div class="acp-device-name">${dev.name}</div>
        <div class="acp-device-meta" style="margin-bottom:8px;">Select triggers for this device</div>
        <div class="acp-sensors">`;
      for (const s of sensors) {
        const sel = acpSelectedEntities.has(s.entity_id) ? ' selected' : '';
        const label = s.name || s.entity_id.split('.')[1].replace(/_/g, ' ');
        html += `<span class="acp-sensor-chip${sel}" onclick="toggleSensorChip(this, '${s.entity_id}')">${label}</span>`;
      }
      html += '</div></div>';
      list.innerHTML = html;
      updateAddBtn();
    }

    function toggleSensorChip(el, entityId) {
      if (acpSelectedEntities.has(entityId)) {
        acpSelectedEntities.delete(entityId);
        el.classList.remove('selected');
      } else {
        acpSelectedEntities.add(entityId);
        el.classList.add('selected');
      }
      updateAddBtn();
    }

    function updateAddBtn() {
      const btn = document.getElementById('acp-add-btn');
      if (btn) btn.disabled = acpSelectedEntities.size === 0;
    }

    async function addSelectedControl() {
      if (!acpSelectedDevice || acpSelectedEntities.size === 0) return;
      const btn = document.getElementById('acp-add-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Adding...'; }

      try {
        const res = await fetch('./api/controls/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            device_id: acpSelectedDevice.device_id,
            name: acpSelectedDevice.name || 'Unknown',
            trigger_entities: [...acpSelectedEntities],
          })
        });
        if (res.ok) {
          closeAddControlPicker();
          const data = await res.json();
          // Navigate to the new control's detail page
          window.location.href = './control/' + encodeURIComponent(data.id);
        } else {
          const err = await res.json();
          if (err.error === 'Device already configured') {
            closeAddControlPicker();
            window.location.href = './control/' + encodeURIComponent(err.id);
          } else {
            alert('Error: ' + (err.error || 'Unknown'));
          }
        }
      } catch (e) {
        alert('Error adding control');
      }
      if (btn) { btn.disabled = false; btn.textContent = 'Add'; }
    }
  </script>
</body>
</html>
