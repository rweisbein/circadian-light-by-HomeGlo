    // ============================================================
    // Buttons card helpers
    // ============================================================
    const buttonNames = {
      'on': 'Power', 'up': 'Up', 'down': 'Down', 'off': 'Hue',
      'toggle': 'Toggle', 'brightness_up': 'Bright Up', 'brightness_down': 'Bright Down',
      'arrow_left': 'Left', 'arrow_right': 'Right',
      'dial': 'Dial'
    };
    const buttonBadges = {
      'on': '\u23FB', 'up': '\u25B2', 'down': '\u25BC', 'off': 'Hue',
      'toggle': '\u23FB', 'brightness_up': '\u25B2', 'brightness_down': '\u25BC',
      'arrow_left': '\u25C0', 'arrow_right': '\u25B6', 'dial': '\u27F3'
    };
    const actionTypeShort = {
      'short_release': 'Short', 'press': 'Short',
      'double_press': '2\u00d7', 'triple_press': '3\u00d7',
      'quadruple_press': '4\u00d7', 'quintuple_press': '5\u00d7',
      'hold': 'Long', 'rotate': 'Rotate'
    };
    // Known action suffixes, longest first so we match greedily
    const knownActionSuffixes = [
      'quintuple_press', 'quadruple_press', 'triple_press', 'double_press',
      'short_release', 'press', 'hold', 'rotate'
    ];

    // Action ID -> display label (built from switchmap actions API or inline)
    let actionLabelCache = null;
    function getActionLabel(actionId) {
      if (!actionId) return '';
      if (actionId === 'magic') return '';
      if (actionId.startsWith('set_')) {
        const mId = actionId.slice(4);
        const m = allMoments[mId];
        return m ? (m.icon ? m.icon + ' ' : '') + (m.name || mId) : mId;
      }
      if (actionId === 'hold_repeat') return 'Hold repeat';
      // Lazy build from switchmap actions
      if (!actionLabelCache) {
        actionLabelCache = {};
        if (window._switchmapActions) {
          for (const actions of Object.values(window._switchmapActions)) {
            for (const a of actions) actionLabelCache[a.id] = a.label;
          }
        }
      }
      return actionLabelCache[actionId] || actionId.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    function formatMagicButtonEvent(key) {
      const magicActionLabels = {
        'hold': 'Long press', 'short_release': 'Short press', 'press': 'Short press',
        'double_press': '2\u00d7 press', 'triple_press': '3\u00d7 press',
        'quadruple_press': '4\u00d7 press', 'quintuple_press': '5\u00d7 press',
        'rotate': 'Rotate'
      };
      for (const suffix of knownActionSuffixes) {
        if (key.endsWith('_' + suffix)) {
          const buttonPart = key.slice(0, key.length - suffix.length - 1);
          const buttonLabel = buttonNames[buttonPart] || buttonPart;
          const actionLabel = magicActionLabels[suffix] || suffix;
          return `${buttonLabel} \u2014 ${actionLabel}`;
        }
      }
      return key.replace(/_/g, ' ');
    }

    function getMagicSlots(switchType) {
      const typeData = switchMapData[switchType];
      if (!typeData || !typeData.effective_mapping) return [];
      return Object.entries(typeData.effective_mapping)
        .filter(([_, action]) => action === 'magic')
        .map(([key]) => key);
    }

    function renderMagicEditor() {
      const container = document.getElementById('magic-editor');
      const switchType = editingControl?.type;
      const typeData = switchMapData[switchType];

      if (!typeData || !typeData.effective_mapping) {
        container.innerHTML = '<div style="font-size:0.85rem; color:var(--muted);">No button data available</div>';
        return;
      }

      const buttons = typeData.buttons || [];
      const supported = typeData.action_types || ['short_release', 'hold'];
      const actionTypes = [];
      if (supported.includes('short_release')) actionTypes.push('short_release');
      else if (supported.includes('press')) actionTypes.push('press');
      if (supported.includes('double_press')) actionTypes.push('double_press');
      if (supported.includes('triple_press')) actionTypes.push('triple_press');
      if (supported.includes('quadruple_press')) actionTypes.push('quadruple_press');
      if (supported.includes('quintuple_press')) actionTypes.push('quintuple_press');
      if (supported.includes('hold')) actionTypes.push('hold');
      if (supported.includes('rotate')) actionTypes.push('rotate');
      const mapping = typeData.effective_mapping;
      const magicSlots = new Set(getMagicSlots(switchType));

      let html = '';

      for (const btn of buttons) {
        const btnName = buttonNames[btn] || btn.charAt(0).toUpperCase() + btn.slice(1);
        const badge = buttonBadges[btn] || btn;

        // Collect action rows for this button
        let actionRows = '';
        for (const actionType of actionTypes) {
          const eventKey = `${btn}_${actionType}`;
          const actionValue = mapping[eventKey];
          if (!actionValue) continue;

          const typeLabel = actionTypeShort[actionType] || actionType;
          const isMagic = actionValue === 'magic';

          if (isMagic) {
            // Magic slot: show ✦ + dropdown with all actions (except magic and dial)
            const currentValue = editingMagicButtons[eventKey] || '';
            const cats = window._switchmapActions || {};
            let magicOpts = '';
            for (const [cat, actions] of Object.entries(cats)) {
              if (cat === 'Dial') continue;
              const filtered = actions.filter(a => a.id !== 'magic');
              if (!filtered.length) continue;
              const isTop = cat === '_top';
              if (!isTop) magicOpts += `<optgroup label="${cat}">`;
              for (const action of filtered) {
                const value = action.id === null ? '' : action.id;
                const selected = (currentValue === action.id || (currentValue === '' && action.id === null)) ? ' selected' : '';
                magicOpts += `<option value="${value}"${selected}>${action.label}</option>`;
              }
              if (!isTop) magicOpts += '</optgroup>';
            }
            actionRows += `
              <div class="btn-map-row">
                <span class="btn-map-type">${typeLabel}</span>
                <div class="btn-map-magic">
                  <span class="magic-star" title="Assignable">&#10022;</span>
                  <select onchange="updateMagicButton('${eventKey}', this.value)">
                    ${magicOpts}
                  </select>
                </div>
              </div>
            `;
          } else {
            // Universal action: show as text
            let label = getActionLabel(typeof actionValue === 'object' ? actionValue.action : actionValue);
            const whenOff = typeof actionValue === 'object' ? actionValue.when_off : null;
            if (whenOff) {
              label += ` <span style="font-size:0.75rem; color:var(--muted);">(if off: ${getActionLabel(whenOff)})</span>`;
            }
            actionRows += `
              <div class="btn-map-row">
                <span class="btn-map-type">${typeLabel}</span>
                <span class="btn-map-action">${label}</span>
              </div>
            `;
          }
        }

        if (!actionRows) continue;

        html += `
          <div class="btn-map-section">
            <div class="btn-map-label">
              <span class="btn-badge-sm">${badge}</span>
              <span>${btnName}</span>
            </div>
            <div class="btn-map-actions">
              ${actionRows}
            </div>
          </div>
        `;
      }

      // Orphaned magic assignments (assigned to keys no longer in mapping)
      const orphanedKeys = Object.keys(editingMagicButtons).filter(k =>
        !magicSlots.has(k) && editingMagicButtons[k]
      );
      for (const key of orphanedKeys) {
        const label = formatMagicButtonEvent(key);
        const momentAction = editingMagicButtons[key];
        const momentName = getActionLabel(momentAction) || momentAction;
        html += `<div class="magic-row-orphan">
          <span class="magic-row-label">${label} (removed)</span>
          <span style="flex:1; font-size:0.85rem;">${momentName}</span>
          <button class="magic-orphan-remove" onclick="removeMagicOrphan('${key}')" title="Remove">\u2715</button>
        </div>`;
      }

      if (!html) {
        html = '<div style="font-size:0.85rem; color:var(--muted);">No button data available</div>';
      }

      container.innerHTML = html;
    }

    function updateMagicButton(slot, value) {
      if (value) {
        editingMagicButtons[slot] = value;
      } else {
        delete editingMagicButtons[slot];
      }
      autoSave();
    }

    function removeMagicOrphan(key) {
      delete editingMagicButtons[key];
      renderMagicEditor();
      autoSave();
    }

    // ============================================================
    // Switch Scopes Editor
    // ============================================================
    function renderScopesEditor() {
      const container = document.getElementById('scopes-editor');
      container.innerHTML = editingScopes.map((scope, idx) => {
        const feedbackArea = scope.feedback_area || (scope.areas.length > 0 ? scope.areas[0] : null);
        const areaChips = scope.areas.map(areaId => {
          const area = allAreas.find(a => a.area_id === areaId);
          const areaName = area ? area.name : areaId;
          const isFeedback = areaId === feedbackArea;
          const starClass = isFeedback ? 'feedback-star active' : 'feedback-star';
          const starHtml = `<span class="${starClass}" onclick="event.stopPropagation(); setFeedbackArea(${idx}, '${areaId}')" title="Feedback target">&#9733;</span>`;
          return `
            <span class="area-chip">
              ${starHtml}${areaName}
              <button class="area-chip-remove" onclick="removeAreaFromScope(${idx}, '${areaId}')">&times;</button>
            </span>
          `;
        }).join('');

        const showArrows = editingScopes.length > 1;
        const upDisabled = idx === 0 ? 'disabled' : '';
        const downDisabled = idx === editingScopes.length - 1 ? 'disabled' : '';
        return `
          <div class="scope-editor" data-scope-idx="${idx}">
            <div class="scope-editor-header">
              <span class="scope-editor-title">Reach ${idx + 1}</span>
              ${showArrows ? `
                <div class="scope-reorder-arrows">
                  <button class="scope-reorder-arrow" ${upDisabled} onclick="swapScope(${idx}, -1)" title="Move up">&#9650;</button>
                  <button class="scope-reorder-arrow" ${downDisabled} onclick="swapScope(${idx}, 1)" title="Move down">&#9660;</button>
                </div>
              ` : ''}
              ${editingScopes.length > 1 ? `<button class="scope-editor-remove" onclick="removeScope(${idx})">remove</button>` : ''}
            </div>
            <div class="area-chips">
              ${areaChips}
              <button class="add-areas-chip" onclick="addAreasToScope(${idx})">+</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function setFeedbackArea(scopeIdx, areaId) {
      editingScopes[scopeIdx].feedback_area = areaId;
      // Move starred area to front
      const areas = editingScopes[scopeIdx].areas;
      const idx = areas.indexOf(areaId);
      if (idx > 0) {
        areas.splice(idx, 1);
        areas.unshift(areaId);
      }
      renderScopesEditor();
      autoSave();
    }

    function addScope() {
      if (editingScopes.length >= 5) {
        alert('Maximum 5 reaches allowed');
        return;
      }
      editingScopes.push({ areas: [], feedback_area: null });
      renderScopesEditor();
      autoSave();
    }

    function removeScope(idx) {
      if (editingScopes.length <= 1) return;
      if (!confirm(`Remove Reach ${idx + 1}?`)) return;
      editingScopes.splice(idx, 1);
      renderScopesEditor();
      autoSave();
    }

    function swapScope(idx, direction) {
      const newIdx = idx + direction;
      if (newIdx < 0 || newIdx >= editingScopes.length) return;
      [editingScopes[idx], editingScopes[newIdx]] = [editingScopes[newIdx], editingScopes[idx]];
      renderScopesEditor();
      autoSave();
    }

    function removeAreaFromScope(scopeIdx, areaId) {
      const scope = editingScopes[scopeIdx];
      const idx = scope.areas.indexOf(areaId);
      if (idx >= 0) {
        scope.areas.splice(idx, 1);
      }
      renderScopesEditor();
      autoSave();
    }

    async function addAreasToScope(scopeIdx) {
      const scope = editingScopes[scopeIdx];
      const selected = await openAreaPicker({
        title: `Add Areas to Reach ${scopeIdx + 1}`,
        selected: scope.areas,
        multi: true
      });

      if (selected && selected.length > 0) {
        selected.forEach(areaId => {
          if (!scope.areas.includes(areaId)) {
            scope.areas.push(areaId);
          }
        });
        renderScopesEditor();
        autoSave();
      }
    }

    // ============================================================
    // Motion/Contact Sensor Scopes Editor
    // ============================================================

    function _getDeviceBinarySensors() {
      // Get binary_sensors from the current control's data
      const ctrl = controls.find(c => c.id === editingControlId);
      return (ctrl && ctrl.binary_sensors) || [];
    }

    function _hasDeviceBinarySensors() {
      return _getDeviceBinarySensors().length > 0;
    }

    // Trigger categories: presence (mutually exclusive with "any motion") and events (independent)
    const TRIGGER_CATEGORIES = {
      presence: [
        { id: 'any_motion', label: 'Any motion', keywords: ['_motion_detected', '_motion', '_presence', '_occupancy'], isAll: true },
        { id: 'person', label: 'Person', keywords: ['_person_detected', '_human_detected', '_human'] },
        { id: 'pet', label: 'Pet', keywords: ['_pet_detected', '_animal_detected', '_animal'] },
        { id: 'vehicle', label: 'Vehicle', keywords: ['_vehicle_detected', '_vehicle'] },
      ],
      events: [
        { id: 'package', label: 'Package', keywords: ['_package_delivered', '_package_stranded', '_package_taken', '_package'] },
        { id: 'doorbell', label: 'Doorbell', keywords: ['_ringing', '_ding', '_doorbell'] },
      ],
    };

    function _matchCategoryOwn(cat, sensors) {
      // Match only this category's own keywords (for selection checking)
      return sensors.filter(s => cat.keywords.some(kw => s.entity_id.includes(kw)));
    }

    function _matchCategoryAll(cat, sensors) {
      // If isAll (any_motion), also match all other presence category keywords (for toggling on)
      let kws = [...cat.keywords];
      if (cat.isAll) {
        for (const pc of TRIGGER_CATEGORIES.presence) {
          if (!pc.isAll) kws.push(...pc.keywords);
        }
      }
      return sensors.filter(s => kws.some(kw => s.entity_id.includes(kw)));
    }

    function _getCategoryEntities(sensors) {
      // Returns { categoryId: { own: [...], all: [...] }, ... } and uncategorized list
      const result = {};
      const categorized = new Set();
      for (const group of ['presence', 'events']) {
        for (const cat of TRIGGER_CATEGORIES[group]) {
          const ownMatched = _matchCategoryOwn(cat, sensors);
          const allMatched = _matchCategoryAll(cat, sensors);
          if (allMatched.length > 0) {
            result[cat.id] = {
              own: ownMatched.map(s => s.entity_id),
              all: allMatched.map(s => s.entity_id),
            };
            allMatched.forEach(s => categorized.add(s.entity_id));
          }
        }
      }
      const uncategorized = sensors.filter(s => !categorized.has(s.entity_id));
      return { categories: result, uncategorized };
    }

    function _isCategorySelected(scopeEntities, catEntities) {
      return catEntities.some(e => scopeEntities.includes(e));
    }

    function _renderTriggerSelector(scope, idx) {
      if (!_hasDeviceBinarySensors()) return '';
      const sensors = _getDeviceBinarySensors();
      if (sensors.length === 0) return '';
      const { categories, uncategorized } = _getCategoryEntities(sensors);
      if (Object.keys(categories).length === 0 && uncategorized.length === 0) return '';

      const selected = scope.trigger_entities || [];
      // Empty trigger_entities = "any motion" (no filter). Treat as Any Motion selected.
      const isEmptyMeansAny = selected.length === 0;
      const anyMotionSelected = isEmptyMeansAny || (categories.any_motion && _isCategorySelected(selected, categories.any_motion.own));

      let html = '<div style="margin-top:8px;">';

      // Presence group
      const presenceCats = TRIGGER_CATEGORIES.presence.filter(c => categories[c.id]);
      if (presenceCats.length > 0) {
        html += '<div style="font-size:0.72rem;color:var(--muted2);margin-bottom:3px;">Presence</div>';
        html += '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;">';
        for (const cat of presenceCats) {
          const isSelected = cat.isAll ? anyMotionSelected : _isCategorySelected(selected, categories[cat.id].own);
          const greyed = !cat.isAll && anyMotionSelected && !isSelected ? ' greyed' : '';
          const sel = isSelected ? ' selected' : '';
          html += `<span class="trigger-chip${sel}${greyed}" onclick="toggleTriggerCategory(${idx}, '${cat.id}')">${cat.label}</span>`;
        }
        html += '</div>';
      }

      // Events group
      const eventCats = TRIGGER_CATEGORIES.events.filter(c => categories[c.id]);
      if (eventCats.length > 0) {
        html += '<div style="font-size:0.72rem;color:var(--muted2);margin-bottom:3px;">Events</div>';
        html += '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;">';
        for (const cat of eventCats) {
          const isSelected = _isCategorySelected(selected, categories[cat.id].own);
          html += `<span class="trigger-chip${isSelected ? ' selected' : ''}" onclick="toggleTriggerCategory(${idx}, '${cat.id}')">${cat.label}</span>`;
        }
        html += '</div>';
      }

      // Show all toggle for uncategorized
      if (uncategorized.length > 0) {
        const showAllId = 'trigger-showall-' + idx;
        const linkId = 'trigger-showall-link-' + idx;
        // Keep expanded if any uncategorized entity is selected or user expanded it
        const anyUncatSelected = uncategorized.some(s => selected.includes(s.entity_id));
        const startOpen = anyUncatSelected || _triggerShowAllExpanded.has(idx);
        html += `<a href="#" id="${linkId}" style="font-size:0.7rem;color:var(--muted2);text-decoration:underline;" onclick="event.preventDefault();var el=document.getElementById('${showAllId}');var lk=document.getElementById('${linkId}');if(el.style.display==='none'){el.style.display='flex';lk.textContent='hide others';_triggerShowAllExpanded.add(${idx});}else{el.style.display='none';lk.textContent='show all';_triggerShowAllExpanded.delete(${idx});}">${startOpen ? 'hide others' : 'show all'}</a>`;
        html += `<div id="${showAllId}" style="display:${startOpen ? 'flex' : 'none'};flex-wrap:wrap;gap:4px;margin-top:4px;">`;
        for (const s of uncategorized) {
          const label = s.name || s.entity_id.split('.')[1].replace(/_/g, ' ');
          const sel = selected.includes(s.entity_id) ? ' selected' : '';
          html += `<span class="trigger-chip${sel}" onclick="toggleTriggerEntity(${idx}, '${s.entity_id}')">${label}</span>`;
        }
        html += '</div>';
      }

      html += '</div>';
      return html;
    }

    function toggleTriggerCategory(scopeIdx, catId) {
      const scope = editingMotionScopes[scopeIdx];
      if (!scope.trigger_entities) scope.trigger_entities = [];
      const sensors = _getDeviceBinarySensors();
      const { categories } = _getCategoryEntities(sensors);
      const catData = categories[catId];
      if (!catData) return;

      const cat = [...TRIGGER_CATEGORIES.presence, ...TRIGGER_CATEGORIES.events].find(c => c.id === catId);
      const isEmptyMeansAny = scope.trigger_entities.length === 0;

      if (cat && cat.isAll) {
        // "Any motion" toggle
        if (isEmptyMeansAny) {
          // Already "any" via empty list — deselecting is a no-op (must pick specifics instead)
          return;
        }
        // Selecting "Any motion" — clear to empty (= no filter)
        const isSelected = _isCategorySelected(scope.trigger_entities, catData.own);
        if (isSelected) {
          // Deselect: remove any_motion entities but keep other selections
          scope.trigger_entities = scope.trigger_entities.filter(e => !catData.all.includes(e));
        } else {
          // Select: clear to empty = accept everything
          scope.trigger_entities = [];
        }
      } else {
        // Specific category toggle (Person, Pet, Vehicle, Package, Doorbell)
        if (isEmptyMeansAny) {
          // Transitioning from "any" to specific: we need to NOT be empty anymore.
          // Don't add the "any_motion" entities — just add this specific category.
          scope.trigger_entities = [...catData.all];
        } else {
          const isSelected = _isCategorySelected(scope.trigger_entities, catData.own);
          if (isSelected) {
            scope.trigger_entities = scope.trigger_entities.filter(e => !catData.all.includes(e));
            // If nothing left, revert to empty (= any motion)
            if (scope.trigger_entities.length === 0) {
              // stays empty = any
            }
          } else {
            for (const e of catData.all) {
              if (!scope.trigger_entities.includes(e)) scope.trigger_entities.push(e);
            }
          }
        }
      }
      // Preserve show-all state
      const showAllEl = document.getElementById('trigger-showall-' + scopeIdx);
      if (showAllEl && showAllEl.style.display !== 'none') _triggerShowAllExpanded.add(scopeIdx);
      autoSave();
      renderMotionScopesEditor();
    }

    // Track which scopes have "show all" expanded (survives re-render)
    const _triggerShowAllExpanded = new Set();

    function toggleTriggerEntity(scopeIdx, entityId) {
      const scope = editingMotionScopes[scopeIdx];
      if (!scope.trigger_entities) scope.trigger_entities = [];
      if (scope.trigger_entities.length === 0) {
        // Transitioning from "any" to specific: start with just this entity
        scope.trigger_entities = [entityId];
      } else {
        const idx = scope.trigger_entities.indexOf(entityId);
        if (idx >= 0) {
          scope.trigger_entities.splice(idx, 1);
          // If empty after removal, stays empty = any
        } else {
          scope.trigger_entities.push(entityId);
        }
      }
      // Preserve show-all state
      const showAllEl = document.getElementById('trigger-showall-' + scopeIdx);
      if (showAllEl && showAllEl.style.display !== 'none') _triggerShowAllExpanded.add(scopeIdx);
      autoSave();
      renderMotionScopesEditor();
    }

    // Track which motion scopes are expanded (by index)
    const _motionScopeExpanded = new Set();

    function toggleMotionScope(idx) {
      if (_motionScopeExpanded.has(idx)) {
        _motionScopeExpanded.delete(idx);
      } else {
        _motionScopeExpanded.add(idx);
      }
      renderMotionScopesEditor();
    }

    function _motionScopeAction(scope) {
      const modeLabels = { 'on_only': 'On only', 'on_off': 'On/Off', 'alert': 'Alert', 'disabled': 'Disabled' };
      return modeLabels[scope.mode || 'on_off'] || scope.mode;
    }

    function _motionScopeAreas(scope) {
      const areaNames = (scope.areas || []).map(areaId => {
        const area = allAreas.find(a => a.area_id === areaId);
        return area ? area.name : areaId;
      });
      if (areaNames.length === 0) return 'No areas';
      if (areaNames.length <= 5) return areaNames.join(', ');
      return areaNames.slice(0, 4).join(', ') + ` +${areaNames.length - 4}`;
    }

    function renderMotionScopesEditor() {
      const container = document.getElementById('motion-scopes-editor');

      const modeLabels = {
        'on_only': 'On only',
        'on_off': 'On/Off',
        'alert': 'Alert',
        'disabled': 'Disabled'
      };

      // Check if trigger selector has meaningful choices
      const hasTriggerChoices = _hasDeviceBinarySensors() && (() => {
        const sensors = _getDeviceBinarySensors();
        if (sensors.length === 0) return false;
        const { categories } = _getCategoryEntities(sensors);
        // More than just "any_motion" means there's a real choice
        const catKeys = Object.keys(categories).filter(k => k !== 'any_motion');
        return catKeys.length > 0;
      })();

      container.innerHTML = editingMotionScopes.map((scope, idx) => {
        const isExpanded = _motionScopeExpanded.has(idx);
        const durationMinutes = (scope.duration || 60) / 60;
        const mode = scope.mode || 'on_off';
        const boostEnabled = scope.boost_enabled || false;
        const showDuration = mode === 'on_off';
        const showBoost = mode !== 'alert' && mode !== 'disabled';
        const showAlert = mode === 'alert';
        const alertIntensity = scope.alert_intensity || 'low';
        const alertCount = scope.alert_count || 3;
        const boostBrightness = scope.boost_brightness || 50;
        const activeWhen = scope.active_when || 'always';
        const activeOffset = scope.active_offset || 0;
        const showOffset = activeWhen !== 'always';
        const cooldown = scope.cooldown || 0;

        const showMotionArrows = editingMotionScopes.length > 1;
        const motionUpDisabled = idx === 0 ? 'disabled' : '';
        const motionDownDisabled = idx === editingMotionScopes.length - 1 ? 'disabled' : '';

        if (!isExpanded) {
          // Collapsed card: action + areas, no controls
          return `
            <div class="scope-card" data-motion-idx="${idx}">
              <div class="scope-card-header" onclick="toggleMotionScope(${idx})">
                <span class="scope-card-chevron">&#x203A;</span>
                <span class="scope-card-action">${_motionScopeAction(scope)}</span>
                <span class="scope-card-areas">${_motionScopeAreas(scope)}</span>
              </div>
            </div>
          `;
        }

        // Expanded card: full edit UI
        const areaChips = (scope.areas || []).map(areaId => {
          const area = allAreas.find(a => a.area_id === areaId);
          const areaName = area ? area.name : areaId;
          return `
            <span class="area-chip">
              ${areaName}
              <button class="area-chip-remove" onclick="removeAreaFromMotionScope(${idx}, '${areaId}')">&times;</button>
            </span>
          `;
        }).join('');

        return `
          <div class="scope-card is-open" data-motion-idx="${idx}">
            <div class="scope-card-header" onclick="toggleMotionScope(${idx})">
              <span class="scope-card-chevron">&#x203A;</span>
              <span class="scope-card-action">${_motionScopeAction(scope)}</span>
              <span style="flex:1;"></span>
              <div class="scope-card-expanded-controls" onclick="event.stopPropagation()">
                ${showMotionArrows ? `
                  <button class="scope-reorder-btn" ${motionUpDisabled} onclick="swapMotionScope(${idx}, -1)" title="Move up">&#9650;</button>
                  <button class="scope-reorder-btn" ${motionDownDisabled} onclick="swapMotionScope(${idx}, 1)" title="Move down">&#9660;</button>
                ` : ''}
                ${editingMotionScopes.length > 1 ? `<button class="scope-editor-remove" onclick="removeMotionScope(${idx})">remove</button>` : ''}
              </div>
            </div>
            <div class="scope-card-body">
              <div class="scope-section">
                <div class="scope-section-label">Areas</div>
                <div class="area-chips">
                  ${areaChips}
                  <button class="add-areas-chip" onclick="addAreasToMotionScope(${idx})">+</button>
                </div>
              </div>

              ${hasTriggerChoices ? `
                <div class="scope-section">
                  <div class="scope-section-label">Presence</div>
                  ${_renderTriggerSelector(scope, idx)}
                </div>
              ` : ''}

              <div class="scope-section">
                <div class="scope-section-label">Action</div>
                <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                  <select onchange="updateMotionScope(${idx}, 'mode', this.value)">
                    ${Object.entries(modeLabels).map(([value, label]) => `
                      <option value="${value}" ${mode === value ? 'selected' : ''}>${label}</option>
                    `).join('')}
                  </select>
                  <div style="display: ${showDuration ? 'flex' : 'none'}; align-items: center; gap: 6px;">
                    <div class="number-input-wrap">
                      <input type="number" id="duration-${idx}" style="width: 60px;" value="${durationMinutes}" min="0.5" max="60" step="0.5"
                        onchange="updateMotionScope(${idx}, 'duration', Math.round(parseFloat(this.value) * 60))">
                      <div class="number-input-btns">
                        <button type="button" onclick="stepNumberInput('duration-${idx}', 0.5)">&#9650;</button>
                        <button type="button" onclick="stepNumberInput('duration-${idx}', -0.5)">&#9660;</button>
                      </div>
                    </div>
                    <span style="color: var(--muted); font-size: 0.85rem;">min</span>
                  </div>
                  <label style="display: ${showBoost ? 'flex' : 'none'}; align-items: center; gap: 6px; cursor: pointer;">
                    <input type="checkbox" style="width: 16px; height: 16px;" ${boostEnabled ? 'checked' : ''}
                      onchange="updateMotionScope(${idx}, 'boost_enabled', this.checked)">
                    <span style="font-size: 0.85rem;">Boost</span>
                  </label>
                  <div style="display: ${boostEnabled && showBoost ? 'flex' : 'none'}; align-items: center; gap: 6px;">
                    <span style="color: var(--muted); font-size: 0.85rem;">+</span>
                    <div class="number-input-wrap">
                      <input type="number" id="boost-${idx}" style="width: 55px;" value="${boostBrightness}" min="5" max="100" step="5"
                        onchange="updateMotionScope(${idx}, 'boost_brightness', parseInt(this.value))">
                      <div class="number-input-btns">
                        <button type="button" onclick="stepNumberInput('boost-${idx}', 5)">&#9650;</button>
                        <button type="button" onclick="stepNumberInput('boost-${idx}', -5)">&#9660;</button>
                      </div>
                    </div>
                    <span style="color: var(--muted); font-size: 0.85rem;">%</span>
                  </div>
                  <div style="display: ${showAlert ? 'flex' : 'none'}; align-items: center; gap: 8px;">
                    <select onchange="updateMotionScope(${idx}, 'alert_intensity', this.value)">
                      <option value="low" ${alertIntensity === 'low' ? 'selected' : ''}>Low</option>
                      <option value="med" ${alertIntensity === 'med' ? 'selected' : ''}>Med</option>
                      <option value="high" ${alertIntensity === 'high' ? 'selected' : ''}>High</option>
                    </select>
                    <div class="number-input-wrap">
                      <input type="number" id="alert-count-${idx}" style="width: 45px;" value="${alertCount}" min="1" max="10" step="1"
                        onchange="updateMotionScope(${idx}, 'alert_count', parseInt(this.value))">
                      <div class="number-input-btns">
                        <button type="button" onclick="stepNumberInput('alert-count-${idx}', 1)">&#9650;</button>
                        <button type="button" onclick="stepNumberInput('alert-count-${idx}', -1)">&#9660;</button>
                      </div>
                    </div>
                    <span style="color: var(--muted); font-size: 0.85rem;">bounces</span>
                  </div>
                </div>
              </div>

              <div class="scope-section">
                <div class="scope-section-label">Schedule</div>
                <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                  <select onchange="updateMotionScope(${idx}, 'active_when', this.value)">
                    <option value="always" ${activeWhen === 'always' ? 'selected' : ''}>Always</option>
                    <option value="sunset_to_sunrise" ${activeWhen === 'sunset_to_sunrise' ? 'selected' : ''}>Sunset to Sunrise</option>
                    <option value="wake_to_bed" ${activeWhen === 'wake_to_bed' ? 'selected' : ''}>Wake to Bed</option>
                  </select>
                  <div style="display: ${showOffset ? 'flex' : 'none'}; align-items: center; gap: 6px;">
                    <span style="color: var(--muted); font-size: 0.85rem;">\u00b1</span>
                    <div class="number-input-wrap">
                      <input type="number" id="offset-${idx}" style="width: 45px;" value="${activeOffset}"
                        min="-120" max="120" step="5"
                        onchange="updateMotionScope(${idx}, 'active_offset', parseInt(this.value))">
                      <div class="number-input-btns">
                        <button type="button" onclick="stepNumberInput('offset-${idx}', 5)">&#9650;</button>
                        <button type="button" onclick="stepNumberInput('offset-${idx}', -5)">&#9660;</button>
                      </div>
                    </div>
                    <span style="color: var(--muted); font-size: 0.85rem;">min</span>
                  </div>
                  <span style="color: var(--muted); font-size: 0.85rem;">Cooloff</span>
                  <div class="number-input-wrap">
                    <input type="number" id="cooldown-${idx}" style="width: 55px;" value="${cooldown}" min="0" max="300" step="5"
                      onchange="updateMotionScope(${idx}, 'cooldown', parseInt(this.value) || 0)">
                    <div class="number-input-btns">
                      <button type="button" onclick="stepNumberInput('cooldown-${idx}', 5)">&#9650;</button>
                      <button type="button" onclick="stepNumberInput('cooldown-${idx}', -5)">&#9660;</button>
                    </div>
                  </div>
                  <span style="color: var(--muted); font-size: 0.85rem;">sec</span>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function addMotionScope() {
      if (editingMotionScopes.length >= 5) {
        alert('Maximum 5 reaches allowed');
        return;
      }
      const newIdx = editingMotionScopes.length;
      editingMotionScopes.push({
        areas: [],
        mode: 'on_off',
        duration: 60,
        boost_enabled: false,
        boost_brightness: 50,
        active_when: 'always',
        active_offset: 0,
        cooldown: 0,
        trigger_entities: [],
        alert_intensity: 'low',
        alert_count: 3,
      });
      _motionScopeExpanded.add(newIdx);
      renderMotionScopesEditor();
      autoSave();
    }

    function removeMotionScope(idx) {
      if (editingMotionScopes.length <= 1) return;
      if (!confirm(`Remove Reach ${idx + 1}?`)) return;
      editingMotionScopes.splice(idx, 1);
      // Rebuild expanded set with shifted indices
      const newExpanded = new Set();
      for (const i of _motionScopeExpanded) {
        if (i < idx) newExpanded.add(i);
        else if (i > idx) newExpanded.add(i - 1);
      }
      _motionScopeExpanded.clear();
      for (const i of newExpanded) _motionScopeExpanded.add(i);
      renderMotionScopesEditor();
      autoSave();
    }

    function swapMotionScope(idx, direction) {
      const newIdx = idx + direction;
      if (newIdx < 0 || newIdx >= editingMotionScopes.length) return;
      [editingMotionScopes[idx], editingMotionScopes[newIdx]] = [editingMotionScopes[newIdx], editingMotionScopes[idx]];
      // Swap expanded state too
      const aExp = _motionScopeExpanded.has(idx);
      const bExp = _motionScopeExpanded.has(newIdx);
      if (aExp) _motionScopeExpanded.add(newIdx); else _motionScopeExpanded.delete(newIdx);
      if (bExp) _motionScopeExpanded.add(idx); else _motionScopeExpanded.delete(idx);
      renderMotionScopesEditor();
      // Animate the swapped cards
      const cards = document.querySelectorAll('#motion-scopes-editor .scope-card');
      if (cards[idx]) cards[idx].classList.add(direction > 0 ? 'moving-up' : 'moving-down');
      if (cards[newIdx]) cards[newIdx].classList.add(direction > 0 ? 'moving-down' : 'moving-up');
      setTimeout(() => {
        if (cards[idx]) cards[idx].classList.remove('moving-up', 'moving-down');
        if (cards[newIdx]) cards[newIdx].classList.remove('moving-up', 'moving-down');
      }, 250);
      autoSave();
    }

    function removeAreaFromMotionScope(scopeIdx, areaId) {
      const scope = editingMotionScopes[scopeIdx];
      const idx = scope.areas.indexOf(areaId);
      if (idx >= 0) {
        scope.areas.splice(idx, 1);
      }
      renderMotionScopesEditor();
      autoSave();
    }

    async function addAreasToMotionScope(scopeIdx) {
      const scope = editingMotionScopes[scopeIdx];
      const selected = await openAreaPicker({
        title: `Add Areas to Reach ${scopeIdx + 1}`,
        selected: scope.areas,
        multi: true
      });

      if (selected && selected.length > 0) {
        selected.forEach(areaId => {
          if (!scope.areas.includes(areaId)) {
            scope.areas.push(areaId);
          }
        });
        renderMotionScopesEditor();
        autoSave();
      }
    }

    function updateMotionScope(idx, field, value) {
      editingMotionScopes[idx][field] = value;
      renderMotionScopesEditor();
      autoSave();
    }

    // ============================================================
    // Cooldown countdown + polling
    // ============================================================
    function startCooldownCountdown(ctrl) {
      // Clear any existing intervals
      if (_cooldownInterval) { clearInterval(_cooldownInterval); _cooldownInterval = null; }
      if (_cooldownPollInterval) { clearInterval(_cooldownPollInterval); _cooldownPollInterval = null; }

      const statusEl = document.getElementById('cooldown-status');
      if (!statusEl) return;

      let cooldownUntil = ctrl.last_action?.cooldown_until ? new Date(ctrl.last_action.cooldown_until).getTime() : 0;
      const cooldownSec = ctrl.cooldown || 0;

      function updateDisplay() {
        if (cooldownSec <= 0) {
          statusEl.textContent = '';
          return;
        }
        const remaining = Math.max(0, Math.ceil((cooldownUntil - Date.now()) / 1000));
        if (remaining > 0) {
          statusEl.textContent = `Cooldown: ${remaining}s`;
          statusEl.style.color = 'var(--accent)';
        } else {
          statusEl.textContent = 'Ready';
          statusEl.style.color = 'var(--muted)';
        }
      }

      updateDisplay();

      if (cooldownSec > 0) {
        // Tick every second for live countdown
        _cooldownInterval = setInterval(updateDisplay, 1000);

        // Poll for new motion triggers every 10s
        _cooldownPollInterval = setInterval(async () => {
          try {
            const cacheBust = `?_t=${Date.now()}`;
            const res = await fetch(basePath + `/api/controls${cacheBust}`);
            if (res.ok) {
              const data = await res.json();
              const updatedCtrl = (data.controls || []).find(c => c.id === editingControlId);
              if (updatedCtrl?.last_action?.cooldown_until) {
                cooldownUntil = new Date(updatedCtrl.last_action.cooldown_until).getTime();
              }
            }
          } catch (e) { /* ignore poll errors */ }
        }, 10000);
      }
    }

    // ============================================================
    // setupControlPage - main setup function
    // ============================================================
    function setupControlPage() {
      const ctrl = controls.find(c => c.id === editingControlId);
      if (!ctrl) {
        document.getElementById('page-title').textContent = 'Control not found';
        return;
      }

      // Unsupported devices get a simplified info display
      if (!ctrl.supported) {
        showUnsupportedInfo(ctrl);
        return;
      }

      editingDeviceId = ctrl.device_id || null;
      editingControl = ctrl;

      const isSensorType = ctrl.category === 'motion_sensor' || ctrl.category === 'contact_sensor';
      const isConfigured = ctrl.status === 'active';

      // Load inactive/pause state for all control types
      editingInactive = ctrl.inactive || false;

      if (isSensorType) {
        // Load motion/contact sensor scopes
        if (ctrl.scopes && ctrl.scopes.length > 0) {
          editingMotionScopes = ctrl.scopes.map(s => ({
            areas: [...(s.areas || [])],
            mode: s.mode || 'on_off',
            duration: s.duration || 60,
            cooldown: s.cooldown || 0,
            boost_enabled: s.boost_enabled || false,
            boost_brightness: s.boost_brightness || 50,
            active_when: s.active_when || 'always',
            active_offset: s.active_offset || 0,
            trigger_entities: [...(s.trigger_entities || [])],
            alert_intensity: s.alert_intensity || 'low',
            alert_count: s.alert_count || 3,
          }));
        } else if (ctrl.areas && ctrl.areas.length > 0) {
          const scopeMap = new Map();
          for (const a of ctrl.areas) {
            const settings = {
              mode: a.mode || 'on_off',
              duration: a.duration || 60,
              cooldown: a.cooldown || 0,
              boost_enabled: a.boost_enabled || false,
              boost_brightness: a.boost_brightness || 50,
              active_when: a.active_when || 'always',
              active_offset: a.active_offset || 0,
              trigger_entities: [...(a.trigger_entities || [])],
              alert_intensity: a.alert_intensity || 'low',
              alert_count: a.alert_count || 3,
            };
            const groupKey = JSON.stringify({
              mode: settings.mode, duration: settings.duration, cooldown: settings.cooldown,
              boost_enabled: settings.boost_enabled, boost_brightness: settings.boost_brightness,
              active_when: settings.active_when, active_offset: settings.active_offset,
              trigger_entities: settings.trigger_entities,
              alert_intensity: settings.alert_intensity, alert_count: settings.alert_count,
            });
            if (scopeMap.has(groupKey)) {
              scopeMap.get(groupKey).areas.push(a.area_id);
            } else {
              scopeMap.set(groupKey, {
                areas: [a.area_id],
                ...settings
              });
            }
          }
          editingMotionScopes = Array.from(scopeMap.values());
        } else {
          editingMotionScopes = [];
        }
        editingScopes = [];
      } else {
        // Load switch scopes
        editingScopes = ctrl.scopes && ctrl.scopes.length > 0
          ? ctrl.scopes.map(s => ({ areas: [...(s.areas || [])], feedback_area: s.feedback_area || null }))
          : [{ areas: [], feedback_area: null }];
        editingMotionScopes = [];
      }

      // Set page header icon and title
      document.getElementById('page-header-icon').innerHTML = categoryIcon(ctrl.category);
      const pausedSpan = editingInactive ? ' <span style="color:var(--muted);font-weight:normal;"> (paused)</span>' : '';
      document.getElementById('page-title').innerHTML = `${ctrl.name}${pausedSpan}`;

      // Subtitle: area + type
      const subEl = document.getElementById('page-title-sub');
      const locationName = ctrl.area_name || 'Unassigned';
      const typeName = ctrl.type_name || ctrl.type || '';
      subEl.textContent = typeName ? `${locationName} · ${typeName}` : locationName;

      // Hide header-meta-area (location now in subtitle)
      document.getElementById('header-meta-area').textContent = '';

      // Build last action for toolbar menu
      let lastActionHtml = '';
      if (ctrl.last_action && typeof ctrl.last_action === 'object' && ctrl.last_action.action) {
        const la = ctrl.last_action;
        let actionLabel = la.action;
        if (actionLabel === 'motion_detected') actionLabel = 'Motion';
        else if (actionLabel === 'motion_cleared') actionLabel = 'Cleared';
        let timeStr = '';
        if (la.timestamp) {
          const d = new Date(la.timestamp);
          const mo = d.getMonth() + 1;
          const day = d.getDate();
          let h = d.getHours();
          const mi = d.getMinutes().toString().padStart(2, '0');
          const ap = h >= 12 ? 'p' : 'a';
          h = h % 12 || 12;
          timeStr = `${mo}/${day} ${h}:${mi}${ap}`;
        }
        lastActionHtml = `<div>${timeStr}</div><div style="padding-left:8px;color:var(--muted);">${actionLabel}</div>`;
      }

      // Battery string
      let batteryStr = '';
      if (ctrl.battery?.value != null) {
        const bv = ctrl.battery.value;
        const bColor = bv <= 20 ? 'var(--danger)' : bv <= 50 ? 'var(--warning)' : 'var(--muted2)';
        batteryStr = `<span style="color:${bColor};">Battery: ${bv}%</span>`;
      }

      // Populate toolbar menu
      const toolbarInfo = document.getElementById('toolbar-menu-info');
      toolbarInfo.innerHTML = [
        lastActionHtml,
        lastActionHtml ? '<div class="toolbar-menu-divider" style="margin:4px -16px;"></div>' : '',
        ctrl.model ? `<div>Model: ${ctrl.model}</div>` : '',
        batteryStr ? `<div>${batteryStr}</div>` : '',
      ].filter(Boolean).join('');

      // Show copy IEEE/ID items
      const copyIeee = document.getElementById('toolbar-menu-copy-ieee');
      const copyId = document.getElementById('toolbar-menu-copy-id');
      if (copyIeee) copyIeee.style.display = ctrl.id ? '' : 'none';
      if (copyId) copyId.style.display = ctrl.device_id ? '' : 'none';

      // Show reset for configured controls
      const resetItem = document.getElementById('toolbar-menu-reset');
      const resetDivider = document.getElementById('toolbar-menu-reset-divider');
      if (isConfigured) {
        resetDivider.style.display = '';
        resetItem.style.display = '';
      } else {
        resetDivider.style.display = 'none';
        resetItem.style.display = 'none';
      }

      document.getElementById('device-info-section').style.display = 'none';

      // Show/hide appropriate sections based on control type
      const typeSectionEl = document.getElementById('type-section');
      const switchSection = document.getElementById('switch-config-section');
      const motionSection = document.getElementById('motion-config-section');
      const pauseSection = document.getElementById('pause-section');

      // Show settings section for all control types and set checkbox + timer
      pauseSection.style.display = '';
      pauseSection.classList.add('is-open');
      document.getElementById('control-pause-checkbox').checked = editingInactive;
      document.getElementById('pause-timer-row').style.display = editingInactive ? 'flex' : 'none';
      initPauseTimer(ctrl.inactive_until);

      if (isSensorType) {
        if (typeSectionEl) typeSectionEl.style.display = 'none';
        switchSection.style.display = 'none';
        motionSection.style.display = '';
          document.getElementById('magic-section').style.display = 'none';
        renderMotionScopesEditor();

        // Show sensitivity row for ZHA motion sensors
        const sensitivityRow = document.getElementById('sensitivity-row');
        if (ctrl.category === 'motion_sensor' && ctrl.integration === 'zha') {
          sensitivityRow.style.display = 'flex';
          loadZhaSettings(ctrl.device_id);
        } else {
          sensitivityRow.style.display = 'none';
        }
      } else {
        // Type is now shown in device-info, hide the type section
        if (typeSectionEl) typeSectionEl.style.display = 'none';
        switchSection.style.display = '';
        motionSection.style.display = 'none';
        document.getElementById('sensitivity-row').style.display = 'none';


        // Load magic buttons and show section if switch type has magic slots
        editingMagicButtons = { ...(ctrl.magic_buttons || {}) };
        const magicSlots = getMagicSlots(ctrl.type);
        const hasOrphans = Object.keys(editingMagicButtons).some(k => !magicSlots.includes(k));
        const magicSection = document.getElementById('magic-section');
        if (magicSlots.length > 0 || hasOrphans) {
          magicSection.style.display = '';
          renderMagicEditor();
        } else {
          magicSection.style.display = 'none';
        }

        renderScopesEditor();
      }
    }

    // ============================================================
    // Save / Remove
    // ============================================================
    async function saveControl() {
      const isSensorType = editingControl?.category === 'motion_sensor' || editingControl?.category === 'contact_sensor';

      // Get pause/inactive status from checkbox (applies to all control types)
      const inactive = document.getElementById('control-pause-checkbox').checked;
      const inactiveUntil = inactive ? (editingInactiveUntil || 'forever') : null;

      let payload;
      if (isSensorType) {
        // Skip save if no scopes with areas yet (auto-save can fire before areas are added)
        const hasAreas = editingMotionScopes.some(s => s.areas && s.areas.length > 0);
        if (editingMotionScopes.length === 0 || !hasAreas) {
          return;
        }
        payload = {
          name: editingControl?.name,
          category: editingControl?.category,
          scopes: editingMotionScopes,
          device_id: editingDeviceId,
          inactive: inactive,
          inactive_until: inactiveUntil,
        };
      } else {
        // Switch config
        payload = {
          name: editingControl?.name,
          type: editingControl?.type,
          scopes: editingScopes,
          device_id: editingDeviceId,
          magic_buttons: editingMagicButtons,
          inactive: inactive,
          inactive_until: inactiveUntil
        };
      }

      try {
        const response = await fetch(basePath + `/api/controls/${encodeURIComponent(editingControlId)}/configure`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          const data = await response.json();
          console.error('Failed to save:', data.error);
          return;
        }

        // Update "(paused)" indicator in title
        const pausedSpan = inactive ? ' <span style="color:var(--muted);font-weight:normal;"> (paused)</span>' : '';
        document.getElementById('page-title').innerHTML = `${editingControl?.name}${pausedSpan}`;

        showSaveStatus();
      } catch (err) {
        console.error('Error saving control:', err);
      }
    }

    async function removeConfig() {
      if (!confirm(`Reset "${editingControl?.name || editingControlId}"? This will clear all configuration. The control will remain in the list as "Not configured".`)) return;

      try {
        const response = await fetch(basePath + `/api/controls/${encodeURIComponent(editingControlId)}/configure`, {
          method: 'DELETE'
        });

        if (!response.ok) {
          const data = await response.json();
          alert(data.error || 'Failed to remove configuration');
          return;
        }

        goBack();
      } catch (err) {
        console.error('Error removing config:', err);
        alert('Error removing configuration');
      }
    }

    // ============================================================
    // Tooltip positioning handler
    // ============================================================
    document.addEventListener('mouseover', (e) => {
      const icon = e.target.closest('.info-icon');
      if (!icon) return;

      const tooltip = icon.querySelector('.info-tooltip');
      if (!tooltip) return;

      const iconRect = icon.getBoundingClientRect();
      const tooltipWidth = 280;
      const padding = 12;

      // Position below the icon by default
      let top = iconRect.bottom + 8;
      let left = iconRect.left + (iconRect.width / 2) - (tooltipWidth / 2);

      // Keep within viewport horizontally
      if (left < padding) left = padding;
      if (left + tooltipWidth > window.innerWidth - padding) {
        left = window.innerWidth - tooltipWidth - padding;
      }

      // If would go off bottom, position above instead
      if (top + 100 > window.innerHeight) {
        top = iconRect.top - 8;
        tooltip.style.transform = 'translateY(-100%)';
      } else {
        tooltip.style.transform = 'none';
      }

      tooltip.style.top = top + 'px';
      tooltip.style.left = left + 'px';
    });
  </script>
</body>
</html>
