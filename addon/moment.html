<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circadian Light - Moment</title>
  <style>
    :root {
      --bg: #000;
      --panel: #111;
      --card: #1a1a1a;
      --accent: #feac60;
      --accent-hover: #ffc078;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --muted2: #64748b;
      --line: #334155;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Page Header */
    .page-header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--accent);
    }

    .back-btn svg {
      width: 20px;
      height: 20px;
    }

    .editor-icon-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 1.2rem;
      color: var(--text);
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .editor-icon-btn:hover {
      border-color: var(--accent);
    }

    .page-title-input {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 4px 0;
      flex: 1;
      min-width: 0;
      transition: border-color 0.2s;
    }

    .page-title-input:focus {
      outline: none;
      border-bottom-color: dodgerblue;
    }

    .run-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 0.9rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .run-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .run-btn.running {
      color: var(--accent);
      opacity: 0.5;
      pointer-events: none;
    }

    /* Main Content */
    .main {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    /* Card-based collapsible sections */
    .ctrl-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }

    .ctrl-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 12px 14px;
      user-select: none;
    }

    .ctrl-card-chevron {
      display: inline-block;
      font-size: 1.1rem;
      line-height: 1;
      transition: transform 0.25s;
      color: var(--muted2);
      flex-shrink: 0;
    }

    .ctrl-card.is-open .ctrl-card-chevron {
      transform: rotate(90deg);
    }

    .ctrl-card-title {
      font-size: 1.0rem;
      font-weight: 600;
      color: var(--text);
    }

    .ctrl-card-right {
      margin-left: auto;
    }

    .ctrl-card-body {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.25s ease;
    }

    .ctrl-card.is-open .ctrl-card-body {
      max-height: 2000px;
      opacity: 1;
    }

    .ctrl-card-body-inner {
      padding: 0 14px 14px;
    }

    /* Settings rows */
    .settings-row {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }

    .settings-label {
      width: 80px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
    }

    /* Form Controls */
    .form-select {
      padding: 8px 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
      cursor: pointer;
    }

    .form-select:focus {
      outline: 2px solid dodgerblue;
    }

    .form-select-sm {
      padding: 6px 10px;
      font-size: 0.85rem;
    }

    /* Exception items */
    .exception-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
    }

    .exception-area {
      width: 140px;
      font-size: 0.9rem;
      color: var(--text);
    }

    .exception-action {
      flex: 1;
      padding: 5px 8px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 4px;
      color: var(--text);
      font-size: 0.9rem;
    }

    .exception-remove {
      background: transparent;
      border: none;
      color: var(--muted2);
      font-size: 1rem;
      cursor: pointer;
      padding: 2px 6px;
      line-height: 1;
      opacity: 0.5;
      transition: all 0.15s;
    }

    .exception-remove:hover {
      color: var(--danger);
      opacity: 1;
    }

    /* Add Exception Row */
    .add-exception-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .add-exception-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 0;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .add-exception-btn:hover {
      color: var(--accent);
    }

    /* Usage rows */
    .usage-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .usage-switch-name {
      font-size: 0.9rem;
      min-width: 140px;
    }

    .usage-button-label {
      flex: 1;
      font-size: 0.8rem;
      color: var(--muted2);
    }

    .usage-switch-link {
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      min-width: 140px;
      transition: color 0.2s;
    }

    .usage-switch-link:hover {
      color: var(--accent);
    }

    .usage-remove-btn {
      background: transparent;
      border: none;
      color: var(--muted2);
      font-size: 1rem;
      cursor: pointer;
      padding: 2px 6px;
      line-height: 1;
      opacity: 0.5;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .usage-remove-btn:hover {
      color: var(--danger);
      opacity: 1;
    }

    /* Assign picker */
    .assign-picker {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .assign-search {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      font-size: 0.85rem;
      width: 100%;
      margin-bottom: 8px;
    }

    .assign-search:focus {
      outline: none;
      border-color: dodgerblue;
    }

    .assign-switch-list {
      max-height: 240px;
      overflow-y: auto;
    }

    .assign-switch-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      margin: 0 -8px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .assign-switch-row:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .assign-switch-name {
      font-size: 0.9rem;
    }

    .assign-switch-area {
      font-size: 0.8rem;
      color: var(--muted);
      margin-left: auto;
    }

    .assign-slot-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .assign-back-btn {
      background: transparent;
      border: none;
      color: var(--accent);
      font-size: 0.85rem;
      cursor: pointer;
      padding: 0;
    }

    .assign-back-btn:hover {
      text-decoration: underline;
    }

    .assign-slot-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      margin: 0 -8px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .assign-slot-row:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .assign-slot-row.is-current {
      opacity: 0.5;
      cursor: default;
    }

    .assign-slot-label {
      font-size: 0.9rem;
    }

    .assign-slot-current {
      font-size: 0.8rem;
      color: var(--muted);
      margin-left: auto;
    }

    .assign-confirm {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      margin-top: 4px;
      background: rgba(254, 172, 96, 0.08);
      border-radius: 6px;
      font-size: 0.85rem;
    }

    .assign-confirm-btn {
      padding: 4px 12px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .assign-confirm-cancel {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 0.85rem;
      cursor: pointer;
    }

    /* Icon Picker Modal */
    .icon-picker-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s;
    }

    .icon-picker-overlay.visible {
      opacity: 1;
      visibility: visible;
    }

    .icon-picker {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 20px;
      width: 340px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .icon-picker h4 {
      margin-bottom: 16px;
      font-size: 1rem;
    }

    .icon-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }

    .icon-option {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .icon-option:hover {
      border-color: var(--accent);
      background: rgba(254, 172, 96, 0.1);
    }

    .icon-option.selected {
      border-color: var(--accent);
      background: rgba(254, 172, 96, 0.2);
    }

    .icon-picker-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    /* Buttons */
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-cancel {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--muted);
    }

    .btn-cancel:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }

    /* Save Status */
    .save-status {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      background: var(--success);
      color: white;
      border-radius: 8px;
      font-size: 0.9rem;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      z-index: 150;
    }

    .save-status.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .add-exception-row {
        flex-wrap: wrap;
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <!-- Page Header -->
  <header class="page-header">
    <button class="back-btn" onclick="goBack()" title="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <button class="editor-icon-btn" id="header-icon-btn" onclick="showIconPicker()">&#127763;</button>
    <input type="text" class="page-title-input" id="page-title" value="Loading..."
           onchange="updateMomentName(this.value)" onblur="saveMoment()">
    <button class="run-btn" id="header-run-btn" onclick="runMoment()" title="Run moment">&#x25B6;</button>
  </header>

  <main class="main">
    <div id="moment-editor">
      <!-- Editor content populated by JS -->
    </div>
  </main>

  <!-- Icon Picker Modal -->
  <div class="icon-picker-overlay" id="icon-picker-overlay">
    <div class="icon-picker">
      <h4>Choose Icon</h4>
      <div class="icon-grid" id="icon-grid">
        <!-- Populated by JS -->
      </div>
      <div class="icon-picker-actions">
        <button class="btn btn-cancel" onclick="hideIconPicker()">Cancel</button>
      </div>
    </div>
  </div>

  <div class="save-status" id="save-status">Saved</div>

  <script src="./shared.js"></script>
  <script>
    // Icon options for moment icon picker
    const MOMENT_ICONS = [
      { icon: '&#128716;', name: 'bed' },
      { icon: '&#127769;', name: 'moon' },
      { icon: '&#127763;', name: 'moon-face' },
      { icon: '&#127774;', name: 'sun' },
      { icon: '&#127773;', name: 'sun-rays' },
      { icon: '&#127749;', name: 'sunset' },
      { icon: '&#127747;', name: 'sunrise' },
      { icon: '&#127752;', name: 'rainbow' },
      { icon: '&#127881;', name: 'party' },
      { icon: '&#127878;', name: 'celebrate' },
      { icon: '&#127871;', name: 'candle' },
      { icon: '&#128161;', name: 'bulb' },
      { icon: '&#127968;', name: 'home' },
      { icon: '&#128682;', name: 'door' },
      { icon: '&#128249;', name: 'movie' },
      { icon: '&#127909;', name: 'clapperboard' },
      { icon: '&#127911;', name: 'headphones' },
      { icon: '&#127926;', name: 'music' },
      { icon: '&#127860;', name: 'dinner' },
      { icon: '&#9749;', name: 'coffee' },
      { icon: '&#128218;', name: 'book' },
      { icon: '&#128187;', name: 'work' },
      { icon: '&#128170;', name: 'workout' },
      { icon: '&#128704;', name: 'yoga' },
      { icon: '&#9889;', name: 'bright' },
      { icon: '&#128680;', name: 'emergency' },
      { icon: '&#9211;', name: 'off' },
    ];

    // Action options
    const ACTION_OPTIONS = [
      { value: 'lights_on', label: 'On' },
      { value: 'off', label: 'Off' },
      { value: 'nitelite', label: 'NiteLite' },
      { value: 'britelite', label: 'BriteLite' },
      { value: 'wake_or_bed', label: 'Wake / Bed' },
      { value: 'circadian_off', label: 'Circadian off' },
      { value: 'reset', label: 'Reset' },
      { value: 'leave_alone', label: 'Leave alone' }
    ];

    // Category options
    const CATEGORY_OPTIONS = [
      { value: 'utility', label: 'Utility' },
      { value: 'fun', label: 'Fun' }
    ];

    // Magic button label maps (from control.html)
    const magicButtonNames = {
      'on': 'Power', 'up': 'Up', 'down': 'Down', 'off': 'Hue',
      'toggle': 'Toggle', 'brightness_up': 'Bright Up', 'brightness_down': 'Bright Down',
      'arrow_left': 'Left', 'arrow_right': 'Right',
      'dial': 'Dial'
    };
    const magicActionLabels = {
      'hold': 'Long press', 'short_release': 'Press', 'press': 'Press',
      'double_press': '2\u00d7 press', 'triple_press': '3\u00d7 press',
      'quadruple_press': '4\u00d7 press', 'quintuple_press': '5\u00d7 press',
      'rotate': 'Rotate'
    };
    const knownActionSuffixes = [
      'quintuple_press', 'quadruple_press', 'triple_press', 'double_press',
      'short_release', 'press', 'hold', 'rotate'
    ];

    function formatMagicButtonEvent(key) {
      for (const suffix of knownActionSuffixes) {
        if (key.endsWith('_' + suffix)) {
          const buttonPart = key.slice(0, key.length - suffix.length - 1);
          const buttonLabel = magicButtonNames[buttonPart] || buttonPart;
          const actionLabel = magicActionLabels[suffix] || suffix;
          return `${buttonLabel} \u2014 ${actionLabel}`;
        }
      }
      return key.replace(/_/g, ' ');
    }

    function getMagicSlots(switchType) {
      const typeData = switchMapData[switchType];
      if (!typeData || !typeData.effective_mapping) return [];
      return Object.entries(typeData.effective_mapping)
        .filter(([_, action]) => action === 'magic')
        .map(([key]) => key);
    }

    // State
    let moment = null;
    let selectedMomentId = null;
    let allAreas = [];
    let allZones = [];
    let allSwitches = [];
    let allMoments = {};
    let switchMapData = {};
    let newExceptionAction = 'leave_alone';
    let newExceptionTimer = 0;
    let assignPickerOpen = false;
    let assignPickerSearch = '';
    let assignPickerSwitch = null; // selected switch in step 2
    let assignConfirmSlot = null; // slot pending confirmation

    // Normalize exception value: old format was a plain string, new format is {action, timer}
    function normalizeException(val) {
      if (typeof val === 'string') return { action: val, timer: 0 };
      return { action: val.action || 'leave_alone', timer: val.timer || 0 };
    }

    // Compute base path for API calls (handles ingress prefix)
    const basePath = (() => {
      const path = window.location.pathname;
      const m = path.match(/^(.*)\/moment\/[^/]+\/?$/);
      return m ? (m[1] || '') : '';
    })();

    function goBack() {
      if (window.history.length > 1 && document.referrer) {
        window.history.back();
      } else {
        window.location.href = basePath + '/moments';
      }
    }

    function toggleCard(cardId) {
      const card = document.getElementById(cardId);
      if (card) card.classList.toggle('is-open');
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
      const data = window.circadianData || {};
      selectedMomentId = data.selectedMomentId;

      if (!selectedMomentId) {
        document.getElementById('page-title').value = 'Moment not found';
        return;
      }

      await loadData();
      renderMomentEditor();
    });

    async function loadData() {
      const fetches = await Promise.allSettled([
        fetch(basePath + '/api/moments'),
        fetch(basePath + '/api/glozones'),
        fetch(basePath + '/api/switches'),
        fetch(basePath + '/api/switchmap')
      ]);

      const [momentsRes, zonesRes, switchesRes, switchmapRes] = fetches;

      try {
        if (momentsRes.status === 'fulfilled' && momentsRes.value.ok) {
          const data = await momentsRes.value.json();
          allMoments = data.moments || {};
          moment = allMoments[selectedMomentId] || null;
        }
      } catch (err) { console.error('Error parsing moments:', err); }

      try {
        if (zonesRes.status === 'fulfilled' && zonesRes.value.ok) {
          const data = await zonesRes.value.json();
          allZones = data.zones || [];
          allAreas = [];
          allZones.forEach(zone => {
            (zone.areas || []).forEach(area => {
              allAreas.push({
                area_id: area.area_id,
                name: area.name,
                zone_id: zone.id,
                zone_name: zone.name
              });
            });
          });
        }
      } catch (err) { console.error('Error parsing zones:', err); }

      try {
        if (switchesRes.status === 'fulfilled' && switchesRes.value.ok) {
          const data = await switchesRes.value.json();
          allSwitches = data.switches || [];
        }
      } catch (err) { console.error('Error parsing switches:', err); }

      try {
        if (switchmapRes.status === 'fulfilled' && switchmapRes.value.ok) {
          const data = await switchmapRes.value.json();
          switchMapData = data.mappings || {};
        }
      } catch (err) { console.error('Error parsing switchmap:', err); }
    }

    function updateHeader() {
      if (!moment) return;
      document.getElementById('header-icon-btn').innerHTML = moment.icon || '&#127763;';
      const titleInput = document.getElementById('page-title');
      titleInput.value = moment.name || 'Unnamed Moment';
      if (moment.name === 'New Moment') {
        requestAnimationFrame(() => { titleInput.focus(); titleInput.select(); });
      }
    }

    // ========== Main Render ==========

    function renderMomentEditor() {
      if (!moment) {
        document.getElementById('page-title').value = 'Moment not found';
        document.getElementById('moment-editor').innerHTML = `
          <div style="text-align: center; padding: 40px 20px; color: var(--muted);">
            <p>This moment could not be found.</p>
          </div>
        `;
        return;
      }

      updateHeader();

      const exceptions = moment.exceptions || {};
      const exceptionCount = Object.keys(exceptions).length;
      const usages = getUsages();
      const usageCount = usages.length;

      document.getElementById('moment-editor').innerHTML = `
        ${renderSettingsCard()}
        ${renderExceptionsCard(exceptions, exceptionCount)}
        ${renderUsageCard(usages, usageCount)}
      `;

      // Render assign picker if open
      if (assignPickerOpen) {
        renderAssignPicker();
      }
    }

    // ========== Settings Card ==========

    function renderSettingsCard() {
      return `
        <div class="ctrl-card is-open" id="settings-section">
          <div class="ctrl-card-header" onclick="toggleCard('settings-section')">
            <span class="ctrl-card-chevron">&#x203A;</span>
            <span class="ctrl-card-title">Settings</span>
          </div>
          <div class="ctrl-card-body">
            <div class="ctrl-card-body-inner">
              <div class="settings-row">
                <span class="settings-label">Category</span>
                <select class="form-select form-select-sm" onchange="updateMomentCategory(this.value); saveMoment();">
                  ${CATEGORY_OPTIONS.map(opt => `
                    <option value="${opt.value}" ${moment.category === opt.value ? 'selected' : ''}>${opt.label}</option>
                  `).join('')}
                </select>
              </div>
              <div class="settings-row">
                <span class="settings-label">Action</span>
                <select class="form-select form-select-sm" onchange="updateDefaultAction(this.value); saveMoment();">
                  ${ACTION_OPTIONS.map(opt => `
                    <option value="${opt.value}" ${moment.default_action === opt.value ? 'selected' : ''}>${opt.label}</option>
                  `).join('')}
                </select>
              </div>
              <div class="settings-row">
                <span class="settings-label">Auto-off</span>
                <div style="display: flex; align-items: center; gap: 8px;">
                  <input type="number" class="form-select form-select-sm" style="width: 60px;"
                    value="${Math.round((moment.timer || 0) / 60)}" min="0" max="480" step="1"
                    onchange="moment.timer = (parseInt(this.value) || 0) * 60; saveMoment();">
                  <span style="color: var(--muted); font-size: 0.85rem;">min</span>
                </div>
              </div>
              <div style="color: var(--muted2); font-size: 0.75rem; margin-top: 4px;">
                ID: ${selectedMomentId}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // ========== Exceptions Card ==========

    function renderExceptionsCard(exceptions, exceptionCount) {
      const countLabel = exceptionCount > 0 ? exceptionCount : '';
      return `
        <div class="ctrl-card is-open" id="exceptions-section">
          <div class="ctrl-card-header" onclick="toggleCard('exceptions-section')">
            <span class="ctrl-card-chevron">&#x203A;</span>
            <span class="ctrl-card-title">Exceptions</span>
            <span class="ctrl-card-right" style="color: var(--muted); font-size: 0.85rem;">${countLabel}</span>
          </div>
          <div class="ctrl-card-body">
            <div class="ctrl-card-body-inner">
              ${exceptionCount > 0 ? `
                <div class="exception-item" style="padding-bottom: 2px; margin-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.05);">
                  <span class="exception-area" style="font-size: 0.75rem; color: var(--muted2);">Area</span>
                  <span style="flex: 1; font-size: 0.75rem; color: var(--muted2);">Action</span>
                  <div style="display:flex;align-items:center;gap:4px; min-width: 62px;">
                    <span style="font-size: 0.75rem; color: var(--muted2);">Auto-off</span>
                  </div>
                  <span style="width: 22px;"></span>
                </div>
              ` : ''}
              <div id="exceptions-list">
                ${Object.entries(exceptions).map(([areaId, rawVal]) => {
                  const exc = normalizeException(rawVal);
                  const area = allAreas.find(a => a.area_id === areaId);
                  const areaName = area ? area.name : areaId;
                  return `
                    <div class="exception-item">
                      <span class="exception-area">${areaName}</span>
                      <select class="exception-action" onchange="updateException('${areaId}', {action: this.value, timer: ${exc.timer}}); saveMoment();">
                        ${ACTION_OPTIONS.map(opt => `
                          <option value="${opt.value}" ${exc.action === opt.value ? 'selected' : ''}>${opt.label}</option>
                        `).join('')}
                      </select>
                      <div style="display:flex;align-items:center;gap:4px;">
                        <input type="number" style="width:48px;padding:2px 4px;font-size:0.8rem;border:1px solid var(--line);border-radius:4px;background:var(--bg);color:var(--text);"
                          value="${Math.round(exc.timer / 60)}" min="0" max="480" step="1"
                          onchange="updateException('${areaId}', {action:'${exc.action}', timer:(parseInt(this.value)||0)*60}); saveMoment();">
                        <span style="color:var(--muted);font-size:0.75rem;">m</span>
                      </div>
                      <button class="exception-remove" onclick="removeException('${areaId}'); saveMoment();">&times;</button>
                    </div>
                  `;
                }).join('')}
              </div>
              <div class="add-exception-row">
                <select class="form-select form-select-sm" id="new-exception-action" onchange="newExceptionAction = this.value;">
                  ${ACTION_OPTIONS.map(opt => `
                    <option value="${opt.value}" ${newExceptionAction === opt.value ? 'selected' : ''}>${opt.label}</option>
                  `).join('')}
                </select>
                <div style="display:flex;align-items:center;gap:4px;">
                  <input type="number" style="width:48px;padding:2px 4px;font-size:0.8rem;border:1px solid var(--line);border-radius:4px;background:var(--bg);color:var(--text);"
                    value="${Math.round(newExceptionTimer / 60)}" min="0" max="480" step="1"
                    onchange="newExceptionTimer = (parseInt(this.value)||0) * 60;">
                  <span style="color:var(--muted);font-size:0.75rem;">m</span>
                </div>
                <button class="add-exception-btn" onclick="addException()">+ Add exception</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // ========== Usage Card ==========

    function getUsages() {
      const actionRef = 'set_' + selectedMomentId;
      const usages = [];
      for (const sw of allSwitches) {
        const buttons = sw.magic_buttons || {};
        for (const [buttonEvent, action] of Object.entries(buttons)) {
          if (action === actionRef) {
            // Get area names from scopes
            const scopeAreas = (sw.scopes || [])
              .flatMap(s => s.areas || [])
              .map(areaId => {
                const area = allAreas.find(a => a.area_id === areaId);
                return area ? area.name : areaId;
              });
            usages.push({
              switch_id: sw.id,
              switch_name: sw.name,
              area_names: scopeAreas.join(', '),
              button_event: buttonEvent,
              button_label: formatMagicButtonEvent(buttonEvent)
            });
          }
        }
      }
      return usages;
    }

    function renderUsageCard(usages, usageCount) {
      const countLabel = usageCount > 0 ? usageCount : '';
      let listHtml;
      if (usages.length === 0) {
        listHtml = '<div style="font-size: 0.85rem; color: var(--muted);">Not assigned to any controls</div>';
      } else {
        listHtml = usages.map(u => `
          <div class="usage-row">
            <a href="${basePath}/control/${encodeURIComponent(u.switch_id)}?from=moment&id=${encodeURIComponent(selectedMomentId)}" class="usage-switch-link">${u.switch_name}</a>
            <span class="usage-button-label">${u.button_label}</span>
            <button class="usage-remove-btn" onclick="event.preventDefault(); removeAssignment('${u.switch_id}', '${u.button_event}')" title="Remove assignment">&times;</button>
          </div>
        `).join('');
      }

      return `
        <div class="ctrl-card is-open" id="usage-section">
          <div class="ctrl-card-header" onclick="toggleCard('usage-section')">
            <span class="ctrl-card-chevron">&#x203A;</span>
            <span class="ctrl-card-title">Usage</span>
            <span class="ctrl-card-right" style="color: var(--muted); font-size: 0.85rem;">${countLabel}</span>
          </div>
          <div class="ctrl-card-body">
            <div class="ctrl-card-body-inner">
              ${listHtml}
              <div id="assign-picker-container"></div>
              ${!assignPickerOpen ? `
                <div style="margin-top: ${usages.length > 0 ? '10' : '8'}px;">
                  <button class="add-exception-btn" onclick="openAssignPicker()">+ Assign to a control</button>
                </div>
              ` : ''}
            </div>
          </div>
        </div>
      `;
    }

    // ========== Assign Picker ==========

    function openAssignPicker() {
      assignPickerOpen = true;
      assignPickerSearch = '';
      assignPickerSwitch = null;
      assignConfirmSlot = null;
      renderMomentEditor();
      // Focus search input after render
      requestAnimationFrame(() => {
        const input = document.getElementById('assign-search-input');
        if (input) input.focus();
      });
    }

    function closeAssignPicker() {
      assignPickerOpen = false;
      assignPickerSearch = '';
      assignPickerSwitch = null;
      assignConfirmSlot = null;
      renderMomentEditor();
    }

    function renderAssignPicker() {
      const container = document.getElementById('assign-picker-container');
      if (!container) return;

      if (assignPickerSwitch) {
        // Step 2: show slots for selected switch
        renderAssignSlots(container);
      } else {
        // Step 1: show switch list
        renderAssignSwitchList(container);
      }
    }

    function renderAssignSwitchList(container) {
      // Build the picker shell with input if not already present
      if (!container.querySelector('.assign-picker')) {
        container.innerHTML = `
          <div class="assign-picker">
            <input type="text" class="assign-search" id="assign-search-input"
                   placeholder="Search controls..." value="${assignPickerSearch}"
                   oninput="assignPickerSearch = this.value; updateAssignList();">
            <div class="assign-switch-list" id="assign-list-inner"></div>
            <div style="margin-top: 8px;">
              <button class="add-exception-btn" onclick="closeAssignPicker()" style="color: var(--muted2);">Cancel</button>
            </div>
          </div>
        `;
      }

      updateAssignList();
    }

    function updateAssignList() {
      const listEl = document.getElementById('assign-list-inner');
      if (!listEl) return;

      // Filter to switches with magic slots, areas, and not stale
      const switchesWithMagic = allSwitches.filter(sw => {
        if (sw.stale) return false;
        const slots = getMagicSlots(sw.type);
        if (slots.length === 0) return false;
        const hasAreas = (sw.scopes || []).some(s => (s.areas || []).length > 0);
        return hasAreas;
      });

      // Apply search filter
      const search = assignPickerSearch.toLowerCase();
      const filtered = (search
        ? switchesWithMagic.filter(sw => {
            const nameMatch = (sw.name || '').toLowerCase().includes(search);
            const areaMatch = (sw.scopes || []).some(s =>
              (s.areas || []).some(areaId => {
                const area = allAreas.find(a => a.area_id === areaId);
                return area && area.name.toLowerCase().includes(search);
              })
            );
            return nameMatch || areaMatch;
          })
        : switchesWithMagic
      ).sort((a, b) => (a.name || '').localeCompare(b.name || ''));

      let html = '';
      if (filtered.length === 0) {
        html = '<div style="font-size: 0.85rem; color: var(--muted); padding: 8px 0;">No matching controls</div>';
      } else {
        for (const sw of filtered) {
          const scopeAreas = (sw.scopes || [])
            .flatMap(s => s.areas || [])
            .map(areaId => {
              const area = allAreas.find(a => a.area_id === areaId);
              return area ? area.name : '';
            })
            .filter(Boolean);
          const areaLabel = scopeAreas.slice(0, 3).join(', ') + (scopeAreas.length > 3 ? '...' : '');
          html += `
            <div class="assign-switch-row" onclick="selectAssignSwitch('${sw.id}')">
              <span class="assign-switch-name">${sw.name}</span>
              <span class="assign-switch-area">${areaLabel}</span>
            </div>
          `;
        }
      }

      listEl.innerHTML = html;
    }

    function selectAssignSwitch(switchId) {
      assignPickerSwitch = allSwitches.find(sw => sw.id === switchId) || null;
      assignConfirmSlot = null;
      renderAssignPicker();
    }

    function assignPickerBack() {
      assignPickerSwitch = null;
      assignConfirmSlot = null;
      renderAssignPicker();
    }

    function renderAssignSlots(container) {
      const sw = assignPickerSwitch;
      if (!sw) return;

      const slots = getMagicSlots(sw.type);
      const actionRef = 'set_' + selectedMomentId;

      let html = `
        <div class="assign-picker">
          <div class="assign-slot-header">
            <button class="assign-back-btn" onclick="assignPickerBack()">&larr; Back</button>
            <span style="font-size: 0.9rem; font-weight: 500;">${sw.name}</span>
          </div>
      `;

      if (slots.length === 0) {
        html += '<div style="font-size: 0.85rem; color: var(--muted);">No magic button slots</div>';
      } else {
        for (const slot of slots) {
          const currentAction = (sw.magic_buttons || {})[slot] || '';
          const isCurrent = currentAction === actionRef;
          let currentLabel = 'Unassigned';
          if (currentAction && currentAction.startsWith('set_')) {
            const mId = currentAction.slice(4);
            currentLabel = allMoments[mId]?.name || mId;
          }

          if (isCurrent) {
            html += `
              <div class="assign-slot-row is-current" title="Already assigned to this moment">
                <span class="assign-slot-label">${formatMagicButtonEvent(slot)}</span>
                <span class="assign-slot-current" style="color: var(--accent);">${currentLabel}</span>
              </div>
            `;
          } else if (assignConfirmSlot === slot && currentAction) {
            // Show confirmation for replacing
            html += `
              <div class="assign-confirm">
                <span>Replace <strong>${currentLabel}</strong>?</span>
                <button class="assign-confirm-btn" onclick="confirmAssignSlot('${sw.id}', '${slot}')">Replace</button>
                <button class="assign-confirm-cancel" onclick="assignConfirmSlot = null; renderAssignPicker();">Cancel</button>
              </div>
            `;
          } else {
            html += `
              <div class="assign-slot-row" onclick="handleAssignSlot('${sw.id}', '${slot}', '${currentAction}')">
                <span class="assign-slot-label">${formatMagicButtonEvent(slot)}</span>
                <span class="assign-slot-current">${currentLabel}</span>
              </div>
            `;
          }
        }
      }

      html += `
          <div style="margin-top: 8px;">
            <button class="add-exception-btn" onclick="closeAssignPicker()" style="color: var(--muted2);">Cancel</button>
          </div>
        </div>
      `;

      container.innerHTML = html;
    }

    function handleAssignSlot(switchId, slot, currentAction) {
      if (currentAction && currentAction.startsWith('set_')) {
        // Slot has an existing assignment — ask for confirmation
        assignConfirmSlot = slot;
        renderAssignPicker();
      } else {
        // Slot is unassigned — assign directly
        confirmAssignSlot(switchId, slot);
      }
    }

    async function confirmAssignSlot(switchId, slot) {
      const sw = allSwitches.find(s => s.id === switchId);
      if (!sw) return;

      // Update magic_buttons locally
      if (!sw.magic_buttons) sw.magic_buttons = {};
      sw.magic_buttons[slot] = 'set_' + selectedMomentId;

      // Save to backend
      try {
        const payload = {
          name: sw.name,
          type: sw.type,
          scopes: sw.scopes,
          device_id: sw.device_id,
          indicator_light: sw.indicator_light || '',
          magic_buttons: sw.magic_buttons,
          inactive: sw.inactive || false,
          inactive_until: sw.inactive_until || null
        };

        const response = await fetch(basePath + `/api/controls/${encodeURIComponent(switchId)}/configure`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          assignPickerOpen = false;
          assignPickerSwitch = null;
          assignConfirmSlot = null;
          renderMomentEditor();
          showSaveStatus();
        } else {
          const data = await response.json();
          console.error('Failed to assign:', data.error);
        }
      } catch (err) {
        console.error('Error assigning moment:', err);
      }
    }

    // ========== Moment CRUD Helpers ==========

    function updateMomentName(name) {
      if (!moment) return;
      moment.name = name;
    }

    function updateMomentCategory(category) {
      if (!moment) return;
      moment.category = category;
    }

    function updateDefaultAction(action) {
      if (!moment) return;
      moment.default_action = action;
      renderMomentEditor();
    }

    function updateException(areaId, excObj) {
      if (!moment) return;
      if (!moment.exceptions) moment.exceptions = {};
      moment.exceptions[areaId] = excObj;
      renderMomentEditor();
    }

    function removeException(areaId) {
      if (!moment) return;
      if (moment.exceptions) {
        delete moment.exceptions[areaId];
      }
      renderMomentEditor();
    }

    async function addException() {
      if (!moment) return;

      const existingExceptions = Object.keys(moment.exceptions || {});

      const selected = await openAreaPicker({
        title: 'Add Exception',
        selected: existingExceptions,
        multi: true
      });

      if (selected && selected.length > 0) {
        if (!moment.exceptions) moment.exceptions = {};
        selected.forEach(areaId => {
          if (!moment.exceptions[areaId]) {
            moment.exceptions[areaId] = { action: newExceptionAction, timer: newExceptionTimer };
          }
        });
        renderMomentEditor();
        saveMoment();
      }
    }

    // ========== Remove Assignment ==========

    async function removeAssignment(switchId, buttonEvent) {
      const sw = allSwitches.find(s => s.id === switchId);
      if (!sw) return;

      // Remove the magic button assignment
      if (sw.magic_buttons) {
        delete sw.magic_buttons[buttonEvent];
      }

      // Save to backend
      try {
        const payload = {
          name: sw.name,
          type: sw.type,
          scopes: sw.scopes,
          device_id: sw.device_id,
          indicator_light: sw.indicator_light || '',
          magic_buttons: sw.magic_buttons || {},
          inactive: sw.inactive || false,
          inactive_until: sw.inactive_until || null
        };

        const response = await fetch(basePath + `/api/controls/${encodeURIComponent(switchId)}/configure`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          renderMomentEditor();
          showSaveStatus();
        } else {
          const data = await response.json();
          console.error('Failed to remove assignment:', data.error);
        }
      } catch (err) {
        console.error('Error removing assignment:', err);
      }
    }

    // ========== Run Moment ==========

    async function runMoment() {
      if (!selectedMomentId) return;
      const btn = document.getElementById('header-run-btn');
      if (btn) btn.classList.add('running');
      try {
        const response = await fetch(basePath + `/api/moments/${encodeURIComponent(selectedMomentId)}/run`, {
          method: 'POST'
        });
        if (!response.ok) {
          const data = await response.json();
          console.error('Failed to run moment:', data.error);
        }
      } catch (err) {
        console.error('Error running moment:', err);
      }
      setTimeout(() => { if (btn) btn.classList.remove('running'); }, 600);
    }

    // ========== Save/Load ==========

    async function saveMoment() {
      if (!selectedMomentId || !moment) return;

      try {
        const response = await fetch(basePath + `/api/moments/${encodeURIComponent(selectedMomentId)}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(moment)
        });

        if (response.ok) {
          showSaveStatus();
        } else {
          const data = await response.json();
          console.error('Failed to save:', data.error);
        }
      } catch (err) {
        console.error('Error saving moment:', err);
      }
    }

    function showSaveStatus() {
      const status = document.getElementById('save-status');
      status.classList.add('visible');
      setTimeout(() => status.classList.remove('visible'), 2000);
    }

    // ========== Icon Picker ==========

    function showIconPicker() {
      const grid = document.getElementById('icon-grid');
      const currentIcon = moment?.icon || '&#127763;';

      grid.innerHTML = MOMENT_ICONS.map(item => `
        <div class="icon-option ${item.icon === currentIcon ? 'selected' : ''}"
             onclick="selectIcon('${item.icon}')">${item.icon}</div>
      `).join('');

      document.getElementById('icon-picker-overlay').classList.add('visible');
    }

    function hideIconPicker() {
      document.getElementById('icon-picker-overlay').classList.remove('visible');
    }

    function selectIcon(icon) {
      if (!moment) return;
      moment.icon = icon;
      hideIconPicker();
      renderMomentEditor();
      saveMoment();
    }

    // Close modal on overlay click
    document.getElementById('icon-picker-overlay').addEventListener('click', (e) => {
      if (e.target.classList.contains('icon-picker-overlay')) hideIconPicker();
    });
  </script>
</body>
</html>
