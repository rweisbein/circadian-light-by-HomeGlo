<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circadian Light - Switch Map</title>
  <style>
    :root {
      --bg: #000;
      --panel: #111;
      --card: #1a1a1a;
      --accent: #feac60;
      --accent-hover: #ffc078;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --muted2: #64748b;
      --line: #334155;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Navigation */
    .nav {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 0 12px;
      display: flex;
      align-items: center;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      font-weight: 600;
      font-size: 1.1rem;
      color: var(--muted);
      margin-right: 8px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-logo {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    .nav-links {
      display: flex;
      gap: 4px;
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    .nav-link {
      padding: 8px 8px;
      color: var(--muted);
      text-decoration: none;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .nav-link:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
    }

    .nav-link.active {
      color: var(--text);
    }

    /* Nav overflow menu */
    .nav-more { background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; padding: 4px 8px; border-radius: 6px; display: none; flex-shrink: 0; letter-spacing: 2px; line-height: 1; }
    .nav-more:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-overflow { display: none; position: absolute; top: 100%; right: 12px; background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 4px 0; min-width: 140px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 200; }
    .nav-overflow.open { display: block; }
    .nav-overflow-item { display: block; padding: 10px 16px; color: var(--muted); text-decoration: none; font-size: 0.9rem; white-space: nowrap; }
    .nav-overflow-item:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-overflow-item.active { color: var(--text); }

    /* Main Content - Single Column */
    .main {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px;
    }

    /* Page header */
    .page-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .page-header a {
      color: var(--muted);
      text-decoration: none;
      font-size: 1.1rem;
      line-height: 1;
    }

    .page-title {
      font-size: 1.2rem;
      font-weight: 600;
    }

    /* Type selector */
    .type-selector {
      margin-bottom: 12px;
    }

    .type-selector select {
      width: 100%;
      padding: 10px 12px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
    }

    /* Mode toggle */
    .mode-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 14px;
    }

    .mode-toggle {
      display: flex;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .mode-btn {
      padding: 7px 14px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .mode-btn.active {
      background: var(--accent);
      color: #000;
      font-weight: 600;
    }

    .mode-bar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .copy-btn {
      padding: 7px 14px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* Collapsible cards */
    .ctrl-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }

    .ctrl-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 12px 14px;
      user-select: none;
    }

    .ctrl-card-chevron {
      display: inline-block;
      font-size: 1.1rem;
      line-height: 1;
      transition: transform 0.25s;
      color: var(--muted2);
      flex-shrink: 0;
    }

    .ctrl-card.is-open .ctrl-card-chevron {
      transform: rotate(90deg);
    }

    .ctrl-card-title {
      font-size: 1.0rem;
      font-weight: 600;
      color: var(--text);
    }

    .ctrl-card-body {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.25s ease;
    }

    .ctrl-card.is-open .ctrl-card-body {
      max-height: 2000px;
      opacity: 1;
    }

    .ctrl-card-body-inner {
      padding: 0 14px 14px;
    }

    /* Button badge (inline visual) */
    .btn-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: 2px solid var(--line);
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      background: var(--panel);
      flex-shrink: 0;
    }

    /* Unsaved indicator */
    .unsaved-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--warning);
      border-radius: 50%;
      margin-left: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .unsaved-indicator.visible {
      opacity: 1;
    }

    /* Action rows (edit mode) */
    .action-row {
      margin-bottom: 10px;
    }

    .action-row:last-child {
      margin-bottom: 0;
    }

    .action-row-label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 4px;
    }

    .action-row select {
      width: 100%;
      padding: 9px 10px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.85rem;
    }

    .action-row select:focus {
      outline: none;
      border-color: dodgerblue;
    }

    .action-row select option {
      background: var(--panel);
    }

    .action-row select optgroup {
      font-weight: 600;
      color: var(--muted);
    }

    .when-off-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      padding-left: 12px;
    }

    .when-off-label {
      font-size: 0.75rem;
      color: var(--muted2);
      white-space: nowrap;
    }

    .when-off-row select {
      flex: 1;
      padding: 7px 10px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.85rem;
    }

    /* Cheat sheet rows */
    .cheat-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 5px 0;
    }

    .cheat-row + .cheat-row {
      border-top: 1px solid rgba(255, 255, 255, 0.04);
    }

    .cheat-label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 500;
      min-width: 36px;
      flex-shrink: 0;
    }

    .cheat-action {
      font-size: 0.9rem;
      color: var(--text);
    }

    .cheat-if-off {
      font-size: 0.8rem;
      color: var(--muted2);
    }

    /* Magic summary rows — two-line left, moment right */
    .magic-summary-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
      font-size: 0.85rem;
    }

    .magic-summary-row + .magic-summary-row {
      border-top: 1px solid rgba(255, 255, 255, 0.04);
    }

    .magic-left {
      flex: 1;
      min-width: 0;
    }

    .magic-switch-name {
      color: var(--muted);
    }

    .magic-btn-slot {
      color: var(--muted2);
      font-size: 0.8rem;
      padding-left: 10px;
    }

    .magic-right {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .magic-arrow {
      color: var(--muted2);
    }

    .magic-moment {
      color: var(--text);
    }

    .muted-text {
      font-size: 0.85rem;
      color: var(--muted2);
      padding: 8px 0;
    }

    /* Cheat sheet card - always open, no pointer */
    .cheatsheet-card .ctrl-card-header {
      cursor: default;
    }

    /* Save bar */
    .save-bar {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--card);
      border: 1px solid var(--line);
      color: var(--text);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .btn-secondary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-danger {
      background: transparent;
      border: 1px solid var(--danger);
      color: var(--danger);
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.1);
    }

    /* Status Messages */
    .status-message {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      z-index: 200;
    }

    .status-message.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .status-message.success {
      background: var(--success);
      color: white;
    }

    .status-message.error {
      background: var(--danger);
      color: white;
    }

    /* Loading state */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      color: var(--muted);
    }

    /* Print Styles */
    @media print {
      .nav, .mode-bar, .save-bar { display: none; }
      .main { max-width: none; padding: 0; }
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="nav">
    <a href="./" class="nav-brand">
      <img class="nav-logo" src="./icon.png" alt="Circadian Light">
      Home
    </a>
    <div class="nav-links">
      <a href="./switches" class="nav-link active">Controls</a>
      <a href="./tune" class="nav-link">Tune</a>
      <a href="./moments" class="nav-link">Magic</a>
      <a href="./settings" class="nav-link">Settings</a>
    </div>
    <button class="nav-more" aria-label="More pages">&middot;&middot;&middot;</button>
    <div class="nav-overflow"></div>
  </nav>

  <!-- Main Content -->
  <main class="main">
    <div class="page-header">
      <a href="./switches" title="Back to Controls">&larr;</a>
      <span class="page-title">Switch Map</span>
      <span class="unsaved-indicator" id="unsaved-indicator"></span>
    </div>

    <div class="type-selector">
      <select id="switch-type-select">
        <!-- Populated by JS -->
      </select>
    </div>

    <div class="mode-bar">
      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-edit" onclick="setMode('edit')">Edit</button>
        <button class="mode-btn" id="mode-cheatsheet" onclick="setMode('cheatsheet')">Cheat Sheet</button>
      </div>
      <div class="mode-bar-right">
        <button class="copy-btn" id="copy-btn" onclick="copyCheatSheet()" style="display:none;">Copy</button>
      </div>
    </div>

    <div id="cards-container">
      <div class="loading">Loading mappings...</div>
    </div>

    <div class="save-bar" id="save-bar">
      <button class="btn btn-danger" onclick="resetToDefaults()">Reset to Defaults</button>
      <button class="btn btn-secondary" id="cancel-btn" onclick="cancelChanges()" disabled>Cancel</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveMappings()" disabled>Save</button>
    </div>
  </main>

  <!-- Status Message -->
  <div class="status-message" id="status-message"></div>

  <script src="./shared.js"></script>
  <script>
    // State
    let switchTypes = {};
    let currentSwitchType = 'hue_dimmer';
    let currentMappings = {};
    let customMappings = {};
    let actionCategories = {};
    let whenOffOptions = [];
    let hasUnsavedChanges = false;
    let currentMode = 'edit';
    let allSwitches = [];
    let allMoments = {};

    // Button labels for display
    const buttonLabels = {
      'on': '\u23FB', 'up': '\u25B2', 'down': '\u25BC', 'off': 'Hue',
      'toggle': '\u23FB', 'brightness_up': '\u25B2', 'brightness_down': '\u25BC',
      'arrow_left': '\u25C0', 'arrow_right': '\u25B6',
      'dial': '\u27F3'
    };

    // Button display names
    const buttonNames = {
      'on': 'Power', 'off': 'Hue Button', 'dial': 'Dial Button'
    };

    // Action type labels
    const actionTypeLabels = {
      'short_release': '1\u00D7 press', 'press': '1\u00D7 press',
      'double_press': '2\u00D7 press', 'triple_press': '3\u00D7 press',
      'quadruple_press': '4\u00D7 press', 'quintuple_press': '5\u00D7 press',
      'hold': 'Long press', 'rotate': 'Rotate'
    };

    // Short labels for cheat sheet
    const actionTypeShort = {
      'short_release': '1\u00D7', 'press': '1\u00D7',
      'double_press': '2\u00D7', 'triple_press': '3\u00D7',
      'quadruple_press': '4\u00D7', 'quintuple_press': '5\u00D7',
      'hold': 'Long', 'rotate': 'Rotate'
    };

    // Get displayable action types for a switch
    function getDisplayableActionTypes(typeInfo) {
      const supported = typeInfo.action_types || [];
      const result = [];
      if (supported.includes('short_release')) result.push('short_release');
      else if (supported.includes('press')) result.push('press');
      if (supported.includes('double_press')) result.push('double_press');
      if (supported.includes('triple_press')) result.push('triple_press');
      if (supported.includes('quadruple_press')) result.push('quadruple_press');
      if (supported.includes('quintuple_press')) result.push('quintuple_press');
      if (supported.includes('hold')) result.push('hold');
      if (supported.includes('rotate')) result.push('rotate');
      return result;
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
      await loadData();
      renderSwitchTypeSelect();
      render();

      window.addEventListener('beforeunload', (e) => {
        if (hasUnsavedChanges) {
          e.preventDefault();
          e.returnValue = '';
        }
      });
    });

    async function loadData() {
      try {
        const [mapRes, actionsRes, switchesRes, momentsRes] = await Promise.all([
          fetch('./api/switchmap'),
          fetch('./api/switchmap/actions'),
          fetch('./api/switches'),
          fetch('./api/moments')
        ]);

        if (mapRes.ok) {
          const data = await mapRes.json();
          switchTypes = data.mappings || {};
          customMappings = data.custom_mappings || {};
        }

        if (actionsRes.ok) {
          const data = await actionsRes.json();
          actionCategories = data.categories || {};
          whenOffOptions = data.when_off_options || [];
        }

        if (switchesRes.ok) {
          const data = await switchesRes.json();
          allSwitches = data.switches || [];
        }

        if (momentsRes.ok) {
          const data = await momentsRes.json();
          allMoments = data.moments || {};
        }

        if (switchTypes[currentSwitchType]) {
          currentMappings = { ...switchTypes[currentSwitchType].effective_mapping };
        }
      } catch (err) {
        console.error('Error loading data:', err);
        showStatus('Error loading data', 'error');
      }
    }

    function renderSwitchTypeSelect() {
      const select = document.getElementById('switch-type-select');
      select.innerHTML = Object.entries(switchTypes).map(([id, info]) => `
        <option value="${id}" ${id === currentSwitchType ? 'selected' : ''}>${info.name}</option>
      `).join('');

      select.addEventListener('change', (e) => {
        const newType = e.target.value;
        if (hasUnsavedChanges) {
          if (!confirm('You have unsaved changes. Discard them?')) {
            e.target.value = currentSwitchType;
            return;
          }
        }
        currentSwitchType = newType;
        if (switchTypes[currentSwitchType]) {
          currentMappings = { ...switchTypes[currentSwitchType].effective_mapping };
        }
        hasUnsavedChanges = false;
        render();
      });
    }

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('mode-edit').classList.toggle('active', mode === 'edit');
      document.getElementById('mode-cheatsheet').classList.toggle('active', mode === 'cheatsheet');
      document.getElementById('copy-btn').style.display = mode === 'cheatsheet' ? '' : 'none';
      document.getElementById('save-bar').style.display = mode === 'edit' ? '' : 'none';
      render();
    }

    function render() {
      if (currentMode === 'edit') {
        renderEditMode();
      } else {
        renderCheatSheet();
      }
      checkForChanges();
    }

    function toggleCard(id) {
      const el = document.getElementById(id);
      if (el) el.classList.toggle('is-open');
    }

    // ── Edit Mode ──

    function renderEditMode() {
      const container = document.getElementById('cards-container');
      const typeInfo = switchTypes[currentSwitchType];
      if (!typeInfo) {
        container.innerHTML = '<div class="loading">No switch type selected</div>';
        return;
      }

      const buttons = typeInfo.buttons || ['on', 'up', 'down', 'off'];
      const availableActionTypes = getDisplayableActionTypes(typeInfo);

      container.innerHTML = buttons.map(btn => {
        const cardId = 'card-' + btn;
        const buttonName = buttonNames[btn] || btn.charAt(0).toUpperCase() + btn.slice(1);
        const badge = buttonLabels[btn] || btn;

        const rows = availableActionTypes.map(actionType => {
          const eventKey = `${btn}_${actionType}`;
          const mapping = currentMappings[eventKey];

          let actionValue = null;
          let whenOffValue = null;
          if (typeof mapping === 'object' && mapping !== null) {
            actionValue = mapping.action;
            whenOffValue = mapping.when_off;
          } else {
            actionValue = mapping;
          }

          const supportsWhenOff = isAdjustmentAction(actionValue);
          const label = actionTypeLabels[actionType] || actionType;

          return `
            <div class="action-row">
              <div class="action-row-label">${label}</div>
              <select onchange="updateMapping('${eventKey}', this.value)" data-event="${eventKey}">
                ${buildActionOptions(actionValue, actionType)}
              </select>
              ${supportsWhenOff ? `
                <div class="when-off-row">
                  <span class="when-off-label">if off:</span>
                  <select onchange="updateWhenOff('${eventKey}', this.value)">
                    ${buildWhenOffOptions(whenOffValue)}
                  </select>
                </div>
              ` : ''}
            </div>
          `;
        }).join('');

        return `
          <div class="ctrl-card is-open" id="${cardId}">
            <div class="ctrl-card-header" onclick="toggleCard('${cardId}')">
              <span class="ctrl-card-chevron">\u203A</span>
              <span class="btn-badge">${badge}</span>
              <span class="ctrl-card-title">${buttonName}</span>
            </div>
            <div class="ctrl-card-body"><div class="ctrl-card-body-inner">
              ${rows}
            </div></div>
          </div>
        `;
      }).join('');
    }

    // ── Cheat Sheet Mode ──

    function renderCheatSheet() {
      const container = document.getElementById('cards-container');
      const typeInfo = switchTypes[currentSwitchType];
      if (!typeInfo) {
        container.innerHTML = '<div class="loading">No switch type selected</div>';
        return;
      }

      const buttons = typeInfo.buttons || ['on', 'up', 'down', 'off'];
      const availableActionTypes = getDisplayableActionTypes(typeInfo);
      let html = '';

      for (const btn of buttons) {
        const buttonName = buttonNames[btn] || btn.charAt(0).toUpperCase() + btn.slice(1);
        const badge = buttonLabels[btn] || btn;

        const rows = [];
        for (const actionType of availableActionTypes) {
          const eventKey = `${btn}_${actionType}`;
          const mapping = currentMappings[eventKey];

          let actionValue = null;
          let whenOffValue = null;
          if (typeof mapping === 'object' && mapping !== null) {
            actionValue = mapping.action;
            whenOffValue = mapping.when_off;
          } else {
            actionValue = mapping;
          }

          if (!actionValue) continue;

          const label = actionTypeShort[actionType] || actionType;
          let actionText = getActionLabel(actionValue);

          if (whenOffValue) {
            actionText += ` <span class="cheat-if-off">(if off: ${getActionLabel(whenOffValue)})</span>`;
          }

          // Check if this is a magic action
          if (actionValue === 'magic') {
            actionText = formatMagicLabel('Magic');
          }

          rows.push(`
            <div class="cheat-row">
              <span class="cheat-label">${label}</span>
              <span class="cheat-action">${actionText}</span>
            </div>
          `);
        }

        if (rows.length === 0) continue;

        html += `
          <div class="ctrl-card is-open cheatsheet-card">
            <div class="ctrl-card-header">
              <span class="btn-badge">${badge}</span>
              <span class="ctrl-card-title">${buttonName}</span>
            </div>
            <div class="ctrl-card-body"><div class="ctrl-card-body-inner">
              ${rows.join('')}
            </div></div>
          </div>
        `;
      }

      // Magic Button Summary
      html += renderMagicSummary();

      container.innerHTML = html;
    }

    function renderMagicSummary() {
      const typeSwitches = allSwitches.filter(s => s.type === currentSwitchType);
      const rows = [];

      for (const sw of typeSwitches) {
        const mb = sw.magic_buttons || {};
        for (const [slot, actionValue] of Object.entries(mb)) {
          if (!actionValue) continue;
          const parts = slot.split('_');
          // slot format: "on_press", "down_hold", etc.
          const btnKey = parts.slice(0, -1).join('_');
          const eventType = parts[parts.length - 1];
          let btnName = buttonNames[btnKey] || (btnKey.charAt(0).toUpperCase() + btnKey.slice(1));
          btnName = btnName.replace(/ Button$/, '');
          const eventLabel = {
            'press': '1\u00D7', 'short_release': '1\u00D7', 'double_press': '2\u00D7',
            'triple_press': '3\u00D7', 'hold': 'Long'
          }[eventType] || eventType;

          const momentText = formatMagicAction(actionValue);

          rows.push(`
            <div class="magic-summary-row">
              <div class="magic-left">
                <div class="magic-switch-name">${sw.name}</div>
                <div class="magic-btn-slot">${btnName} ${eventLabel}</div>
              </div>
              <div class="magic-right">
                <span class="magic-arrow">\u2192</span>
                <span class="magic-moment">${momentText}</span>
              </div>
            </div>
          `);
        }
      }

      const body = rows.length > 0
        ? rows.join('')
        : '<div class="muted-text">No magic buttons assigned</div>';

      return `
        <div class="ctrl-card is-open cheatsheet-card" id="magic-summary">
          <div class="ctrl-card-header">
            <span class="ctrl-card-title">\u2726 Magic Button Assignments</span>
          </div>
          <div class="ctrl-card-body"><div class="ctrl-card-body-inner">
            ${body}
          </div></div>
        </div>
      `;
    }

    // ── Helpers ──

    function getActionLabel(actionId) {
      if (!actionId) return 'No Action';
      // Check if it's a magic/moment action
      if (actionId.startsWith('set_')) {
        return formatMagicAction(actionId);
      }
      for (const [cat, actions] of Object.entries(actionCategories)) {
        const found = actions.find(a => a.id === actionId);
        if (found) return found.label;
      }
      return actionId;
    }

    function formatMagicAction(actionValue) {
      if (!actionValue) return '';
      if (actionValue.startsWith('set_')) {
        const momentId = actionValue.replace('set_', '');
        const moment = allMoments[momentId];
        if (moment) {
          const icon = moment.icon || '';
          return `${icon ? icon + ' ' : ''}${moment.name}`;
        }
        return momentId;
      }
      return actionValue;
    }

    function formatMagicLabel(label) {
      return label;
    }

    function isAdjustmentAction(action) {
      const adjustmentActions = [
        'step_up', 'step_down', 'step_up_2', 'step_down_2', 'step_up_3', 'step_down_3',
        'bright_up', 'bright_down', 'bright_up_2', 'bright_down_2', 'bright_up_3', 'bright_down_3',
        'color_up', 'color_down'
      ];
      return adjustmentActions.includes(action);
    }

    function buildActionOptions(selectedValue, actionType) {
      let html = '';
      const dialOnly = actionType === 'rotate';
      for (const [category, actions] of Object.entries(actionCategories)) {
        if (dialOnly && category !== 'Dial') continue;
        if (!dialOnly && category === 'Dial') continue;
        html += `<optgroup label="${category}">`;
        for (const action of actions) {
          const value = action.id === null ? '' : action.id;
          const selected = (selectedValue === action.id || (selectedValue === null && action.id === null)) ? 'selected' : '';
          html += `<option value="${value}" ${selected}>${action.label}</option>`;
        }
        html += '</optgroup>';
      }
      return html;
    }

    function buildWhenOffOptions(selectedValue) {
      return whenOffOptions.map(opt => {
        const value = opt.id === null ? '' : opt.id;
        const selected = (selectedValue === opt.id || (selectedValue === null && opt.id === null)) ? 'selected' : '';
        return `<option value="${value}" ${selected}>${opt.label}</option>`;
      }).join('');
    }

    // ── Mutations ──

    function updateMapping(eventKey, value) {
      const newAction = value === '' ? null : value;
      const currentValue = currentMappings[eventKey];

      let newMapping;
      if (typeof currentValue === 'object' && currentValue !== null && isAdjustmentAction(newAction)) {
        newMapping = { action: newAction, when_off: currentValue.when_off };
      } else {
        newMapping = newAction;
      }

      currentMappings[eventKey] = newMapping;
      checkForChanges();
      renderEditMode();
    }

    function updateWhenOff(eventKey, value) {
      const whenOffAction = value === '' ? null : value;
      const currentValue = currentMappings[eventKey];

      let mainAction;
      if (typeof currentValue === 'object' && currentValue !== null) {
        mainAction = currentValue.action;
      } else {
        mainAction = currentValue;
      }

      currentMappings[eventKey] = { action: mainAction, when_off: whenOffAction };
      checkForChanges();
      renderEditMode();
    }

    function checkForChanges() {
      const typeInfo = switchTypes[currentSwitchType];
      if (!typeInfo) return;

      const saved = typeInfo.effective_mapping || {};
      hasUnsavedChanges = false;

      for (const [key, value] of Object.entries(currentMappings)) {
        if (!isEqual(value, saved[key])) {
          hasUnsavedChanges = true;
          break;
        }
      }

      if (!hasUnsavedChanges) {
        for (const key of Object.keys(saved)) {
          if (!isEqual(currentMappings[key], saved[key])) {
            hasUnsavedChanges = true;
            break;
          }
        }
      }

      document.getElementById('unsaved-indicator').classList.toggle('visible', hasUnsavedChanges);
      document.getElementById('save-btn').disabled = !hasUnsavedChanges;
      document.getElementById('cancel-btn').disabled = !hasUnsavedChanges;
    }

    function isEqual(a, b) {
      if (a === b) return true;
      if (a === null && b === undefined) return true;
      if (a === undefined && b === null) return true;
      if (typeof a === 'object' && typeof b === 'object') {
        return JSON.stringify(a) === JSON.stringify(b);
      }
      return false;
    }

    async function saveMappings() {
      const typeInfo = switchTypes[currentSwitchType];
      if (!typeInfo) return;

      const defaults = typeInfo.default_mapping || {};
      const customForType = {};

      for (const [key, value] of Object.entries(currentMappings)) {
        const defaultValue = defaults[key];
        if (!isEqual(value, defaultValue)) {
          customForType[key] = value;
        }
      }

      const allCustom = { ...customMappings };
      if (Object.keys(customForType).length > 0) {
        allCustom[currentSwitchType] = customForType;
      } else {
        delete allCustom[currentSwitchType];
      }

      try {
        const res = await fetch('./api/switchmap', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(allCustom)
        });

        if (res.ok) {
          customMappings = allCustom;

          if (switchTypes[currentSwitchType]) {
            const defs = switchTypes[currentSwitchType].default_mapping || {};
            const effective = { ...defs };
            if (allCustom[currentSwitchType]) {
              Object.assign(effective, allCustom[currentSwitchType]);
            }
            switchTypes[currentSwitchType].effective_mapping = effective;
            switchTypes[currentSwitchType].has_custom = !!allCustom[currentSwitchType];
          }

          hasUnsavedChanges = false;
          document.getElementById('unsaved-indicator').classList.remove('visible');
          document.getElementById('save-btn').disabled = true;
          document.getElementById('cancel-btn').disabled = true;
          showStatus('Mappings saved', 'success');
        } else {
          const data = await res.json();
          showStatus(data.error || 'Failed to save', 'error');
        }
      } catch (err) {
        console.error('Error saving mappings:', err);
        showStatus('Error saving mappings', 'error');
      }
    }

    function resetToDefaults() {
      if (!confirm('Reset all mappings for this switch type to defaults?')) return;

      const typeInfo = switchTypes[currentSwitchType];
      if (!typeInfo) return;

      currentMappings = { ...typeInfo.default_mapping };
      checkForChanges();
      renderEditMode();
    }

    function cancelChanges() {
      const typeInfo = switchTypes[currentSwitchType];
      if (!typeInfo) return;

      currentMappings = { ...typeInfo.effective_mapping };
      hasUnsavedChanges = false;
      checkForChanges();
      renderEditMode();
    }

    // ── Copy to Clipboard ──

    function copyCheatSheet() {
      const typeInfo = switchTypes[currentSwitchType];
      if (!typeInfo) return;

      const buttons = typeInfo.buttons || ['on', 'up', 'down', 'off'];
      const availableActionTypes = getDisplayableActionTypes(typeInfo);
      let lines = [];

      lines.push(typeInfo.name);
      lines.push('='.repeat(typeInfo.name.length));
      lines.push('');

      for (const btn of buttons) {
        const buttonName = buttonNames[btn] || btn.charAt(0).toUpperCase() + btn.slice(1);
        const badge = buttonLabels[btn] || btn;
        const sectionRows = [];

        for (const actionType of availableActionTypes) {
          const eventKey = `${btn}_${actionType}`;
          const mapping = currentMappings[eventKey];

          let actionValue = null;
          let whenOffValue = null;
          if (typeof mapping === 'object' && mapping !== null) {
            actionValue = mapping.action;
            whenOffValue = mapping.when_off;
          } else {
            actionValue = mapping;
          }

          if (!actionValue) continue;

          const label = actionTypeLabels[actionType] || actionType;
          let actionText = getActionLabelPlain(actionValue);
          if (whenOffValue) {
            actionText += ` (if off: ${getActionLabelPlain(whenOffValue)})`;
          }
          sectionRows.push(`  ${label}: ${actionText}`);
        }

        if (sectionRows.length === 0) continue;

        lines.push(`${badge} ${buttonName}`);
        lines.push(...sectionRows);
        lines.push('');
      }

      // Magic summary
      const typeSwitches = allSwitches.filter(s => s.type === currentSwitchType);
      const magicRows = [];
      for (const sw of typeSwitches) {
        const mb = sw.magic_buttons || {};
        for (const [slot, actionValue] of Object.entries(mb)) {
          if (!actionValue) continue;
          const parts = slot.split('_');
          const btnKey = parts.slice(0, -1).join('_');
          const eventType = parts[parts.length - 1];
          let btnName = buttonNames[btnKey] || (btnKey.charAt(0).toUpperCase() + btnKey.slice(1));
          btnName = btnName.replace(/ Button$/, '');
          const eventLabel = {
            'press': '1\u00D7', 'short_release': '1\u00D7', 'double_press': '2\u00D7',
            'triple_press': '3\u00D7', 'hold': 'Long'
          }[eventType] || eventType;
          const momentText = formatMagicActionPlain(actionValue);
          magicRows.push(`  ${sw.name}: ${btnName} ${eventLabel}  \u2192  ${momentText}`);
        }
      }

      if (magicRows.length > 0) {
        lines.push('Magic Button Assignments');
        lines.push(...magicRows);
        lines.push('');
      }

      const text = lines.join('\n').trimEnd();
      // Use textarea fallback for Safari compatibility
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand('copy');
        showStatus('Copied!', 'success');
      } catch (e) {
        // Fall back to async clipboard API
        navigator.clipboard.writeText(text).then(() => {
          showStatus('Copied!', 'success');
        }).catch(() => {
          showStatus('Copy failed', 'error');
        });
      }
      document.body.removeChild(ta);
    }

    function getActionLabelPlain(actionId) {
      if (!actionId) return 'No Action';
      if (actionId.startsWith('set_')) {
        return formatMagicActionPlain(actionId);
      }
      for (const [cat, actions] of Object.entries(actionCategories)) {
        const found = actions.find(a => a.id === actionId);
        if (found) return found.label;
      }
      return actionId;
    }

    function formatMagicActionPlain(actionValue) {
      if (!actionValue) return '';
      if (actionValue.startsWith('set_')) {
        const momentId = actionValue.replace('set_', '');
        const moment = allMoments[momentId];
        if (moment) return moment.name;
        return momentId;
      }
      return actionValue;
    }

    function showStatus(message, type = 'success') {
      const el = document.getElementById('status-message');
      el.textContent = message;
      el.className = `status-message ${type} visible`;
      setTimeout(() => {
        el.classList.remove('visible');
      }, 3000);
    }
  </script>
</body>
</html>
