<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    // Ensure trailing slash so ./relative links resolve correctly in HA dashboard iframes
    if (!window.location.pathname.endsWith('/')) {
      window.history.replaceState(null, '', window.location.pathname + '/' + window.location.search + window.location.hash);
    }
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circadian Light - Home</title>
  <link rel="stylesheet" href="./shared.css">
  <style>
    :root {
      --bg: #000;
      --panel: #111;
      --card: #1a1a1a;
      --accent: #feac60;
      --accent-hover: #ffc078;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --muted2: #64748b;
      --line: #334155;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Navigation */
    .nav {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 0 12px;
      display: flex;
      align-items: center;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      font-weight: 600;
      font-size: 1.1rem;
      color: var(--muted);
      margin-right: 8px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-brand.active {
      color: var(--text);
    }

    .nav-logo {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    .nav-links {
      display: flex;
      gap: 4px;
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    .nav-link {
      padding: 8px 8px;
      color: var(--muted);
      text-decoration: none;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .nav-link:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
    }

    .nav-link.active {
      color: var(--text);
    }


    /* Main Content */
    .main {
      /* Match controls page (switches.html .main: 750px) so home and
         controls feel like the same app on desktop. 750 also keeps the
         slider narrow enough that the right-aligned readout and schedule
         pill stack above/below it, matching mobile. */
      max-width: 750px;
      margin: 0 auto;
      padding: 12px 12px 24px;
    }

    .page-header {
      margin-bottom: 24px;
    }

    .page-title {
      font-size: 1.5rem;
      font-weight: 600;
    }

    /* Areas Table */
    .areas-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .areas-table th {
      text-align: left;
      padding: 12px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      transition: color 0.2s;
    }

    .areas-table th:hover {
      color: var(--text);
    }

    .areas-table th.sorted {
      color: var(--accent);
    }

    .areas-table th .sort-arrow {
      margin-left: 6px;
      opacity: 0.5;
    }

    .areas-table th.sorted .sort-arrow {
      opacity: 1;
    }

    .areas-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      font-size: 0.9rem;
    }

    .areas-table tr:last-child td {
      border-bottom: none;
    }

    .areas-table tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
    }

    .empty-state-title {
      font-size: 1.1rem;
      margin-bottom: 8px;
      color: var(--text);
    }

    .empty-state-text {
      font-size: 0.9rem;
    }

    /* Loading State */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      color: var(--muted);
    }

    .timer-fade { color: #e2e8f0; animation: timer-motion-flash 1.4s ease-in-out infinite; }

    /* Status badges */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .status-on {
      background: rgba(34, 197, 94, 0.15);
      color: var(--success);
    }

    .status-off {
      background: rgba(148, 163, 184, 0.15);
      color: var(--muted);
    }

    .status-frozen {
      background: rgba(99, 179, 237, 0.15);
      color: #63b3ed;
    }

    /* Header with filter */
    .th-with-filter {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .th-title-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .header-filter {
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      font-size: 0.75rem;
      font-weight: normal;
      cursor: pointer;
      width: 100%;
    }

    .header-filter:focus {
      outline: none;
      border-color: dodgerblue;
    }

    /* Brightness/Color display */
    .lighting-info {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }

    .brightness-value,
    .kelvin-value {
      /* Inherit color from row */
    }

    /* Buttons */
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary {
      background: var(--card);
      border: 1px solid var(--line);
      color: var(--text);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* Clickable rows */
    .areas-table tbody tr {
      cursor: pointer;
    }


    /* Timer styles (shared with homepage) */
    .timer-motion {
      color: #e2e8f0;
      /* Slower than the other status flashes (fade/boost at 1.4s) — motion is
         a passive "auto-off pending" state, not a fresh action, so a calmer
         breath reads as ambient rather than urgent. */
      animation: timer-motion-flash 2.5s ease-in-out infinite;
    }

    .timer-boost {
      color: #e2e8f0;
      opacity: 0.9;
    }
    .timer-boost-flash {
      animation: timer-motion-flash 1.4s ease-in-out infinite;
    }

    .timer-frozen {
      color: #63b3ed;
      opacity: 1;
    }

    .timer-alarm {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 1px 7px;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      color: inherit;
      font-size: 0.78rem;
      font-weight: 500;
      text-decoration: none;
      white-space: nowrap;
    }
    /* On-rows have a warm bg + dark text — use a dark transparent chip there */
    .area-row:not(.area-row-off) .timer-alarm {
      background: rgba(0,0,0,0.12);
    }
    .timer-alarm-rel {
      opacity: 0.65;
      font-size: 0.88em;
      font-variant-numeric: tabular-nums;
    }

    .timer-warning {
      color: #e6a817;
      animation: timer-warning-pulse 1s ease-in-out infinite;
    }

    /* Symmetric breath — fully visible at 0%/100%, ~35% at midpoint, smooth
       ease-in-out across a 1.4s period. Mirrors `try-it-icon-pulse` in
       rhythm-design.html so home-page status flashes feel like the same
       family as the broadcast icon. The previous 0→1 alternate animation
       hit fully invisible at the trough and read as a hard blink. */
    @keyframes timer-motion-flash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    @keyframes timer-warning-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    /* Area row - div-based for proper shading like modal header */
    .area-row {
      --row-bg: var(--card);
      --row-text: var(--text);
      --row-fill: 0;
      display: flex;
      align-items: center;
      padding: 2px 8px 2px 8px;
      gap: 8px;
      background: var(--row-bg);
      color: var(--row-text);
      border-bottom: 1px solid var(--line);
      position: relative;
      overflow: hidden;
    }

    .area-row:last-child {
      border-bottom: none;
    }

    .area-row:hover {
      background: color-mix(in srgb, var(--row-bg), white 3%);
    }

    /* Uniform glow overlay */
    .area-row::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.12);
      opacity: var(--row-fill);
      pointer-events: none;
    }

    .area-row > * {
      position: relative;
      z-index: 1;
    }

    /* Circadian-off row state */
    .area-row.circadian-off {
      cursor: pointer;
      color: var(--muted2);
    }

    .area-row.circadian-off .area-row-name {
      opacity: 0.45;
    }

    .circadian-enable-cta {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-left: auto;
      color: var(--accent);
      font-size: 0.78rem;
      white-space: nowrap;
      opacity: 0.6;
      transition: opacity 0.2s;
      padding: 6px 10px;
      border: 1px dashed rgba(254, 172, 96, 0.3);
      border-radius: 6px;
    }

    .area-row.circadian-off:hover .circadian-enable-cta {
      opacity: 1;
    }

    .circadian-enable-cta svg {
      width: 14px;
      height: 14px;
    }

    .area-row-name {
      min-width: 0;
      font-size: 1.35rem;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }

    .phase-midpoint {
      font-size: 0.9rem;
      opacity: 0.8;
      white-space: nowrap;
    }

    /* Active status (row 1, right of area name) */
    .row-active-status {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
      color: #e2e8f0;
      white-space: nowrap;
      flex-shrink: 0;
      margin-right: 16px;
    }
    .row-active-status:empty { display: none; }
    .row-active-status > span { background: rgba(0,0,0,0.5); border-radius: 3px; padding: 1px 5px; }

    /* Schedule row (row 3, below slider) */
    .row-status-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 16px 3px 16px;
    }

    .row-schedule-left {
      font-size: 0.82rem;
      opacity: 0.8;
      white-space: nowrap;
      flex-shrink: 0;
      margin-right: auto;
    }
    .row-schedule-left:empty { display: none; }

    .row-schedule-right {
      font-size: 0.9rem;
      color: inherit;
      opacity: 0.7;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }
    .row-schedule-right:empty { display: none; }

    /* Row middle: stacked name + slider column */
    .row-middle {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
      min-width: 0;
      padding-bottom: 1px;
    }

    .row-middle-top {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 2px;
    }

    .row-status-sym {
      font-size: 0.6rem;
      opacity: 0.7;
      padding: 0 3px;
      border-radius: 3px;
      background: rgba(0,0,0,0.3);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Horizontal slider track — track not tappable, thumb is draggable */
    .row-slider-track {
      height: 0;
      position: relative;
      pointer-events: none;
      touch-action: none;
      padding: 10px 0;
      margin: 0 16px;
    }

    /* Slider fills the row middle — readout (above) and schedule pill (below)
       align vertically with the slider's right edge, matching mobile layout. */

    /* Phase 1: off rows are single-line — schedule pill inlines into the name row. */
    .area-row-off .row-middle-top {
      gap: 6px;
      align-items: center;
    }
    .row-off-flex {
      flex: 1;
      min-width: 0;
    }
    .area-row-off .row-schedule-right {
      color: var(--text);
      opacity: 0.7;
      padding-right: 8px;
    }

    .row-slider-track::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 4px;
      transform: translateY(-50%);
      border-radius: 2px;
      background: rgba(0,0,0,0.35);
      box-shadow: 0 0.5px 0 rgba(255,255,255,0.15);
    }

    .row-slider-fill {
      display: none;
    }

    .row-slider-thumb {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 44px;
      height: 19px;
      border-radius: 9px 9px 6px 6px;
      background: rgba(255,255,255,0.9);
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
      pointer-events: auto;
      cursor: pointer;
      touch-action: none;
      transition: left 0.15s;
    }

    .row-slider-thumb.dragging {
      transition: none;
    }

    /* Ghost thumb: faint outlined duplicate of the pill at drag start X,
       stays put while the live thumb follows the finger. Hidden by default,
       revealed only while dragging. Gives visual anchoring for the delta. */
    .row-slider-thumb-ghost {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 44px;
      height: 19px;
      border-radius: 9px 9px 6px 6px;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.55);
      pointer-events: none;
      display: none;
    }
    .row-slider-track.dragging .row-slider-thumb-ghost {
      display: block;
    }

    /* Drag-delta fill: faint band stretched between ghost and live thumb.
       Reinforces direction of change (brightening vs dimming) and the
       magnitude of the delta at a glance. */
    .row-slider-fill-drag {
      position: absolute;
      top: 50%;
      height: 6px;
      transform: translateY(-50%);
      border-radius: 3px;
      background: rgba(255,255,255,0.25);
      pointer-events: none;
      display: none;
    }
    .row-slider-track.dragging .row-slider-fill-drag {
      display: block;
    }

    /* Inline target-% label in row header (right of area name). Only visible
       while a drag is active on this row's slider; disappears on release. */
    .row-drag-value {
      margin-left: 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--row-text, var(--text));
      opacity: 0.85;
      display: none;
      flex-shrink: 0;
    }
    .area-row.slider-dragging .row-drag-value {
      display: inline;
    }
    /* Suppress reset chip during drag so the inline target % can use the
       horizontal space (reset isn't tappable mid-drag anyway). Reappears on
       release if the area is still dirty. */
    .area-row.slider-dragging .mismatch-dot-area {
      display: none;
    }

    /* Row control buttons - horizontal row */
    .row-controls {
      display: inline-flex;
      gap: 2px;
      align-items: center;
      flex-shrink: 0;
    }

    .row-controls-pill {
      background: rgba(0,0,0,0.5);
      padding: 2px;
      border-radius: 8px;
      display: flex;
      align-items: center;
    }

    .row-step-stack {
      display: inline-flex;
      flex-direction: row;
      gap: 2px;
    }
    .row-step-stack .row-btn {
      width: 28px;
      height: 28px;
      border-radius: 3px;
    }

    .row-step-stack .row-btn svg {
      width: 16px;
      height: 14px;
    }

    .row-controls-left {
      display: inline-flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .row-btn {
      width: 28px;
      height: 28px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(30,30,30,0.9);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      padding: 0;
    }

    .row-btn:hover {
      border-color: rgba(255,255,255,0.4);
      background: rgba(50,50,50,0.9);
    }

    /* Active row button (area-row power) — high-contrast inversion (white fill,
       black icon) reads as "lit up" without relying on the orange accent.
       Dark border keeps the button's edge visible on light-tinted card
       backgrounds (e.g. cream tint when warm CT × high brightness). */
    .row-btn.active {
      background: #fff;
      color: #000;
      border-color: rgba(0,0,0,0.4);
    }
    .row-btn.active:hover {
      background: rgba(255,255,255,0.92);
      border-color: rgba(0,0,0,0.55);
    }

    /* Zone-level power button — same inversion idiom, hollow off / solid white on. */
    .row-controls-left .row-btn {
      border-radius: 50%;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.35);
      color: var(--muted);
    }
    .row-controls-left .row-btn:hover {
      border-color: var(--text);
      background: rgba(255,255,255,0.08);
    }
    .row-controls-left .row-btn.active {
      background: #fff;
      border-color: rgba(0,0,0,0.4);
      color: #000;
    }
    .row-controls-left .row-btn.active:hover {
      background: rgba(255,255,255,0.92);
      border-color: rgba(0,0,0,0.55);
    }
    .row-controls-left .row-btn svg {
      width: 13px;
      height: 13px;
    }

    .row-btn svg {
      width: 14px;
      height: 14px;
    }

    /* On/Off section headers */
    /* Zone group headers */
    .zone-group {
      margin-bottom: 16px;
    }

    @media (min-width: 768px) {
      .zone-group,
      .home-toolbar,
      .edit-toolbar {
        /* Inner content fills .main (capped at 750px) — the inner cap is
           redundant now, kept here so a future .main expansion stays bounded. */
        max-width: 100%;
      }
    }

    .zone-group:last-child {
      margin-bottom: 0;
    }

    .zone-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 8px 8px 8px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px 8px 0 0;
      user-select: none;
      transition: background 0.15s;
      position: relative;
      z-index: 2;
    }

    .zone-header-sticky {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      pointer-events: auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .zone-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.12);
      opacity: var(--header-fill, 0);
      pointer-events: none;
      border-radius: 8px 8px 0 8px;
    }

    .zone-header > * {
      position: relative;
      z-index: 1;
    }

    .zone-header:hover {
      background: rgba(255,255,255,0.05);
    }
    .zone-name-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
      flex: 1;
      min-width: 0;
      gap: 2px;
    }
    .zone-type-chip {
      font-size: 0.54rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 1px 6px;
      border: 1px solid currentColor;
      border-radius: 10px;
      opacity: 0.55;
      white-space: nowrap;
      line-height: 1.4;
    }
    .phase-midpoint-delta {
      opacity: 0.55;
      font-size: 0.85em;
      font-variant-numeric: tabular-nums;
      margin-left: 3px;
    }
    .zone-label-sub {
      font-size: 1.05rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      opacity: 0.85;
      margin-top: 1px;
    }
    .zone-phase-label {
      font-size: 0.9rem;
      font-weight: 400;
      opacity: 0.7;
      white-space: nowrap;
      flex-shrink: 0;
      margin-left: 6px;
    }
    .zone-header .row-controls {
      min-width: 58px;
      justify-content: flex-end;
    }
    .zone-rhythm-link {
      font-size: 1.45rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
      cursor: pointer;
    }
    .zone-rhythm-link:hover {
      opacity: 0.7;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
    }

    .zone-header.collapsed {
      border-radius: 8px;
    }

    .zone-header.no-tint {
      background: var(--bg);
    }

    .zone-header.no-tint::before {
      display: none;
    }

    .zone-header.no-tint:hover {
      background: rgba(255,255,255,0.03);
    }

    .zone-chevron-tap {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: inherit;
      opacity: 0.55;
      transition: opacity 0.15s;
      flex-shrink: 0;
      padding: 4px;
    }

    .zone-chevron-tap:hover {
      opacity: 1;
    }

    .zone-chevron {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      font-size: 1.05rem;
      line-height: 1;
      color: inherit;
      transform: rotate(0deg);
      transition: transform 0.25s;
      flex-shrink: 0;
      box-sizing: border-box;
    }

    .zone-header:not(.collapsed) .zone-chevron {
      transform: rotate(90deg);
    }

    /* Phase 1: bigger left-side zone chevron */
    .zone-chevron-big-tap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      cursor: pointer;
      color: inherit;
      opacity: 0.7;

    <!-- Areas grouped by zone -->

    </div>
  </main>

  <script>
    // State
    let areas = [];
    let areaStatus = {};
    let zoneStates = {};
    let viewMode = 'custom'; // 'custom', 'alpha', 'onoff'
    // Whether the view-segments pill bar is expanded (showing all options)
    // vs. collapsed (showing only the active pill). Reset on render-time
    // by using a module variable so periodic re-renders preserve state.
    let _viewSegExpanded = false;
    // Phase 2: action mode pill state — 'brightness' | 'color' | 'bed'
    let homePillMode = 'brightness';
    let cachedConfig = null;
    let cachedSunTimes = null; // { sunrise, sunset, solarNoon, solarMid } in local hours
    let currentMode = 'view'; // 'view' | 'organize'
    let cachedGlozones = null; // raw glozone data for edit mode ordering
    let homeRefreshTimer = null;     // Home page card refresh timer
    let homeTickTimer = null;        // 1s home page timer countdown tick
    let sliderDragging = false;      // Guards renderAreas during row button actions
    let homeNameEditing = false;     // Guards renderAreas while inline-editing the home name

    // ============================================================
    // Circadian Calculation Functions (for row shading)
    // ============================================================

    const SPEED_TO_SLOPE = [0, 0.4, 0.6, 0.8, 1.0, 1.3, 1.7, 2.3, 3.0, 4.0, 5.5, 30.0, 60.0];

    function logistic(x, midpoint, slope, y0, y1) {
      try {
        const expVal = Math.exp(-slope * (x - midpoint));
        return y0 + (y1 - y0) / (1 + expVal);
      } catch {
        return slope * (x - midpoint) > 0 ? y1 : y0;
      }
    }

    function wrap24(x) {
      return ((x % 24) + 24) % 24;
    }

    function getWindowWeight(hour, windowStart, windowEnd, fadeHrs) {
      const h = wrap24(hour);
      let inWindow = false;
      let distFromStart = 0;
      let distToEnd = 0;

      if (windowStart > windowEnd) {
        inWindow = h >= windowStart || h <= windowEnd;
        if (inWindow) {
          distFromStart = h >= windowStart ? (h - windowStart) : (h + 24 - windowStart);
          distToEnd = h <= windowEnd ? (windowEnd - h) : (windowEnd + 24 - h);
        }
      } else {
        inWindow = h >= windowStart && h <= windowEnd;
        if (inWindow) {
          distFromStart = h - windowStart;
          distToEnd = windowEnd - h;
        }
      }

      if (!inWindow) {
        return { inWindow: false, weight: 0 };
      }

      let weight = 1;
      if (fadeHrs > 0.01) {
        if (distFromStart < fadeHrs) {
          weight = Math.min(weight, distFromStart / fadeHrs);
        }
        if (distToEnd < fadeHrs) {
          weight = Math.min(weight, distToEnd / fadeHrs);
        }
      }

      return { inWindow: true, weight };
    }

    function rad(d) { return d * Math.PI / 180; }

    /**
     * Client-side sun time calculation (matches glo-designer.html).
     * Returns { sunrise, sunset, solarNoon, solarMid } as local hour values.
     */
    function getSunTimes(lat, lon) {
      const date = new Date();
      const n = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / 86400000);
      const J = n + ((lon < 0 ? 360 + lon : lon) / 360);
      const M = (357.5291 + 0.9856 * J) % 360;
      const C = 1.9148 * Math.sin(rad(M)) + 0.02 * Math.sin(rad(2 * M)) + 0.0003 * Math.sin(rad(3 * M));
      const L = (M + 102.9372 + C + 180) % 360;
      const D = Math.asin(Math.sin(rad(L)) * Math.sin(rad(23.44)));
      const cosH0 = (Math.cos(rad(90.833)) - Math.sin(rad(lat)) * Math.sin(D)) / (Math.cos(rad(lat)) * Math.cos(D));

      if (cosH0 < -1 || cosH0 > 1) {
        const sn = 12 - date.getTimezoneOffset() / 60 - (lon / 15);
        return { sunrise: sn - 6, sunset: sn + 6, solarNoon: sn, solarMid: (sn + 12) % 24 };
      }

      const H0 = Math.acos(cosH0);
      const dl = (2 * H0 * 180 / Math.PI) / 15;
      const tz = -date.getTimezoneOffset() / 60;
      const sn = 12 + tz - (lon / 15);
      return { sunrise: sn - dl / 2, sunset: sn + dl / 2, solarNoon: sn, solarMid: (sn + 12) % 24 };
    }

    function liftMidpointToPhase(midpoint, phaseStart, phaseEnd) {
      const phaseCenter = (phaseStart + phaseEnd) / 2;
      let mid = midpoint;
      while (mid < phaseCenter - 12) mid += 24;
      while (mid > phaseCenter + 12) mid -= 24;
      const margin = 0.01;
      return Math.max(phaseStart + margin, Math.min(phaseEnd - margin, mid));
    }

    function applySolarRule(baseCCT, hour, cfg, sunTimes, colorOverride) {
      if (!sunTimes) return baseCCT;

      let cct = baseCCT;
      const sunrise = sunTimes.sunrise;
      const sunset = sunTimes.sunset;
      const solarNoon = sunTimes.solarNoon;
      const solarMid = sunTimes.solarMid;

      // Warm night — ceiling
      if (cfg.warm_night_enabled) {
        let warmTarget = cfg.warm_night_target;
        if (colorOverride && colorOverride > 0) {
          warmTarget += colorOverride;
        }

        if (cct > warmTarget) {
          const fadeHrs = cfg.warm_night_fade / 60;
          const startOffsetHrs = cfg.warm_night_start / 60;
          const endOffsetHrs = cfg.warm_night_end / 60;
          const mode = cfg.warm_night_mode;

          let windowStart, windowEnd;
          if (mode === 'sunrise') {
            windowStart = wrap24(solarMid);
            windowEnd = wrap24(sunrise + endOffsetHrs);
          } else if (mode === 'sunset') {
            windowStart = wrap24(sunset + startOffsetHrs);
            windowEnd = wrap24(solarMid);
          } else {
            windowStart = wrap24(sunset + startOffsetHrs);
            windowEnd = wrap24(sunrise + endOffsetHrs);
          }

          const { inWindow, weight } = getWindowWeight(hour, windowStart, windowEnd, fadeHrs);
          if (inWindow && weight > 0) {
            cct = cct + (warmTarget - cct) * weight;
          }
        }
      }

      // Daylight color blend (intensity-based)
      const daylightCct = cfg.daylight_cct || 0;
      const colorSensitivity = cfg.color_sensitivity ?? 1.0;
      if (cfg.daylight_enabled !== false && daylightCct > 0 && sunTimes) {
        let blend = Math.min(1.0, 1.0 * colorSensitivity);
        // Apply daylight window + fade using configurable start/end offsets
        const startOffsetHrs = (cfg.daylight_start ?? 60) / 60;
        const endOffsetHrs = (cfg.daylight_end ?? -60) / 60;
        const fadeHrs = (cfg.daylight_fade ?? 60) / 60;
        const ds = wrap24(sunTimes.sunrise + startOffsetHrs);
        const de = wrap24(sunTimes.sunset + endOffsetHrs);
        const dw = getWindowWeight(hour, ds, de, fadeHrs);
        blend *= dw.weight;
        let daylightTarget = daylightCct;
        if (colorOverride && colorOverride < 0) {
          daylightTarget += colorOverride;
        }
        if (daylightTarget > cct) {
          cct += (daylightTarget - cct) * blend;
        }
      }

      return cct;
    }

    /**
     * Calculate brightness (0-1) at a given hour using the area's state overrides.
     * cfg = cachedConfig, state = { brightness_mid, color_mid, color_override, frozen_at }
     * currentHour = the hour used to determine which phase runtimeState applies to
     */
    function calcMiniBrightness(hour, cfg, state, currentHour) {
      const tAscend = cfg.ascend_start;
      let tDescend = cfg.descend_start;
      if (tDescend <= tAscend) tDescend += 24;

      const kAscend = SPEED_TO_SLOPE[Math.max(1, Math.min(12, cfg.wake_speed))];
      const kDescend = SPEED_TO_SLOPE[Math.max(1, Math.min(12, cfg.bed_speed))];
      const bMin = cfg.min_brightness / 100;
      const bMax = cfg.max_brightness / 100;

      // Determine which phase the current time (cursor) is in
      const cursorH48 = currentHour < tAscend ? currentHour + 24 : currentHour;
      const cursorInAscend = cursorH48 >= tAscend && cursorH48 < tDescend;

      const wakeMid = cursorInAscend ? (state.brightness_mid ?? cfg.wake_time) : cfg.wake_time;
      const bedMid = !cursorInAscend ? (state.brightness_mid ?? cfg.bed_time) : cfg.bed_time;

      // Phase detection for this sample hour
      const h48 = hour < tAscend ? hour + 24 : hour;
      const inAscend = h48 >= tAscend && h48 < tDescend;

      const mid48 = inAscend
        ? liftMidpointToPhase(wakeMid, tAscend, tDescend)
        : liftMidpointToPhase(bedMid, tDescend, tDescend + 24);

      let value;
      if (inAscend) {
        value = logistic(h48, mid48, kAscend, bMin, bMax);
      } else {
        const hDescend48 = (h48 < tDescend) ? h48 + 24 : h48;
        value = logistic(hDescend48, mid48, -kDescend, bMin, bMax);
      }

      return Math.max(bMin, Math.min(bMax, value));
    }

    /**
     * Calculate CCT (Kelvin) at a given hour, with solar rules applied.
     */
    function calcMiniColor(hour, cfg, state, sunTimes, currentHour) {
      const tAscend = cfg.ascend_start;
      let tDescend = cfg.descend_start;
      if (tDescend <= tAscend) tDescend += 24;

      const kAscend = SPEED_TO_SLOPE[Math.max(1, Math.min(12, cfg.wake_speed))];
      const kDescend = SPEED_TO_SLOPE[Math.max(1, Math.min(12, cfg.bed_speed))];
      const cLow = cfg.min_color_temp;
      const cHigh = cfg.max_color_temp;

      const cursorH48 = currentHour < tAscend ? currentHour + 24 : currentHour;
      const cursorInAscend = cursorH48 >= tAscend && cursorH48 < tDescend;

      const colorWakeMid = cursorInAscend ? (state.color_mid ?? cfg.wake_time) : cfg.wake_time;
      const colorBedMid = !cursorInAscend ? (state.color_mid ?? cfg.bed_time) : cfg.bed_time;

      const h48 = hour < tAscend ? hour + 24 : hour;
      const inAscend = h48 >= tAscend && h48 < tDescend;

      const mid48 = inAscend
        ? liftMidpointToPhase(colorWakeMid, tAscend, tDescend)
        : liftMidpointToPhase(colorBedMid, tDescend, tDescend + 24);

      let normalized;
      if (inAscend) {
        normalized = logistic(h48, mid48, kAscend, 0, 1);
      } else {
        const hDescend48 = (h48 < tDescend) ? h48 + 24 : h48;
        normalized = logistic(hDescend48, mid48, -kDescend, 0, 1);
      }
      normalized = Math.max(0, Math.min(1, normalized));

      let cct = cLow + (cHigh - cLow) * normalized;

      // Apply solar rules
      cct = applySolarRule(cct, hour, cfg, sunTimes, state.color_override);

      return cct;
    }

    function formatCountdown(isoTimestamp) {
      if (!isoTimestamp) return null;
      const expires = new Date(isoTimestamp);
      if (isNaN(expires.getTime())) return null;  // Invalid date (e.g. "motion" sentinel)
      const now = new Date();
      const diffMs = expires - now;
      if (diffMs <= 0) return null;
      const totalSec = Math.floor(diffMs / 1000);
      if (totalSec < 60) return `${totalSec}s`;
      const min = Math.floor(totalSec / 60);
      if (min < 60) return `${min}m`;
      const hr = Math.floor(min / 60);
      const remMin = min % 60;
      return remMin > 0 ? `${hr}h ${remMin}m` : `${hr}h`;
    }

    // Relative-time hint for an auto-schedule fire time.
    // Takes a decimal-hour + day-offset and returns "22m" / "11h" / "2d".
    function formatRelativeFromFire(fireOffsetDays, decimalHour) {
      if (decimalHour == null) return '';
      const offDays = fireOffsetDays ?? 0;
      const now = new Date();
      const nowH = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
      const diffH = offDays * 24 + decimalHour - nowH;
      if (diffH <= 0) return '';
      if (diffH < 1) {
        const m = Math.max(1, Math.round(diffH * 60));
        return m + 'm';
      }
      if (diffH < 24) return Math.round(diffH) + 'h';
      return Math.floor(diffH / 24) + 'd';
    }

    // ============================================================
    // Page Logic
    // ============================================================

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
      await loadPreferences();
      const urlParams = new URLSearchParams(window.location.search);
      const requestedMode = urlParams.get('mode');
      if (requestedMode === 'tune') {
        window.location.href = './tune';
        return;
      }
      loadData();
      setupEventListeners();
    });

    async function loadPreferences() {
      try {
        const configRes = await fetch('./api/config');

        if (configRes.ok) {
          cachedConfig = await configRes.json();
          const prefs = cachedConfig.areas_ui || {};
          const savedMode = prefs.view_mode || prefs.sort_mode || 'onoff';
          viewMode = savedMode === 'custom' ? 'custom' : 'onoff';
          // Phase 2: load pill mode (action) preference
          const savedPill = prefs.pill_mode || 'brightness';
          homePillMode = ['brightness', 'color', 'bed'].includes(savedPill) ? savedPill : 'brightness';

          // Compute sun times client-side from config lat/lon
          const lat = cachedConfig.latitude || 35.0;
          const lon = cachedConfig.longitude || -78.6;
          cachedSunTimes = getSunTimes(lat, lon);
        }
      } catch (err) {
        console.error('Error loading preferences:', err);
      }
    }

    async function savePreferences() {
      try {
        await fetch('./api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            areas_ui: {
              view_mode: viewMode,
              pill_mode: homePillMode,
            }
          })
        });
      } catch (err) {
        console.error('Error saving preferences:', err);
      }
    }

    // Phase 2: determine current home phase from any area's status. Sun-driven,
    // so all areas agree. Falls back to 'bed' if no status loaded yet.
    function getHomePhase() {
      for (const a of (areas || [])) {
        const p = areaStatus[a.area_id]?.phase;
        if (p) return p;
      }
      return 'bed';
    }

    // Phase 2: next phase boundary time (when Adjust overrides will reset).
    // Uses any zone's config — boundaries are sun-aligned so zones agree.
    function getNextPhaseBoundaryLabel() {
      const gz = cachedGlozones?.zones || {};
      const zoneNames = Object.keys(gz);
      if (!zoneNames.length) return null;
      const zc = gz[zoneNames[0]];
      if (!zc) return null;
      const phase = getHomePhase();
      const t = phase === 'wake' ? zc.descend_start : zc.ascend_start;
      if (t == null) return null;
      return formatDecimalHour(t);
    }

    function getHomeRefreshInterval() {
      if (cachedConfig) {
        const val = cachedConfig.home_refresh_interval;
        if (val && val >= 1 && val <= 60) return val;
      }
      return 3;
    }

    function formatAutoSchedulePill(nxt, type, areaId) {
      if (!nxt) return '';
      let t = nxt.time;
      if (t && t !== 'paused') t = t.replace(/:00([ap])$/, '$1');
      let day = '';
      const offset = nxt.offset;
      if (offset != null && offset >= 0) {
        if (offset <= 1) day = '';
        else if (offset <= 6) day = nxt.day_abbr || '';
        else day = (nxt.date_short || '').replace(' ', '');
      }
      // Within 24h + sun-triggered: swap absolute time for "Sunrise" / "Sunset" label.
      if (!day && t && t !== 'paused' && (nxt.source === 'sunrise' || nxt.source === 'sunset')) {
        const label = nxt.source === 'sunrise' ? 'Sunrise' : 'Sunset';
        const offMin = nxt.sun_offset_min || 0;
        if (Math.abs(offMin) >= 60) {
          const h = Math.round(offMin / 60);
          const sign = h > 0 ? '+' : '−';
          t = `${label} ${sign}${Math.abs(h)}h`;
        } else {
          t = label;
        }
      }
      const text = day ? t + ' ' + day : t;
      const arrow = type === 'on' ? '\u25B2' : '\u25BC';
      const focus = type === 'on' ? 'auto_on' : 'auto_off';
      const href = areaId ? `./area/${encodeURIComponent(areaId)}?focus=${focus}` : '#';
      // Relative hint (e.g. "22m", "11h"); show only when fire is imminent
      // (within 2h) — at longer ranges the absolute time / Sunset+offset
      // already conveys "when" and the trailing "· 7h" adds visual noise.
      let relative = '';
      if (t && t !== 'paused' && nxt.decimal_hour != null) {
        const fireOff = nxt.fire_offset ?? nxt.offset ?? 0;
        const now = new Date();
        const nowH = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
        const diffH = fireOff * 24 + nxt.decimal_hour - nowH;
        if (diffH > 0 && diffH <= 2) {
          const rel = formatRelativeFromFire(fireOff, nxt.decimal_hour);
          if (rel) relative = ` <span class="timer-alarm-rel">· ${rel}</span>`;
        }
      }
      return `<a href="${href}" class="timer-alarm" style="text-decoration:none; color:inherit;">${arrow} ${text}${relative}</a>`;
    }

    // Wall-clock-sync any pulsing animations within `root`.
    //
    // Setting `animation-delay: -<offset>s` (offset = now % duration) makes the
    // CSS animation start at the phase it would be at if it had been running
    // since wall-clock 0. After a DOM rebuild (renderAreas → innerHTML or
    // updateHomeTimers' sig-change branch) the new element resumes at the
    // same wall-clock phase as the one it replaced, so the rebuild is
    // invisible — no jump in the breath cycle.
    //
    // The dataset.pulseSynced flag makes this idempotent: re-setting
    // animation-delay on a running animation would itself cause a phase jump,
    // so we only ever sync each element once.
    function syncPulsesToWallClock(root) {
      const els = root.querySelectorAll('.timer-fade, .timer-motion, .timer-warning, .timer-boost, .timer-boost-flash');
      const now = Date.now();
      for (const el of els) {
        if (el.dataset.pulseSynced) continue;
        const cs = getComputedStyle(el);
        const durStr = (cs.animationDuration || '').split(',')[0].trim();
        const dur = parseFloat(durStr) * 1000;
        if (!dur || isNaN(dur)) continue;
        const offset = (now % dur) / 1000;
        el.style.animationDelay = `-${offset.toFixed(3)}s`;
        el.dataset.pulseSynced = '1';
      }
    }

    function updateHomeTimers() {
      // Update active status (row 1) and schedule (row 3) separately
      // Active status: fade, motion, boost, frozen (current state)
      document.querySelectorAll('[data-area-active]').forEach(el => {
        const areaId = el.getAttribute('data-area-active');
        const status = areaStatus[areaId] || {};
        const hasMotion = status.motion_expires_at && status.motion_expires_at !== 'forever';
        const isBoosted = status.boosted || false;
        const isMotionCoupled = status.is_motion_coupled || false;
        const warnClass = status.motion_warning_active ? ' timer-warning' : '';

        const parts = [];

        // Fade indicator: arrow + compact countdown
        const fadeDir = status.fade_direction;
        if (fadeDir) {
          const fadeIcon = fadeDir === 'in' ? '\u25B2' : '\u25BC';
          const remaining = status.fade_remaining;
          let countdown = '';
          if (remaining != null && remaining > 0) {
            countdown = remaining >= 60 ? `${Math.round(remaining / 60)}m` : `${remaining}s`;
          }
          parts.push(`<span class="timer-fade">${fadeIcon} ${countdown}</span>`);
        }

        // Motion + boost (combined or separate)
        if (hasMotion && isBoosted && isMotionCoupled) {
          const remaining = formatCountdown(status.motion_expires_at);
          if (remaining) parts.push(`<span class="timer-motion${warnClass}">\u26A1 ${remaining}</span>`);
        } else {
          if (hasMotion) {
            const remaining = formatCountdown(status.motion_expires_at);
            if (remaining) parts.push(`<span class="timer-motion${warnClass}">${remaining}</span>`);
          }
          if (isBoosted && status.boost_brightness && !isMotionCoupled) {
            let text = '\u26A1';
            let boostFlash = '';
            if (status.boost_expires_at !== 'forever' && status.boost_expires_at) {
              const remaining = formatCountdown(status.boost_expires_at);
              if (remaining) {
                text += ` ${remaining}`;
                boostFlash = ' timer-boost-flash';
              }
            }
            parts.push(`<span class="timer-boost${boostFlash}">${text}</span>`);
          }
        }

        // Frozen
        if (status.frozen) {
          parts.push(`<span class="timer-frozen">❄</span>`);
        }

        // Build a structure signature (count + classes) to detect when
        // the set of status items changes (not just text content)
        const sig = parts.map(p => {
          const m = p.match(/class="([^"]*)/);
          return m ? m[1] : '';
        }).join('|');
        const prevSig = el.getAttribute('data-sig');

        if (sig !== prevSig) {
          // Structure changed — full rebuild
          el.innerHTML = parts.join('');
          el.setAttribute('data-sig', sig);
          syncPulsesToWallClock(el);
        } else {
          // Same structure — update text only (preserves animations)
          const children = el.children;
          for (let i = 0; i < children.length && i < parts.length; i++) {
            const m = parts[i].match(/>([^<]*)</);
            if (m && children[i].textContent !== m[1]) {
              children[i].textContent = m[1];
            }
          }
        }
      });

      // Schedule row (row 3): bed/wake left, auto on/off right
      document.querySelectorAll('[data-area-schedule]').forEach(el => {
        const areaId = el.getAttribute('data-area-schedule');
        const status = areaStatus[areaId] || {};
        // Right side: auto schedule (always shown, even during fade).
        const scheduleEl = el.querySelector('.row-schedule-right');
        if (scheduleEl) {
          const scheduleParts = [];
          const nxtOn = status.next_auto_on;
          const nxtOff = status.next_auto_off;
          if (nxtOn && nxtOff) {
            const onAt = (nxtOn.fire_offset ?? nxtOn.offset ?? 999) * 24 + (nxtOn.decimal_hour ?? 0);
            const offAt = (nxtOff.fire_offset ?? nxtOff.offset ?? 999) * 24 + (nxtOff.decimal_hour ?? 0);
            const onOff = onAt <= offAt ? ['on', nxtOn] : ['off', nxtOff];
            scheduleParts.push(formatAutoSchedulePill(onOff[1], onOff[0], areaId));
          } else if (nxtOn) {
            scheduleParts.push(formatAutoSchedulePill(nxtOn, 'on', areaId));
          } else if (nxtOff) {
            scheduleParts.push(formatAutoSchedulePill(nxtOff, 'off', areaId));
          }
          const newSchedule = scheduleParts.join('');
          if (scheduleEl.innerHTML !== newSchedule) {
            scheduleEl.innerHTML = newSchedule;
          }
        }

        // Left side: bed/wake (already rendered as static HTML)
        const leftEl = el.querySelector('.row-schedule-left');

        // Show/hide row based on content
        const hasLeft = leftEl && leftEl.innerHTML.trim().length > 0;
        const hasRight = scheduleEl && scheduleEl.innerHTML.trim().length > 0;
        const hasContent = hasLeft || hasRight;
        el.style.display = hasContent ? '' : 'none';
        const rowMiddle = el.closest('.row-middle');
        if (rowMiddle) rowMiddle.style.paddingBottom = hasContent ? '0' : '';
      });
    }

    function startHomeRefresh() {
      stopHomeRefresh();
      const interval = getHomeRefreshInterval() * 1000;
      homeRefreshTimer = setInterval(async () => {
        try {
          const [res, zsRes, gzRes] = await Promise.all([
            fetch('./api/area-status?lite=true'),
            fetch('./api/zone-states'),
            fetch('./api/glozones'),
          ]);
          if (res.ok) {
            areaStatus = await res.json();
          }
          if (zsRes.ok) {
            const zs = await zsRes.json();
            zoneStates = zs.zone_states || {};
          }
          if (gzRes.ok) {
            cachedGlozones = await gzRes.json();
          }
          renderAreas();
          refreshHomeStatus();
        } catch (err) {
          console.error('Error refreshing home page:', err);
        }
      }, interval);
      // 1s tick for timer countdowns (no API calls)
      homeTickTimer = setInterval(updateHomeTimers, 1000);
      // Periodic refresh of sun-intensity pill (slower cadence than area status)
      homeSunTimer = setInterval(refreshHomeSun, 30000);
    }

    let homeSunTimer = null;

    function stopHomeSun() {
      if (homeSunTimer) { clearInterval(homeSunTimer); homeSunTimer = null; }
    }

    // Update the "X rooms on" count from current area state (cheap, no fetch).
    function refreshRoomsOnCount() {
      const el = document.getElementById('rooms-on-count');
      if (!el) return;
      const list = areas || [];
      let onCount = 0;
      for (const a of list) {
        const s = areaStatus[a.area_id] || {};
        if (s.is_on && s.is_circadian !== false) onCount++;
      }
      const total = list.length;
      el.textContent = onCount === 0
        ? (total ? `All off` : `…`)
        : `${onCount} of ${total} on`;
    }

    // Cached sun intensity so we can repaint the pill on every renderAreas()
    // without refetching on each tick (refresh cadence below).
    let _cachedSunPct = null;

    function paintSunPill(pct) {
      const pctEl = document.getElementById('home-sun-pct');
      const iconEl = document.getElementById('home-sun-icon');
      if (!pctEl || !iconEl || pct == null) return;
      pctEl.textContent = pct + '%';
      const t = pct / 100;
      const r = Math.round(120 + (245 - 120) * t);
      const g = Math.round(100 + (200 - 100) * t);
      const b = Math.round(60 + (100 - 60) * t);
      iconEl.style.color = `rgb(${r}, ${g}, ${b})`;
      iconEl.style.textShadow = `0 0 ${4 + t * 8}px rgba(${r},${g},${b},${0.3 + t * 0.4})`;
    }

    // Fetch sun intensity from /api/outdoor-status, cache it, and repaint the pill.
    async function refreshHomeSun() {
      try {
        const res = await fetch('./api/outdoor-status');
        if (!res.ok) return;
        const data = await res.json();
        _cachedSunPct = Math.max(0, Math.min(100, Math.round((data.outdoor_normalized ?? 0) * 100)));
        paintSunPill(_cachedSunPct);
      } catch (e) { /* leave cached value */ }
    }

    // Convenience wrapper called after each render — updates count + repaints sun pill from cache.
    function refreshHomeStatus() {
      refreshRoomsOnCount();
      if (_cachedSunPct != null) paintSunPill(_cachedSunPct);
    }

    function stopHomeRefresh() {
      if (homeRefreshTimer) { clearInterval(homeRefreshTimer); homeRefreshTimer = null; }
      if (homeTickTimer) { clearInterval(homeTickTimer); homeTickTimer = null; }
      stopHomeSun();
    }

    async function loadData() {
      const container = document.getElementById('areas-container');
      container.innerHTML = '<div class="loading">Loading areas...</div>';

      try {
        const [areasRes, statusRes, zoneStatesRes, glozonesRes] = await Promise.all([
          fetch('./api/areas'),
          fetch('./api/area-status?lite=true'),
          fetch('./api/zone-states'),
          fetch('./api/glozones')
        ]);

        if (areasRes.ok) {
          areas = await areasRes.json();
        }

        if (statusRes.ok) {
          areaStatus = await statusRes.json();
        }

        if (zoneStatesRes.ok) {
          const zs = await zoneStatesRes.json();
          zoneStates = zs.zone_states || {};
        }

        if (glozonesRes.ok) {
          cachedGlozones = await glozonesRes.json();
        }

        renderAreas();
        refreshHomeStatus();
        refreshHomeSun();
        startHomeRefresh();
      } catch (err) {
        console.error('Error loading data:', err);
        container.innerHTML = '<div class="loading">Error loading data</div>';
      }
    }

    // Collapsed zone state (persisted in localStorage)
    function getCollapsedZones() {
      try {
        return JSON.parse(localStorage.getItem('areas_collapsed_zones') || '{}');
      } catch { return {}; }
    }

    function setZoneCollapsed(zoneName, collapsed) {
      const state = getCollapsedZones();
      state[zoneName] = collapsed;
      localStorage.setItem('areas_collapsed_zones', JSON.stringify(state));
    }

    function toggleZone(zoneName, el) {
      // Use clicked element's parent .zone-group to find the correct header/table
      // (avoids querySelector hitting the wrong duplicate in On first view)
      const zoneGroup = el ? el.closest('.zone-group') : null;
      const header = zoneGroup
        ? zoneGroup.querySelector(`[data-zone="${zoneName}"]`)
        : document.querySelector(`[data-zone="${zoneName}"]`);
      const content = zoneGroup
        ? zoneGroup.querySelector(`[data-zone-table="${zoneName}"]`)
        : document.querySelector(`[data-zone-table="${zoneName}"]`);

      if (!header || !content) return;
      const willCollapse = !header.classList.contains('collapsed');

      if (willCollapse) {
        // Collapse: set explicit height first, then transition to 0
        content.style.maxHeight = content.scrollHeight + 'px';
        content.offsetHeight; // force reflow
        header.classList.add('collapsed');
        content.classList.add('hidden');
        content.style.maxHeight = '';
      } else {
        // Expand: measure height, animate from 0
        content.classList.remove('hidden');
        content.style.maxHeight = content.scrollHeight + 'px';
        header.classList.remove('collapsed');
        const onEnd = () => {
          content.style.maxHeight = '';
          content.removeEventListener('transitionend', onEnd);
        };
        content.addEventListener('transitionend', onEnd);
      }

      setZoneCollapsed(zoneName, willCollapse);
    }

    async function zoneAction(zoneName, action, value, mode) {
      try {
        const body = { zone_name: zoneName, action: action };
        if (value !== undefined) { body.value = value; body.mode = mode || 'step'; }
        const response = await fetch('./api/zone/action', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (response.ok) {
          // Refresh after action
          setTimeout(async () => {
            const [statusRes, zsRes] = await Promise.all([
              fetch('./api/area-status?lite=true'),
              fetch('./api/zone-states')
            ]);
            if (statusRes.ok) areaStatus = await statusRes.json();
            if (zsRes.ok) {
              const zs = await zsRes.json();
              zoneStates = zs.zone_states || {};
            }
            renderAreas();
          }, 500);
        }
      } catch (err) {
        console.error('Error executing zone action:', err);
      }
    }

    function glozoneReset(zoneName) {
      zoneAction(zoneName, 'glozone_reset');
    }

    function glozoneResetFull(zoneName) {
      zoneAction(zoneName, 'glozone_reset_full');
    }

    // Phase 2: chevrons dispatch per the home pill mode.
    // Brightness → bright_up/down (delta), Color → color_up/down, Bed → step_up/down
    // (curve-walking step that nudges the brightness target and lands the midpoint).
    function homeStepUp(areaId) {
      if (homePillMode === 'color') return rowAction(areaId, 'color_up');
      if (homePillMode === 'bed') return rowAction(areaId, 'step_up');
      return rowAction(areaId, 'bright_up');
    }

    function homeStepDown(areaId) {
      if (homePillMode === 'color') return rowAction(areaId, 'color_down');
      if (homePillMode === 'bed') return rowAction(areaId, 'step_down');
      return rowAction(areaId, 'bright_down');
    }

    // Canonical curve slopes (matches brain.py SPEED_TO_SLOPE) for phase
    // safe-offset math below. The page-wide SPEED_TO_SLOPE at line ~1466
    // has stale values and is used by other curve previews; keeping this
    // separate so the slider clamping uses the right numbers.
    const PHASE_SLOPE_TABLE = [
      0.0, 0.5889, 0.7852, 1.0708, 1.4722, 1.9630, 2.6173, 3.9260,
      5.8890, 11.778, 23.556, 70.668, 176.67,
    ];

    // How far the shifted midpoint will be pushed from the user's target time,
    // given the zone's brightness/slope config. Used to narrow the phase
    // slider so the user can't land on a target whose shifted midpoint would
    // escape the phase window (and then wrap into the wrong day). Ported
    // from area.html. Returns { minOffset, maxOffset } in hours.
    function computePhaseSafeOffset(zc, inAscend) {
      if (!zc) return { minOffset: 0, maxOffset: 0 };
      const brightnessPct = inAscend
        ? (zc.wake_brightness || 50)
        : (zc.bed_brightness || 50);
      if (brightnessPct === 50) return { minOffset: 0, maxOffset: 0 };
      const speed = inAscend ? zc.wake_speed : zc.bed_speed;
      const slopeMag = PHASE_SLOPE_TABLE[Math.max(1, Math.min(12, speed || 6))];
      if (!(slopeMag > 0)) return { minOffset: 0, maxOffset: 0 };
      const bMin = (zc.min_brightness || 2) / 100;
      const bMax = (zc.max_brightness || 100) / 100;
      const targetNorm = bMin + (bMax - bMin) * (brightnessPct / 100);
      const eps = 0.001;
      const clamped = Math.max(bMin + eps, Math.min(bMax - eps, targetNorm));
      const ratio = (clamped - bMin) / (bMax - bMin);
      const logTerm = Math.log((1 - ratio) / ratio);
      const slopeSigned = inAscend ? slopeMag : -slopeMag;
      const offset = logTerm / slopeSigned;
      const margin = 0.25; // 15-min buffer past the strict minimum
      return {
        minOffset: Math.max(0, -offset) + margin,
        maxOffset: Math.max(0, offset) + margin,
      };
    }

    // Phase 2: map slider pct (0-100) to a bed/wake time using the zone's
    // ascend_start / descend_start narrowed by computePhaseSafeOffset so the
    // user can't drag the thumb to a target whose midpoint would escape the
    // phase window (matches area-details slider behavior).
    function getPhaseBounds(areaId) {
      const status = areaStatus[areaId] || {};
      const phase = status.phase || getHomePhase();
      const zoneName = status.zone_name;
      const zc = zoneName ? cachedGlozones?.zones?.[zoneName] : null;
      const tAscend = zc?.ascend_start ?? 4.0;
      let tDescend = zc?.descend_start ?? 16.0;
      if (tDescend <= tAscend) tDescend += 24;
      const inAscend = phase === 'wake';
      const rawLo = inAscend ? tAscend : tDescend;
      const rawHi = inAscend ? tDescend : tAscend + 24;
      const { minOffset, maxOffset } = computePhaseSafeOffset(zc, inAscend);
      let lo = rawLo + minOffset;
      let hi = rawHi - maxOffset;
      // Fall back to raw bounds if narrowing inverted the window.
      if (hi - lo < 0.5) { lo = rawLo; hi = rawHi; }
      return { phase, lo, hi };
    }
    function bedTimeFromPct(areaId, pct) {
      const { lo, hi } = getPhaseBounds(areaId);
      const p = Math.max(0, Math.min(100, pct)) / 100;
      const target = lo + (hi - lo) * p;
      return ((target % 24) + 24) % 24;
    }

    async function setPhaseTime(areaId, targetTime) {
      try {
        const res = await fetch('./api/area/action', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ area_id: areaId, action: 'set_phase_time', target_time: targetTime })
        });
        if (res.ok) {
          setTimeout(async () => {
            try {
              const [s, zs] = await Promise.all([
                fetch('./api/area-status?lite=true'),
                fetch('./api/zone-states'),
              ]);
              if (s.ok) areaStatus = await s.json();
              if (zs.ok) { const j = await zs.json(); zoneStates = j.zone_states || {}; }
            } catch (e) { console.error(e); }
            sliderDragging = false;
            renderAreas();
          }, 500);
        } else {
          sliderDragging = false;
        }
      } catch (e) {
        sliderDragging = false;
        console.error('set_phase_time failed', e);
      }
    }

    async function confirmZonePowerOff(zoneName) {
      const onAreas = areas.filter(a => {
        const s = areaStatus[a.area_id] || {};
        return s.zone_name === zoneName && s.is_on;
      });
      if (onAreas.length === 0) return;
      if (cachedConfig?.confirm_zone_pushes) {
        const areaList = onAreas.map(a => a.name).join('\n');
        const msg = `Turn off lights in these areas?\n\n${areaList}`;
        if (!confirm(msg)) return;
      }
      for (const area of onAreas) {
        await fetch('./api/area/action', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ area_id: area.area_id, action: 'lights_off' })
        });
      }
      setTimeout(async () => {
        try {
          const [statusRes, zsRes] = await Promise.all([
            fetch('./api/area-status?lite=true'),
            fetch('./api/zone-states')
          ]);
          if (statusRes.ok) areaStatus = await statusRes.json();
          if (zsRes.ok) {
            const zs = await zsRes.json();
            zoneStates = zs.zone_states || {};
          }
          renderAreas();
        } catch (err) {
          console.error('Error refreshing after zone power off:', err);
        }
      }, 500);
    }

    function glozoneDown(zoneName) {
      if (cachedConfig?.confirm_zone_pushes) {
        const zs = zoneStates[zoneName] || {};
        const bri = Math.round(zs.brightness ?? 0);
        const kelvin = Math.round(zs.kelvin ?? 4000);
        const affectedAreas = areas.filter(a => {
          const s = areaStatus[a.area_id] || {};
          if ((s.zone_name || a.zone_name) !== zoneName || !s.is_on) return false;
          return Math.round(s.brightness || 0) !== bri || Math.round(s.kelvin || 4000) !== kelvin;
        });
        if (affectedAreas.length > 0) {
          const areaList = affectedAreas.map(a => a.name).join('\n');
          const msg = `Send ${bri}% / ${kelvin}K to "${zoneName}"? These areas will adjust:\n\n${areaList}`;
          if (!confirm(msg)) return;
        }
      }
      zoneAction(zoneName, 'glozone_down');
    }

    function rowFullSend(areaId) {
      const area = areas.find(a => a.area_id === areaId);
      if (!area) return;
      const status = areaStatus[areaId] || {};
      const zoneName = status.zone_name || area.zone_name;
      if (!zoneName) return;
      if (cachedConfig?.confirm_zone_pushes) {
        const bri = Math.round(status.brightness || 0);
        const kelvin = Math.round(status.kelvin || 4000);
        const affectedAreas = areas.filter(a => {
          const s = areaStatus[a.area_id] || {};
          if ((s.zone_name || a.zone_name) !== zoneName || !s.is_on) return false;
          return Math.round(s.brightness || 0) !== bri || Math.round(s.kelvin || 4000) !== kelvin;
        });
        if (affectedAreas.length > 0) {
          const areaList = affectedAreas.map(a => a.name).join('\n');
          const msg = `Full Send ${bri}% / ${kelvin}K to "${zoneName}"? These areas will adjust:\n\n${areaList}`;
          if (!confirm(msg)) return;
        }
      }
      rowAction(areaId, 'full_send');
    }
