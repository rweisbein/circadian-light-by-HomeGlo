<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    // Ensure trailing slash so ./relative links resolve correctly in HA dashboard iframes
    if (!window.location.pathname.endsWith('/')) {
      window.history.replaceState(null, '', window.location.pathname + '/' + window.location.search + window.location.hash);
    }
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circadian Light - Home</title>
  <link rel="stylesheet" href="./shared.css">
  <style>
    :root {
      --bg: #000;
      --panel: #111;
      --card: #1a1a1a;
      --accent: #feac60;
      --accent-hover: #ffc078;
      /* "value has been changed from saved/default" — modified-state indicator.
         See area.html for rationale. Blue per productivity-software convention. */
      --changed: #78AAE6;
      --changed-hover: #9DC2EE;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --muted2: #64748b;
      --line: #334155;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Navigation */
    .nav {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 0 12px;
      display: flex;
      align-items: center;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      font-weight: 600;
      font-size: 1.1rem;
      color: var(--muted);
      margin-right: 8px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-brand.active {
      color: var(--text);
    }

    .nav-logo {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    .nav-links {
      display: flex;
      gap: 4px;
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    .nav-link {
      padding: 8px 8px;
      color: var(--muted);
      text-decoration: none;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .nav-link:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
    }

    .nav-link.active {
      color: var(--text);
    }


    /* Main Content */
    .main {
      /* Match controls page (switches.html .main: 750px) so home and
         controls feel like the same app on desktop. 750 also keeps the
         slider narrow enough that the right-aligned readout and schedule
         pill stack above/below it, matching mobile. */
      max-width: 750px;
      margin: 0 auto;
      padding: 12px 12px 24px;
    }

    .page-header {
      margin-bottom: 24px;
    }

    .page-title {
      font-size: 1.5rem;
      font-weight: 600;
    }

    /* Areas Table */
    .areas-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .areas-table th {
      text-align: left;
      padding: 12px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      transition: color 0.2s;
    }

    .areas-table th:hover {
      color: var(--text);
    }

    .areas-table th.sorted {
      color: var(--accent);
    }

    .areas-table th .sort-arrow {
      margin-left: 6px;
      opacity: 0.5;
    }

    .areas-table th.sorted .sort-arrow {
      opacity: 1;
    }

    .areas-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      font-size: 0.9rem;
    }

    .areas-table tr:last-child td {
      border-bottom: none;
    }

    .areas-table tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
    }

    .empty-state-title {
      font-size: 1.1rem;
      margin-bottom: 8px;
      color: var(--text);
    }

    .empty-state-text {
      font-size: 0.9rem;
    }

    /* Loading State */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      color: var(--muted);
    }

    .timer-fade { color: #e2e8f0; animation: timer-motion-flash 1.4s ease-in-out infinite; }

    /* Status badges */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .status-on {
      background: rgba(34, 197, 94, 0.15);
      color: var(--success);
    }

    .status-off {
      background: rgba(148, 163, 184, 0.15);
      color: var(--muted);
    }

    .status-frozen {
      background: rgba(99, 179, 237, 0.15);
      color: #63b3ed;
    }

    /* Header with filter */
    .th-with-filter {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .th-title-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .header-filter {
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      font-size: 0.75rem;
      font-weight: normal;
      cursor: pointer;
      width: 100%;
    }

    .header-filter:focus {
      outline: none;
      border-color: dodgerblue;
    }

    /* Brightness/Color display */
    .lighting-info {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }

    .brightness-value,
    .kelvin-value {
      /* Inherit color from row */
    }

    /* Buttons */
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary {
      background: var(--card);
      border: 1px solid var(--line);
      color: var(--text);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* Clickable rows */
    .areas-table tbody tr {
      cursor: pointer;
    }


    /* Timer styles (shared with homepage) */
    .timer-motion {
      color: #e2e8f0;
      /* Slower than the other status flashes (fade/boost at 1.4s) — motion is
         a passive "auto-off pending" state, not a fresh action, so a calmer
         breath reads as ambient rather than urgent. */
      animation: timer-motion-flash 2.5s ease-in-out infinite;
    }

    .timer-boost {
      color: #e2e8f0;
      opacity: 0.9;
    }
    /* SVG bolt inside timer-motion / timer-boost. Uses currentColor so
       it picks up the timer's color (not the yellow-by-default ⚡ emoji). */
    .timer-bolt {
      width: 0.9em;
      height: 0.9em;
      display: inline-block;
      vertical-align: -0.12em;
    }
    .timer-boost-flash {
      animation: timer-motion-flash 1.4s ease-in-out infinite;
    }

    .timer-frozen {
      color: #63b3ed;
      opacity: 1;
    }
    /* Zone-header freeze indicator — inline next to the bed/wake label.
       Chip styled to mirror area-row .row-active-status > span: pill
       background, color inherited from the zone header (readable on any
       tint), uniform with the other inline pills. Tappable to unfreeze. */
    .zone-frozen-indicator {
      display: inline-flex;
      align-items: center;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 6px;
      background: rgba(0,0,0,0.18);
      color: inherit;
      opacity: 0.9;
      margin-left: 8px;
      cursor: pointer;
      transition: opacity 0.12s, background 0.12s;
      line-height: 1;
    }
    .zone-frozen-indicator:hover {
      background: rgba(0,0,0,0.30);
      opacity: 1;
    }

    .timer-alarm {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 1px 7px;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      color: inherit;
      font-size: 0.78rem;
      font-weight: 500;
      text-decoration: none;
      white-space: nowrap;
    }
    /* On-rows have a warm bg + dark text — use a dark transparent chip there */
    .area-row:not(.area-row-off) .timer-alarm {
      background: rgba(0,0,0,0.12);
    }
    .timer-alarm-rel {
      opacity: 0.65;
      font-size: 0.88em;
      font-variant-numeric: tabular-nums;
    }
    /* In-window schedule pill: countdown (`35m`) is the primary, bolded;
       the source label (`(Sunset)` / `(6:23a)`) sits in parens, muted. */
    .timer-alarm-primary {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .timer-alarm-paren {
      opacity: 0.65;
      font-size: 0.88em;
      margin-left: 3px;
    }

    .timer-warning {
      color: #e6a817;
      animation: timer-warning-pulse 1s ease-in-out infinite;
    }

    /* Symmetric breath — fully visible at 0%/100%, ~35% at midpoint, smooth
       ease-in-out across a 1.4s period. Mirrors `try-it-icon-pulse` in
       rhythm-design.html so home-page status flashes feel like the same
       family as the broadcast icon. The previous 0→1 alternate animation
       hit fully invisible at the trough and read as a hard blink. */
    @keyframes timer-motion-flash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    @keyframes timer-warning-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    /* Area row - div-based for proper shading like modal header */
    .area-row {
      --row-bg: var(--card);
      --row-text: var(--text);
      --row-fill: 0;
      display: flex;
      align-items: stretch;
      /* Symmetric 8px L/R padding so the power button column lines up with
         the off-row power buttons (same padding-left as .area-row-off) and
         the middle column gets 8px more breathing room for chips/pills.
         The .zone-content panel border + zone-header already convey "rooms
         nested under zone" — extra row indent was redundant. */
      padding: 6px 8px;
      gap: 8px;
      background: var(--row-bg);
      color: var(--row-text);
      border-bottom: 1px solid var(--line);
      position: relative;
      overflow: hidden;
    }
    /* Off rows stay single-line, but tall enough for a comfortable touch
       target on the power button (Apple HIG ~44pt). 4px pad + 36px button
       + 4px pad + 1px border = ~45px row. */
    .area-row.area-row-off {
      align-items: center;
      padding: 4px 8px;
    }
    /* Power button size is set once on .row-controls-left .row-btn —
       same 36px in both on and off rows. */

    .area-row:last-child {
      border-bottom: none;
    }
    /* First row in a regular zone needs extra top breathing room — its only
       visual separator from the zone-header above is the header's 1px
       border, which disappears when row + header tints are similar. On-rows
       get a larger bump (full-layout content sits high), off-rows get a
       smaller one (compact layout already short). Upcoming + Off pseudo-
       zones are excluded via the `__` prefix on data-zone-table — those
       groups want their compact rows untouched. */
    /* Breathing room between zone header and first row — applied to the
       zone-content container so all rows stay uniform height (no asymmetric
       row padding). Excludes the Upcoming + Off pseudo-zones, which want
       their compact rows flush to the header.
       First zone in the page gets a stronger bump (no zone-group margin
       above it to provide visual isolation, so its header feels tighter
       against its first row). */
    .zone-content:not([data-zone-table^="__"]) {
      padding-top: 4px;
    }
    /* First zone in the page sits right after .home-sticky-top — gets a
       stronger top-padding bump so its first row has breathing room from
       the sticky toolbar. Adjacent-sibling combinator picks the .zone-group
       immediately after .home-sticky-top; nested .zone-group children of
       other parents won't match. */
    .home-sticky-top + .zone-group .zone-content:not([data-zone-table^="__"]) {
      padding-top: 10px;
    }
    /* On-row first-child gets additional padding on the ROW because the
       full-layout content (name + slider + chevrons) sits high in the row.
       The 6px container padding + 10px row padding-top = 16px effective
       gap, which previously read well. */
    .zone-content:not([data-zone-table^="__"]) > .area-row:not(.area-row-off):first-child {
      padding-top: 10px;
    }

    .area-row:hover {
      background: color-mix(in srgb, var(--row-bg), white 3%);
    }

    /* Uniform glow overlay */
    .area-row::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.12);
      opacity: var(--row-fill);
      pointer-events: none;
    }

    .area-row > * {
      position: relative;
      z-index: 1;
    }

    /* Circadian-off row state */
    .area-row.circadian-off {
      cursor: pointer;
      color: var(--muted2);
    }

    .area-row.circadian-off .area-row-name {
      opacity: 0.45;
    }
    /* Enable button on a circadian-off row — same shell as the power button
       on every other row, accent-tinted to read as "tap to bring this room
       back into Circadian". */
    .row-controls-left .row-btn.circadian-enable-btn {
      color: var(--accent);
      border-color: rgba(254, 172, 96, 0.55);
    }
    .row-controls-left .row-btn.circadian-enable-btn:hover {
      border-color: rgba(254, 172, 96, 0.85);
    }

    .area-row-name {
      min-width: 0;
      /* Sized below .zone-rhythm-link so the zone reads as the parent
         of these rooms — same hierarchy as Apple's grouped UITableView. */
      font-size: 1.15rem;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }

    .phase-midpoint {
      font-size: 0.9rem;
      opacity: 0.8;
      white-space: nowrap;
    }

    /* Active status (row 1, right of area name) */
    /* Phase 3: motion/fade/boost/freeze indicators on the status row.
       Visual match to the inactive .delta-chip so the row reads as one
       horizontal pill series instead of mismatched shapes. */
    .row-active-status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .row-active-status:empty { display: none; }
    .row-active-status > span {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 6px;
      background: rgba(0,0,0,0.10);
      color: inherit;
      opacity: 0.6;
      white-space: nowrap;
      border: 1px solid transparent;
      margin-right: 4px;
    }
    .area-row-off .row-active-status > span {
      background: transparent;
      color: var(--muted);
      opacity: 0.7;
      border-color: rgba(255,255,255,0.06);
    }
    /* The freeze glyph is an emoji and renders smaller than text at the same
       font-size — pump it up so it matches the visual weight of the other chips. */
    .row-active-status .timer-frozen { font-size: 0.95rem; line-height: 1; padding: 0 2px; }

    /* Unified status strip (row 3, below slider).
       Left-aligned, wrap-capable. Order: schedule pill → state chip (motion/
       fade/freeze/boost) → divergence chips. All children share the .delta-chip /
       .timer-alarm visual language so the row reads as one info series. */
    .row-status-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px;
      /* No left padding so the reset dot + divergence chips on row 3 align
         horizontally with the area name on row 1 (both anchored at the
         left of .row-middle). Right padding kept so the schedule pill has
         a small gutter from the row's right edge. */
      padding: 0 16px 3px 0;
      /* Reserve the status row's vertical space even when empty so all on-rows
         have a consistent height — chevron touch targets stay stable. */
      min-height: 22px;
    }
    /* Schedule pill in the unified strip (on-row). Inline-flex preserved so
       .timer-alarm-rel ("· 22m") stays on the same baseline as the pill text.
       margin-left: auto anchors it to the right side of row 3 — the reset
       dot + divergence chips sit on the left. */
    .row-schedule-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
      margin-left: auto;
    }
    .row-schedule-pill:empty { display: none; }
    .row-active-status:empty { display: none; }

    /* Off-row schedule pill still right-aligns inside its compact row. */
    .row-schedule-right {
      font-size: 0.9rem;
      color: inherit;
      opacity: 0.7;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }
    .row-schedule-right:empty { display: none; }

    /* Row middle: stacked name + slider column */
    .row-middle {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
      min-width: 0;
      padding-bottom: 1px;
    }

    .row-middle-top {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 2px;
    }

    .row-status-sym {
      font-size: 0.6rem;
      opacity: 0.7;
      padding: 0 3px;
      border-radius: 3px;
      background: rgba(0,0,0,0.3);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Horizontal slider track — track not tappable, thumb is draggable */
    .row-slider-track {
      height: 0;
      position: relative;
      pointer-events: none;
      touch-action: none;
      padding: 10px 0;
      margin: 0 16px;
    }

    /* Slider fills the row middle — readout (above) and schedule pill (below)
       align vertically with the slider's right edge, matching mobile layout. */

    /* Phase 1: off rows are single-line — schedule pill inlines into the name row. */
    .area-row-off .row-middle-top {
      gap: 6px;
      align-items: center;
    }
    .row-off-flex {
      flex: 1;
      min-width: 0;
    }
    .area-row-off .row-schedule-right {
      color: var(--text);
      opacity: 0.7;
      padding-right: 8px;
    }

    .row-slider-track::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 6px;
      transform: translateY(-50%);
      border-radius: 3px;
      /* Per-mode gradient computed in JS (buildSliderTrackGradient) and
         set as an inline CSS var on each row. Falls back to the neutral
         dark bar when no mode-specific gradient is generated. */
      background: var(--slider-track-bg, rgba(0,0,0,0.35));
      /* Inset translucent dark stroke separates the track from warm/bright
         row tints (e.g., 2000K bedtime rows where amber-on-amber blends).
         Translucent so dark rows aren't visibly outlined. */
      box-shadow:
        inset 0 0 0 1px rgba(0,0,0,0.45),
        0 0.5px 0 rgba(255,255,255,0.15);
    }

    .row-slider-fill {
      display: none;
    }

    .row-slider-thumb {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 44px;
      height: 19px;
      border-radius: 9px 9px 6px 6px;
      background: rgba(255,255,255,0.9);
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
      pointer-events: auto;
      cursor: pointer;
      touch-action: none;
      transition: left 0.15s;
    }

    .row-slider-thumb.dragging {
      transition: none;
    }

    /* Ghost thumb: faint outlined duplicate of the pill at drag start X,
       stays put while the live thumb follows the finger. Hidden by default,
       revealed only while dragging. Gives visual anchoring for the delta. */
    .row-slider-thumb-ghost {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 44px;
      height: 19px;
      border-radius: 9px 9px 6px 6px;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.55);
      pointer-events: none;
      display: none;
    }
    .row-slider-track.dragging .row-slider-thumb-ghost {
      display: block;
    }
    /* Tune-mode default-position tick — shows where the slider was
       before the user dragged (the "previous saved" step). Hidden by
       default; revealed via .is-visible. Pairs with the orange
       row-readout to cue "tap to revert". */
    .row-slider-default-tick {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 2px;
      height: 16px;
      /* --changed (#78AAE6) — tick only appears when dirty, so it's part of
         the dirty cluster and shares the blue convention. */
      background: rgba(120, 170, 230, 0.6);
      border-radius: 1px;
      pointer-events: none;
      display: none;
      z-index: 1;
    }
    .row-slider-default-tick.is-visible { display: block; }

    /* Drag-delta fill: faint band stretched between ghost and live thumb.
       Reinforces direction of change (brightening vs dimming) and the
       magnitude of the delta at a glance. */
    .row-slider-fill-drag {
      position: absolute;
      top: 50%;
      height: 6px;
      transform: translateY(-50%);
      border-radius: 3px;
      background: rgba(255,255,255,0.25);
      pointer-events: none;
      display: none;
    }
    .row-slider-track.dragging .row-slider-fill-drag {
      display: block;
    }

    /* row-drag-value retired — row-readout updates live during drag,
       eliminating the dual-readout. (Style kept harmless for any stale
       references but the markup is gone.) */
    .row-drag-value { display: none !important; }

    /* Inline row-level action buttons next to the area name (Adjust modes
       when dirty): ↺ reset (glo_down) + ↑ Full Send (full_send). Spaced
       apart deliberately — the two actions have very different effects
       on the home's lighting and a mis-tap is costly. Extra margin-right
       so the status chips (motion/fade/boost/freeze) don't crowd them. */
    .row-actions {
      display: inline-flex;
      align-items: center;
      gap: 18px;
      margin-left: 10px;
      margin-right: 12px;
    }
    .row-action-btn {
      width: 24px;
      height: 24px;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.30);
      background: rgba(255,255,255,0.85);
      color: #1a1a1a;
      font-size: 14px;
      line-height: 1;
      font-weight: 700;
      cursor: pointer;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, transform 0.08s;
      -webkit-tap-highlight-color: transparent;
    }
    .row-action-btn:hover { background: #fff; }
    .row-action-btn:active { transform: scale(0.95); }

    /* Divergence chips wrapper on row 1 (next to the readout). Chips
       cluster left of the readout, with a small left margin so they
       don't crowd the row-actions buttons. */
    .row-divchips {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-left: 10px;
    }
    .row-divchips:empty { display: none; }
    /* Suppress reset chip during drag so the inline target % can use the
       horizontal space (reset isn't tappable mid-drag anyway). Reappears on
       release if the area is still dirty. */
    .area-row.slider-dragging .mismatch-dot-area {
      display: none;
    }

    /* Row control buttons - horizontal row */
    .row-controls {
      display: inline-flex;
      gap: 2px;
      align-items: stretch;
      flex-shrink: 0;
    }

    .row-controls-pill {
      background: rgba(0,0,0,0.5);
      padding: 2px;
      border-radius: 8px;
      display: flex;
      align-items: center;
    }

    .row-step-stack {
      display: inline-flex;
      flex-direction: column;
      gap: 4px;
      align-self: stretch;  /* fill row height for bigger touch targets */
    }
    .row-step-stack .row-btn {
      width: 38px;
      flex: 1 1 auto;       /* split row height between the two buttons */
      min-height: 30px;
      max-height: 44px;     /* cap stretch on taller rows (iOS wrap) */
      border-radius: 6px;
    }

    .row-step-stack .row-btn svg {
      width: 16px;
      height: 14px;
    }

    .row-controls-left {
      display: inline-flex;
      /* Center the power button vertically within the row's stretched
         height — without this it sticks to the top because .row-btn has
         an explicit 28px height. */
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .row-btn {
      width: 28px;
      height: 28px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(30,30,30,0.9);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      padding: 0;
      /* Strip iOS Safari's default button rendering (inner shading, edge
         artifacts, system font fallback) — without these the chevrons
         render slightly distorted vs the rest of the UI on iOS. */
      -webkit-appearance: none;
      appearance: none;
      font: inherit;
      box-sizing: border-box;
    }

    .row-btn:hover {
      border-color: rgba(255,255,255,0.4);
      background: rgba(50,50,50,0.9);
    }

    /* Active row button (area-row power) — high-contrast inversion (white fill,
       black icon) reads as "lit up" without relying on the orange accent.
       Dark border keeps the button's edge visible on light-tinted card
       backgrounds (e.g. cream tint when warm CT × high brightness). */
    .row-btn.active {
      background: #fff;
      color: #000;
      border-color: rgba(0,0,0,0.4);
    }
    .row-btn.active:hover {
      background: rgba(255,255,255,0.92);
      border-color: rgba(0,0,0,0.55);
    }

    /* Power button (on and off rows) — hollow off / solid white on. Same
       36x36 touch-target size whether the room is on or off so the button
       doesn't visually change size between states. */
    .row-controls-left .row-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.35);
      color: var(--muted);
    }
    .row-controls-left .row-btn:hover {
      border-color: var(--text);
      background: rgba(255,255,255,0.08);
    }
    .row-controls-left .row-btn.active {
      background: #fff;
      border-color: rgba(0,0,0,0.4);
      color: #000;
    }
    .row-controls-left .row-btn.active:hover {
      background: rgba(255,255,255,0.92);
      border-color: rgba(0,0,0,0.55);
    }
    .row-controls-left .row-btn svg {
      width: 18px;
      height: 18px;
    }

    .row-btn svg {
      width: 14px;
      height: 14px;
    }

    /* On/Off section headers */
    /* Zone group headers */
    .zone-group {
      margin-bottom: 16px;
    }

    @media (min-width: 768px) {
      .zone-group,
      .home-toolbar,
      .edit-toolbar {
        /* Inner content fills .main (capped at 750px) — the inner cap is
           redundant now, kept here so a future .main expansion stays bounded. */
        max-width: 100%;
      }
    }

    .zone-group:last-child {
      margin-bottom: 0;
    }

    .zone-header {
      display: flex;
      /* Top-align so the chevron / zone name / right-side buttons all sit
         on row 1, even when the zone-name-group spans two rows. */
      align-items: flex-start;
      gap: 6px;
      padding: 8px 8px 8px 8px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px 8px 0 0;
      user-select: none;
      transition: background 0.15s;
      position: relative;
      z-index: 2;
    }

    .zone-header-sticky {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      pointer-events: auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .zone-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.12);
      opacity: var(--header-fill, 0);
      pointer-events: none;
      border-radius: 8px 8px 0 8px;
    }

    .zone-header > * {
      position: relative;
      z-index: 1;
    }

    .zone-header:hover {
      background: rgba(255,255,255,0.05);
    }
    .zone-name-group {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      line-height: 1;
      flex: 1;
      min-width: 0;
      gap: 4px;
    }
    /* Top row of the zone header: name + count + phase label inline. */
    .zone-title-row {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      flex-wrap: wrap;
      min-width: 0;
    }
    /* Bottom row of the zone header: reset dot + divergence chips on the
       left (only when diverged), phase label (Bed/Wake) always on the right.
       Always rendered so the Bed/Wake time has a stable position; reset +
       chips appear inline only when present. */
    .zone-subrow {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      min-width: 0;
      width: 100%;
      padding-top: 2px;
    }
    /* No special positioning — phase label flows inline with the reset dot
       and divergence chips, all left-aligned under the zone name. */
    .zone-type-chip {
      font-size: 0.54rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 1px 6px;
      border: 1px solid currentColor;
      border-radius: 10px;
      opacity: 0.55;
      white-space: nowrap;
      line-height: 1.4;
    }
    .phase-midpoint-delta {
      opacity: 0.55;
      font-size: 0.85em;
      font-variant-numeric: tabular-nums;
      margin-left: 3px;
    }
    .zone-label-sub {
      font-size: 1.05rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      opacity: 0.85;
      margin-top: 1px;
    }
    .zone-phase-label {
      font-size: 0.9rem;
      font-weight: 400;
      opacity: 0.7;
      white-space: nowrap;
      flex-shrink: 0;
      margin-left: 6px;
    }
    .zone-header .row-controls {
      min-width: 58px;
      justify-content: flex-end;
      /* Zone header is align-items: flex-start so chevron + name top-align.
         Override here so the right-side buttons (glozonedown, power) center
         vertically across the header's full height instead of riding the top. */
      align-self: center;
    }
    .zone-rhythm-link {
      /* Bumped vs area-row-name so the zone reads as the container of
         the rooms below it — typography carries the hierarchy. */
      font-size: 1.6rem;
      font-weight: 700;
      text-decoration: none;
      transition: opacity 0.15s;
      cursor: pointer;
    }
    .zone-rhythm-link:hover {
      opacity: 0.7;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
    }

    .zone-header.collapsed {
      border-radius: 8px;
    }

    .zone-header.no-tint {
      background: var(--bg);
    }

    .zone-header.no-tint::before {
      display: none;
    }

    .zone-header.no-tint:hover {
      background: rgba(255,255,255,0.03);
    }

    /* Phase 3: "Upcoming" section in Active view — flat row list under a
       quiet label. No zone header (these rooms are off; zone grouping isn't
       useful here). Card styling matches zone-content for visual continuity. */
    .upcoming-section {
      margin-bottom: 16px;
    }
    .upcoming-section-label {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted2);
      font-weight: 700;
      margin: 18px 4px 6px;
    }
    .upcoming-content {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    /* Phase 3: Tune mode — neutral zone header. Card bg + a full-height 3px
       accent stripe on the LEFT edge marks the section without the warm
       "current state" tint Adjust mode uses. The stripe replaces the
       previous full-warm-border treatment that read as alarming. */
    .zone-header.tune {
      background: var(--card);
      border: 1px solid var(--line);
      color: var(--text);
    }
    .zone-header.tune::before { display: none; }
    .zone-header.tune .zone-rhythm-link,
    .zone-header.tune .zone-phase-label,
    .zone-header.tune .zone-chevron-big { color: var(--text); }
    .zone-header.tune .zone-phase-label { opacity: 0.55; }

    /* Upcoming header — zone-header markup but without right-side actions.
       Reuses .zone-header styling; clickable to collapse. */
    .zone-header.upcoming-header {
      cursor: pointer;
      background: var(--panel);
      border: 1px solid var(--line);
    }
    .zone-header.upcoming-header::before { display: none; }
    .zone-header.upcoming-header .zone-rhythm-link {
      color: var(--text);
      cursor: pointer;
    }
    .zone-header.upcoming-header:hover { background: rgba(255,255,255,0.05); }

    .zone-chevron-tap {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: inherit;
      opacity: 0.55;
      transition: opacity 0.15s;
      flex-shrink: 0;
      padding: 4px;
    }

    .zone-chevron-tap:hover {
      opacity: 1;
    }

    .zone-chevron {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      font-size: 1.05rem;
      line-height: 1;
      color: inherit;
      transform: rotate(0deg);
      transition: transform 0.25s;
      flex-shrink: 0;
      box-sizing: border-box;
    }

    .zone-header:not(.collapsed) .zone-chevron {
      transform: rotate(90deg);
    }

    /* Phase 1: bigger left-side zone chevron */
    .zone-chevron-big-tap {
      display: inline-flex;
      /* Top-align the chevron icon inside the tap-target so when the
         zone header gets a second sub-row (Bed/Wake + chips), the chevron
         stays visually next to the zone name on row 1 instead of drifting
         to the vertical center of the now-taller header. */
      align-items: flex-start;
      justify-content: center;
      width: 36px;
      height: 36px;
      cursor: pointer;
      color: inherit;
      opacity: 0.7;
      flex-shrink: 0;
      transition: opacity 0.15s;
      margin-left: -4px;
      /* Pair with the header's align-items: flex-start so the tap-target
         box itself anchors to the top of the header. */
      align-self: flex-start;
    }
    .zone-chevron-big-tap:hover { opacity: 1; }
    .zone-chevron-big {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      font-size: 1.55rem;
      line-height: 1;
      color: inherit;
      transform: rotate(0deg);
      transition: transform 0.25s;
      flex-shrink: 0;
    }
    .zone-header:not(.collapsed) .zone-chevron-big {
      transform: rotate(90deg);
    }

    .zone-name {
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
      color: var(--text);
      line-height: 1.3;
      min-width: 0;
    }

    .zone-count {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 400;
      font-variant-numeric: tabular-nums;
    }
    .zone-header.tune .zone-count { color: rgba(255,255,255,0.45); }

    .zone-content {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 0 0 8px 8px;
      margin-top: -1px;
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.3s ease, border-width 0.3s ease, margin-top 0.3s ease;
      opacity: 1;
    }

    .zone-content.no-header {
      border-radius: 8px;
      margin-top: 0;
    }

    .zone-content.hidden {
      max-height: 0 !important;
      opacity: 0;
      overflow: hidden;
      border-width: 0;
      margin-top: 0;
    }

    /* Sliders — custom minimal styling */
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 18px; padding: 0; margin: 0;
      background: transparent; cursor: pointer;
      --track-fill: rgba(255,255,255,0.5);
      --track-empty: rgba(255,255,255,0.12);
    }
    input[type=range]:focus { outline: none; }
    input[type=range]::-webkit-slider-runnable-track {
      height: 4px;
      background: linear-gradient(to right, var(--track-fill) var(--fill-pct, 50%), var(--track-empty) var(--fill-pct, 50%));
      border-radius: 2px;
    }
    input[type=range]::-moz-range-track {
      height: 4px; background: var(--track-empty); border-radius: 2px;
    }
    input[type=range]::-moz-range-progress {
      height: 4px; background: var(--track-fill); border-radius: 2px;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 30px; height: 18px; border-radius: 9px;
      background: #fff; border: 1px solid rgba(0,0,0,0.15); margin-top: -7px;
    }
    input[type=range]::-moz-range-thumb {
      width: 30px; height: 18px; border-radius: 9px;
      background: #fff; border: 1px solid rgba(0,0,0,0.15);
    }

    /* Row reset: area doesn't match zone — tap to reset to rhythm.
       Dark chip + white ↺ stays legible across the warm→cool row background
       palette. Sized smaller than the 36px power button so the row reads as
       [primary][secondary] rather than two equal buttons. */
    .mismatch-dot-area {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 14px;
      line-height: 1;
      font-weight: 600;
      flex-shrink: 0;
      margin-left: 10px;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }
    /* Glyph chosen by action — ↺ reset to rhythm (Adjust + Tune both use this),
       ↑ send the area's override up to the zone (Adjust only). */
    .mismatch-dot-area.diverge-reset::before { content: '\21BA'; }
    .mismatch-dot-area.diverge-send::before { content: '\2191'; }
    .mismatch-dot-area.diverge-tune::before { content: '\21BA'; }
    .mismatch-dot-area:hover {
      background: rgba(0,0,0,0.75);
    }
    /* Tighter gap between the paired reset + send dots so they read as one
       group instead of two unrelated buttons. */
    .mismatch-dot-area.diverge-send { margin-left: 4px; }

    /* Placeholder to keep layout stable when no dot */
    .mismatch-dot-placeholder {
      width: 5px;
      height: 5px;
      flex-shrink: 0;
    }

    /* Red dot: zone has been stepped or frozen */
    .mismatch-dot-zone {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(239, 68, 68, 0.9);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.6);
      flex-shrink: 0;
    }


    /* Zone reset button — spans full width of row-controls container (2 btn slots) */
    .zone-reset-btn {
      width: 100%;
      height: 28px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(30,30,30,0.9);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all 0.15s;
      padding: 0;
      flex-shrink: 0;
    }

    .zone-reset-btn:hover {
      border-color: rgba(255,255,255,0.4);
      background: rgba(50,50,50,0.9);
    }

    .zone-reset-btn svg {
      flex-shrink: 0;
    }

    /* Nav overflow menu */
    .nav-more { background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; padding: 4px 8px; border-radius: 6px; display: none; flex-shrink: 0; letter-spacing: 2px; line-height: 1; }
    .nav-more:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-overflow { display: none; position: absolute; top: 100%; right: 12px; background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 4px 0; min-width: 140px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 200; }
    .nav-overflow.open { display: block; }
    .nav-overflow-item { display: block; padding: 10px 16px; color: var(--muted); text-decoration: none; font-size: 0.9rem; white-space: nowrap; }
    .nav-overflow-item:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-overflow-item.active { color: var(--text); }

    /* Home page view segments — see `.view-segments` in shared.css. Same
       component used by the Controls page; consumers manage their own
       active state + click-to-expand JS. */

    /* Edit mode styles */
    .edit-toolbar { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
    .edit-toolbar-link { font-size: 0.85rem; color: var(--muted); text-decoration: none; cursor: pointer; }
    .edit-toolbar-link:hover { text-decoration: underline; color: var(--text); }
    .edit-zone-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px 8px 0 8px;
      cursor: pointer;
      user-select: none;
    }
    .edit-zone-header.collapsed { border-radius: 8px; }

    .edit-zone-arrows {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .edit-zone-arrow {
      width: 22px;
      height: 16px;
      border-radius: 3px;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      line-height: 1;
      padding: 0;
    }
    .edit-zone-arrow:hover { background: rgba(255,255,255,0.1); color: var(--accent); border-color: var(--accent); }
    .edit-zone-arrow:disabled { opacity: 0.3; cursor: not-allowed; }

    .edit-zone-name {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--text);
      flex: 1;
    }

    .edit-zone-actions { display: flex; gap: 6px; }
    .edit-icon-btn {
      width: 28px;
      height: 28px;
      border-radius: 4px;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      padding: 0;
    }
    .edit-icon-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); border-color: var(--accent); }
    .edit-icon-btn.danger:hover { color: var(--danger); border-color: var(--danger); }
    .edit-icon-btn.default-star { font-size: 1rem; border: none; background: none; width: auto; height: auto; color: var(--muted2); }
    .edit-icon-btn.default-star.active { color: var(--accent); }
    .edit-icon-btn.default-star:hover { color: var(--accent); }

    .edit-rename-input {
      font-weight: 700;
      font-size: 1.05rem;
      background: var(--card);
      border: 1px solid var(--accent);
      color: var(--text);
      border-radius: 4px;
      padding: 2px 8px;
      flex: 1;
      outline: none;
    }

    .edit-mode-row {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      gap: 12px;
      background: var(--card);
      border-bottom: 1px solid var(--line);
      cursor: grab;
    }
    .edit-mode-row:last-child { border-bottom: none; }
    .edit-mode-row.dragging { opacity: 0.4; }
    .edit-mode-row.moving-out {
      opacity: 0;
      max-height: 0;
      padding: 0 16px;
      overflow: hidden;
      transition: opacity 0.25s, max-height 0.3s ease 0.1s, padding 0.3s ease 0.1s;
    }

    .move-zone-select {
      font-size: 0.78rem;
      padding: 2px 6px;
      border-radius: 5px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--muted);
      cursor: pointer;
    }
    .move-zone-select:focus { border-color: dodgerblue; color: var(--text); }

    /* Circadian on/off toggle in Manage mode (one per area row). Pairs
       semantically with the drag handle — both are structural per-area
       decisions ("where" and "should HomeGlo manage"). Logo colored when
       on, heavily-dimmed grayscale when off. The off state also dims the
       sibling area-name so the whole row reads as "muted" at a glance. */
    .edit-row-circadian {
      width: 26px;
      height: 26px;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      flex-shrink: 0;
      transition: filter 0.15s, opacity 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .edit-row-circadian:hover { background: rgba(255,255,255,0.06); }
    .edit-row-circadian img {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: block;
      transition: filter 0.15s, opacity 0.15s;
    }
    .edit-row-circadian.is-off img {
      filter: grayscale(1) brightness(0.55);
      opacity: 0.30;
    }
    /* Dim the area name on circadian-off rows so the whole row reads as
       "this room is off the system" instead of just having a slightly
       grayer icon. Scoped to the area-name span (the flex:1 span after
       the toggle button). */
    .edit-mode-row.is-circadian-off .edit-row-name {
      opacity: 0.45;
    }

    .home-name-heading {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.01em;
      cursor: text;
      padding: 2px 4px;
      border-radius: 4px;
      transition: background 0.15s;
    }
    .home-name-heading:hover { background: rgba(255,255,255,0.06); }

    /* Phase 3: sticky top section — keeps title + status + mode + sort
       visible as the user scrolls. Pinned below the nav (.nav: 52px tall). */
    .home-sticky-top {
      position: sticky;
      top: 52px;
      z-index: 30;
      background: var(--bg);
      padding-top: 8px;
      padding-bottom: 12px;
    }
    /* Sticky-top 3-row layout. Each row has a left + right anchor with
       a flexible spacer between, so anchors stay pinned to the edges
       regardless of width. Row 3 right is empty by design (the segmented
       bar carries that row alone). */
    .home-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .home-row + .home-row { margin-top: 4px; }
    .home-row-spacer { flex: 1 1 auto; }

    /* Mode pill tinted in tune modes — reinforces "you're in tune X"
       with a bg + border accent matching the per-row stripes and slider
       gradient. Stronger than the original 0.08/0.30 because it's now the
       sole header-level tune cue (axis bar removed). */
    #home-mode-pill.is-tune-sun {
      background: rgba(230, 170, 80, 0.22);
      border-color: rgba(230, 170, 80, 0.70);
    }
    #home-mode-pill.is-tune-balance {
      background: rgba(120, 170, 230, 0.22);
      border-color: rgba(120, 170, 230, 0.70);
    }
    /* Zone headers stack below the sticky top as the user scrolls.
       Top offset is a rough sum of nav + sticky-top content height. */
    .zone-header {
      position: sticky;
      top: 168px;
      z-index: 20;
    }
    /* When sticky, on-rows below could show through a translucent header.
       Force opaque bgs on the no-tint / tune variants. */
    .zone-header.no-tint { background: var(--bg); }

    /* Active-room count — right-aligned on row 3 next to the view/sort
       segments. Muted so the row reads as state info, not interactive. */
    .rooms-on-count {
      font-size: 0.82rem;
      color: var(--muted);
      cursor: default;
    }
    /* Sun pill styling lives in shared.css under .outdoor-chip / .outdoor-chip-icon */

    /* Segmented bar (.view-segments-bar) and action pill (.action-pill)
       styles live in shared.css. */
    .tune-impact-text {
      font-size: 0.82rem;
      opacity: 0.85;
      font-weight: 500;
      white-space: nowrap;
    }
    /* Tune mode: row-status-row drops its left padding so the breakdown text
       aligns left-flush with the area name above (instead of indented under
       the slider track). The status-row only contains the breakdown in Tune
       mode, so no other content is affected. */
    .area-row .row-status-row:has(.tune-breakdown) {
      padding-left: 0;
      padding-right: 0;
    }

    /* Tune mode row-3 breakdown. Left side is static (Baseline · axis · Final);
       right side is empty by default, populated during slider drag with the
       candidate preview. The wrapper is flex so the preview anchors right and
       the left side can ellipsis-truncate on tight widths if needed. */
    .tune-breakdown {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      font-size: 0.82rem;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      /* Surrounding text uses a muted color so the bold .tb-impact reads
         as the primary number. Avoiding `opacity` on the parent — opacity
         compounds and would mute the impact too. */
      color: var(--muted, rgba(255, 255, 255, 0.5));
    }
    /* Static formula: always anchored to the right via margin-left:auto so
       it stays right-aligned whether the preview is empty or active. */
    .tune-breakdown .tb-static {
      margin-left: auto;
      flex: 0 1 auto;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* Drag preview: lives to the left of the static. Hidden when empty. */
    .tune-breakdown .tb-preview {
      flex: 0 0 auto;
    }
    .tune-breakdown .tb-preview:empty { display: none; }
    /* "(before → after)" parenthetical on the current readout. Hidden at
       rest; revealed when the row's slider is being dragged. */
    .tb-bf { color: var(--muted2); font-weight: 400; margin-left: 4px; display: none; }
    .area-row.slider-dragging .tb-bf { display: inline; }
    /* Tune mode status row (below slider): Peak + Current both on the
       right, space-separated. tb-peak gets margin-left:auto so the pair
       hugs the right edge. A touch smaller than the descriptor headline. */
    .area-row.mode-sun .row-status-row,
    .area-row.mode-balance .row-status-row {
      display: flex;
      align-items: baseline;
      gap: 16px;
      justify-content: flex-end;
      font-size: 0.78rem;
    }
    .tb-peak { margin-left: auto; }
    .tb-current { text-align: right; }
    /* Bigger row-readout in Tune modes so the descriptor (e.g. "Bright
       1.15x") reads as the headline value, matching area-detail's Tune
       slider readout. */
    .area-row.mode-sun .row-readout,
    .area-row.mode-balance .row-readout {
      font-size: 1rem;
    }
    /* In tune modes, the inline drag-value (next to area name) is
       redundant with the dynamic row-readout which now updates during
       drag. Hide it so the row isn't double-stating the candidate. */
    .area-row.mode-sun .row-drag-value,
    .area-row.mode-balance .row-drag-value {
      display: none !important;
    }
    /* Small "peak" tag on the row-3 LEFT slot when idle — tells the user
       the numbers next to it are the peak-impact projection (sun=100% or
       rhythm=100%) and not the current "now" reading. */
    .tb-peak-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.6;
      margin-right: 3px;
    }
    /* Factor impact (e.g. "0%" after "Sun") — the number the user is
       actively tuning. Heavier weight + full text color (vs the muted
       surroundings) so the eye finds it in both the static formula and
       the live preview. */
    .tune-breakdown .tb-impact {
      font-weight: 800;
      color: var(--text);
    }

    /* Phase 2: divergence chips on status row.
       Each chip signals "this dimension differs from zone state" — same semantic
       as the row-readout-dirty (which is also blue). Chips use --changed (blue)
       to thread the modified-state convention through every "value differs"
       cue in the app. */
    /* 1.2.372 — Option B: solid blue fill + dark text. Previous approach
       (dark backdrop + blue text + blue border) had a luminance-contrast
       problem on warm-CCT row tints: blue-on-warm-tan reads as hue
       contrast only, washing out perceptually. Solid blue + dark text
       guarantees high contrast at any tint, and matches the bolder
       treatment we just gave the area-page reset button. */
    .delta-chip {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 6px;
      background: var(--changed);
      color: #0c1626;
      opacity: 1;
      white-space: nowrap;
      border: 1px solid var(--changed);
      /* Spacing is governed by the parent flex `gap` (status-row, zone-subrow). */
    }
    /* Area-row chips are tappable to clear divergence per-dimension —
       avoids needing to switch to the right mode first. */
    .delta-chip.delta-chip-action {
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, opacity 0.12s, color 0.12s;
    }
    .delta-chip.delta-chip-action:hover {
      background: var(--changed-hover, #5a8fd4);
      border-color: var(--changed-hover, #5a8fd4);
      color: #0c1626;
      opacity: 1;
    }
    /* Zone-header divergence chips: same solid-blue treatment for
       consistency across the page. */
    .zone-delta-chip {
      background: var(--changed);
      color: #0c1626;
      opacity: 1;
      font-weight: 700;
      border-color: var(--changed);
    }
    /* Active-mode chip emphasis removed — all chips uniform muted style.
       The chip's presence is sufficient signal; pulling the eye to the
       currently-active mode's chip was over-engineering. */

    /* Readout label inline with row name (current value for active mode) */
    .row-readout {
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0.85;
      white-space: nowrap;
      margin-left: auto;
      padding-right: 8px;
      transition: color 0.15s, opacity 0.15s;
    }
    /* Dirty row-readout: blue + tappable. Doubles as the per-row reset
       button — Adjust modes tap to glo_down (revert to zone), Tune modes
       tap to restoreTunePrev (undo last change). */
    .row-readout--dirty {
      color: var(--changed);
      opacity: 1;
      cursor: pointer;
    }
    .row-readout--dirty:hover { color: var(--changed-hover); }
    /* Tune-mode multiplier suffix (e.g., "0.95x") next to the descriptor.
       Muted so the named step ("Subtle") reads as the primary value. Used
       in both the static readout and the live drag preview. */
    .tune-mult {
      font-weight: 400;
      opacity: 0.55;
      margin-left: 2px;
    }
    .home-name-input {
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.01em;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 2px 4px;
      outline: none;
      font-family: inherit;
    }

    .drag-handle { color: var(--muted2); font-size: 1.1rem; cursor: grab; user-select: none; }
    .drag-handle:active { cursor: grabbing; }

    .zone-content.drag-over { outline: 2px dashed var(--accent); outline-offset: -2px; }
    .zone-header.drag-over-target,
    .edit-zone-header.drag-over-target { outline: 2px solid var(--accent); background: rgba(254,172,96,0.1); }

    .drag-indicator {
      height: 2px;
      background: var(--accent);
      margin: 0 16px;
      pointer-events: none;
    }

  </style>
  <script src="./shared.js"></script>

<body>
  <!-- Navigation -->
  <nav class="nav">
    <a href="./" class="nav-brand active">
      <img class="nav-logo" src="./icon.png" alt="Circadian Light">
      Home
    </a>
    <div class="nav-links">
      <a href="./switches" class="nav-link">Controls</a>
      <a href="./moments" class="nav-link">Magic</a>
      <a href="./settings" class="nav-link">Settings</a>
    </div>
    <button class="nav-more" aria-label="More pages">&middot;&middot;&middot;</button>
    <div class="nav-overflow"></div>
  </nav>

  <!-- Main Content -->
  <main class="main">
    <!-- Areas grouped by zone -->
    <div id="areas-container">
      <div class="loading">Loading areas...</div>
    </div>
  </main>

  <script>
    // State
    let areas = [];
    let areaStatus = {};
    let zoneStates = {};
    let viewMode = 'custom'; // 'custom', 'alpha', 'onoff'
    // Whether the view-segments pill bar is expanded (showing all options)
    // vs. collapsed (showing only the active pill). Reset on render-time
    // by using a module variable so periodic re-renders preserve state.
    let _viewSegExpanded = false;
    // Phase 2/3: action mode pill state — 'brightness' | 'color' | 'bed' | 'sun' | 'balance'
    let homePillMode = 'brightness';
    // Most-recently-dragged tune slider's area id. The row-readout for
    // this area goes orange in Tune mode ("oops, I dragged to test —
    // tap to revert"). Single-area scope: dragging a second area's
    // slider clears the first. Cleared on mode change + page reload
    // (in-memory). Auto-clears after 10s past the most recent change
    // (the "oops" window expires — orange shouldn't linger).
    let _homeRecentTuneAreaId = null;
    let _homeRecentTuneTimer = null;
    function setHomeRecentTune(areaId) {
      _homeRecentTuneAreaId = areaId;
      if (_homeRecentTuneTimer) clearTimeout(_homeRecentTuneTimer);
      _homeRecentTuneTimer = setTimeout(() => {
        const id = _homeRecentTuneAreaId;
        _homeRecentTuneAreaId = null;
        _homeRecentTuneTimer = null;
        if (id) refreshTuneRowDom(id);  // drop the orange
      }, 10000);
    }
    // Phase 3: mode popover open-state — persisted across re-renders so the
    // refresh cycle doesn't kick the popover closed mid-interaction.
    let _modePopoverOpen = false;
    // Phase 3: secondary sort for Tune modes — 'custom' (zone order) | 'setting' (magnitude)
    let homeTuneSort = 'custom';

    // Phase 3: per-area sun_exposure / balance lookup (lazy-fetched from /api/light-filters).
    // Map: areaId → { brightness_factor, natural_light_exposure }.
    let cachedAreaTune = {};
    async function loadAreaTuneData() {
      try {
        const res = await fetch('./api/light-filters');
        if (!res.ok) return;
        const data = await res.json();
        const m = {};
        for (const zone of Object.values(data.zones || {})) {
          for (const a of (zone.areas || [])) {
            if (a.id) m[a.id] = {
              brightness_factor: a.brightness_factor ?? 1.0,
              natural_light_exposure: a.natural_light_exposure ?? 0.0,
            };
          }
        }
        cachedAreaTune = m;
      } catch (e) { console.error('loadAreaTuneData failed', e); }
    }
    function getAreaTune(areaId) {
      return cachedAreaTune[areaId] || { brightness_factor: 1.0, natural_light_exposure: 0.0 };
    }

    // Phase 3: per-area sun_exposure / balance discrete steps.
    const SOLAR_STEPS = [
      // Migrated to match area-detail's descriptors (single source of
      // truth). Old labels: Medium @ 0.60, Strong @ 0.90 → renamed to
      // Strong @ 0.60, Near full @ 0.90 so the pages read the same.
      { label: 'None',      exposure: 0.00 },
      { label: 'Low',       exposure: 0.25 },
      { label: 'Moderate',  exposure: 0.40 },
      { label: 'Strong',    exposure: 0.60 },
      { label: 'High',      exposure: 0.75 },
      { label: 'Near full', exposure: 0.90 },
      { label: 'Full',      exposure: 1.00 },
      { label: 'Amplified', exposure: 1.25 },
      { label: 'Intense',   exposure: 1.60 },
      { label: 'Sun room',  exposure: 2.00 },
    ];
    const LUMEN_STEPS = [
      { label: 'Min',       factor: 0.60 },
      { label: 'Very Dim',  factor: 0.75 },
      { label: 'Dim',       factor: 0.85 },
      { label: 'Subtle',    factor: 0.95 },
      { label: 'Normal',    factor: 1.00 },
      { label: 'Lifted',    factor: 1.05 },
      { label: 'Bright',    factor: 1.15 },
      { label: 'Strong',    factor: 1.25 },
      { label: 'Max',       factor: 1.40 },
    ];
    function isTuneMode(m) { return m === 'sun' || m === 'balance'; }
    function nearestStepIndex(steps, value, key) {
      let best = 0, bestDist = Infinity;
      for (let i = 0; i < steps.length; i++) {
        const d = Math.abs(steps[i][key] - value);
        if (d < bestDist) { bestDist = d; best = i; }
      }
      return best;
    }
    let cachedConfig = null;
    let cachedSunTimes = null; // { sunrise, sunset, solarNoon, solarMid } in local hours
    let currentMode = 'view'; // 'view' | 'manage'
    let cachedGlozones = null; // raw glozone data for edit mode ordering
    let homeRefreshTimer = null;     // Home page card refresh timer
    let homeTickTimer = null;        // 1s home page timer countdown tick
    let sliderDragging = false;      // Guards renderAreas during row button actions
    let homeNameEditing = false;     // Guards renderAreas while inline-editing the home name

    // ============================================================
    // Circadian Calculation Functions (for row shading)
    // ============================================================

    const SPEED_TO_SLOPE = [0, 0.4, 0.6, 0.8, 1.0, 1.3, 1.7, 2.3, 3.0, 4.0, 5.5, 30.0, 60.0];

    // Inverse logistic: given a target y at x, return the midpoint that would
    // produce it. Used to compute the curve's shifted midpoint from a user-set
    // phase brightness target (see computeShiftedMidpoint below).
    function inverseMidpoint(x, targetValue, slope, y0, y1) {
      const epsilon = 0.001;
      const clamped = Math.max(y0 + epsilon, Math.min(y1 - epsilon, targetValue));
      const ratio = (clamped - y0) / (y1 - y0);
      try {
        return x + Math.log((1 - ratio) / ratio) / slope;
      } catch (e) {
        return x;
      }
    }

    // Given a candidate wake/bed TIME (hour-of-day in 48-hour space) and the
    // configured wake/bed brightness percent at that time, return the
    // shifted sigmoid midpoint that produces it. Ported from area.html so the
    // home-page phase slider gradient can sample candidate phase times.
    function computeShiftedMidpoint(targetTimeH48, brightnessPct, slope, bMinNorm, bMaxNorm) {
      if (brightnessPct === 50) return targetTimeH48;
      const targetNorm = bMinNorm + (bMaxNorm - bMinNorm) * (brightnessPct / 100);
      return inverseMidpoint(targetTimeH48, targetNorm, slope, bMinNorm, bMaxNorm);
    }

    function logistic(x, midpoint, slope, y0, y1) {
      try {
        const expVal = Math.exp(-slope * (x - midpoint));
        return y0 + (y1 - y0) / (1 + expVal);
      } catch {
        return slope * (x - midpoint) > 0 ? y1 : y0;
      }
    }

    function wrap24(x) {
      return ((x % 24) + 24) % 24;
    }

    function getWindowWeight(hour, windowStart, windowEnd, fadeHrs) {
      const h = wrap24(hour);
      let inWindow = false;
      let distFromStart = 0;
      let distToEnd = 0;

      if (windowStart > windowEnd) {
        inWindow = h >= windowStart || h <= windowEnd;
        if (inWindow) {
          distFromStart = h >= windowStart ? (h - windowStart) : (h + 24 - windowStart);
          distToEnd = h <= windowEnd ? (windowEnd - h) : (windowEnd + 24 - h);
        }
      } else {
        inWindow = h >= windowStart && h <= windowEnd;
        if (inWindow) {
          distFromStart = h - windowStart;
          distToEnd = windowEnd - h;
        }
      }

      if (!inWindow) {
        return { inWindow: false, weight: 0 };
      }

      let weight = 1;
      if (fadeHrs > 0.01) {
        if (distFromStart < fadeHrs) {
          weight = Math.min(weight, distFromStart / fadeHrs);
        }
        if (distToEnd < fadeHrs) {
          weight = Math.min(weight, distToEnd / fadeHrs);
        }
      }

      return { inWindow: true, weight };
    }

    function rad(d) { return d * Math.PI / 180; }

    /**
     * Client-side sun time calculation (matches glo-designer.html).
     * Returns { sunrise, sunset, solarNoon, solarMid } as local hour values.
     */
    function getSunTimes(lat, lon) {
      const date = new Date();
      const n = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / 86400000);
      const J = n + ((lon < 0 ? 360 + lon : lon) / 360);
      const M = (357.5291 + 0.9856 * J) % 360;
      const C = 1.9148 * Math.sin(rad(M)) + 0.02 * Math.sin(rad(2 * M)) + 0.0003 * Math.sin(rad(3 * M));
      const L = (M + 102.9372 + C + 180) % 360;
      const D = Math.asin(Math.sin(rad(L)) * Math.sin(rad(23.44)));
      const cosH0 = (Math.cos(rad(90.833)) - Math.sin(rad(lat)) * Math.sin(D)) / (Math.cos(rad(lat)) * Math.cos(D));

      if (cosH0 < -1 || cosH0 > 1) {
        const sn = 12 - date.getTimezoneOffset() / 60 - (lon / 15);
        return { sunrise: sn - 6, sunset: sn + 6, solarNoon: sn, solarMid: (sn + 12) % 24 };
      }

      const H0 = Math.acos(cosH0);
      const dl = (2 * H0 * 180 / Math.PI) / 15;
      const tz = -date.getTimezoneOffset() / 60;
      const sn = 12 + tz - (lon / 15);
      return { sunrise: sn - dl / 2, sunset: sn + dl / 2, solarNoon: sn, solarMid: (sn + 12) % 24 };
    }

    function liftMidpointToPhase(midpoint, phaseStart, phaseEnd) {
      const phaseCenter = (phaseStart + phaseEnd) / 2;
      let mid = midpoint;
      while (mid < phaseCenter - 12) mid += 24;
      while (mid > phaseCenter + 12) mid -= 24;
      const margin = 0.01;
      return Math.max(phaseStart + margin, Math.min(phaseEnd - margin, mid));
    }

    function applySolarRule(baseCCT, hour, cfg, sunTimes, colorOverride) {
      if (!sunTimes) return baseCCT;

      let cct = baseCCT;
      const sunrise = sunTimes.sunrise;
      const sunset = sunTimes.sunset;
      const solarNoon = sunTimes.solarNoon;
      const solarMid = sunTimes.solarMid;

      // Warm night — ceiling
      if (cfg.warm_night_enabled) {
        let warmTarget = cfg.warm_night_target;
        if (colorOverride && colorOverride > 0) {
          warmTarget += colorOverride;
        }

        if (cct > warmTarget) {
          const fadeHrs = cfg.warm_night_fade / 60;
          const startOffsetHrs = cfg.warm_night_start / 60;
          const endOffsetHrs = cfg.warm_night_end / 60;
          const mode = cfg.warm_night_mode;

          let windowStart, windowEnd;
          if (mode === 'sunrise') {
            windowStart = wrap24(solarMid);
            windowEnd = wrap24(sunrise + endOffsetHrs);
          } else if (mode === 'sunset') {
            windowStart = wrap24(sunset + startOffsetHrs);
            windowEnd = wrap24(solarMid);
          } else {
            windowStart = wrap24(sunset + startOffsetHrs);
            windowEnd = wrap24(sunrise + endOffsetHrs);
          }

          const { inWindow, weight } = getWindowWeight(hour, windowStart, windowEnd, fadeHrs);
          if (inWindow && weight > 0) {
            cct = cct + (warmTarget - cct) * weight;
          }
        }
      }

      // Daylight color blend (intensity-based)
      const daylightCct = cfg.daylight_cct || 0;
      const colorSensitivity = cfg.color_sensitivity ?? 1.0;
      if (cfg.daylight_enabled !== false && daylightCct > 0 && sunTimes) {
        let blend = Math.min(1.0, 1.0 * colorSensitivity);
        // Apply daylight window + fade using configurable start/end offsets
        const startOffsetHrs = (cfg.daylight_start ?? 60) / 60;
        const endOffsetHrs = (cfg.daylight_end ?? -60) / 60;
        const fadeHrs = (cfg.daylight_fade ?? 60) / 60;
        const ds = wrap24(sunTimes.sunrise + startOffsetHrs);
        const de = wrap24(sunTimes.sunset + endOffsetHrs);
        const dw = getWindowWeight(hour, ds, de, fadeHrs);
        blend *= dw.weight;
        let daylightTarget = daylightCct;
        if (colorOverride && colorOverride < 0) {
          daylightTarget += colorOverride;
        }
        if (daylightTarget > cct) {
          cct += (daylightTarget - cct) * blend;
        }
      }

      return cct;
    }

    /**
     * Calculate brightness (0-1) at a given hour using the area's state overrides.
     * cfg = cachedConfig, state = { brightness_mid, color_mid, color_override, frozen_at }
     * currentHour = the hour used to determine which phase runtimeState applies to
     */
    function calcMiniBrightness(hour, cfg, state, currentHour) {
      const tAscend = cfg.ascend_start;
      let tDescend = cfg.descend_start;
      if (tDescend <= tAscend) tDescend += 24;

      const kAscend = SPEED_TO_SLOPE[Math.max(1, Math.min(12, cfg.wake_speed))];
      const kDescend = SPEED_TO_SLOPE[Math.max(1, Math.min(12, cfg.bed_speed))];
      const bMin = cfg.min_brightness / 100;
      const bMax = cfg.max_brightness / 100;

      // Determine which phase the current time (cursor) is in
      const cursorH48 = currentHour < tAscend ? currentHour + 24 : currentHour;
      const cursorInAscend = cursorH48 >= tAscend && cursorH48 < tDescend;

      const wakeMid = cursorInAscend ? (state.brightness_mid ?? cfg.wake_time) : cfg.wake_time;
      const bedMid = !cursorInAscend ? (state.brightness_mid ?? cfg.bed_time) : cfg.bed_time;

      // Phase detection for this sample hour
      const h48 = hour < tAscend ? hour + 24 : hour;
      const inAscend = h48 >= tAscend && h48 < tDescend;

      const mid48 = inAscend
        ? liftMidpointToPhase(wakeMid, tAscend, tDescend)
        : liftMidpointToPhase(bedMid, tDescend, tDescend + 24);

      let value;
      if (inAscend) {
        value = logistic(h48, mid48, kAscend, bMin, bMax);
      } else {
        const hDescend48 = (h48 < tDescend) ? h48 + 24 : h48;
        value = logistic(hDescend48, mid48, -kDescend, bMin, bMax);
      }

      return Math.max(bMin, Math.min(bMax, value));
    }

    /**
     * Calculate CCT (Kelvin) at a given hour, with solar rules applied.
     */
    function calcMiniColor(hour, cfg, state, sunTimes, currentHour) {
      const tAscend = cfg.ascend_start;
      let tDescend = cfg.descend_start;
      if (tDescend <= tAscend) tDescend += 24;

      const kAscend = SPEED_TO_SLOPE[Math.max(1, Math.min(12, cfg.wake_speed))];
      const kDescend = SPEED_TO_SLOPE[Math.max(1, Math.min(12, cfg.bed_speed))];
      const cLow = cfg.min_color_temp;
      const cHigh = cfg.max_color_temp;

      const cursorH48 = currentHour < tAscend ? currentHour + 24 : currentHour;
      const cursorInAscend = cursorH48 >= tAscend && cursorH48 < tDescend;

      const colorWakeMid = cursorInAscend ? (state.color_mid ?? cfg.wake_time) : cfg.wake_time;
      const colorBedMid = !cursorInAscend ? (state.color_mid ?? cfg.bed_time) : cfg.bed_time;

      const h48 = hour < tAscend ? hour + 24 : hour;
      const inAscend = h48 >= tAscend && h48 < tDescend;

      const mid48 = inAscend
        ? liftMidpointToPhase(colorWakeMid, tAscend, tDescend)
        : liftMidpointToPhase(colorBedMid, tDescend, tDescend + 24);

      let normalized;
      if (inAscend) {
        normalized = logistic(h48, mid48, kAscend, 0, 1);
      } else {
        const hDescend48 = (h48 < tDescend) ? h48 + 24 : h48;
        normalized = logistic(hDescend48, mid48, -kDescend, 0, 1);
      }
      normalized = Math.max(0, Math.min(1, normalized));

      let cct = cLow + (cHigh - cLow) * normalized;

      // Apply solar rules
      cct = applySolarRule(cct, hour, cfg, sunTimes, state.color_override);

      return cct;
    }

    function formatCountdown(isoTimestamp) {
      if (!isoTimestamp) return null;
      const expires = new Date(isoTimestamp);
      if (isNaN(expires.getTime())) return null;  // Invalid date (e.g. "motion" sentinel)
      const now = new Date();
      const diffMs = expires - now;
      if (diffMs <= 0) return null;
      const totalSec = Math.floor(diffMs / 1000);
      if (totalSec < 60) return `${totalSec}s`;
      const min = Math.floor(totalSec / 60);
      if (min < 60) return `${min}m`;
      const hr = Math.floor(min / 60);
      const remMin = min % 60;
      return remMin > 0 ? `${hr}h ${remMin}m` : `${hr}h`;
    }

    // Relative-time hint for an auto-schedule fire time.
    // Takes a decimal-hour + day-offset and returns "22m" / "11h" / "2d".
    function formatRelativeFromFire(fireOffsetDays, decimalHour) {
      if (decimalHour == null) return '';
      const offDays = fireOffsetDays ?? 0;
      const now = new Date();
      const nowH = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
      const diffH = offDays * 24 + decimalHour - nowH;
      if (diffH <= 0) return '';
      if (diffH < 1) {
        const m = Math.max(1, Math.round(diffH * 60));
        return m + 'm';
      }
      if (diffH < 24) return Math.round(diffH) + 'h';
      return Math.floor(diffH / 24) + 'd';
    }

    // ============================================================
    // Page Logic
    // ============================================================

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
      await loadPreferences();
      const urlParams = new URLSearchParams(window.location.search);
      const requestedMode = urlParams.get('mode');
      // ?mode=manage → land in Manage mode (used by the Activity page's
      // mode-pill router when the user picks Manage). Needs to await
      // the data load first because enterManageMode() renders areas.
      // Event listeners are wired BEFORE entering Manage so the mode
      // pill (and everything else) is clickable on arrival — otherwise
      // the pill renders but does nothing until a page reload.
      if (requestedMode === 'manage') {
        await loadData();
        setupEventListeners();
        enterManageMode();
        return;
      }
      loadData();
      setupEventListeners();
    });

    async function loadPreferences() {
      try {
        const configRes = await fetch('./api/config');

        if (configRes.ok) {
          cachedConfig = await configRes.json();
          const prefs = cachedConfig.areas_ui || {};
          const savedMode = prefs.view_mode || prefs.sort_mode || 'onoff';
          viewMode = savedMode === 'custom' ? 'custom' : 'onoff';
          // Phase 2/3: load pill mode (action) preference
          const savedPill = prefs.pill_mode || 'brightness';
          homePillMode = ['brightness', 'color', 'bed', 'sun', 'balance'].includes(savedPill) ? savedPill : 'brightness';
          // ?mode=X URL param overrides the saved pref — used when returning
          // from the Activity page so the user lands back in the same mode
          // they were in (e.g., Brightness → Activity → Brightness again).
          // Honored for adjust/tune modes only; 'manage' lands via direct
          // enterManageMode call which would still need re-entry logic.
          try {
            const urlMode = new URLSearchParams(window.location.search).get('mode');
            if (urlMode && ['brightness', 'color', 'bed', 'sun', 'balance'].includes(urlMode)) {
              homePillMode = urlMode;
            }
          } catch (_) {}
          homeTuneSort = prefs.tune_sort === 'setting' ? 'setting' : 'custom';

          // Compute sun times client-side from config lat/lon
          const lat = cachedConfig.latitude || 35.0;
          const lon = cachedConfig.longitude || -78.6;
          cachedSunTimes = getSunTimes(lat, lon);
        }
      } catch (err) {
        console.error('Error loading preferences:', err);
      }
    }

    async function savePreferences() {
      try {
        await fetch('./api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            areas_ui: {
              view_mode: viewMode,
              pill_mode: homePillMode,
              tune_sort: homeTuneSort,
            }
          })
        });
      } catch (err) {
        console.error('Error saving preferences:', err);
      }
    }

    // Phase 2: determine current home phase from any area's status. Sun-driven,
    // so all areas agree. Falls back to 'bed' if no status loaded yet.
    function getHomePhase() {
      for (const a of (areas || [])) {
        const p = areaStatus[a.area_id]?.phase;
        if (p) return p;
      }
      return 'bed';
    }

    function getHomeRefreshInterval() {
      if (cachedConfig) {
        const val = cachedConfig.home_refresh_interval;
        if (val && val >= 1 && val <= 60) return val;
      }
      return 3;
    }

    function formatAutoSchedulePill(nxt, type, areaId) {
      if (!nxt) return '';
      let t = nxt.time;
      if (t && t !== 'paused') t = t.replace(/:00([ap])$/, '$1');
      let day = '';
      const offset = nxt.offset;
      if (offset != null && offset >= 0) {
        if (offset <= 1) day = '';
        else if (offset <= 6) day = nxt.day_abbr || '';
        else day = (nxt.date_short || '').replace(' ', '');
      }
      // Within 24h + sun-triggered: swap absolute time for "Sunrise" / "Sunset" label.
      if (!day && t && t !== 'paused' && (nxt.source === 'sunrise' || nxt.source === 'sunset')) {
        const label = nxt.source === 'sunrise' ? 'Sunrise' : 'Sunset';
        const offMin = nxt.sun_offset_min || 0;
        if (Math.abs(offMin) >= 60) {
          const h = Math.round(offMin / 60);
          const sign = h > 0 ? '+' : '−';
          t = `${label} ${sign}${Math.abs(h)}h`;
        } else {
          t = label;
        }
      }
      const text = day ? t + ' ' + day : t;
      const arrow = type === 'on' ? '\u25B2' : '\u25BC';
      const focus = type === 'on' ? 'auto_on' : 'auto_off';
      const href = areaId ? `./area/${encodeURIComponent(areaId)}?focus=${focus}` : '#';
      // In-window (≤2h): countdown leads as a bolded primary; the source
      // label (Sunset / Sunrise — prefixed with "~" when there's a
      // sun_offset_min, otherwise the absolute time) sits in parens.
      // Out-of-window: just the absolute label — "· 7h" tail at longer
      // ranges was visual noise.
      let body = text;
      if (t && t !== 'paused' && nxt.decimal_hour != null) {
        const fireOff = nxt.fire_offset ?? nxt.offset ?? 0;
        const now = new Date();
        const nowH = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
        const diffH = fireOff * 24 + nxt.decimal_hour - nowH;
        if (diffH > 0 && diffH <= 2) {
          const rel = formatRelativeFromFire(fireOff, nxt.decimal_hour);
          if (rel) {
            const isSun = !day && (nxt.source === 'sunrise' || nxt.source === 'sunset');
            let parenLabel;
            if (isSun) {
              const label = nxt.source === 'sunrise' ? 'Sunrise' : 'Sunset';
              const offMin = nxt.sun_offset_min || 0;
              parenLabel = (Math.abs(offMin) > 0 ? '~' : '') + label;
            } else {
              parenLabel = text;
            }
            body = `<span class="timer-alarm-primary">${rel}</span>`
              + ` <span class="timer-alarm-paren">(${parenLabel})</span>`;
          }
        }
      }
      return `<a href="${href}" class="timer-alarm" style="text-decoration:none; color:inherit;">${arrow} ${body}</a>`;
    }

    // Wall-clock-sync any pulsing animations within `root`.
    //
    // Setting `animation-delay: -<offset>s` (offset = now % duration) makes the
    // CSS animation start at the phase it would be at if it had been running
    // since wall-clock 0. After a DOM rebuild (renderAreas → innerHTML or
    // updateHomeTimers' sig-change branch) the new element resumes at the
    // same wall-clock phase as the one it replaced, so the rebuild is
    // invisible — no jump in the breath cycle.
    //
