        // Collapse: set explicit height first, then transition to 0
        content.style.maxHeight = content.scrollHeight + 'px';
        content.offsetHeight; // force reflow
        header.classList.add('collapsed');
        content.classList.add('hidden');
        content.style.maxHeight = '';
      } else {
        // Expand: measure height, animate from 0
        content.classList.remove('hidden');
        content.style.maxHeight = content.scrollHeight + 'px';
        header.classList.remove('collapsed');
        const onEnd = () => {
          content.style.maxHeight = '';
          content.removeEventListener('transitionend', onEnd);
        };
        content.addEventListener('transitionend', onEnd);
      }

      setZoneCollapsed(zoneName, willCollapse);
    }

    async function zoneAction(zoneName, action, value, mode) {
      try {
        const body = { zone_name: zoneName, action: action };
        if (value !== undefined) { body.value = value; body.mode = mode || 'step'; }
        const response = await fetch('./api/zone/action', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (response.ok) {
          // Refresh after action
          setTimeout(async () => {
            const [statusRes, zsRes] = await Promise.all([
              fetch('./api/area-status?lite=true'),
              fetch('./api/zone-states')
            ]);
            if (statusRes.ok) areaStatus = await statusRes.json();
            if (zsRes.ok) {
              const zs = await zsRes.json();
              zoneStates = zs.zone_states || {};
            }
            renderAreas();
          }, 500);
        }
      } catch (err) {
        console.error('Error executing zone action:', err);
      }
    }

    function glozoneReset(zoneName) {
      zoneAction(zoneName, 'glozone_reset');
    }

    function glozoneResetFull(zoneName) {
      zoneAction(zoneName, 'glozone_reset_full');
    }

    // Phase 2/3: chevrons dispatch per the home pill mode.
    // Brightness → bright_up/down, Color → color_up/down, Sun/Balance → step
    // the discrete table. Bed/Wake → step_up/step_down — curve-walking step
    // that shifts the midpoint (same vector the slider adjusts).
    //
    // Wake/Bed direction: chevrons should semantically mean "more light NOW"
    // for up and "less light NOW" for down. In Bed phase (descend), step_up
    // already maps to "brighter now" (delays the bed midpoint). In Wake phase
    // (ascend), step_up makes lights dimmer now — so we invert in Wake mode
    // so the user-facing up arrow always means "more light now".
    function homeStepUp(areaId) {
      if (homePillMode === 'color') return rowAction(areaId, 'color_up');
      if (homePillMode === 'bed') {
        const phase = getHomePhase();
        return rowAction(areaId, phase === 'wake' ? 'step_down' : 'step_up');
      }
      if (homePillMode === 'sun') return tuneStep(areaId, 'sun', +1);
      if (homePillMode === 'balance') return tuneStep(areaId, 'balance', +1);
      return rowAction(areaId, 'bright_up');
    }

    function homeStepDown(areaId) {
      if (homePillMode === 'color') return rowAction(areaId, 'color_down');
      if (homePillMode === 'bed') {
        const phase = getHomePhase();
        return rowAction(areaId, phase === 'wake' ? 'step_up' : 'step_down');
      }
      if (homePillMode === 'sun') return tuneStep(areaId, 'sun', -1);
      if (homePillMode === 'balance') return tuneStep(areaId, 'balance', -1);
      return rowAction(areaId, 'bright_down');
    }

    // Phase 3: step the area's sun_exposure or brightness_factor by ±1 table position.
    function tuneStep(areaId, dim, dir) {
      const t = getAreaTune(areaId);
      if (dim === 'sun') {
        const idx = nearestStepIndex(SOLAR_STEPS, t.natural_light_exposure, 'exposure');
        const next = Math.max(0, Math.min(SOLAR_STEPS.length - 1, idx + dir));
        saveAreaTune(areaId, { natural_light_exposure: SOLAR_STEPS[next].exposure });
      } else {
        const idx = nearestStepIndex(LUMEN_STEPS, t.brightness_factor, 'factor');
        const next = Math.max(0, Math.min(LUMEN_STEPS.length - 1, idx + dir));
        saveAreaTune(areaId, { brightness_factor: LUMEN_STEPS[next].factor });
      }
    }

    // Phase 3: previous-value tracking for Tune undo. Snapshots are written
    // to localStorage on every change so a reset restores the value the user
    // had before their last edit (not the system default).
    const tunePrevKey = (areaId, dim) => `tune_prev_${areaId}_${dim}`;
    function snapshotTunePrev(areaId, dim, value) {
      try { localStorage.setItem(tunePrevKey(areaId, dim), String(value)); } catch (e) {}
    }
    function getTunePrev(areaId, dim) {
      try {
        const v = localStorage.getItem(tunePrevKey(areaId, dim));
        return v != null ? parseFloat(v) : null;
      } catch (e) { return null; }
    }
    function clearTunePrev(areaId, dim) {
      try { localStorage.removeItem(tunePrevKey(areaId, dim)); } catch (e) {}
    }
    async function restoreTunePrev(areaId) {
      const dim = homePillMode === 'sun' ? 'sun' : 'balance';
      const prev = getTunePrev(areaId, dim);
      if (prev == null) return;
      clearTunePrev(areaId, dim);
      const payload = dim === 'sun'
        ? { natural_light_exposure: prev }
        : { brightness_factor: prev };
      saveAreaTune(areaId, payload, { skipSnapshot: true });
    }

    // Phase 3: persist sun_exposure / brightness_factor changes. Re-fetches state and re-renders.
    async function saveAreaTune(areaId, payload, opts = {}) {
      // Snapshot the value BEFORE writing the new one — so a later reset
      // can restore the user's previous setting (not the system default).
      if (!opts.skipSnapshot) {
        const curr = getAreaTune(areaId);
        if ('natural_light_exposure' in payload) {
          snapshotTunePrev(areaId, 'sun', curr.natural_light_exposure);
        }
        if ('brightness_factor' in payload) {
          snapshotTunePrev(areaId, 'balance', curr.brightness_factor);
        }
      }
      // Optimistic local update: writes land in cachedAreaTune now, before
      // the backend round-trip. Keeps the visual (stripe, readout) at the
      // candidate value during the 400ms wait — otherwise getAreaTune
      // returns the stale value and the stripe briefly snaps back.
      if (cachedAreaTune[areaId]) {
        Object.assign(cachedAreaTune[areaId], payload);
      } else {
        cachedAreaTune[areaId] = { brightness_factor: 1.0, natural_light_exposure: 0.0, ...payload };
      }
      try {
        const res = await fetch('./api/light-filters/area-brightness', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ area_id: areaId, ...payload }),
        });
        if (res.ok) {
          setTimeout(async () => {
            try {
              const [s, zs] = await Promise.all([
                fetch('./api/area-status?lite=true'),
                fetch('./api/zone-states'),
              ]);
              if (s.ok) areaStatus = await s.json();
              if (zs.ok) { const j = await zs.json(); zoneStates = j.zone_states || {}; }
              await loadAreaTuneData();
            } catch (e) { console.error(e); }
            sliderDragging = false;
            renderAreas();
          }, 400);
        } else { sliderDragging = false; }
      } catch (e) { sliderDragging = false; console.error('saveAreaTune failed', e); }
    }

    // Canonical curve slopes (matches brain.py SPEED_TO_SLOPE) for phase
    // safe-offset math below. The page-wide SPEED_TO_SLOPE at line ~1466
    // has stale values and is used by other curve previews; keeping this
    // separate so the slider clamping uses the right numbers.
    const PHASE_SLOPE_TABLE = [
      0.0, 0.5889, 0.7852, 1.0708, 1.4722, 1.9630, 2.6173, 3.9260,
      5.8890, 11.778, 23.556, 70.668, 176.67,
    ];

    // How far the shifted midpoint will be pushed from the user's target time,
    // given the zone's brightness/slope config. Used to narrow the phase
    // slider so the user can't land on a target whose shifted midpoint would
    // escape the phase window (and then wrap into the wrong day). Ported
    // from area.html. Returns { minOffset, maxOffset } in hours.
    function computePhaseSafeOffset(zc, inAscend) {
      if (!zc) return { minOffset: 0, maxOffset: 0 };
      const brightnessPct = inAscend
        ? (zc.wake_brightness || 50)
        : (zc.bed_brightness || 50);
      if (brightnessPct === 50) return { minOffset: 0, maxOffset: 0 };
      const speed = inAscend ? zc.wake_speed : zc.bed_speed;
      const slopeMag = PHASE_SLOPE_TABLE[Math.max(1, Math.min(12, speed || 6))];
      if (!(slopeMag > 0)) return { minOffset: 0, maxOffset: 0 };
      const bMin = (zc.min_brightness || 2) / 100;
      const bMax = (zc.max_brightness || 100) / 100;
      const targetNorm = bMin + (bMax - bMin) * (brightnessPct / 100);
      const eps = 0.001;
      const clamped = Math.max(bMin + eps, Math.min(bMax - eps, targetNorm));
      const ratio = (clamped - bMin) / (bMax - bMin);
      const logTerm = Math.log((1 - ratio) / ratio);
      const slopeSigned = inAscend ? slopeMag : -slopeMag;
      const offset = logTerm / slopeSigned;
      const margin = 0.25; // 15-min buffer past the strict minimum
      return {
        minOffset: Math.max(0, -offset) + margin,
        maxOffset: Math.max(0, offset) + margin,
      };
    }

    // Phase 2: map slider pct (0-100) to a bed/wake time using the zone's
    // ascend_start / descend_start narrowed by computePhaseSafeOffset so the
    // user can't drag the thumb to a target whose midpoint would escape the
    // phase window (matches area-details slider behavior).
    function getPhaseBounds(areaId) {
      const status = areaStatus[areaId] || {};
      const phase = status.phase || getHomePhase();
      const zoneName = status.zone_name;
      const zc = zoneName ? cachedGlozones?.zones?.[zoneName] : null;
      const tAscend = zc?.ascend_start ?? 4.0;
      let tDescend = zc?.descend_start ?? 16.0;
      if (tDescend <= tAscend) tDescend += 24;
      const inAscend = phase === 'wake';
      const rawLo = inAscend ? tAscend : tDescend;
      const rawHi = inAscend ? tDescend : tAscend + 24;
      const { minOffset, maxOffset } = computePhaseSafeOffset(zc, inAscend);
      let lo = rawLo + minOffset;
      let hi = rawHi - maxOffset;
      // Fall back to raw bounds if narrowing inverted the window.
      if (hi - lo < 0.5) { lo = rawLo; hi = rawHi; }
      return { phase, lo, hi };
    }
    function bedTimeFromPct(areaId, pct) {
      const { lo, hi } = getPhaseBounds(areaId);
      const p = Math.max(0, Math.min(100, pct)) / 100;
      const target = lo + (hi - lo) * p;
      return ((target % 24) + 24) % 24;
    }

    async function setPhaseTime(areaId, targetTime) {
      try {
        const res = await fetch('./api/area/action', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ area_id: areaId, action: 'set_phase_time', target_time: targetTime })
        });
        if (res.ok) {
          setTimeout(async () => {
            try {
              const [s, zs] = await Promise.all([
                fetch('./api/area-status?lite=true'),
                fetch('./api/zone-states'),
              ]);
              if (s.ok) areaStatus = await s.json();
              if (zs.ok) { const j = await zs.json(); zoneStates = j.zone_states || {}; }
            } catch (e) { console.error(e); }
            sliderDragging = false;
            renderAreas();
          }, 500);
        } else {
          sliderDragging = false;
        }
      } catch (e) {
        sliderDragging = false;
        console.error('set_phase_time failed', e);
      }
    }

    function glozoneAffectedAreas(zoneName) {
      // Compare against the zone's STATE (midpoints/overrides) — what
      // glozone_down actually rewrites — instead of observed brightness/
      // kelvin, which lag during the fade after the action fires.
      return areas.filter(a => {
        const s = areaStatus[a.area_id] || {};
        if ((s.zone_name || a.zone_name) !== zoneName) return false;
        if (!s.is_on || s.is_circadian === false) return false;
        return isAreaDirty(s);
      });
    }

    function glozoneDown(zoneName) {
      const affectedAreas = glozoneAffectedAreas(zoneName);
      if (affectedAreas.length === 0) return;
      if (cachedConfig?.confirm_zone_pushes) {
        const zs = zoneStates[zoneName] || {};
        const bri = Math.round(zs.brightness ?? 0);
        const kelvin = Math.round(zs.kelvin ?? 4000);
        const areaList = affectedAreas.map(a => a.name).join('\n');
        const msg = `Send ${bri}% / ${kelvin}K to "${zoneName}"? These areas will adjust:\n\n${areaList}`;
        if (!confirm(msg)) return;
      }
      zoneAction(zoneName, 'glozone_down');
    }

    function rowFullSend(areaId) {
      const area = areas.find(a => a.area_id === areaId);
      if (!area) return;
      const status = areaStatus[areaId] || {};
      const zoneName = status.zone_name || area.zone_name;
      if (!zoneName) return;
      if (cachedConfig?.confirm_zone_pushes) {
        const bri = Math.round(status.brightness || 0);
        const kelvin = Math.round(status.kelvin || 4000);
        const affectedAreas = areas.filter(a => {
          const s = areaStatus[a.area_id] || {};
          if ((s.zone_name || a.zone_name) !== zoneName || !s.is_on) return false;
          return Math.round(s.brightness || 0) !== bri || Math.round(s.kelvin || 4000) !== kelvin;
        });
        if (affectedAreas.length > 0) {
          const areaList = affectedAreas.map(a => a.name).join('\n');
          const msg = `Full Send ${bri}% / ${kelvin}K to "${zoneName}"? These areas will adjust:\n\n${areaList}`;
          if (!confirm(msg)) return;
        }
      }
      rowAction(areaId, 'full_send');
    }

    // ============================================================
    // Mode Functions (Organize)
    // ============================================================

    function enterOrganizeMode() {
      currentMode = 'organize';
      stopHomeRefresh();
      renderAreas();
    }

    function exitMode() {
      currentMode = 'view';
      loadData();
      startHomeRefresh();
    }

    async function moveZone(zoneName, direction) {
      if (!cachedGlozones || !cachedGlozones.zones) return;
      const zoneNames = Object.keys(cachedGlozones.zones);
      const idx = zoneNames.indexOf(zoneName);
      if (idx < 0) return;
      const newIdx = idx + direction;
      if (newIdx < 0 || newIdx >= zoneNames.length) return;

      // Swap
      [zoneNames[idx], zoneNames[newIdx]] = [zoneNames[newIdx], zoneNames[idx]];

      try {
        const res = await fetch('./api/glozones/reorder', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ order: zoneNames })
        });
        if (res.ok) {
          // Re-fetch glozone data and re-render
          const gzRes = await fetch('./api/glozones');
          if (gzRes.ok) cachedGlozones = await gzRes.json();
          renderAreas();
        }
      } catch (err) {
        console.error('Error reordering zones:', err);
      }
    }

    async function createZoneFromEdit() {
      const name = prompt('New zone name:');
      if (!name || !name.trim()) return;

      try {
        const res = await fetch('./api/glozones', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: name.trim() })
        });
        if (res.ok) {
          const gzRes = await fetch('./api/glozones');
          if (gzRes.ok) cachedGlozones = await gzRes.json();
          // Also reload zone states
          const zsRes = await fetch('./api/zone-states');
          if (zsRes.ok) {
            const zs = await zsRes.json();
            zoneStates = zs.zone_states || {};
          }
          renderAreas();
        } else {
          const err = await res.json();
          alert(err.error || 'Error creating zone');
        }
      } catch (err) {
        console.error('Error creating zone:', err);
      }
    }

    async function deleteZoneFromEdit(zoneName) {
      // Count areas in this zone
      const zoneData = cachedGlozones?.zones?.[zoneName];
      const areaCount = zoneData?.areas?.length || 0;
      let msg;
      if (areaCount > 0) {
        // Find the default zone (where areas will be moved)
        const defaultZone = Object.entries(cachedGlozones?.zones || {})
          .find(([zn, zc]) => zc.is_default && zn !== zoneName)?.[0]
          || Object.keys(cachedGlozones?.zones || {}).find(zn => zn !== zoneName);
        msg = `Move ${areaCount} area(s) to "${defaultZone}" and delete "${zoneName}"?`;
      } else {
        msg = `Delete "${zoneName}"?`;
      }
      if (!confirm(msg)) return;

      try {
        const res = await fetch(`./api/glozones/${encodeURIComponent(zoneName)}`, {
          method: 'DELETE'
        });
        if (res.ok) {
          const [gzRes, zsRes, statusRes] = await Promise.all([
            fetch('./api/glozones'),
            fetch('./api/zone-states'),
            fetch('./api/area-status?lite=true')
          ]);
          if (gzRes.ok) cachedGlozones = await gzRes.json();
          if (zsRes.ok) {
            const zs = await zsRes.json();
            zoneStates = zs.zone_states || {};
          }
          if (statusRes.ok) areaStatus = await statusRes.json();
          renderAreas();
        } else {
          const err = await res.json();
          alert(err.error || 'Error deleting zone');
        }
      } catch (err) {
        console.error('Error deleting zone:', err);
      }
    }

    async function setDefaultZone(zoneName) {
      try {
        await fetch(`./api/glozones/${encodeURIComponent(zoneName)}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ is_default: true })
        });
        const gzRes = await fetch('./api/glozones');
        if (gzRes.ok) cachedGlozones = await gzRes.json();
        renderAreas();
      } catch (err) {
        console.error('Error setting default zone:', err);
      }
    }

    function startRenameZone(zoneName) {
      const nameEl = document.querySelector(`[data-edit-zone-name="${zoneName}"]`);
      if (!nameEl) return;
      const input = document.createElement('input');
      input.type = 'text';
      input.value = zoneName;
      input.className = 'edit-rename-input';

      async function doRename() {
        const newName = input.value.trim();
        if (!newName || newName === zoneName) {
          // Revert
          input.replaceWith(nameEl);
          return;
        }
        try {
          const res = await fetch(`./api/glozones/${encodeURIComponent(zoneName)}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: newName })
          });
          if (res.ok) {
            const gzRes = await fetch('./api/glozones');
            if (gzRes.ok) cachedGlozones = await gzRes.json();
            const zsRes = await fetch('./api/zone-states');
            if (zsRes.ok) {
              const zs = await zsRes.json();
              zoneStates = zs.zone_states || {};
            }
            renderAreas();
          } else {
            const err = await res.json();
            alert(err.error || 'Error renaming zone');
            input.replaceWith(nameEl);
          }
        } catch (err) {
          console.error('Error renaming zone:', err);
          input.replaceWith(nameEl);
        }
      }

      input.addEventListener('blur', doRename);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
        if (e.key === 'Escape') { input.removeEventListener('blur', doRename); input.replaceWith(nameEl); }
      });

      nameEl.replaceWith(input);
      input.focus();
      input.select();
    }

    // ============================================================
    // Drag and Drop for Edit Mode
    // ============================================================

    let dragState = { areaId: null, sourceZone: null };

    function onDragStart(e, areaId, zoneName) {
      dragState = { areaId, sourceZone: zoneName };
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', areaId);
      e.target.classList.add('dragging');
    }

    function onDragEnd(e) {
      e.target.classList.remove('dragging');
      // Clean up all drag-over indicators
      document.querySelectorAll('.drag-over, .drag-over-target').forEach(el => {
        el.classList.remove('drag-over', 'drag-over-target');
      });
      document.querySelectorAll('.drag-indicator').forEach(el => el.remove());
      dragState = { areaId: null, sourceZone: null };
    }

    function onZoneContentDragOver(e, zoneName) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const content = e.currentTarget;
      content.classList.add('drag-over');

      // Show insertion indicator
      document.querySelectorAll('.drag-indicator').forEach(el => el.remove());
      const rows = [...content.querySelectorAll('.edit-mode-row')];
      let insertBefore = null;
      for (const row of rows) {
        const rect = row.getBoundingClientRect();
        if (e.clientY < rect.top + rect.height / 2) {
          insertBefore = row;
          break;
        }
      }
      const indicator = document.createElement('div');
      indicator.className = 'drag-indicator';
      if (insertBefore) {
        content.insertBefore(indicator, insertBefore);
      } else {
        content.appendChild(indicator);
      }
    }

    function onZoneContentDragLeave(e) {
      // Only remove if actually leaving the container (not entering a child)
      if (!e.currentTarget.contains(e.relatedTarget)) {
        e.currentTarget.classList.remove('drag-over');
        e.currentTarget.querySelectorAll('.drag-indicator').forEach(el => el.remove());
      }
    }

    function onZoneHeaderDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      e.currentTarget.classList.add('drag-over-target');
    }

    function onZoneHeaderDragLeave(e) {
      e.currentTarget.classList.remove('drag-over-target');
    }

    async function onZoneContentDrop(e, targetZone) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      document.querySelectorAll('.drag-indicator').forEach(el => el.remove());

      const areaId = dragState.areaId;
      const sourceZone = dragState.sourceZone;
      if (!areaId) return;

      if (sourceZone === targetZone) {
        // Reorder within zone: compute new order from DOM position
        const content = e.currentTarget;
        const rows = [...content.querySelectorAll('.edit-mode-row')];
        const currentIds = rows.map(r => r.dataset.areaId).filter(id => id !== areaId);

        // Find insertion index
        let insertIdx = currentIds.length;
        for (let i = 0; i < rows.length; i++) {
          if (rows[i].dataset.areaId === areaId) continue;
          const rect = rows[i].getBoundingClientRect();
          if (e.clientY < rect.top + rect.height / 2) {
            insertIdx = currentIds.indexOf(rows[i].dataset.areaId);
            break;
          }
        }
        currentIds.splice(insertIdx, 0, areaId);

        try {
          await fetch(`./api/glozones/${encodeURIComponent(targetZone)}/reorder-areas`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ area_ids: currentIds })
          });
          const gzRes = await fetch('./api/glozones');
          if (gzRes.ok) cachedGlozones = await gzRes.json();
          renderAreas();
        } catch (err) {
          console.error('Error reordering areas:', err);
        }
      } else {
        // Cross-zone move: remove from source, add to target
        await crossZoneMove(areaId, sourceZone, targetZone);
      }
    }

    async function onZoneHeaderDrop(e, targetZone) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over-target');

      const areaId = dragState.areaId;
      const sourceZone = dragState.sourceZone;
      if (!areaId || sourceZone === targetZone) return;

      await crossZoneMove(areaId, sourceZone, targetZone);
    }

    async function crossZoneMove(areaId, sourceZone, targetZone) {
      try {
        // Find area name
        const area = areas.find(a => a.area_id === areaId);
        const areaName = area ? area.name : areaId;

        // Remove from source zone
        await fetch(`./api/glozones/${encodeURIComponent(sourceZone)}/areas/${encodeURIComponent(areaId)}`, {
          method: 'DELETE'
        });

        // Add to target zone
        await fetch(`./api/glozones/${encodeURIComponent(targetZone)}/areas`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ area_id: areaId, area_name: areaName })
        });

        // Refresh
        const [gzRes, statusRes] = await Promise.all([
          fetch('./api/glozones'),
          fetch('./api/area-status?lite=true')
        ]);
        if (gzRes.ok) cachedGlozones = await gzRes.json();
        if (statusRes.ok) areaStatus = await statusRes.json();
        renderAreas();
      } catch (err) {
        console.error('Error moving area:', err);
      }
    }

    async function removeStaleArea(areaId, zoneName) {
      try {
        const resp = await fetch(`./api/areas/${encodeURIComponent(areaId)}/purge`, { method: 'DELETE' });
        if (!resp.ok) throw new Error(`Failed to remove: ${resp.status}`);
        const gzRes = await fetch('./api/glozones');
        if (gzRes.ok) cachedGlozones = await gzRes.json();
        renderAreas();
      } catch (err) {
        console.error('Error removing stale area:', err);
      }
    }

    async function moveAreaToZone(selectEl, areaId, sourceZone) {
      const targetZone = selectEl.value;
      if (!targetZone) return;
      const row = selectEl.closest('.edit-mode-row');
      row.classList.add('moving-out');
      setTimeout(() => crossZoneMove(areaId, sourceZone, targetZone), 350);
    }

    // Click-to-edit home name. Span swaps to a text input; blur or Enter
    // commits to /api/config; Escape cancels. Updates cachedConfig in place
    // so the next render picks up the new value without a full refetch.
    async function editHomeName(spanEl) {
      homeNameEditing = true;  // pause renderAreas() so periodic refresh doesn't clobber the input
      const current = spanEl.textContent;
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'home-name-input';
      input.value = current === 'Your home' ? '' : current;
      input.placeholder = 'Your home';
      spanEl.replaceWith(input);
      input.focus();
      input.select();

      let committed = false;
      const commit = async (save) => {
        if (committed) return;
        committed = true;
        const newName = save ? (input.value.trim() || '') : current;
        const span = document.createElement('span');
        span.className = 'home-name-heading';
        span.id = 'home-name-heading';
        span.title = 'Click to rename';
        span.onclick = () => editHomeName(span);
        span.textContent = newName || 'Your home';
        input.replaceWith(span);
        homeNameEditing = false;  // re-enable renderAreas
        if (save && newName !== current) {
          if (cachedConfig) cachedConfig.home_name = newName;
          try {
            await fetch('./api/config', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ home_name: newName }),
            });
          } catch (e) { console.error('Save home name failed:', e); }
        }
      };
      input.addEventListener('blur', () => commit(true));
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
        else if (e.key === 'Escape') { e.preventDefault(); commit(false); }
      });
    }

    function renderAreas() {
      if (sliderDragging) return; // Don't re-render while user is dragging
      if (homeNameEditing) return; // Don't re-render while inline-editing home name
      const container = document.getElementById('areas-container');

      // Merge area data with status
      const mergedAreas = areas.map(area => {
        const status = areaStatus[area.area_id] || {};
        return {
          ...area,
          is_on: status.is_on || false,
          is_circadian: status.is_circadian !== false,  // default true when undefined
          brightness: status.is_on ? (status.actual_brightness ?? status.brightness ?? 0) : 0,
          kelvin: status.kelvin || 4000,
          frozen: status.frozen || false,
          boosted: status.boosted || false,
          boost_brightness: status.boost_brightness || null,
          boost_expires_at: status.boost_expires_at || null,
          boost_started_from_off: status.boost_started_from_off || false,
          is_motion_coupled: status.is_motion_coupled || false,
          motion_expires_at: status.motion_expires_at || null,
          motion_warning_active: status.motion_warning_active || false,
          zone_name: status.zone_name || null,
          min_brightness: status.min_brightness ?? null,
          max_brightness: status.max_brightness ?? null,
          min_color_temp: status.min_color_temp ?? null,
          max_color_temp: status.max_color_temp ?? null,
          brightness_mid: status.brightness_mid ?? null,
          color_mid: status.color_mid ?? null,
          color_override: status.color_override ?? null,
          brightness_override: status.brightness_override ?? null,
          brightness_override_set_at: status.brightness_override_set_at ?? null,
          color_override_set_at: status.color_override_set_at ?? null,
          frozen_at: status.frozen_at ?? null,
          solar_breakdown: status.solar_breakdown ?? null
        };
      });

      // Sort areas within each zone group
      // Phase 3: in Tune mode + Setting sort, reorder within-zone by raw setting value.
      // Sun: descending (highest exposure first — see which rooms are most sun-tuned).
      // Balance: ascending (lowest first — Min, Very Dim, Dim … so dim rooms surface).
      const sortAreas = (list) => {
        if (!isTuneMode(homePillMode) || homeTuneSort !== 'setting') return list;
        if (homePillMode === 'sun') {
          return [...list].sort((a, b) => (getAreaTune(b.area_id).natural_light_exposure) - (getAreaTune(a.area_id).natural_light_exposure));
        }
        return [...list].sort((a, b) => (getAreaTune(a.area_id).brightness_factor) - (getAreaTune(b.area_id).brightness_factor));
      };

      function isAreaMismatched(area) {
        if (!area.zone_name || !zoneStates[area.zone_name]) return false;
        const rs = zoneStates[area.zone_name].runtime_state || {};
        const differs = (a, b, tol) => {
          if (a == null && b == null) return false;
          if (a == null || b == null) return true;
          return Math.abs(a - b) >= tol;
        };
        return differs(area.brightness_mid, rs.brightness_mid, 0.05) ||
               differs(area.color_mid, rs.color_mid, 0.05) ||
               differs(area.frozen_at, rs.frozen_at, 0.05) ||
               differs(area.color_override, rs.color_override, 10) ||
               differs(area.brightness_override, rs.brightness_override, 1) ||
               differs(area.brightness_override_set_at, rs.brightness_override_set_at, 0.1) ||
               differs(area.color_override_set_at, rs.color_override_set_at, 0.1);
      }

      // Tune mode requires a zone + zone runtime state to compute Baseline /
      // Final. Areas without zone state can't be tuned, so hide them — except
      // in Organize mode where the user manages them.
      const filtered = (isTuneMode(homePillMode) && currentMode !== 'organize')
        ? mergedAreas.filter(a => a.zone_name && zoneStates[a.zone_name])
        : mergedAreas;

      // Group by zone
      const zoneGroups = {};
      const unassigned = [];
      for (const area of filtered) {
        if (area.zone_name) {
          if (!zoneGroups[area.zone_name]) zoneGroups[area.zone_name] = [];
          zoneGroups[area.zone_name].push(area);
        } else {
          unassigned.push(area);
        }
      }

      // Sort zone names, put Unassigned at end
      const zoneNames = Object.keys(zoneGroups).sort();

      // Collapsed state
      const collapsedState = getCollapsedZones();

      // Chevron icon
      const chevronIcon = `<span class="zone-chevron">&#x203A;</span>`;

      // Power icon (shared for zone header)
      const powerIconSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18.36 6.64a9 9 0 1 1-12.73 0M12 2v10"/></svg>`;

      // Rhythm Zone Reset icon: rewind arrow
      const glozoneResetIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>`;

      // Rhythm Zone Down icon: double-down chevron, styled to match the
      // area-row down icon (24×24 viewBox, stroke 3, rounded caps) so the
      // zone-header version reads as the same family as the per-area button
      // — just doubled to signal "zone-wide" rather than "single area".
      const glozoneDownIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 5 12 12 19 5"/><polyline points="5 13 12 20 19 13"/></svg>`;

      // Build toolbar HTML
      const homeName = cachedConfig?.home_name || 'Your home';
      // Phase 1: always-visible segmented bar with 3 pills. No popover collapse.
      const viewValue = currentMode === 'organize'
        ? 'organize'
        : (viewMode === 'onoff' ? 'onoff' : 'home');
      const VIEWS = [
        { value: 'onoff',    label: 'Active' },
        { value: 'home',     label: 'All' },
      ];
      // Phase 3: in Tune modes, segmented bar becomes Area / <Sun exposure | Balance> sort.
      const inTune = isTuneMode(homePillMode);
      const settingSortLabel = homePillMode === 'sun' ? 'Sun exposure' : 'Balance';
      const segmentsHtml = inTune
        ? `
          <button class="view-segment ${homeTuneSort === 'custom' ? 'active' : ''}" data-tune-sort="custom">Area</button>
          <button class="view-segment ${homeTuneSort === 'setting' ? 'active' : ''}" data-tune-sort="setting">${settingSortLabel}</button>
        `
        : VIEWS.map(v => {
            const cls = v.value === viewValue ? 'view-segment active' : 'view-segment';
            return `<button class="${cls}" data-view="${v.value}">${v.label}</button>`;
          }).join('');

      // Phase 2: action mode pill (top-right) — picks knob for slider + chevrons.
      // Bed is phase-aware (Bed if descending, Wake if ascending).
      const homePhase = getHomePhase();  // 'wake' | 'bed' | null
      const bedLabel = homePhase === 'wake' ? 'Wake time' : 'Bed time';
      const modeLabels = { brightness: 'Brightness', color: 'Color', bed: bedLabel, sun: 'Sun exposure', balance: 'Balance' };
      // In organize mode the pill reflects that, so the user has a way back out
      // (clicking any other option exits organize via the click handler).
      // Mode prefix: "Adjusting" for Brightness/Color/Bed, "Tuning" for Sun/Balance.
      // Organize mode skips the prefix (the label is its own complete phrase).
      const modePrefix = currentMode === 'organize'
        ? ''
        : (isTuneMode(homePillMode) ? 'Tune: ' : 'Adjust: ');
      const activeModeLabel = (currentMode === 'organize'
        ? 'Reorder areas'
        : (modeLabels[homePillMode] || 'Brightness'));
      const modeOption = (val, label) => {
        const cls = homePillMode === val ? 'action-popover-option active' : 'action-popover-option';
        return `<div class="${cls}" data-pill-mode="${val}">${label}</div>`;
      };
      const popoverOpenClass = _modePopoverOpen ? ' open' : '';
      // Caret SVG matches zone-chevron family
      const caretSvg = `<span class="action-pill-caret"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 5 6 8 9 5"/></svg></span>`;
      // Tune-mode pill gets a hue-tinted bg + border via .is-tune-sun /
      // .is-tune-balance — matches the thin axis bar below + the per-row
      // stripe colors so the "you're tuning X" cue is consistent.
      const pillTuneClass = homePillMode === 'sun'
        ? ' is-tune-sun'
        : (homePillMode === 'balance' ? ' is-tune-balance' : '');
      const modePillHtml = `
        <div class="action-pill${pillTuneClass}" id="home-mode-pill" title="What slider & chevrons control">
          <span class="action-pill-prefix">${modePrefix}</span><span id="home-mode-label">${activeModeLabel}</span>${caretSvg}
          <div class="action-popover${popoverOpenClass}" id="home-mode-popover">
            <div class="action-popover-section-label">Adjust <span class="action-popover-section-sub">${(() => { const t = getNextPhaseBoundaryLabel(); return t ? 'resets @ ' + t : 'resets at phase change'; })()}</span></div>
            ${modeOption('brightness', 'Brightness')}
            ${modeOption('color', 'Color')}
            ${modeOption('bed', bedLabel)}
            <div class="action-popover-divider"></div>
            <div class="action-popover-section-label">Tune <span class="action-popover-section-sub">saved per area</span></div>
            ${modeOption('sun', 'Sun exposure')}
            ${modeOption('balance', 'Balance')}
            <div class="action-popover-divider"></div>
            <div class="action-popover-option ${currentMode === 'organize' ? 'active' : ''}" data-pill-mode="organize">Reorder areas</div>
          </div>
        </div>
      `;

      // Status line: rooms-on count + sun pill. Numbers/values filled by refreshHomeStatus().
      // Wrapped in .home-sticky-top so the title, status, mode pill, and view
      // segments stay pinned beneath the nav as the user scrolls.
      let html = `
        <div class="home-sticky-top">
          <!-- Row 1: home name (L) · mode pill (R) — identity + action -->
          <div class="home-row home-row-1">
            <span class="home-name-heading" id="home-name-heading" ondblclick="editHomeName(this)" title="Double-click (or tap and hold) to rename" style="touch-action: manipulation;">${homeName || ''}</span>
            <span class="home-row-spacer"></span>
            ${modePillHtml}
          </div>
          <!-- Row 2: active count (L) · sun intensity (R) — state -->
          <div class="home-row home-row-2">
            <span class="rooms-on-count" id="rooms-on-count">${computeRoomsOnText()}</span>
            <span class="home-row-spacer"></span>
            <button type="button" class="outdoor-chip" id="home-sun-pill" aria-expanded="false" title="Sun intensity">
              <span class="outdoor-chip-icon" id="home-sun-icon" data-sun-icon style="${sunIconStyleString(_cachedSunPct)}">☀</span>
              <span id="home-sun-pct" data-sun-pct>${cachedSunPctText()}</span>
            </button>
            <div class="outdoor-chip-popover" id="home-sun-popover" hidden></div>
          </div>
          <!-- Row 3: list controls (L) -->
          <div class="seg-row home-row-3">
            <span class="seg-label">${inTune ? 'sort' : 'view'}</span>
            <div class="view-segments-bar" id="home-view-segments" role="tablist" title="Page mode">
              ${segmentsHtml}
            </div>
          </div>
          ${inTune ? `<div class="tune-axis-bar tune-axis-${homePillMode}"></div>` : ''}
        </div>
      `;

      const renderZoneGroup = (zoneName, areasInZone, zoneIndex, totalZones, { allOff = false } = {}) => {
        const isCollapsed = collapsedState[zoneName] || false;
        const sorted = currentMode === 'organize' ? areasInZone : sortAreas(areasInZone);
        const escapedZoneName = zoneName.replace(/'/g, "\\'");

        if (currentMode === 'organize') {
          // Edit mode: simplified header with arrows, rename, delete
          const upDisabled = zoneIndex === 0 ? 'disabled' : '';
          const downDisabled = zoneIndex === totalZones - 1 ? 'disabled' : '';

          // Build move-to-zone options (all zones except current, sorted alpha)
          const allZoneNames = Object.keys(cachedGlozones?.zones || {});
          const otherZones = allZoneNames.filter(z => z !== zoneName).sort();
          const moveOptions = otherZones.map(z => `<option value="${z}">${z}</option>`).join('');

          const areaRows = sorted.map(area => `
            <div class="edit-mode-row" draggable="true" data-area-id="${area.area_id}"
              ondragstart="onDragStart(event, '${area.area_id}', '${escapedZoneName}')"
              ondragend="onDragEnd(event)">
              <span class="drag-handle">&#9776;</span>
              <span style="flex: 1; font-size: 0.9rem;">${area.name}</span>
              ${otherZones.length > 0 ? `<select class="move-zone-select" onchange="moveAreaToZone(this, '${area.area_id}', '${escapedZoneName}')">
                <option value="" disabled selected>Move to\u2026</option>
                ${moveOptions}
              </select>` : ''}
            </div>
          `).join('');

          // Find stale areas: in zone config but not in HA
          const haAreaIds = new Set(areas.map(a => a.area_id));
          const configAreas = cachedGlozones?.zones?.[zoneName]?.areas || [];
          const staleRows = configAreas
            .filter(ca => {
              const cId = typeof ca === 'object' ? ca.id : ca;
              return !haAreaIds.has(cId);
            })
            .map(ca => {
              const cId = typeof ca === 'object' ? ca.id : ca;
              const cName = (typeof ca === 'object' ? ca.name : ca) || cId;
              return `
                <div class="edit-mode-row stale-area-row" data-area-id="${cId}">
                  <span style="flex: 1; font-size: 0.9rem; color: var(--muted); font-style: italic;">${cName} <span style="font-size: 0.75rem;">(removed from HA)</span></span>
                  <button class="edit-icon-btn danger" onclick="event.stopPropagation(); removeStaleArea('${cId}', '${escapedZoneName}')" title="Remove">&#128465;</button>
                </div>
              `;
            }).join('');

          return `
            <div class="zone-group">
              <div class="edit-zone-header ${isCollapsed ? 'collapsed' : ''}" data-zone="${zoneName}"
                ondragover="onZoneHeaderDragOver(event)"
                ondragleave="onZoneHeaderDragLeave(event)"
                ondrop="onZoneHeaderDrop(event, '${escapedZoneName}')">
                <div class="edit-zone-arrows">
                  <button class="edit-zone-arrow" ${upDisabled} onclick="event.stopPropagation(); moveZone('${escapedZoneName}', -1)" title="Move up">&#9650;</button>
                  <button class="edit-zone-arrow" ${downDisabled} onclick="event.stopPropagation(); moveZone('${escapedZoneName}', 1)" title="Move down">&#9660;</button>
                </div>
                <span class="edit-zone-name" data-edit-zone-name="${zoneName}" onclick="event.stopPropagation(); toggleZone('${escapedZoneName}', this)">${zoneName}</span>
                <button class="edit-icon-btn default-star ${cachedGlozones?.zones?.[zoneName]?.is_default ? 'active' : ''}" onclick="event.stopPropagation(); setDefaultZone('${escapedZoneName}')" title="Default zone">&#9733;</button>
                <div class="edit-zone-actions">
                  <button class="edit-icon-btn" onclick="event.stopPropagation(); startRenameZone('${escapedZoneName}')" title="Rename">&#9998;</button>
                  <button class="edit-icon-btn danger" onclick="event.stopPropagation(); deleteZoneFromEdit('${escapedZoneName}')" title="Delete">&#128465;</button>
                </div>
              </div>
              <div class="zone-content ${isCollapsed ? 'hidden' : ''}" data-zone-table="${zoneName}"
                ondragover="onZoneContentDragOver(event, '${escapedZoneName}')"
                ondragleave="onZoneContentDragLeave(event)"
                ondrop="onZoneContentDrop(event, '${escapedZoneName}')">
                ${areaRows}
                ${staleRows}
              </div>
            </div>
          `;
        }

        // Normal mode: zone header (no slider)
        let zoneHeaderStyle = '';
        let zoneTextColor = 'var(--text)';
        let zoneMismatchDot = '';
        let zoneFrozenIndicator = '';

        const zs = zoneStates[zoneName];
        // Phase 3: in Tune modes, neutralize the zone-header tint — focus on tuning,
        // not current zone color/brightness.
        const tuneNeutralHeader = isTuneMode(homePillMode);
        if (zs) {
          const zoneBri = zs.brightness;
          const zoneKelvin = zs.kelvin;
          const cctColor = cctToRGB(zoneKelvin);
          const tintedColor = tintColorByBrightness(cctColor, zoneBri);
          zoneTextColor = readableTextColor(tintedColor);
          zoneHeaderStyle = `background: ${tintedColor}; color: ${zoneTextColor}; --header-fill: ${zoneBri / 100};`;
          if (allOff || tuneNeutralHeader) {
            zoneHeaderStyle = '';
            zoneTextColor = 'var(--text)';
          }

          // Zone diverged from pure rhythm — show a clickable reset affordance
          // next to the zone name (replaces the standalone reset button that used
          // to live on the right side). Single-click resets; no menu (zone has
          // only one reasonable action: snap back to rhythm).
          const rs = zs.runtime_state;
          if (rs && (rs.brightness_mid != null || rs.color_mid != null || rs.frozen_at != null ||
                     rs.color_override != null || rs.brightness_override != null)) {
            zoneMismatchDot = `<span class="mismatch-dot-area diverge-tune" onclick="event.stopPropagation(); glozoneReset('${escapedZoneName}')" title="Reset zone to rhythm"></span>`;
          }

          // Frozen indicator on zone header
          if (rs && rs.frozen_at != null) {
            zoneFrozenIndicator = `<span class="row-status-sym timer-frozen">❄</span>`;
          }
        }

        const bigChevron = `<span class="zone-chevron-big-tap" onclick="event.stopPropagation(); toggleZone('${escapedZoneName}', this)" title="${isCollapsed ? 'Expand' : 'Collapse'}"><span class="zone-chevron-big">&#x203A;</span></span>`;
        return `
          <div class="zone-group">
            <div class="zone-header ${isCollapsed ? 'collapsed' : ''} ${allOff ? 'no-tint' : ''} ${tuneNeutralHeader ? 'tune' : ''}" data-zone="${zoneName}" style="${zoneHeaderStyle}">
              ${bigChevron}
              ${(() => {
                const rhythmPhase = getZoneRhythmPhase(zoneName, sorted);
                const phaseChip = getZonePhaseDivergenceChip(zoneName, sorted);
                const overrideChips = getZoneDivergenceChips(zoneName);
                const subrow = (phaseChip || overrideChips || zoneMismatchDot)
                  ? `<span class="zone-subrow">${phaseChip}${overrideChips}${zoneMismatchDot}</span>`
                  : '';
                return `
                  <div class="zone-name-group" style="color: ${zoneTextColor};">
                    <span class="zone-title-row">
                      <a class="zone-rhythm-link" href="./zone/${encodeURIComponent(zoneName)}?back=home" style="color: ${zoneTextColor};">${zoneName}</a>
                      <span class="zone-count">(${sorted.length})</span>
                      ${rhythmPhase ? `<span class="zone-phase-label${phaseChip ? ' phase-shifted' : ''}" style="color: ${zoneTextColor};">${rhythmPhase}</span>` : ''}
                    </span>
                    ${subrow}
                  </div>`;
              })()}
              ${zoneFrozenIndicator}
              <div class="row-controls">
                ${(tuneNeutralHeader || glozoneAffectedAreas(zoneName).length === 0) ? '' : `<button class="row-btn" onclick="event.stopPropagation(); glozoneDown('${escapedZoneName}')" title="Push rhythm zone state to all areas">${glozoneDownIcon}</button>`}
              </div>
            </div>
            <div class="zone-content ${isCollapsed ? 'hidden' : ''}" data-zone-table="${zoneName}">
              ${sorted.map(area => renderAreaRow(area)).join('')}
            </div>
          </div>
        `;
      };

      if (currentMode === 'organize') {
        // Organize mode: use glozone API order (preserves user ordering)
        const gzZonesObj = cachedGlozones?.zones || {};
        const gzZoneNames = Object.keys(gzZonesObj);
        const totalZones = gzZoneNames.length;

        // Build area list per zone from glozone data (preserves area order within zone)
        for (let i = 0; i < gzZoneNames.length; i++) {
          const zoneName = gzZoneNames[i];
          const gzData = gzZonesObj[zoneName];
          const zoneAreaIds = (gzData.areas || []).map(a => typeof a === 'object' ? a.id : a);
          const areasInZone = zoneAreaIds.map(id => mergedAreas.find(a => a.area_id === id)).filter(Boolean);
          html += renderZoneGroup(zoneName, areasInZone, i, totalZones);
        }

        // Unassigned areas at the end
        if (unassigned.length > 0) {
          html += renderZoneGroup('Unassigned', unassigned, totalZones, totalZones + 1);
        }

        // + New Zone at the bottom
        html += `<div style="text-align: center; padding: 16px 0;">
          <a href="#" onclick="event.preventDefault(); createZoneFromEdit()" style="font-size: 0.85rem; color: var(--accent); text-decoration: none;">+ New Zone</a>
        </div>`;
      } else if (viewMode === 'onoff' && !isTuneMode(homePillMode)) {
        // Phase 3: "Active" view shows just the on rooms (zone-grouped) plus a
        // separate "Upcoming" section for off rooms with a scheduled auto-on.
        // Off rooms with no schedule are filtered out entirely.
        // Skipped in Tune modes (Tune always shows zone-grouped, all areas).
        const isEffectivelyOn = (a) => a.is_on && a.is_circadian;
        // Off rooms with EITHER auto-on or auto-off scheduled appear in Upcoming.
        // The auto-off case ("baby's room will auto-off at 10p if it's on then")
        // is still useful info even when the room is currently off.
        const hasUpcoming = (a) => {
          const s = areaStatus[a.area_id] || {};
          return !!(s.next_auto_on || s.next_auto_off);
        };
        // Earliest pending event regardless of direction — used to sort and to
        // pick which schedule pill to show on the row.
        const nextEventTime = (a) => {
          const s = areaStatus[a.area_id] || {};
          const evs = [s.next_auto_on, s.next_auto_off].filter(Boolean);
          if (!evs.length) return Infinity;
          return Math.min(...evs.map(e => (e.fire_offset ?? e.offset ?? 999) * 24 + (e.decimal_hour ?? 0)));
        };
        const onAreas = filtered.filter(isEffectivelyOn);
        const upcomingAreas = filtered.filter(a => !isEffectivelyOn(a) && hasUpcoming(a));

        // Group on rooms by zone, ordered by glozone API zone order.
        if (onAreas.length > 0) {
          const subGroups = {};
          const subUnassigned = [];
          for (const area of onAreas) {
            if (area.zone_name) {
              (subGroups[area.zone_name] = subGroups[area.zone_name] || []).push(area);
            } else {
              subUnassigned.push(area);
            }
          }
          const gzZoneNames = Object.keys(cachedGlozones?.zones || {});
          const subNames = gzZoneNames.filter(zn => subGroups[zn]);
          for (const zn of Object.keys(subGroups)) {
            if (!subNames.includes(zn)) subNames.push(zn);
          }
          for (const zn of subNames) {
            const gzData = (cachedGlozones?.zones || {})[zn];
            const customOrder = gzData ? (gzData.areas || []).map(a => typeof a === 'object' ? a.id : a) : [];
            const sorted = customOrder.length > 0
              ? subGroups[zn].sort((a, b) => {
                  const ai = customOrder.indexOf(a.area_id);
                  const bi = customOrder.indexOf(b.area_id);
                  return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
                })
              : subGroups[zn];
            html += renderZoneGroup(zn, sorted);
          }
          if (subUnassigned.length > 0) html += renderZoneGroup('Unassigned', subUnassigned);
        }

        // Upcoming section — header styled like a zone header (chevron + name +
        // count); collapse state persisted via collapsedState['__upcoming__'].
        if (upcomingAreas.length > 0) {
          upcomingAreas.sort((a, b) => nextEventTime(a) - nextEventTime(b));
          const upCollapsed = collapsedState['__upcoming__'] || false;
          html += `
            <div class="zone-group">
              <div class="zone-header upcoming-header ${upCollapsed ? 'collapsed' : ''}" data-zone="__upcoming__" onclick="event.stopPropagation(); toggleZone('__upcoming__', this)" title="${upCollapsed ? 'Expand' : 'Collapse'}">
                <span class="zone-chevron-big-tap"><span class="zone-chevron-big">&#x203A;</span></span>
                <div class="zone-name-group">
                  <span style="display: inline-flex; align-items: baseline; gap: 6px;">
                    <span class="zone-rhythm-link">Upcoming</span>
                    <span class="zone-count">(${upcomingAreas.length})</span>
                  </span>
                </div>
              </div>
              <div class="zone-content ${upCollapsed ? 'hidden' : ''}" data-zone-table="__upcoming__">
                ${upcomingAreas.map(area => renderAreaRow(area)).join('')}
              </div>
            </div>
          `;
        }

        // Empty state: no on rooms AND no upcoming.
        if (onAreas.length === 0 && upcomingAreas.length === 0) {
          html += `
            <div style="text-align: center; padding: 48px 24px; color: var(--muted);">
              All rooms off, nothing scheduled.<br>
              <span style="font-size: 0.85rem;">Switch to <b>All</b> to see every room.</span>
            </div>
          `;
        }
      } else if (viewMode === 'custom' || isTuneMode(homePillMode)) {
        // Custom: use API zone order (preserves user arrangement from edit mode)
        const gzZonesObj = cachedGlozones?.zones || {};
        const gzZoneNames = Object.keys(gzZonesObj);

        for (const zoneName of gzZoneNames) {
          const gzData = gzZonesObj[zoneName];
          const zoneAreaIds = (gzData.areas || []).map(a => typeof a === 'object' ? a.id : a);
          const areasInZone = zoneAreaIds.map(id => mergedAreas.find(a => a.area_id === id)).filter(Boolean);
          html += renderZoneGroup(zoneName, areasInZone);
        }
        if (unassigned.length > 0) {
          html += renderZoneGroup('Unassigned', unassigned);
        }
      } else {
        // Alpha: flat list, all areas sorted alphabetically, no zone headers
        const allSorted = [...filtered].sort((a, b) => a.name.localeCompare(b.name));
        html += `<div class="zone-content no-header">${allSorted.map(area => renderAreaRow(area)).join('')}</div>`;
      }

      // Handle empty state
      if (filtered.length === 0) {
        html = `
          <div style="text-align: center; padding: 48px; color: var(--muted);">
            ${mergedAreas.length > 0 ? 'No areas match the current filter.' : 'No areas found in Home Assistant.'}
          </div>
        `;
      }

      container.innerHTML = html;
      initRowSliders();
      updateAllSliderFills();
      updateHomeTimers();
      syncPulsesToWallClock(container);
      initStickyHeaders();
    }

    let _stickyClone = null;
    let _stickyZone = null;
    let _stickyObserver = null;
    function initStickyHeaders() {
      // Phase 3: zone-header stickiness now lives in pure CSS (position: sticky).
      // The legacy clone-based approach below is disabled — CSS sticky stacks
      // cleanly with .home-sticky-top without needing JS coordination.
      if (_stickyClone) { _stickyClone.remove(); _stickyClone = null; _stickyZone = null; }
      return;
    }

    function updateStickyHeader() {
      const groups = document.querySelectorAll('.zone-group');
      let activeHeader = null;
      let activeZone = null;

      for (const group of groups) {
        const header = group.querySelector('.zone-header');
        const content = group.querySelector('.zone-content');
        if (!header || !content) continue;
        if (content.classList.contains('hidden')) continue;

        const groupRect = group.getBoundingClientRect();
        const headerH = header.offsetHeight;

        // Zone group is partially scrolled past the top and still visible
        if (groupRect.top < 0 && groupRect.bottom > headerH) {
          activeHeader = header;
          activeZone = header.getAttribute('data-zone');
        }
      }

      if (activeHeader && activeZone !== _stickyZone) {
        if (_stickyClone) _stickyClone.remove();
        _stickyClone = activeHeader.cloneNode(true);
        _stickyClone.classList.add('zone-header-sticky');
        const origRect = activeHeader.getBoundingClientRect();
        _stickyClone.style.width = origRect.width + 'px';
        _stickyClone.style.left = origRect.left + 'px';
        document.body.appendChild(_stickyClone);
        _stickyZone = activeZone;
      } else if (activeHeader && activeZone === _stickyZone && _stickyClone) {
        // Update position/width in case of resize
        const origRect = activeHeader.getBoundingClientRect();
        _stickyClone.style.width = origRect.width + 'px';
        _stickyClone.style.left = origRect.left + 'px';
      } else if (!activeHeader && _stickyClone) {
        _stickyClone.remove();
        _stickyClone = null;
        _stickyZone = null;
      }
    }

    function renderAreaRow(area) {
      const status = areaStatus[area.area_id] || {};
      const isCircadian = status.is_circadian !== false;  // Default true if undefined

      // Circadian-off: muted row with enable CTA — UNLESS we're in Tune mode,
      // in which case the area's sun_exposure / brightness_factor are still
      // persistent settings worth tuning even when circadian is disabled
      // (they apply when circadian is re-enabled or the lights turn on).
      if (!isCircadian && !isTuneMode(homePillMode)) {
        const sunIconSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
        return `
          <div class="area-row circadian-off" onclick="event.stopPropagation(); rowAction('${area.area_id}', 'circadian_on')">
            <span class="area-row-name">${area.name}</span>
            <span class="circadian-enable-cta">${sunIconSvg} Enable</span>
          </div>
        `;
      }

      const style = getRowStyle(area);
      const { leftControls, rightControls } = getRowControls(area);
      const sliderPct = getModeSliderPct(area);
      const mismatchDot = getMismatchDot(area);
      const phaseMidpoint = getPhaseMidpoint(area);
      const readout = getModeReadout(area);
      const divChips = getDivergenceChips(area);

      // Phase 1+2: off rooms collapse to a single-line row in Adjust modes —
      // power · name · status · chips · schedule pill. In Tune mode, off rooms
      // fall through to the full-row layout so the slider + chevrons are usable.
      if (!area.is_on && !isTuneMode(homePillMode)) {
        // Off rows: name · schedule pill only. Divergence chips and the
        // reset/send-to-zone affordance are suppressed — those are about
        // adjusting live state, which doesn't apply to off rooms.
        return `
          <div class="area-row area-row-off mode-${homePillMode}" style="--row-bg: ${style.bg}; --row-text: ${style.textColor}; --row-fill: ${style.fill.toFixed(3)}; --tune-stripe-left: ${(style.stripe && style.stripe.left) || 'transparent'}; --tune-stripe-right: ${(style.stripe && style.stripe.right) || 'transparent'}; --slider-track-bg: ${buildSliderTrackGradient(area) || 'rgba(0,0,0,0.35)'};">
            ${leftControls}
            <div class="row-middle">
              <div class="row-middle-top">
                <span class="area-row-name" onclick="openAreaModal('${area.area_id}')">${area.name}</span>
                <span class="row-active-status" data-area-active="${area.area_id}"></span>
                <span class="row-off-flex"></span>
                <span data-area-schedule="${area.area_id}" data-zone-name="${area.zone_name || ''}">
                  <span class="row-schedule-right" data-area-timer="${area.area_id}"></span>
                </span>
              </div>
            </div>
          </div>
        `;
      }

      // Phase 3+polish: status row is a single left-aligned, wrap-capable strip
      // — schedule pill first (most-common piece of info), then state chip
      // (motion/fade/boost/freeze), then divergence chips. All share the same
      // pill visual language so the row reads as one continuous info series.
      // Tune mode replaces the entire strip with the impact compound.
      const inTune = isTuneMode(homePillMode);
      const tuneImpactHtml = inTune ? getTuneImpactHtml(area) : '';
      // Adjust mode row 3 layout:
      //   left:  reset dot + divergence chips  (symmetric with zone header)
      //   right: schedule pill                  (margin-left:auto)
      // Active-state chip moves up to row 1, inline with name.
      const statusStripContent = inTune
        ? tuneImpactHtml
        : `${divChips}${mismatchDot}<span class="row-schedule-pill" data-area-timer="${area.area_id}"></span>`;
      const statusRowAttr = inTune ? '' : `data-area-schedule="${area.area_id}" data-zone-name="${area.zone_name || ''}"`;
      return `
        <div class="area-row mode-${homePillMode}" style="--row-bg: ${style.bg}; --row-text: ${style.textColor}; --row-fill: ${style.fill.toFixed(3)}; --tune-stripe-left: ${(style.stripe && style.stripe.left) || 'transparent'}; --tune-stripe-right: ${(style.stripe && style.stripe.right) || 'transparent'}; --slider-track-bg: ${buildSliderTrackGradient(area) || 'rgba(0,0,0,0.35)'};">
          ${leftControls}
          <div class="row-middle">
            <div class="row-middle-top">
              <span class="area-row-name" onclick="openAreaModal('${area.area_id}')">${area.name}</span>
              ${inTune ? '' : `<span class="row-active-status" data-area-active="${area.area_id}"></span>`}
              <span class="row-drag-value" data-area-drag-value="${area.area_id}"></span>
              <span class="row-readout" data-area-readout="${area.area_id}">${readout}</span>
            </div>
            <div class="row-slider-track" data-area-id="${area.area_id}" data-bmin="${area.min_brightness ?? 1}" data-bmax="${area.max_brightness ?? 100}" data-cmin="${getColorSliderRange(area).cMin}" data-cmax="${getColorSliderRange(area).cMax}">
              <div class="row-slider-fill"></div>
              <div class="row-slider-fill-drag"></div>
              <div class="row-slider-thumb-ghost"></div>
              <div class="row-slider-thumb" style="left: ${sliderPct.toFixed(1)}%"></div>
            </div>
            <div class="row-status-row" ${statusRowAttr}>${statusStripContent}</div>
          </div>
          ${rightControls}
        </div>
      `;
    }

    // Phase 3: compute "sun dims X% · final Y%" or "balance dims/lifts X% · final Y%"
    // for the row's status line in Tune modes. Ports computeNlFactor /
    // computeNowBrightness / impact functions from tune.html.
    function computeNlFactor(exposure, outdoorNorm, sensitivity) {
      if (exposure <= 0 || outdoorNorm <= 0) return 1.0;
      return Math.max(0, 1 - exposure * outdoorNorm * sensitivity);
    }
    function computeNowBri(rhythmBri, factor, exposure, outdoorNorm, sensitivity) {
      const nl = computeNlFactor(exposure, outdoorNorm, sensitivity);
      return Math.min(100, Math.round(rhythmBri * nl * factor));
    }
    // Compute the Tune-mode breakdown components for an area. Returns:
    //   baseline: brightness if the factor being tuned were neutral (sun=0
    //             for Sun mode, factor=1.0 for Balance), other tune stays.
    //   delta:    signed shift this factor introduces (withAll - baseline).
    //   final:    observed bulb brightness if room is on; predicted (withAll)
    //             when off. Lets the user sanity-check Tune math against
    //             reality when the room is on.
    //   axis:     'Sun' or 'Balance' for the label.
    function computeTuneBreakdown(area, overrideValue) {
      const zoneName = area.zone_name || areaStatus[area.area_id]?.zone_name;
      const zs = zoneName ? zoneStates[zoneName] : null;
      const rhythmBri = zs?.brightness ?? 50;
      const sensitivity = zs?.brightness_sensitivity ?? 1.0;
      const outdoorNorm = (_cachedSunPct ?? 0) / 100;
      const t = getAreaTune(area.area_id);
      let factor = t.brightness_factor;
      let exposure = t.natural_light_exposure;
      if (overrideValue != null) {
        if (homePillMode === 'sun') exposure = overrideValue;
        else factor = overrideValue;
      }
      const withAll = computeNowBri(rhythmBri, factor, exposure, outdoorNorm, sensitivity);
      let baseline, delta, axis;
      if (homePillMode === 'sun') {
        baseline = computeNowBri(rhythmBri, factor, 0, outdoorNorm, sensitivity);
        delta = withAll - baseline;  // negative = sun is dimming
        axis = 'Sun';
      } else {
        baseline = computeNowBri(rhythmBri, 1.0, exposure, outdoorNorm, sensitivity);
        delta = withAll - baseline;  // signed
        axis = 'Balance';
      }
      // Final: bulb-observed when on, predicted when off. Predicted always
      // used during slider drag preview (overrideValue passed) since the
      // bulb hasn't moved yet.
      let final;
      if (overrideValue != null) {
        final = withAll;
      } else if (area.is_on && typeof area.brightness === 'number') {
        final = Math.round(area.brightness);
      } else {
        final = withAll;
      }
      return { baseline, delta, final, axis };
    }

    // Format: Baseline X% - Sun Y% → Z%   (dim case)
    //         Baseline X% + Balance Y% → Z%   (lift case)
    //         Baseline X% → Z%   (delta = 0)
    // Right-aligned drag preview uses the same shape, sans labels:
    //         X% - Y% → Z%
    // Static and drag-preview share one format — numbers only. The mode
    // pill ("Tuning: Sun exposure") already names the axis, so repeating
    // "Sun" / "Balance" / "Baseline" per row was just noise.
    // Right-slot "current" formula:
    //   current: 99% − 1% → 98%      (sun or balance dim)
    //   current: 79% + 5% → 84%      (balance lift)
    // Signed impact (sign + value) is bolded. Axis name is dropped — the
    // page-level "Tuning: Sun exposure / Balance" pill already names what
    // the slider controls, no need to repeat per row.
    function formatBreakdownNowHtml(b) {
      const isLift = b.delta > 0;
      const op = isLift ? '+' : '&minus;';
      const impactHtml = `<strong class="tb-impact">${op} ${Math.abs(b.delta)}%</strong>`;
      return `<span class="tb-peak-label">current:</span> ${b.baseline}% ${impactHtml} &rarr; ${b.final}%`;
    }
    // Keep legacy alias for any callers still using the old name.
    const formatBreakdownLeft = formatBreakdownNowHtml;
    const formatBreakdownPreview = formatBreakdownNowHtml;
    const formatBreakdownNumbers = formatBreakdownNowHtml;
    // Peak-impact breakdown: what the formula would produce at the factor's
    // MAX effect. For Sun: outdoor at 100% (rhythm + current exposure stay).
    // For Balance: rhythm at 100% with no sun (so the factor is the only
    // multiplier acting on the bulb). Renders into the LEFT slot when the
    // slider is idle — the drag handler temporarily replaces it with the
    // live preview during drag, and refreshTuneRowDom restores it on release.
    function computeTuneBreakdownPeak(area, overrideValue) {
      const zoneName = area.zone_name || areaStatus[area.area_id]?.zone_name;
      const zs = zoneName ? zoneStates[zoneName] : null;
      const sensitivity = zs?.brightness_sensitivity ?? 1.0;
      const t = getAreaTune(area.area_id);
      let factor = t.brightness_factor;
      let exposure = t.natural_light_exposure;
      if (overrideValue != null) {
        if (homePillMode === 'sun') exposure = overrideValue;
        else factor = overrideValue;
      }
      let baseline, withAll, axis;
      if (homePillMode === 'sun') {
        const rhythmBri = zs?.brightness ?? 50;
        const peakOutdoor = 1.0;
        baseline = computeNowBri(rhythmBri, factor, 0, peakOutdoor, sensitivity);
        withAll = computeNowBri(rhythmBri, factor, exposure, peakOutdoor, sensitivity);
        axis = 'Sun';
      } else {
        // Balance peak:
        //   Dim  (factor < 1): peak impact at rhythm = 100 (max rhythm
        //                       = biggest dim delta; bulb falls from 100).
        //   Lift (factor > 1): peak impact at rhythm = 100/factor —
        //                       below that the factor's headroom isn't
        //                       fully expressed; above that the bulb
        //                       clamps to 100% and the lift vanishes.
        const isLift = factor > 1.0;
        const rhythmBri = isLift ? (100 / factor) : 100;
        const noSun = 0;
        baseline = computeNowBri(rhythmBri, 1.0, exposure, noSun, sensitivity);
        withAll = computeNowBri(rhythmBri, factor, exposure, noSun, sensitivity);
        axis = 'Balance';
      }
      return { baseline, delta: withAll - baseline, final: withAll, axis };
    }
    function formatBreakdownPeakHtml(area, overrideValue) {
      const b = computeTuneBreakdownPeak(area, overrideValue);
      // Peak slot shows just the signed impact (e.g. "-15%"). The "now"
      // formula on the right gives the full breakdown.
      const sign = b.delta > 0 ? '+' : '−';
      return '<span class="tb-peak-label">peak</span> '
        + `<strong class="tb-impact">${sign}${Math.abs(b.delta)}%</strong>`;
    }
    function getTuneImpactHtml(area) {
      const b = computeTuneBreakdown(area);
      // Row 3 layout:
      //   left  = peak-impact formula by default; replaced by live drag
      //           preview when the slider is being dragged (updateTunePreview).
      //   right = static "now" formula (Baseline · Δ · Final).
      // The peak/dynamic slot is `.tb-preview` to keep the existing wiring
      // (data-tune-preview attribute) — the contents just rebrand to peak
      // when no drag is active.
      return `<span class="tune-breakdown" data-tune-breakdown="${area.area_id}">`
        + `<span class="tb-preview" data-tune-preview="${area.area_id}">${formatBreakdownPeakHtml(area)}</span>`
        + `<span class="tb-static">${formatBreakdownLeft(b)}</span>`
        + `</span>`;
    }

    function getStatusBadge(area) {
      if (!area.is_on) {
        return '<span class="status-badge status-off">Off</span>';
      }
      if (area.frozen) {
        return '<span class="status-badge status-frozen">Frozen</span>';
      }
      return '<span class="status-badge status-on">On</span>';
    }

    function isAreaDirty(area) {
      if (!(area.zone_name && zoneStates[area.zone_name])) return false;
      const rs = zoneStates[area.zone_name].runtime_state || {};
      const differs = (a, b, tol) => {
        if (a == null && b == null) return false;
        if (a == null || b == null) return true;
        return Math.abs(a - b) >= tol;
      };
      return (differs(area.brightness_mid, rs.brightness_mid, 0.05) ||
              differs(area.color_mid, rs.color_mid, 0.05) ||
              differs(area.frozen_at, rs.frozen_at, 0.05) ||
              differs(area.color_override, rs.color_override, 10) ||
              differs(area.brightness_override, rs.brightness_override, 1) ||
              differs(area.brightness_override_set_at, rs.brightness_override_set_at, 0.1) ||
              differs(area.color_override_set_at, rs.color_override_set_at, 0.1));
    }

    function getMismatchDot(area) {
      // Tune modes: single-click undo to the previous saved tune value. No menu.
      if (isTuneMode(homePillMode)) {
        const dim = homePillMode === 'sun' ? 'sun' : 'balance';
        if (getTunePrev(area.area_id, dim) == null) return '';
        const title = dim === 'sun' ? 'Restore previous sun exposure' : 'Restore previous balance';
        return `<span class="mismatch-dot-area diverge-tune" onclick="event.stopPropagation(); restoreTunePrev('${area.area_id}')" title="${title}"></span>`;
      }
      // Adjust modes: render reset (↺ glo_down) and send-to-zone (↑ glo_up)
      // as two inline buttons. Reset is the dominant action, so direct-click
      // beats a 2-option menu.
      if (!isAreaDirty(area)) return '';
      return `<span class="mismatch-dot-area diverge-reset" onclick="event.stopPropagation(); rowAction('${area.area_id}', 'glo_down')" title="Reset to rhythm"></span>`
           + `<span class="mismatch-dot-area diverge-send" onclick="event.stopPropagation(); rowAction('${area.area_id}', 'glo_up')" title="Send to zone"></span>`;
    }

    function resolveEffectiveTime(zc, phase) {
      // Resolve effective wake/bed time considering alt days
      const wd = (new Date().getDay() + 6) % 7; // JS Sun=0 → Python Mon=0
      const altDays = phase === 'wake' ? (zc.wake_alt_days || []) : (zc.bed_alt_days || []);
      const altTime = phase === 'wake' ? zc.wake_alt_time : zc.bed_alt_time;
      if (altTime != null && altDays.includes(wd)) {
        return altTime;
      }
      return phase === 'wake' ? zc.wake_time : zc.bed_time;
    }

    // Cache for zone effective midpoints (set by getZonePhaseMidpoint, read by getPhaseMidpoint)
    const _zoneEffectiveMidpoint = {};  // zoneName -> decimal hour

    // Zone-level divergence chips: brightness_override + color_override from
    // the zone's runtime_state. These are the deltas glozone_down would push
    // to areas. Phase shift is already conveyed by the "Bed 10p" label.
    // Frozen is conveyed by the snowflake icon. Info-only; no click handler.
    function getZoneDivergenceChips(zoneName) {
      const rs = zoneStates[zoneName]?.runtime_state;
      if (!rs) return '';
      const chips = [];
      const bo = rs.brightness_override;
      if (bo != null && Math.abs(bo) >= 1) {
        const sign = bo > 0 ? '+' : '';
        chips.push(`<span class="delta-chip zone-delta-chip">${sign}${Math.round(bo)}%</span>`);
      }
      const co = rs.color_override;
      if (co != null && Math.abs(co) >= 10) {
        const sign = co > 0 ? '+' : '';
        chips.push(`<span class="delta-chip zone-delta-chip">${sign}${Math.round(co)}K</span>`);
      }
      if (!chips.length) return '';
      return chips.join(' ');
    }

    // Row 1: the zone's RHYTHM (config) bed/wake time — always shown when
    // available, regardless of runtime override. Plain text, sits inline with
    // the zone name + count.
    function getZoneRhythmPhase(zoneName, areasInZone) {
      const anyArea = areasInZone.find(a => areaStatus[a.area_id]?.phase);
      if (!anyArea) return '';
      const phase = areaStatus[anyArea.area_id].phase;
      const zc = cachedGlozones?.zones?.[zoneName];
      if (!zc) return '';
      const mid = resolveEffectiveTime(zc, phase);
      if (mid == null) return '';
      const label = phase === 'wake' ? 'Wake' : 'Bed';
      return `${label} ${formatDecimalHour(mid)}`;
    }

    // Row 2 (subrow) chip: rendered only when the zone runtime has shifted
    // the midpoint off rhythm. Same chip visual language as the brightness /
    // color override chips, so all divergences read as one info series.
    // Also updates _zoneEffectiveMidpoint cache used by area-row divergence.
    function getZonePhaseDivergenceChip(zoneName, areasInZone) {
      const anyArea = areasInZone.find(a => areaStatus[a.area_id]?.phase);
      if (!anyArea) {
        _zoneEffectiveMidpoint[zoneName] = null;
        return '';
      }
      const phase = areaStatus[anyArea.area_id].phase;
      const rs = zoneStates[zoneName]?.runtime_state;
      if (rs && rs.brightness_mid != null) {
        const midpoint = areaStatus[anyArea.area_id]?.phase_midpoint;
        if (midpoint != null) {
          _zoneEffectiveMidpoint[zoneName] = midpoint;
          const label = phase === 'wake' ? 'Wake' : 'Bed';
          return `<span class="delta-chip zone-delta-chip">${label} ${formatDecimalHour(midpoint)}</span>`;
        }
      }
      // Rhythm-aligned — cache the config midpoint so area-row chips can
      // detect area-vs-zone divergence against the right anchor.
      const zc = cachedGlozones?.zones?.[zoneName];
      const mid = zc ? resolveEffectiveTime(zc, phase) : null;
      _zoneEffectiveMidpoint[zoneName] = mid;
      return '';
    }

    function formatDecimalHour(h) {
      if (h == null) return '';
      let hr = Math.floor(h) % 24;
      const min = Math.round((h % 1) * 60);
      const suffix = hr < 12 ? 'a' : 'p';
      if (hr === 0) hr = 12;
      else if (hr > 12) hr -= 12;
      return min === 0 ? `${hr}${suffix}` : `${hr}:${String(min).padStart(2, '0')}${suffix}`;
    }

    function getPhaseMidpoint(area) {
      const status = areaStatus[area.area_id] || {};
      const phase = status.phase;
      const midpoint = status.phase_midpoint;
      if (!phase || midpoint == null) return '';

      // Compare to zone header's displayed midpoint — only show if different
      const zoneName = area.zone_name || status.zone_name;
      if (zoneName) {
        const zoneDefault = _zoneEffectiveMidpoint[zoneName];
        if (zoneDefault != null && Math.abs(midpoint - zoneDefault) < 0.05) {
          return ''; // matches zone default, don't show
        }
      }

      const label = phase === 'wake' ? 'Wake' : 'Bed';
      const time = formatDecimalHour(midpoint);
      return `<span class="phase-midpoint">${label} ${time}</span>`;
    }

    function getSliderPct(brightness, area) {
      // Use area's effective min/max from its rhythm
      const bMin = area?.min_brightness ?? 1;
      const bMax = area?.max_brightness ?? 100;
      return bMax > bMin ? Math.max(0, Math.min(100, (brightness - bMin) / (bMax - bMin) * 100)) : 0;
    }

    // Phase 2/3: slider thumb position by active mode.
