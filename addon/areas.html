      const adjustDirty = !isTuneMode(homePillMode) && isAreaDirty(area);
      const rowActionsHtml = adjustDirty
        ? `<span class="row-actions">`
          + `<button class="row-action-btn" onclick="event.stopPropagation(); rowAction('${area.area_id}', 'glo_down')" title="Reset to rhythm">&#x21BA;</button>`
          + `<button class="row-action-btn row-action-btn--send" onclick="event.stopPropagation(); rowAction('${area.area_id}', 'full_send')" title="Full Send (this area's state to zone, then zone to all)">&#x2191;</button>`

        // reset/send-to-zone affordance are suppressed — those are about
        // adjusting live state, which doesn't apply to off rooms.
        return `
          <div class="area-row area-row-off mode-${homePillMode}" style="--row-bg: ${style.bg}; --row-text: ${style.textColor}; --row-fill: ${style.fill.toFixed(3)}; --slider-track-bg: ${buildSliderTrackGradient(area) || 'rgba(0,0,0,0.35)'};">
            ${leftControls}
            <div class="row-middle">
              <div class="row-middle-top">
                <span class="area-row-name" onclick="openAreaModal('${area.area_id}')">${area.name}</span>
                <span class="row-active-status" data-area-active="${area.area_id}"></span>
                <span class="row-off-flex"></span>
                <span data-area-schedule="${area.area_id}" data-zone-name="${area.zone_name || ''}">
                  <span class="row-schedule-right" data-area-timer="${area.area_id}"></span>
                </span>
              </div>
            </div>
          </div>
        `;
      }

      // Phase 3+polish: status row is a single left-aligned, wrap-capable strip
      // — schedule pill first (most-common piece of info), then state chip
      // (motion/fade/boost/freeze), then divergence chips. All share the same
      // pill visual language so the row reads as one continuous info series.
      // Tune mode replaces the entire strip with the impact compound.
      const inTune = isTuneMode(homePillMode);
      const tuneImpactHtml = inTune ? getTuneImpactHtml(area) : '';
      // Adjust mode row 3 layout: divergence chips on the left,
      // schedule pill on the right. (The reset / full-send actions
      // moved up to row 1 next to the area name.)
      const statusStripContent = inTune
        ? tuneImpactHtml
        : `${divChips}<span class="row-schedule-pill" data-area-timer="${area.area_id}"></span>`;
      const statusRowAttr = inTune ? '' : `data-area-schedule="${area.area_id}" data-zone-name="${area.zone_name || ''}"`;
      return `
        <div class="area-row mode-${homePillMode}" style="--row-bg: ${style.bg}; --row-text: ${style.textColor}; --row-fill: ${style.fill.toFixed(3)}; --slider-track-bg: ${buildSliderTrackGradient(area) || 'rgba(0,0,0,0.35)'};">
          ${leftControls}
          <div class="row-middle">
            <div class="row-middle-top">
              <span class="area-row-name" onclick="openAreaModal('${area.area_id}')">${area.name}</span>
              ${rowActionsHtml}
              ${inTune ? '' : `<span class="row-active-status" data-area-active="${area.area_id}"></span>`}
              <span class="${readoutClass}" data-area-readout="${area.area_id}" ${readoutOnclick}>${readout}</span>
            </div>
            <div class="row-slider-track" data-area-id="${area.area_id}" data-bmin="${area.min_brightness ?? 1}" data-bmax="${area.max_brightness ?? 100}" data-cmin="${getColorSliderRange(area).cMin}" data-cmax="${getColorSliderRange(area).cMax}">

              <div class="row-slider-fill-drag"></div>

              <div class="row-slider-thumb-ghost"></div>

    // Phase 3: compute "sun dims X% · final Y%" or "balance dims/lifts X% · final Y%"
    // for the row's status line in Tune modes. Ports computeNlFactor /
    // computeNowBrightness / impact functions.
    function computeNlFactor(exposure, outdoorNorm, sensitivity) {
      if (exposure <= 0 || outdoorNorm <= 0) return 1.0;
      return Math.max(0, 1 - exposure * outdoorNorm * sensitivity);
    }
    function computeNowBri(rhythmBri, factor, exposure, outdoorNorm, sensitivity) {
      const nl = computeNlFactor(exposure, outdoorNorm, sensitivity);
      return Math.min(100, Math.round(rhythmBri * nl * factor));
    }
    // Compute the Tune-mode breakdown components for an area. Returns:
    //   baseline: brightness if the factor being tuned were neutral (sun=0
    //             for Sun mode, factor=1.0 for Balance), other tune stays.
    //   delta:    signed shift this factor introduces (withAll - baseline).
    //   final:    observed bulb brightness if room is on; predicted (withAll)
    //             when off. Lets the user sanity-check Tune math against
    //             reality when the room is on.
    //   axis:     'Sun' or 'Balance' for the label.
    function computeTuneBreakdown(area, overrideValue) {
      const zoneName = area.zone_name || areaStatus[area.area_id]?.zone_name;
      const zs = zoneName ? zoneStates[zoneName] : null;
      const rhythmBri = zs?.brightness ?? 50;
      const sensitivity = zs?.brightness_sensitivity ?? 1.0;
      const outdoorNorm = (_cachedSunPct ?? 0) / 100;
      const t = getAreaTune(area.area_id);
      let factor = t.brightness_factor;
      let exposure = t.natural_light_exposure;
      if (overrideValue != null) {
        if (homePillMode === 'sun') exposure = overrideValue;
        else factor = overrideValue;
      }
      const withAll = computeNowBri(rhythmBri, factor, exposure, outdoorNorm, sensitivity);
      let baseline, delta, axis;
      if (homePillMode === 'sun') {
        baseline = computeNowBri(rhythmBri, factor, 0, outdoorNorm, sensitivity);
        delta = withAll - baseline;  // negative = sun is dimming
        axis = 'Sun';
      } else {
        baseline = computeNowBri(rhythmBri, 1.0, exposure, outdoorNorm, sensitivity);
        delta = withAll - baseline;  // signed
        axis = 'Balance';
      }
      // Final: bulb-observed when on, predicted when off. Predicted always
      // used during slider drag preview (overrideValue passed) since the
      // bulb hasn't moved yet.
      let final;
      if (overrideValue != null) {
        final = withAll;
      } else if (area.is_on && typeof area.brightness === 'number') {
        final = Math.round(area.brightness);
      } else {
        final = withAll;
      }
      return { baseline, delta, final, axis };
    }

    // Format: Baseline X% - Sun Y% → Z%   (dim case)
    //         Baseline X% + Balance Y% → Z%   (lift case)
    //         Baseline X% → Z%   (delta = 0)

    //         X% - Y% → Z%

    // "Sun" / "Balance" / "Baseline" per row was just noise.

    //   current: 99% − 1% → 98%      (sun or balance dim)
    //   current: 79% + 5% → 84%      (balance lift)

    // page-level "Tuning: Sun dimming / Balance" pill already names what

    function formatBreakdownNowHtml(b) {

      // before/after parenthetical was retired as too noisy.
      const arrow = b.delta > 0 ? '&uarr;' : (b.delta < 0 ? '&darr;' : '');
      const impactHtml = `<strong class="tb-impact">${arrow} ${Math.abs(b.delta)}%</strong>`;
      return `<span class="tb-peak-label">current:</span> ${impactHtml}`;
    }
    // Keep legacy alias for any callers still using the old name.
    const formatBreakdownLeft = formatBreakdownNowHtml;
    const formatBreakdownPreview = formatBreakdownNowHtml;
    const formatBreakdownNumbers = formatBreakdownNowHtml;
    // Peak-impact breakdown: what the formula would produce at the factor's
    // MAX effect. For Sun: outdoor at 100% (rhythm + current exposure stay).
    // For Balance: rhythm at 100% with no sun (so the factor is the only
    // multiplier acting on the bulb). Renders into the LEFT slot when the
    // slider is idle — the drag handler temporarily replaces it with the
    // live preview during drag, and refreshTuneRowDom restores it on release.
    function computeTuneBreakdownPeak(area, overrideValue) {
      const zoneName = area.zone_name || areaStatus[area.area_id]?.zone_name;
      const zs = zoneName ? zoneStates[zoneName] : null;
      const sensitivity = zs?.brightness_sensitivity ?? 1.0;
      const t = getAreaTune(area.area_id);
      let factor = t.brightness_factor;
      let exposure = t.natural_light_exposure;
      if (overrideValue != null) {
        if (homePillMode === 'sun') exposure = overrideValue;
        else factor = overrideValue;
      }
      let baseline, withAll, axis;
      if (homePillMode === 'sun') {
        const rhythmBri = zs?.brightness ?? 50;
        const peakOutdoor = 1.0;
        baseline = computeNowBri(rhythmBri, factor, 0, peakOutdoor, sensitivity);
        withAll = computeNowBri(rhythmBri, factor, exposure, peakOutdoor, sensitivity);
        axis = 'Sun';
      } else {
        // Balance peak:
        //   Dim  (factor < 1): peak impact at rhythm = 100 (max rhythm
        //                       = biggest dim delta; bulb falls from 100).
        //   Lift (factor > 1): peak impact at rhythm = 100/factor —
        //                       below that the factor's headroom isn't
        //                       fully expressed; above that the bulb
        //                       clamps to 100% and the lift vanishes.
        const isLift = factor > 1.0;
        const rhythmBri = isLift ? (100 / factor) : 100;
        const noSun = 0;
        baseline = computeNowBri(rhythmBri, 1.0, exposure, noSun, sensitivity);
        withAll = computeNowBri(rhythmBri, factor, exposure, noSun, sensitivity);
        axis = 'Balance';
      }
      return { baseline, delta: withAll - baseline, final: withAll, axis };
    }
    function formatBreakdownPeakHtml(area, overrideValue) {
      const b = computeTuneBreakdownPeak(area, overrideValue);
      // Peak slot: signed impact with up/down arrow direction. Pairs with
      // formatBreakdownNowHtml's arrow treatment.
      const arrow = b.delta > 0 ? '&uarr;' : (b.delta < 0 ? '&darr;' : '');
      return '<span class="tb-peak-label">peak</span> '
        + `<strong class="tb-impact">${arrow} ${Math.abs(b.delta)}%</strong>`;
    }
    function getTuneImpactHtml(area) {
      // Row 3 (below slider): Peak (left) + Current (right), mirroring
      // area-detail's tune slider footer. Both dynamic during drag —
      // updateTunePreview pushes candidate-value content into both. The
      // Current's "(before → after)" parenthetical is hidden at rest
      // and revealed via .area-row.slider-dragging .tb-bf CSS.
      const b = computeTuneBreakdown(area);
      return `<span class="tb-peak" data-tune-peak="${area.area_id}">${formatBreakdownPeakHtml(area)}</span>`
        + `<span class="tb-current" data-tune-current="${area.area_id}">${formatBreakdownNowHtml(b)}</span>`;
    }

    function getStatusBadge(area) {
      if (!area.is_on) {
        return '<span class="status-badge status-off">Off</span>';
      }
      if (area.frozen) {
        return '<span class="status-badge status-frozen">Frozen</span>';
      }
      return '<span class="status-badge status-on">On</span>';
    }

    function isAreaDirty(area) {
      if (!(area.zone_name && zoneStates[area.zone_name])) return false;
      const rs = zoneStates[area.zone_name].runtime_state || {};
      const differs = (a, b, tol) => {
        if (a == null && b == null) return false;
        if (a == null || b == null) return true;
        return Math.abs(a - b) >= tol;
      };
      return (differs(area.brightness_mid, rs.brightness_mid, 0.05) ||
              differs(area.color_mid, rs.color_mid, 0.05) ||
              differs(area.frozen_at, rs.frozen_at, 0.05) ||
              differs(area.color_override, rs.color_override, 10) ||
              differs(area.brightness_override, rs.brightness_override, 1) ||
              differs(area.brightness_override_set_at, rs.brightness_override_set_at, 0.1) ||
              differs(area.color_override_set_at, rs.color_override_set_at, 0.1));
    }

    function getMismatchDot(area) {
      // Tune modes: tap-undo lives on the row-readout itself now (orange
      // when dirty), so the dot is retired here too.
      if (isTuneMode(homePillMode)) return '';
      // Adjust modes: the reset affordance moved to the row-readout
      // (which goes orange + tappable when dirty). Only the "Full Send"
      // (glo_up) action remains as an inline button — it's the
      // non-redundant action.
      if (!isAreaDirty(area)) return '';
      // "Full Send" = full_send primitive: glo_up (push area state to
      // zone) + glozone_down (push zone state to all areas). Old glo_up
      // alone only did half the job.
      return `<span class="mismatch-dot-area diverge-send" onclick="event.stopPropagation(); rowAction('${area.area_id}', 'full_send')" title="Full Send"></span>`;
    }

    function resolveEffectiveTime(zc, phase) {
      // Resolve effective wake/bed time considering alt days
      const wd = (new Date().getDay() + 6) % 7; // JS Sun=0 → Python Mon=0
      const altDays = phase === 'wake' ? (zc.wake_alt_days || []) : (zc.bed_alt_days || []);
      const altTime = phase === 'wake' ? zc.wake_alt_time : zc.bed_alt_time;
      if (altTime != null && altDays.includes(wd)) {
        return altTime;
      }
      return phase === 'wake' ? zc.wake_time : zc.bed_time;
    }

    // Cache for zone effective midpoints (set by getZonePhaseMidpoint, read by getPhaseMidpoint)
    const _zoneEffectiveMidpoint = {};  // zoneName -> decimal hour

    // Zone-level divergence chips: brightness_override + color_override from
    // the zone's runtime_state. These are the deltas glozone_down would push
    // to areas. Phase shift is already conveyed by the "Bed 10p" label.
    // Frozen is conveyed by the snowflake icon. Info-only; no click handler.
    function getZoneDivergenceChips(zoneName) {
      const rs = zoneStates[zoneName]?.runtime_state;
      if (!rs) return '';
      const chips = [];
      // Each chip is now tappable: clears just that override component
      // via the matching glozone_reset_* primitive. Same UX as the
      // area-row divergence chips on home page.
      const esc = encodeURIComponent(zoneName);
      const bo = rs.brightness_override;
      if (bo != null && Math.abs(bo) >= 1) {
        const sign = bo > 0 ? '+' : '';
        chips.push(`<span class="delta-chip zone-delta-chip delta-chip-action" onclick="event.stopPropagation(); zoneAction('${zoneName.replace(/'/g, "\\'")}', 'glozone_reset_brightness_override')" title="Clear zone brightness override">${sign}${Math.round(bo)}%</span>`);
      }
      const co = rs.color_override;
      if (co != null && Math.abs(co) >= 10) {
        const sign = co > 0 ? '+' : '';
        chips.push(`<span class="delta-chip zone-delta-chip delta-chip-action" onclick="event.stopPropagation(); zoneAction('${zoneName.replace(/'/g, "\\'")}', 'glozone_reset_color_override')" title="Clear zone color override">${sign}${Math.round(co)}K</span>`);
      }
      if (!chips.length) return '';
      return chips.join(' ');
    }

    // Row 1: the zone's RHYTHM (config) bed/wake time — always shown when
    // available, regardless of runtime override. Plain text, sits inline with
    // the zone name + count.
    function getZoneRhythmPhase(zoneName, areasInZone) {
      const anyArea = areasInZone.find(a => areaStatus[a.area_id]?.phase);
      if (!anyArea) return '';
      const phase = areaStatus[anyArea.area_id].phase;
      const zc = cachedGlozones?.zones?.[zoneName];
      if (!zc) return '';
      const mid = resolveEffectiveTime(zc, phase);
      if (mid == null) return '';
      const label = phase === 'wake' ? 'Wake' : 'Bed';
      return `${label} ${formatDecimalHour(mid)}`;
    }

    // Row 2 (subrow) chip: rendered only when the zone runtime has shifted
    // the midpoint off rhythm. Same chip visual language as the brightness /
    // color override chips, so all divergences read as one info series.
    // Also updates _zoneEffectiveMidpoint cache used by area-row divergence.
    // Inverse of computeShiftedMidpoint — given the zone's curve midpoint,
    // return the wake/bed TIME (the clock-time at which the sigmoid reaches
    // the configured brightness percent). Mirrors brain.py:midpoint_to_time.
    // When wake_brightness/bed_brightness === 50, midpoint == time (no shift).
    function midpointToTime(midpoint, brightnessPct, slope, bMinNorm, bMaxNorm) {
      if (brightnessPct === 50) return midpoint;
      const targetNorm = bMinNorm + (bMaxNorm - bMinNorm) * (brightnessPct / 100);
      const eps = 0.001;
      const clamped = Math.max(bMinNorm + eps, Math.min(bMaxNorm - eps, targetNorm));
      const ratio = (clamped - bMinNorm) / (bMaxNorm - bMinNorm);
      return midpoint + Math.log(ratio / (1 - ratio)) / slope;
    }
    // Convert a zone's brightness_mid (curve midpoint, stored % 24) back to
    // its user-facing wake/bed TIME using the zone's brightness/slope config.
    // Uses PHASE_SLOPE_TABLE (defined near bedTimeFromPct) which matches the
    // backend's set_phase_time math.
    function zoneEffectiveBedWakeTime(zc, phase, midpoint) {
      if (zc == null || midpoint == null) return null;
      const inAscend = phase === 'wake';
      const brightnessPct = inAscend ? (zc.wake_brightness ?? 50) : (zc.bed_brightness ?? 50);
      const speed = inAscend ? zc.wake_speed : zc.bed_speed;
      const slopeMag = PHASE_SLOPE_TABLE[Math.max(1, Math.min(12, speed || 6))];
      if (!(slopeMag > 0)) return ((midpoint % 24) + 24) % 24;
      const slopeSigned = inAscend ? slopeMag : -slopeMag;
      const bMin = (zc.min_brightness ?? 2) / 100;
      const bMax = (zc.max_brightness ?? 100) / 100;
      const t = midpointToTime(midpoint, brightnessPct, slopeSigned, bMin, bMax);
      return ((t % 24) + 24) % 24;
    }

    function getZonePhaseDivergenceChip(zoneName, areasInZone) {
      const anyArea = areasInZone.find(a => areaStatus[a.area_id]?.phase);
      if (!anyArea) {
        _zoneEffectiveMidpoint[zoneName] = null;
        return '';
      }
      const phase = areaStatus[anyArea.area_id].phase;
      const zc = cachedGlozones?.zones?.[zoneName];
      const rhythmMid = zc ? resolveEffectiveTime(zc, phase) : null;
      const rs = zoneStates[zoneName]?.runtime_state;
      // Zone-effective bed/wake TIME — derived from rs.brightness_mid via
      // the inverse of the bedtime→midpoint shift the backend applies. Falls
      // back to rhythm if no zone-level shift is in effect. Cached for area-
      // row divergence chips to compare against.
      const effFromMid = (rs && rs.brightness_mid != null)
        ? zoneEffectiveBedWakeTime(zc, phase, rs.brightness_mid)
        : null;
      const effMid = effFromMid != null ? effFromMid : rhythmMid;
      _zoneEffectiveMidpoint[zoneName] = effMid;
      // Only render the chip when the zone's effective time actually differs
      // from rhythm. Uses shortest-arc distance so cross-midnight equality
      // (e.g., 23.99 vs 0.01) reads as match, not 23.98h apart.
      if (effMid == null || rhythmMid == null) return '';
      const diff = Math.abs(effMid - rhythmMid);
      const wrappedDiff = Math.min(diff, 24 - diff);
      if (wrappedDiff < 0.05) return '';
      const label = phase === 'wake' ? 'Wake' : 'Bed';
      // Tappable to clear just the zone's phase shift (brightness_mid +
      // color_mid). Same UX as the brightness/color zone chips above.
      const escZone = zoneName.replace(/'/g, "\\'");
      return `<span class="delta-chip zone-delta-chip delta-chip-action" onclick="event.stopPropagation(); zoneAction('${escZone}', 'glozone_reset_phase')" title="Clear zone phase shift">${label} ${formatDecimalHour(effMid)}</span>`;
    }

    function formatDecimalHour(h) {
      if (h == null) return '';
      let hr = Math.floor(h) % 24;
      const min = Math.round((h % 1) * 60);
      const suffix = hr < 12 ? 'a' : 'p';
      if (hr === 0) hr = 12;
      else if (hr > 12) hr -= 12;
      return min === 0 ? `${hr}${suffix}` : `${hr}:${String(min).padStart(2, '0')}${suffix}`;
    }

    function getPhaseMidpoint(area) {
      const status = areaStatus[area.area_id] || {};
      const phase = status.phase;
      const midpoint = status.phase_midpoint;
      if (!phase || midpoint == null) return '';

      // Compare to zone header's displayed midpoint — only show if different
      const zoneName = area.zone_name || status.zone_name;
      if (zoneName) {
        const zoneDefault = _zoneEffectiveMidpoint[zoneName];
        if (zoneDefault != null && Math.abs(midpoint - zoneDefault) < 0.05) {
          return ''; // matches zone default, don't show
        }
      }

      const label = phase === 'wake' ? 'Wake' : 'Bed';
      const time = formatDecimalHour(midpoint);
      return `<span class="phase-midpoint">${label} ${time}</span>`;
    }

    function getSliderPct(brightness, area) {
      // Slider = full bulb capability (0–100%), not normalized into the
      // zone's [bMin, bMax] rhythm range. The bMin/bMax bound the curve,
      // not the override — dragging the slider IS an override and can
      // reach the full physical range. Matches area-detail's convention
      // and keeps drag space proportional to actual brightness change.
      return Math.max(0, Math.min(100, brightness));
    }

    // Phase 2/3: slider thumb position by active mode.
    // Color slider's effective range — accounts for sun-cooling extension
    // beyond max_color_temp (daylight_cct) and warm-night extension below
    // min_color_temp (warm_night_target). Both ends are taken at their
    // configured TARGETS regardless of current sun strength so the slider
    // shape stays stable as the sun moves; otherwise the thumb would slide
    // around just from the range narrowing/widening through the day.
    // Slider always operates in the NATURAL curve range — same as the
    // backend's set_position math. Sun cooling pushes the rendered bulb
    // kelvin above max_color_temp but isn't slider-addressable; the
    // natural target maps 1:1 to a curve midpoint shift.
    function getColorSliderRange(area) {
      const cMin = area.min_color_temp ?? 2200;
      const cMax = area.max_color_temp ?? 6500;
      return { cMin, cMax };
    }

    // The kelvin contribution from solar rules at this moment — added to
    // the natural curve target to get the predicted final bulb kelvin.
    // daylight_shift > 0 means sun cooling is pushing cooler.
    // night_shift > 0 means night warming is pulling warmer (negative shift).
    function getSolarKelvinShift(area) {
      const sb = area.solar_breakdown;
      if (!sb) return 0;
      return (sb.daylight_shift || 0) - (sb.night_shift || 0);
    }

    // The curve's natural target right now — area.kelvin minus the solar
    // rules' contribution. This is what the slider should position against,
    // since dragging the slider sets a new natural target (the solar rules
    // then re-apply on top to produce the new bulb kelvin).
    function getNaturalKelvin(area) {
      const k = area.kelvin || 0;
      if (!k) return 0;
      return k - getSolarKelvinShift(area);
    }

    function getModeSliderPct(area) {
      if (homePillMode === 'sun') {
        const t = getAreaTune(area.area_id);
        const idx = nearestStepIndex(SOLAR_STEPS, t.natural_light_exposure, 'exposure');
        // Inverted: leftmost = max dimming (high idx), rightmost = no dimming (idx 0).
        return ((SOLAR_STEPS.length - 1 - idx) / (SOLAR_STEPS.length - 1)) * 100;
      }
      if (homePillMode === 'balance') {
        const t = getAreaTune(area.area_id);
        const idx = nearestStepIndex(LUMEN_STEPS, t.brightness_factor, 'factor');
        return (idx / (LUMEN_STEPS.length - 1)) * 100;
      }
      if (homePillMode === 'color') {
        // Matches area-details: slider operates in the natural curve range
        // (cMin..cMax). When the bulb's rendered kelvin is above cMax due
        // to sun cooling, the thumb clamps to 100% — same behavior as the
        // area-details color slider. A better fix needs backend support for
        // targeting kelvins above the natural range via color_override.
        const { cMin, cMax } = getColorSliderRange(area);
        const k = area.kelvin || 4000;
        return cMax > cMin ? Math.max(0, Math.min(100, (k - cMin) / (cMax - cMin) * 100)) : 50;
      }
      if (homePillMode === 'bed') {
        const status = areaStatus[area.area_id] || {};
        const mid = status.phase_midpoint;
        if (mid == null) return 50;
        const { lo, hi } = getPhaseBounds(area.area_id);
        // mid may be in the previous-day window; lift into [lo, hi].
        let m = mid;
        while (m < lo) m += 24;
        return Math.max(0, Math.min(100, (m - lo) / (hi - lo) * 100));
      }
      return getSliderPct(area.brightness || 0, area);
    }

    // Phase 2/3: right-side readout reflecting current mode value.
    function getModeReadout(area, candidateValue) {
      if (homePillMode === 'color') return `${area.kelvin || 4000}K`;
      if (homePillMode === 'bed') {
        const mid = areaStatus[area.area_id]?.phase_midpoint;
        return mid != null ? formatDecimalHour(mid) : '';
      }
      // Tune modes: step descriptor "Label N.NNx" — mirrors area-detail's
      // slider top-right readout. Dynamic during drag — updateTunePreview
      // pushes the candidate-step descriptor here so the user sees the
      // value change as they slide.
      if (homePillMode === 'sun') {
        const exposure = candidateValue != null ? candidateValue
          : getAreaTune(area.area_id).natural_light_exposure;
        const s = SOLAR_STEPS[nearestStepIndex(SOLAR_STEPS, exposure, 'exposure')];
        return s ? `${s.label} <span class="tune-mult">${s.exposure.toFixed(2)}x</span>` : '';
      }
      if (homePillMode === 'balance') {
        const factor = candidateValue != null ? candidateValue
          : getAreaTune(area.area_id).brightness_factor;
        const s = LUMEN_STEPS[nearestStepIndex(LUMEN_STEPS, factor, 'factor')];
        return s ? `${s.label} <span class="tune-mult">${s.factor.toFixed(2)}x</span>` : '';
      }
      return `${Math.round(area.brightness || 0)}%`;
    }

    // Phase 2: divergence chips for the status row. Shown in any Adjust mode;
    // the chip matching the active mode is emphasized.
    function getDivergenceChips(area) {
      const chips = [];
      // Each chip shows only when the area DIVERGES from its zone — info
      // already present in the zone header isn't repeated on the area row.
      // Order: bed/wake → brightness → color.
      const zoneName = area.zone_name;
      const zoneRs = (zoneName ? zoneStates[zoneName]?.runtime_state : null) || {};
      // Divergence chips on home-page area rows are tappable to clear
      // the per-dimension divergence. Fixes the "can't reach the color
      // override clear without switching to color mode" pain. Each chip
      // gets cursor:pointer in CSS via .delta-chip-action and dispatches
      // the right reset primitive on click.
      if (zoneName) {
        const zoneMid = _zoneEffectiveMidpoint[zoneName];
        const areaMid = areaStatus[area.area_id]?.phase_midpoint;
        if (zoneMid != null && areaMid != null && Math.abs(areaMid - zoneMid) >= 0.05) {
          const phase = areaStatus[area.area_id]?.phase || getHomePhase();
          const prefix = phase === 'wake' ? 'Wake' : 'Bed';
          chips.push(`<span class="delta-chip delta-chip-action" onclick="event.stopPropagation(); rowAction('${area.area_id}', 'reset_phase')" title="Tap to clear phase shift">${prefix} ${formatDecimalHour(areaMid)}</span>`);
        }
      }
      const bo = area.brightness_override ?? 0;
      const zBo = zoneRs.brightness_override ?? 0;
      if (Math.abs(bo - zBo) >= 1) {
        const sign = bo > 0 ? '+' : '';
        chips.push(`<span class="delta-chip delta-chip-action" onclick="event.stopPropagation(); rowAction('${area.area_id}', 'reset_brightness_override')" title="Tap to clear brightness override">${sign}${Math.round(bo)}%</span>`);
      }
      const co = area.color_override ?? 0;
      const zCo = zoneRs.color_override ?? 0;
      if (Math.abs(co - zCo) >= 10) {
        const sign = co > 0 ? '+' : '';
        chips.push(`<span class="delta-chip delta-chip-action" onclick="event.stopPropagation(); rowAction('${area.area_id}', 'reset_color_override')" title="Tap to clear color override">${sign}${Math.round(co)}K</span>`);
      }
      return chips.join('');
    }

    function getEffectiveColorLimits(area) {
      const cMin = area.min_color_temp ?? 2200;
      const cMax = area.max_color_temp ?? 6500;
      const sb = area.solar_breakdown;
      if (!sb) return { effMin: cMin, effMax: cMax };
      let effMax = cMax;
      if (sb.warm_night_enabled && sb.night_strength > 0) {
        const ceiling = sb.warm_night_target || 2700;
        effMax = Math.round(cMax - Math.max(0, cMax - ceiling) * sb.night_strength);
      }
      let effMin = cMin;
      if (sb.daylight_blend > 0 && sb.daylight_cct > 0) {
        effMin = Math.round(cMin + Math.max(0, sb.daylight_cct - cMin) * sb.daylight_blend);
      }
      if (effMin > effMax) effMin = effMax;
      return { effMin, effMax };
    }

    function getRowStyle(area) {
      // Tune mode: drop bulb-CCT tint + glow. Card stays neutral so the
      // row reads as data-only — direction + magnitude live on the slider,
      // PEAK readout, and descriptor chip.
      if (isTuneMode(homePillMode)) {
        return { bg: 'var(--card)', fill: 0, textColor: 'var(--text)' };
      }
      if (!area.is_on) {
        return { bg: 'var(--card)', fill: 0, textColor: 'var(--muted)' };
      }
      const cctColor = cctToRGB(area.kelvin);
      const tintedColor = tintColorByBrightness(cctColor, area.brightness);
      const textColor = readableTextColor(tintedColor);
      const fill = area.brightness / 100;
      return { bg: tintedColor, fill, textColor };
    }

    // Build the slider track's background gradient for this row, based on
    // the current home pill mode. Returns a CSS gradient string suitable
    // for inline `--slider-track-bg`. Per-area modes (color, bed/wake)
    // sample real bulb output across the slider's range; CSS-only modes
    // (brightness, sun, balance) return a static gradient.
    function buildSliderTrackGradient(area) {
      const mode = homePillMode;
      if (mode === 'brightness') {
        return 'linear-gradient(90deg, rgba(0,0,0,0.55) 0%, rgba(255,255,255,0.55) 100%)';
      }
      if (mode === 'color') {
        const { cMin, cMax } = getColorSliderRange(area);
        const stops = [];
        const n = 8;
        for (let i = 0; i <= n; i++) {
          const frac = i / n;
          const k = cMin + (cMax - cMin) * frac;
          stops.push(cctToRGB(k) + ' ' + Math.round(frac * 100) + '%');
        }
        return 'linear-gradient(90deg, ' + stops.join(', ') + ')';
      }
      if (mode === 'sun') {
        // Sun-dimming slider is INVERTED on this page too — leftmost step =
        // max dimming (Sun room 2.00x), rightmost = no dimming (None 0.00x).
        // Gradient: flat black on the left (heavy-dimming zone past
        // exposure==1.0) → black-to-blue transition past that boundary →
        // blue on the right. Mirrors area.html's buildTrackGradient sun branch.
        let peakIdx = SOLAR_STEPS.length - 1;
        for (let i = 0; i < SOLAR_STEPS.length; i++) {
          if (SOLAR_STEPS[i].exposure >= 1.0) { peakIdx = i; break; }
        }
        const peakPct = ((SOLAR_STEPS.length - 1 - peakIdx) / (SOLAR_STEPS.length - 1)) * 100;
        const blue = 'rgba(120,170,230,0.85)';
        return `linear-gradient(90deg, rgba(0,0,0,0.40) 0%, rgba(0,0,0,0.40) ${peakPct.toFixed(1)}%, ${blue} 100%)`;
      }
      if (mode === 'balance') {
        // Divergent hue: amber-on-left (dim) → neutral-middle → blue-on-right (lift).
        return 'linear-gradient(90deg, rgba(230,170,80,0.85) 0%, rgba(0,0,0,0.40) 50%, rgba(120,170,230,0.85) 100%)';
      }
      if (mode === 'bed' || mode === 'wake') {
        return buildPhaseGradient(area);
      }
      return '';
    }

    // Phase-mode (bed/wake) gradient: sample candidate phase times across
    // the slider's window and compute the bulb's predicted brightness + CCT
    // at NOW for each. Ported from area.html buildTrackGradient.
    function buildPhaseGradient(area) {
      const zoneName = area.zone_name || areaStatus[area.area_id]?.zone_name;
      const zc = zoneName ? cachedGlozones?.zones?.[zoneName] : null;
      if (!zc) return '';
      const status = areaStatus[area.area_id] || {};
      const phase = status.phase || getHomePhase();
      const cursorInAscend = phase === 'wake';
      const bounds = getPhaseBounds(area.area_id);
      const phaseMin = bounds.lo;
      const phaseMax = bounds.hi;
      const kAscend = SPEED_TO_SLOPE[Math.max(1, Math.min(12, zc.wake_speed))];
      const kDescend = SPEED_TO_SLOPE[Math.max(1, Math.min(12, zc.bed_speed))];
      const slopeSigned = cursorInAscend ? kAscend : -kDescend;
      const bMin = zc.min_brightness, bMax = zc.max_brightness;
      const cMin = zc.min_color_temp, cMax = zc.max_color_temp;
      const bMinNorm = bMin / 100, bMaxNorm = bMax / 100;
      const now = new Date();
      const currentHour = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
      const ascendStart = zc.ascend_start ?? 4.0;
      const now48 = currentHour < ascendStart ? currentHour + 24 : currentHour;
      const briOv = status.brightness_override ?? 0;
      const colorOv = status.color_override ?? 0;
      const briPct = cursorInAscend ? zc.wake_brightness : zc.bed_brightness;
      const stops = [];
      const n = 10;
      for (let i = 0; i <= n; i++) {
        const frac = i / n;
        const candidateTargetH48 = phaseMin + (phaseMax - phaseMin) * frac;
        const shiftedMid = computeShiftedMidpoint(candidateTargetH48, briPct, slopeSigned, bMinNorm, bMaxNorm);
        const briNorm = bMinNorm + (bMaxNorm - bMinNorm) / (1 + Math.exp(-slopeSigned * (now48 - shiftedMid)));
        let b = Math.max(0, Math.min(100, briNorm * 100 + briOv));
        const ct = 1 / (1 + Math.exp(-slopeSigned * (now48 - shiftedMid)));
        let k = cMin + (cMax - cMin) * ct + colorOv;
        k = Math.max(1000, Math.min(10000, k));
        const color = tintColorByBrightness(cctToRGB(k), b);
        stops.push(color + ' ' + Math.round(frac * 100) + '%');
      }
      return 'linear-gradient(to right, ' + stops.join(', ') + ')';
    }

    function getRowControls(area) {
      const isOn = area.is_on;

      // Power icon
      const powerIconSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18.36 6.64a9 9 0 1 1-12.73 0M12 2v10"/>
      </svg>`;

      const leftControls = `
        <div class="row-controls-left">
          <button class="row-btn ${isOn ? 'active' : ''}" onclick="event.stopPropagation(); rowAction('${area.area_id}', 'lights_toggle')" title="Power">${powerIconSvg}</button>
        </div>
      `;

      // Step up icon (compact chevron)
      const stepUpSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="5 15 12 8 19 15"/>
      </svg>`;

      // Step down icon (compact chevron)
      const stepDownSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="5 9 12 16 19 9"/>
      </svg>`;

      // Tune mode: drag is the only adjustment path — no chevrons. The
      // slider snaps to discrete steps on release.
      const rightControls = isTuneMode(homePillMode) ? '' : `
        <div class="row-controls">
          <div class="row-step-stack">
            <button class="row-btn" onclick="event.stopPropagation(); homeStepUp('${area.area_id}')" title="Step up">${stepUpSvg}</button>
            <button class="row-btn" onclick="event.stopPropagation(); homeStepDown('${area.area_id}')" title="Step down">${stepDownSvg}</button>
          </div>
        </div>
      `;

      return { leftControls, rightControls };
    }

function updateSliderFill(el) {
      const pct = (el.value - el.min) / (el.max - el.min) * 100;
      el.style.setProperty('--fill-pct', pct + '%');
    }
    function updateAllSliderFills() {
      document.querySelectorAll('input[type=range]').forEach(updateSliderFill);
    }

    function setupEventListeners() {
      document.getElementById('areas-container').addEventListener('click', (e) => {
        if (e.target.id === 'add-zone-link') { e.preventDefault(); createZoneFromEdit(); }
      });

      // Phase 1: always-visible segmented bar — click any non-active pill switches mode.
      document.getElementById('areas-container').addEventListener('click', (e) => {
        const seg = e.target.closest('.view-segments-bar .view-segment');
        if (!seg) return;
        if (seg.classList.contains('active')) return;
        // Phase 3: Tune-mode tune-sort variant
        if (seg.dataset.tuneSort) {
          homeTuneSort = seg.dataset.tuneSort;
          savePreferences();
          renderAreas();
          return;
        }
        const v = seg.dataset.view;
        if (v === 'manage') { enterManageMode(); return; }
        viewMode = (v === 'onoff') ? 'onoff' : 'custom';
        savePreferences();
        if (currentMode === 'manage') {
          exitMode();
        } else {
          renderAreas();
        }
      });

      // Phase 2/3: mode pill — toggle popover, pick a mode.
      document.getElementById('areas-container').addEventListener('click', (e) => {
        const opt = e.target.closest('.action-popover-option');
        if (opt) {
          e.stopPropagation();
          const newMode = opt.dataset.pillMode;
          _modePopoverOpen = false;
          // Activity is a separate page — navigate, don't try to swap mode.
          if (newMode === 'activity') {
            // Compute addon root explicitly. Relative `./activity` was
            // sometimes resolving against odd-shaped paths (HA ingress +
            // historical /zone/... URLs) and matching the
            // `/{path:.*}/zone/{zone_name}` wildcard, landing the user on
            // a phantom zone-detail page named "activity". Strip any
            // trailing /areas (the home-page route) to find the addon root
            // and append /activity from there.
            let root = window.location.pathname.replace(/\/$/, '');
            root = root.replace(/\/areas$/, '');
            window.location.href = (root || '') + '/activity';
            return;
          }
          // Manage is special — it's a page mode, not a slider/chevron knob.
          if (newMode === 'manage') {
            enterManageMode();
            return;
          }
          // Selecting any non-Manage option while in Manage mode = exit Manage.
          const wasManage = currentMode === 'manage';
          if (newMode && newMode !== homePillMode) {
            homePillMode = newMode;
            // Mode change clears the most-recent-tune marker — orange
            // row-readout is scoped to the current tune mode.
            _homeRecentTuneAreaId = null;
            savePreferences();
            if (isTuneMode(newMode) && !Object.keys(cachedAreaTune).length) {
              loadAreaTuneData().then(renderAreas);
            }
          }
          if (wasManage) {
            exitMode();
          } else {
            renderAreas();
          }
          return;
        }
        const pill = e.target.closest('#home-mode-pill');
        if (pill) {
          e.stopPropagation();
          _modePopoverOpen = !_modePopoverOpen;
          const pop = document.getElementById('home-mode-popover');
          if (pop) pop.classList.toggle('open', _modePopoverOpen);
        }
      });

      // Outside-click → close mode popover (state + DOM in sync).
      document.addEventListener('click', (e) => {
        if (e.target.closest('#home-mode-pill')) return;
        _modePopoverOpen = false;
        const pop = document.getElementById('home-mode-popover');
        if (pop) pop.classList.remove('open');
      });

      // Sun pill / popover is owned by SunIntensity (shared.js) — wired up by
      // attachSunIntensity() from renderAreas, no local click handlers needed.

      // Long-press on the home name → enter rename mode (mobile equivalent
      // of double-click; both gestures route through editHomeName).
      // ~600ms hold; cancelled if the finger moves or lifts early.
      let _renameLongPressTimer = null;
      let _renameTouchTarget = null;
      const cancelLongPress = () => {
        if (_renameLongPressTimer) clearTimeout(_renameLongPressTimer);
        _renameLongPressTimer = null;
        _renameTouchTarget = null;
      };
      const ac = document.getElementById('areas-container');
      ac.addEventListener('touchstart', (e) => {
        const nameEl = e.target.closest('#home-name-heading');
        if (!nameEl) return;
        _renameTouchTarget = nameEl;
        _renameLongPressTimer = setTimeout(() => {
          if (_renameTouchTarget) editHomeName(_renameTouchTarget);
          _renameTouchTarget = null;
        }, 600);
      }, { passive: true });
      ac.addEventListener('touchend', cancelLongPress);
      ac.addEventListener('touchmove', cancelLongPress);
      ac.addEventListener('touchcancel', cancelLongPress);

      // Slider fill updates (delegated)
      document.getElementById('areas-container').addEventListener('input', (e) => {
        if (e.target.matches('input[type=range]')) updateSliderFill(e.target);
      });

    }

    // Navigation to detail pages
    function openAreaModal(areaId) {
      window.location.href = './area/' + encodeURIComponent(areaId);
    }

    function openZoneModal(zoneName) {
      window.location.href = './zone/' + encodeURIComponent(zoneName);
    }

    // Manage-mode circadian toggle. Optimistic UI: flip the visual state
    // immediately so the user sees the tap register, then send the rowAction
    // and let renderAreas reconcile when the refresh lands. Without this,
    // the 500ms server roundtrip feels like a broken button — tap, no
    // change, wait, change.
    function onCircadianToggleClick(btn, areaId) {
      const row = btn.closest('.edit-mode-row');
      const wasOn = !btn.classList.contains('is-off');
      // Flip optimistically
      btn.classList.toggle('is-off', wasOn);
      if (row) row.classList.toggle('is-circadian-off', wasOn);
      // Mirror into areaStatus so renderAreas (post-refresh) renders the
      // same flipped state even if the lite endpoint races our request.
      if (!areaStatus[areaId]) areaStatus[areaId] = {};
      areaStatus[areaId].is_circadian = !wasOn;
      rowAction(areaId, wasOn ? 'circadian_off' : 'circadian_on');
    }

    async function rowAction(areaId, action, value, mode) {
      try {
        const body = { area_id: areaId, action: action };
        if (value !== undefined) { body.value = value; body.mode = mode || 'step'; }
        const response = await fetch('./api/area/action', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        if (response.ok) {
          // Re-fetch area status + zone states and update table
          setTimeout(async () => {
            try {
              const [statusRes, zsRes] = await Promise.all([
                fetch('./api/area-status?lite=true'),
                fetch('./api/zone-states')
              ]);
              if (statusRes.ok) {
                areaStatus = await statusRes.json();
                sliderPreviewCache = {};
              }
              if (zsRes.ok) {
                const zs = await zsRes.json();
                zoneStates = zs.zone_states || {};
              }
              sliderDragging = false;
              renderAreas();
            } catch (err) {
              sliderDragging = false;
              console.error('Error refreshing after row action:', err);
            }
          }, 500);
        } else {
          sliderDragging = false;
          const error = await response.json();
          console.error('Row action failed:', error);
        }
      } catch (err) {
        sliderDragging = false;
        console.error('Error executing row action:', err);
      }
    }

    // Slider preview cache: { areaId: [{brightness, kelvin}, ...] }
    let sliderPreviewCache = {};

    async function fetchSliderPreview(areaId) {
      if (sliderPreviewCache[areaId]) return sliderPreviewCache[areaId];
      try {
        const res = await fetch(`./api/area/slider-preview?area_id=${encodeURIComponent(areaId)}`);
        if (res.ok) {
          const data = await res.json();
          sliderPreviewCache[areaId] = data.points || [];
          return sliderPreviewCache[areaId];
        }
      } catch (err) {
        console.error('Error fetching slider preview:', err);
      }
      return null;
    }

    function kelvinAtBrightness(brightness, previewPoints) {
      if (!previewPoints || previewPoints.length < 2) return 4000;
      if (brightness <= previewPoints[0].brightness) return previewPoints[0].kelvin;
      const last = previewPoints[previewPoints.length - 1];
      if (brightness >= last.brightness) return last.kelvin;
      for (let i = 1; i < previewPoints.length; i++) {
        const prev = previewPoints[i - 1];
        const curr = previewPoints[i];
        if (brightness <= curr.brightness) {
          const frac = (brightness - prev.brightness) / (curr.brightness - prev.brightness);
          return prev.kelvin + (curr.kelvin - prev.kelvin) * frac;
        }
      }
      return last.kelvin;
    }

    function previewRowColor(row, brightness, kelvin) {
      const cctColor = cctToRGB(kelvin);
      const tinted = tintColorByBrightness(cctColor, brightness);
      const textColor = readableTextColor(tinted);
      row.style.setProperty('--row-bg', tinted);
      row.style.setProperty('--row-text', textColor);
      row.style.setProperty('--row-fill', (brightness / 100).toFixed(3));
      row.style.color = textColor;
    }

    function initRowSliders() {
      document.querySelectorAll('.row-slider-thumb').forEach(thumb => {
        const track = thumb.closest('.row-slider-track');
        const row = track?.closest('.area-row');
        if (!track || !row) return;

        const areaId = track.dataset.areaId;
        const bMin = parseFloat(track.dataset.bmin) || 1;
        const bMax = parseFloat(track.dataset.bmax) || 100;

        const ghost = track.querySelector('.row-slider-thumb-ghost');
        const fillDrag = track.querySelector('.row-slider-fill-drag');
        // row-readout doubles as the live drag readout — drop the
        // separate row-drag-value span. updateTunePreview also targets
        // the readout for tune modes.
        const valueEl = row.querySelector(`[data-area-readout="${areaId}"]`);
        let startPct = 0;

        const updateFillDrag = (fromPct, toPct) => {
          if (!fillDrag) return;
          const left = Math.min(fromPct, toPct);
          const width = Math.abs(toPct - fromPct);
          fillDrag.style.left = left + '%';
          fillDrag.style.width = width + '%';
        };

        thumb.addEventListener('pointerdown', (e) => {
          e.stopPropagation();
          e.preventDefault();
          sliderDragging = true;
          thumb.setPointerCapture(e.pointerId);
          thumb.classList.add('dragging');
          track.classList.add('dragging');
          row.classList.add('slider-dragging');
          // Anchor ghost at current thumb position for the life of the drag
          startPct = parseFloat(thumb.style.left) || 0;
          if (ghost) ghost.style.left = startPct + '%';
          updateFillDrag(startPct, startPct);
          // No drag-start seed — the readout already shows the saved
          // value, and the first pointermove will replace it with the
          // candidate. Prevents brightness-format leaks into color/bed
          // modes (the old seed always wrote "%").
          // Pre-fetch preview points for live color preview
          if (areaId) fetchSliderPreview(areaId);
        });
        thumb.addEventListener('pointermove', (e) => {
          if (!thumb.hasPointerCapture(e.pointerId)) return;
          e.stopPropagation();
          let pct = getSliderPctFromPointer(track, e);
          // Tune modes have discrete step positions — snap the thumb to them
          // during drag so the visual matches the value the readout shows.
          if (homePillMode === 'sun') {
            const n = SOLAR_STEPS.length - 1;
            pct = (Math.round(pct / 100 * n) / n) * 100;
          } else if (homePillMode === 'balance') {
            const n = LUMEN_STEPS.length - 1;
            pct = (Math.round(pct / 100 * n) / n) * 100;
          }
          thumb.style.left = pct + '%';
          updateFillDrag(startPct, pct);
          // Phase 2: drag-value preview is mode-aware.
          if (homePillMode === 'color') {
            const cMin = parseFloat(track.dataset.cmin) || 2200;
            const cMax = parseFloat(track.dataset.cmax) || 6500;
            const kelvin = Math.round(cMin + (cMax - cMin) * pct / 100);
            if (valueEl) valueEl.textContent = kelvin + 'K';
            const brightness = areaStatus[areaId]?.brightness || (bMin + (bMax - bMin) * 0.5);
            previewRowColor(row, brightness, kelvin);
          } else if (homePillMode === 'bed') {
            const target = bedTimeFromPct(areaId, pct);
            if (target != null && valueEl) valueEl.textContent = formatDecimalHour(target);
            // No color preview for bed mode — the row's current tint is correct.
          } else if (homePillMode === 'sun') {
            // Inverted: position 0% (left) maps to highest step, position 100% to step 0.
            const n = SOLAR_STEPS.length - 1;
            const idx = n - Math.round(pct / 100 * n);
            const s = SOLAR_STEPS[idx];
            if (valueEl) valueEl.innerHTML = `${s.label} <span class="tune-mult">${s.exposure.toFixed(2)}x</span>`;
            updateTunePreview(areaId, s.exposure);
          } else if (homePillMode === 'balance') {
            const idx = Math.round(pct / 100 * (LUMEN_STEPS.length - 1));
            const s = LUMEN_STEPS[idx];
            if (valueEl) valueEl.innerHTML = `${s.label} <span class="tune-mult">${s.factor.toFixed(2)}x</span>`;
            updateTunePreview(areaId, s.factor);
          } else {
            // Brightness mode: drag preview is brightness only — keep current
            // row color (kelvin from areaStatus), update brightness inline.
            // Slider spans the full 0-100 bulb range (override surface), not
            // the [bMin, bMax] curve bounds — otherwise a zone with max=40
            // shows 40% during full-right drag even though the backend
            // correctly drives the bulb to 100% via an override on release.
            const brightness = pct;
            if (valueEl) valueEl.textContent = Math.round(brightness) + '%';
            const kelvin = areaStatus[areaId]?.kelvin || 4000;
            previewRowColor(row, brightness, kelvin);
          }
        });
        const clearDragAffordances = () => {
          thumb.classList.remove('dragging');
          track.classList.remove('dragging');
          row.classList.remove('slider-dragging');
          clearTunePreview(areaId);
        };
        thumb.addEventListener('pointerup', (e) => {
          if (!thumb.hasPointerCapture(e.pointerId)) return;
          e.stopPropagation();
          const pct = getSliderPctFromPointer(track, e);
          if (areaId) {
            // Phase 2: slider dispatches per homePillMode. Save FIRST so
            // the optimistic cache update happens before clearDragAffordances
            // reads from cachedAreaTune — otherwise the row's stripe +
            // readout reset to the pre-drag (OLD) value for 400ms until
            // the refetch fires renderAreas.
            if (homePillMode === 'color') {
              rowAction(areaId, 'set_position', Math.round(pct), 'color');
            } else if (homePillMode === 'bed') {
              const target = bedTimeFromPct(areaId, pct);
              if (target != null) setPhaseTime(areaId, target);
              else sliderDragging = false;
            } else if (homePillMode === 'sun') {
              // Inverted (see drag-preview branch).
              const n = SOLAR_STEPS.length - 1;
              const idx = n - Math.round(pct / 100 * n);
              saveAreaTune(areaId, { natural_light_exposure: SOLAR_STEPS[idx].exposure });
              setHomeRecentTune(areaId);
            } else if (homePillMode === 'balance') {
              const idx = Math.round(pct / 100 * (LUMEN_STEPS.length - 1));
              saveAreaTune(areaId, { brightness_factor: LUMEN_STEPS[idx].factor });
              setHomeRecentTune(areaId);
            } else {
              // Brightness mode: drag percent maps directly to brightness target.
              rowAction(areaId, 'set_position', Math.round(pct), 'brightness');
            }
          } else {
            sliderDragging = false;
          }
          clearDragAffordances();
        });
        thumb.addEventListener('pointercancel', () => {
          sliderDragging = false;
          clearDragAffordances();
        });
        // Prevent click from bubbling to row's onclick
        thumb.addEventListener('click', (e) => e.stopPropagation());
      });
    }

    function getSliderPctFromPointer(track, e) {
      const rect = track.getBoundingClientRect();
      return Math.max(0, Math.min(100, (e.clientX - rect.left) / rect.width * 100));
    }

    // Tune-mode drag preview: both LEFT (peak with candidate) and RIGHT
    // (now-formula with candidate) update live as the slider moves.
    function updateTunePreview(areaId, candidateValue) {
      // During drag, refresh all three tune readouts on the row from the
      // candidate value:
      //   - Row 1 right (descriptor): "Standard 1.00x"
      //   - Row 3 left  (peak):       "peak ↓ 75%"
      //   - Row 3 right (current):    "current: ↓ 17% (X% → Y%)"
      // All three are .area-row scoped, so one row lookup suffices.
      const readoutEl = document.querySelector(`[data-area-readout="${areaId}"]`);
      const row = readoutEl ? readoutEl.closest('.area-row') : null;
      if (!row) return;
      const area = areas.find(a => a.area_id === areaId);
      if (!area) return;
      const merged = { ...area, ...(areaStatus[areaId] || {}) };
      if (readoutEl) readoutEl.innerHTML = getModeReadout(merged, candidateValue);
      const peakEl = row.querySelector(`[data-tune-peak="${areaId}"]`);
      if (peakEl) peakEl.innerHTML = formatBreakdownPeakHtml(merged, candidateValue);
      const currentEl = row.querySelector(`[data-tune-current="${areaId}"]`);
      if (currentEl) {
        const b = computeTuneBreakdown(merged, candidateValue);
        currentEl.innerHTML = formatBreakdownNowHtml(b);
      }
    }
    function clearTunePreview(areaId) {
      // Renamed semantics — instead of "empty everything", surgically
      // refresh the row's tune surfaces from the current cache. Called on
      // pointerup / pointercancel and after a successful saveAreaTune so
      // the row reflects the optimistically-updated cache without waiting
      // for the 400ms refetch + full renderAreas.
      refreshTuneRowDom(areaId);
    }

    // Surgical row refresh — reads cachedAreaTune + areaStatus and updates:
    //   1. Row 1 right readout (.row-readout — "Bright 1.15" / etc.)
    //   2. Row 3 RIGHT static formula (.tb-static)
    //   3. Row 3 LEFT peak/drag-preview slot (.tb-preview — restored to peak)
    // Avoids re-rendering the whole list when only the tuned row needs to
    // refresh. Called after optimistic cache update on drag release.
    function refreshTuneRowDom(areaId) {
      // On pointerup / save / 10s timer expiry, restore all three tune
      // readouts to the at-rest format AND drop the dirty cues (orange
      // row-readout + slider default tick) if the area is no longer the
      // recent-tune one.
      const readoutEl = document.querySelector(`[data-area-readout="${areaId}"]`);
      const row = readoutEl ? readoutEl.closest('.area-row') : null;
      if (!row || !areaId) return;
      const baseArea = areas.find(a => a.area_id === areaId);
      if (!baseArea) return;
      const merged = { ...baseArea, ...(areaStatus[areaId] || {}) };
      if (readoutEl) readoutEl.innerHTML = getModeReadout(merged);
      const peakEl = row.querySelector(`[data-tune-peak="${areaId}"]`);
      if (peakEl) peakEl.innerHTML = formatBreakdownPeakHtml(merged);
      const currentEl = row.querySelector(`[data-tune-current="${areaId}"]`);
      if (currentEl) {
        const b = computeTuneBreakdown(merged);
        currentEl.innerHTML = formatBreakdownNowHtml(b);
      }
      // Sync the orange row-readout + tick visibility with the recent-tune
      // pointer. Cheap DOM toggle — no full row re-render.
      const isRecent = (areaId === _homeRecentTuneAreaId);
      if (readoutEl) {
        readoutEl.classList.toggle('row-readout--dirty', isRecent);
        if (isRecent) {
          readoutEl.setAttribute('onclick', `event.stopPropagation(); rowReadoutReset('${areaId}')`);
        } else {
          readoutEl.removeAttribute('onclick');
        }
      }
      const tickEl = row.querySelector(`[data-tick="${areaId}"]`);
      if (tickEl) tickEl.classList.toggle('is-visible', isRecent);
    }

  </script>
</body>
