<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circadian Light - Activity</title>
  <link rel="stylesheet" href="./shared.css">
  <style>
    :root {
      --bg: #000;
      --panel: #111;
      --card: #1a1a1a;
      --accent: #feac60;
      --accent-hover: #ffc078;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --muted2: #64748b;
      --line: #334155;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --font-hero: 1.4rem;
      --font-display: 1.1rem;
      --font-card-title: 0.95rem;
      --font-value: 0.85rem;
      --font-body: 0.78rem;
      --font-muted: 0.7rem;
      --font-caps: 0.65rem;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Top nav (matches settings.html / areas.html — each page
       inlines its own copy of these because shared.css doesn't carry .nav
       rules. Future cleanup candidate but out of scope here.) */
    .nav {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 0 12px;
      display: flex;
      align-items: center;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      font-weight: 600;
      font-size: var(--font-display);
      color: var(--muted);
      margin-right: 8px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .nav-brand.active { color: var(--text); }
    .nav-logo { width: 24px; height: 24px; flex-shrink: 0; }
    .nav-links { display: flex; gap: 4px; flex: 1; min-width: 0; overflow: hidden; }
    .nav-link {
      padding: 8px 8px; color: var(--muted); text-decoration: none;
      border-radius: 6px; font-size: var(--font-value);
      transition: all 0.2s;
    }
    .nav-link:hover { color: var(--text); background: rgba(255, 255, 255, 0.05); }
    .nav-link.active { color: var(--text); }
    .nav-more { background: none; border: none; color: var(--muted); font-size: var(--font-display); cursor: pointer; padding: 4px 8px; border-radius: 6px; display: none; flex-shrink: 0; letter-spacing: 2px; line-height: 1; }
    .nav-more:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-overflow { display: none; position: absolute; top: 100%; right: 12px; background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 4px 0; min-width: 140px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 200; }
    .nav-overflow.open { display: block; }
    .nav-overflow-item { display: block; padding: 10px 16px; color: var(--muted); text-decoration: none; font-size: var(--font-value); white-space: nowrap; }
    .nav-overflow-item:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-overflow-item.active { color: var(--text); }

    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 10px;
    }

    /* Mirror home-page chrome (home-name-heading + sticky-top container).
       Reused class names so shared.css picks them up; per-page tweaks here. */
    .home-name-heading {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.01em;
      padding: 4px 8px;
      border-radius: 6px;
      cursor: default;
      user-select: none;
      transition: background 0.15s;
    }
    .activity-sticky-top {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--bg);
      padding: 12px 14px 8px;
      border-bottom: 1px solid var(--line);
    }
    .activity-header-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .activity-spacer { flex: 1 1 auto; }
    .activity-filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .activity-filter-select {
      font-size: 0.85rem;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
    }
    /* Non-default filter value → highlight border + text so the active
       filters are visually distinct from the "All …" defaults. Mirrors the
       Controls page filter pattern. */
    .activity-filter-select.is-active {
      border-color: var(--accent);
      color: var(--accent);
    }
    /* Sort segmenter row — uses shared .view-segments-bar / .view-segment
       styling from shared.css. */
    .activity-sort-row {
      margin-top: 8px;
    }

    .activity-body {
      padding: 12px 14px 32px;
    }
    /* Page-level activity feed: a bit more breathing room than the in-card
       version on area details (more horizontal space available here).
       Shared .hist-list CSS (shared.css) owns the layout baselines; this
       just bumps font + padding for the full-page view. */
    .activity-body .hist-row { padding: 10px 14px; font-size: 0.85rem; }
    .activity-body .tune-history-empty {
      padding: 32px 14px;
      color: var(--muted2);
      font-size: 0.9rem;
      text-align: center;
    }

    /* Mode pill — shared with home page via shared.css. Tap-to-open popover,
       options navigate back to /areas or stay on /activity. */
  </style>
  <script src="./shared.js"></script>
</head>
<body>
  <!-- Navigation (same chrome as home/tune/settings) -->
  <nav class="nav">
    <a href="./" class="nav-brand">
      <img class="nav-logo" src="./icon.png" alt="Circadian Light">
      Home
    </a>
    <div class="nav-links">
      <a href="./switches" class="nav-link">Controls</a>
      <a href="./moments" class="nav-link">Magic</a>
      <a href="./settings" class="nav-link">Settings</a>
    </div>
    <button class="nav-more" aria-label="More pages">&middot;&middot;&middot;</button>
    <div class="nav-overflow"></div>
  </nav>

  <main class="main">
    <!-- Sticky header: home name (left) + mode pill (right). -->
    <div class="activity-sticky-top" id="activity-sticky-top">
      <div class="activity-header-row">
        <span class="home-name-heading" id="home-name-heading">Loading…</span>
        <span class="activity-spacer"></span>
        <div class="action-pill" id="activity-mode-pill" title="Switch mode">
          <span class="action-pill-prefix"></span><span id="activity-mode-label">View: Activity</span>
          <span class="action-pill-caret">
            <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 5 6 8 9 5"/>
            </svg>
          </span>
          <div class="action-popover" id="activity-mode-popover">
            <div class="action-popover-section-label">Adjust</div>
            <div class="action-popover-option" data-pill-mode="brightness">Brightness</div>
            <div class="action-popover-option" data-pill-mode="color">Color</div>
            <div class="action-popover-option" data-pill-mode="bed">Bed time</div>
            <div class="action-popover-divider"></div>
            <div class="action-popover-section-label">Tune</div>
            <div class="action-popover-option" data-pill-mode="sun">Sun dimming</div>
            <div class="action-popover-option" data-pill-mode="balance">Balance</div>
            <div class="action-popover-divider"></div>
            <div class="action-popover-option" data-pill-mode="manage">Manage</div>
            <div class="action-popover-option active" data-pill-mode="activity">Activity</div>
          </div>
        </div>
      </div>
      <div class="activity-filter-row">
        <select class="activity-filter-select" id="activity-area-filter" title="Filter by area">
          <option value="">Areas</option>
        </select>
        <select class="activity-filter-select" id="activity-source-filter" title="Filter by source kind">
          <option value="">Sources</option>
        </select>
        <select class="activity-filter-select" id="activity-action-filter" title="Filter by action">
          <option value="">Actions</option>
        </select>
      </div>
      <div class="seg-row activity-sort-row">
        <span class="seg-label">sort</span>
        <div class="view-segments-bar" id="activity-sort-seg" role="tablist">
          <button class="view-segment" data-sort="recent" role="tab">Recent</button>
          <button class="view-segment" data-sort="area" role="tab">Area</button>
          <button class="view-segment" data-sort="source" role="tab">Source</button>
          <button class="view-segment" data-sort="action" role="tab">Action</button>
        </div>
      </div>
    </div>

    <div class="activity-body" id="activity-body">
      <div class="tune-history-empty">Loading…</div>
    </div>
  </main>

  <script>
    let cachedConfig = null;
    let allAreas = [];           // [{area_id, name}, ...]
    let areaNameMap = {};        // {area_id: name}
    let allControls = [];        // for source-name lookup
    let controlNameMap = {};
    let allEntries = [];         // most recent fetch
    let _modePopoverOpen = false;
    let _refreshTimer = null;
    let _lastTopTs = null;       // for change-detection

    // Persisted filter + sort state — survives reloads, like the per-area
    // card open/closed state on area-details. Each filter is independent so
    // the user can stack "in Master Bedroom, motion-only, turn_on events" etc.
    const _AREA_FILTER_KEY = 'activity_area_filter';
    const _SOURCE_FILTER_KEY = 'activity_source_filter';
    const _ACTION_FILTER_KEY = 'activity_action_filter';
    const _SORT_KEY = 'activity_sort_mode';
    let activeAreaFilter = localStorage.getItem(_AREA_FILTER_KEY) || '';
    let activeSourceFilter = localStorage.getItem(_SOURCE_FILTER_KEY) || '';
    let activeActionFilter = localStorage.getItem(_ACTION_FILTER_KEY) || '';
    let activeSortMode = localStorage.getItem(_SORT_KEY) || 'recent';

    // --- Path / base detection (HA ingress aware) ---
    let basePath = '';
    function _resolveBasePath() {
      // Strip trailing /activity to derive base. Mirrors area.html pattern.
      const m = window.location.pathname.match(/^(.*)\/activity\/?$/);
      basePath = m ? m[1] : '';
      // basePath of '' means root; otherwise it's the HA ingress prefix.
      if (!basePath) basePath = '';
    }

    async function loadStaticData() {
      try {
        const [cfgRes, areasRes, controlsRes] = await Promise.all([
          fetch(basePath + '/api/config'),
          fetch(basePath + '/api/areas'),
          fetch(basePath + '/api/controls').catch(() => null),
        ]);
        if (cfgRes && cfgRes.ok) cachedConfig = await cfgRes.json();
        if (areasRes && areasRes.ok) {
          // /api/areas returns a flat array [{area_id, name}, ...] — not
          // a {areas: [...]} wrapper like /api/glozones or /api/controls.
          const ad = await areasRes.json();
          allAreas = Array.isArray(ad) ? ad : (ad.areas || []);
          areaNameMap = {};
          for (const a of allAreas) {
            if (a.area_id) areaNameMap[a.area_id] = a.name || a.area_id;
          }
        }
        if (controlsRes && controlsRes.ok) {
          const cd = await controlsRes.json();
          allControls = cd.controls || [];
          controlNameMap = buildControlNameLookup(allControls);
        }
        window.cachedConfig = cachedConfig;
      } catch (e) {
        console.error('static load failed', e);
      }
    }

    function renderHomeName() {
      const el = document.getElementById('home-name-heading');
      if (el) el.textContent = (cachedConfig && cachedConfig.home_name) || 'Your home';
    }

    function renderAreaFilterOptions() {
      const sel = document.getElementById('activity-area-filter');
      if (!sel) return;
      const sorted = [...allAreas].sort((a, b) => (a.name || '').localeCompare(b.name || ''));
      const opts = ['<option value="">Areas</option>']
        .concat(sorted.map(a => `<option value="${a.area_id}">${a.name || a.area_id}</option>`));
      sel.innerHTML = opts.join('');
      sel.value = activeAreaFilter;
      sel.classList.toggle('is-active', !!activeAreaFilter);
    }

    // Build source-type + action filter options from the current entry set.
    // Only kinds/actions actually present in the data appear in the dropdowns
    // (avoids a long list of options that produce empty results).
    function renderSourceAndActionOptions() {
      const sourceSel = document.getElementById('activity-source-filter');
      const actionSel = document.getElementById('activity-action-filter');
      if (!sourceSel || !actionSel) return;

      const presentSources = new Set();
      const presentActions = new Set();
      for (const e of allEntries) {
        if (e.source_kind) presentSources.add(e.source_kind);
        if (e.action) presentActions.add(e.action);
      }

      // Source-kind options sorted by display label.
      const sourceList = [...presentSources].sort((a, b) =>
        (HIST_SOURCE_LABEL[a] || a).localeCompare(HIST_SOURCE_LABEL[b] || b)
      );
      sourceSel.innerHTML = ['<option value="">Sources</option>']
        .concat(sourceList.map(k => {
          const label = HIST_SOURCE_LABEL[k] || k;
          return `<option value="${k}">${label}</option>`;
        })).join('');
      sourceSel.value = activeSourceFilter;
      sourceSel.classList.toggle('is-active', !!activeSourceFilter);

      // Action options sorted by display label.
      const actionList = [...presentActions].sort((a, b) =>
        (HIST_ACTION_LABEL[a] || a).localeCompare(HIST_ACTION_LABEL[b] || b)
      );
      actionSel.innerHTML = ['<option value="">Actions</option>']
        .concat(actionList.map(a => {
          const label = HIST_ACTION_LABEL[a] || a;
          return `<option value="${a}">${label}</option>`;
        })).join('');
      actionSel.value = activeActionFilter;
      actionSel.classList.toggle('is-active', !!activeActionFilter);
    }

    function renderSortSeg() {
      const seg = document.getElementById('activity-sort-seg');
      if (!seg) return;
      seg.querySelectorAll('.view-segment').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.sort === activeSortMode);
      });
    }

    // Apply current sort to a filtered entry list. Sort modes other than
    // 'recent' use a secondary by-recent ordering within each group so
    // recently-active areas/sources/actions still surface at the top of
    // their cluster.
    function sortActivityEntries(entries) {
      if (activeSortMode === 'recent') return entries;
      const tsDesc = (a, b) => (b.ts || 0) - (a.ts || 0);
      const cmpStr = (a, b) => a.localeCompare(b);
      if (activeSortMode === 'area') {
        return [...entries].sort((a, b) => {
          const an = areaNameMap[a.area_id] || a.area_id || '';
          const bn = areaNameMap[b.area_id] || b.area_id || '';
          const c = cmpStr(an, bn);
          return c !== 0 ? c : tsDesc(a, b);
        });
      }
      if (activeSortMode === 'source') {
        return [...entries].sort((a, b) => {
          const al = HIST_SOURCE_LABEL[a.source_kind] || a.source_kind || '';
          const bl = HIST_SOURCE_LABEL[b.source_kind] || b.source_kind || '';
          const c = cmpStr(al, bl);
          return c !== 0 ? c : tsDesc(a, b);
        });
      }
      if (activeSortMode === 'action') {
        return [...entries].sort((a, b) => {
          const al = HIST_ACTION_LABEL[a.action] || a.action || '';
          const bl = HIST_ACTION_LABEL[b.action] || b.action || '';
          const c = cmpStr(al, bl);
          return c !== 0 ? c : tsDesc(a, b);
        });
      }
      return entries;
    }

    async function loadActivity() {
      try {
        const res = await fetch(basePath + '/api/history?limit=300');
        if (!res.ok) return;
        const data = await res.json();
        allEntries = data.entries || [];
        _lastTopTs = allEntries.length ? allEntries[0].ts : null;
        renderActivity();
      } catch (e) {
        console.error('loadActivity failed', e);
      }
    }

    function renderActivity() {
      const body = document.getElementById('activity-body');
      if (!body) return;
      // Refresh filter option sets on every render — the available
      // source/action values can change as new entries arrive.
      renderSourceAndActionOptions();
      renderSortSeg();

      let entries = allEntries;
      if (activeAreaFilter) entries = entries.filter(e => e.area_id === activeAreaFilter);
      if (activeSourceFilter) entries = entries.filter(e => e.source_kind === activeSourceFilter);
      if (activeActionFilter) entries = entries.filter(e => e.action === activeActionFilter);
      entries = sortActivityEntries(entries);

      const anyFilterActive = activeAreaFilter || activeSourceFilter || activeActionFilter;
      body.innerHTML = renderHistoryList(entries, {
        showArea: true,
        areaNames: areaNameMap,
        controlNames: controlNameMap,
        emptyMessage: anyFilterActive
          ? 'No activity matches the current filters since the addon last restarted.'
          : 'No activity yet — recording starts when the addon last restarts.',
      });
    }

    // Mode pill open/close + option routing. Options that aren't "activity"
    // navigate back to home with the picked mode preselected.
    function _wireModePill() {
      const pill = document.getElementById('activity-mode-pill');
      const pop = document.getElementById('activity-mode-popover');
      if (!pill || !pop) return;
      pill.addEventListener('click', (e) => {
        // Did the user click an option? Route accordingly.
        const opt = e.target.closest('[data-pill-mode]');
        if (opt) {
          const val = opt.dataset.pillMode;
          if (val === 'activity') {
            _modePopoverOpen = false;
            pop.classList.remove('open');
            return;
          }
          // All other options navigate back to home with mode query param.
          // Build absolute URL from the addon root (strip trailing /activity
          // off our own pathname) to avoid relative-URL pitfalls under HA
          // ingress prefixes. areas.html honors ?mode=X on load.
          let root = window.location.pathname.replace(/\/$/, '');
          root = root.replace(/\/activity$/, '');
          const qs = val ? `?mode=${encodeURIComponent(val)}` : '';
          window.location.href = (root || '') + '/areas' + qs;
          return;
        }
        _modePopoverOpen = !_modePopoverOpen;
        pop.classList.toggle('open', _modePopoverOpen);
      });
      // Outside click closes
      document.addEventListener('click', (e) => {
        if (!pill.contains(e.target) && _modePopoverOpen) {
          _modePopoverOpen = false;
          pop.classList.remove('open');
        }
      });
    }

    function _wireFilter() {
      const areaSel = document.getElementById('activity-area-filter');
      const sourceSel = document.getElementById('activity-source-filter');
      const actionSel = document.getElementById('activity-action-filter');
      if (areaSel) {
        areaSel.addEventListener('change', () => {
          activeAreaFilter = areaSel.value;
          localStorage.setItem(_AREA_FILTER_KEY, activeAreaFilter);
          areaSel.classList.toggle('is-active', !!activeAreaFilter);
          renderActivity();
        });
      }
      if (sourceSel) {
        sourceSel.addEventListener('change', () => {
          activeSourceFilter = sourceSel.value;
          localStorage.setItem(_SOURCE_FILTER_KEY, activeSourceFilter);
          sourceSel.classList.toggle('is-active', !!activeSourceFilter);
          renderActivity();
        });
      }
      if (actionSel) {
        actionSel.addEventListener('change', () => {
          activeActionFilter = actionSel.value;
          localStorage.setItem(_ACTION_FILTER_KEY, activeActionFilter);
          actionSel.classList.toggle('is-active', !!activeActionFilter);
          renderActivity();
        });
      }

      // Sort segmenter — clicking a segment switches the sort mode.
      const seg = document.getElementById('activity-sort-seg');
      if (seg) {
        seg.addEventListener('click', (e) => {
          const btn = e.target.closest('.view-segment');
          if (!btn || !btn.dataset.sort) return;
          activeSortMode = btn.dataset.sort;
          localStorage.setItem(_SORT_KEY, activeSortMode);
          renderActivity();
        });
      }
    }

    async function init() {
      _resolveBasePath();
      await loadStaticData();
      renderHomeName();
      renderAreaFilterOptions();
      _wireModePill();
      _wireFilter();
      await loadActivity();
      // Poll every 3s for new entries (same cadence as the home page).
      _refreshTimer = setInterval(loadActivity, 3000);
    }

    init();
  </script>
</body>
</html>
