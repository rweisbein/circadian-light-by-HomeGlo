    async function refreshOutdoorInPlace() {
      try {
        const resp = await fetch('./api/outdoor-status');
        if (!resp.ok) return;
        tuneOutdoorData = await resp.json();
        if (tuneData) tuneData.outdoor_normalized = tuneOutdoorData.outdoor_normalized ?? 0;
        const newNorm = tuneOutdoorData.outdoor_normalized ?? 0;
        // Update conditions popup details
        const statusEl = document.getElementById('tune-outdoor-status-detail');
        if (statusEl) {
          let warn = (tuneOutdoorData.preferred_source === 'lux' && tuneOutdoorData.source !== 'lux') ? ' (sensor NA)' : '';
          statusEl.textContent = buildOutdoorDetailText(tuneOutdoorData) + warn;
        }
        const readingEl = document.getElementById('tune-outdoor-reading');
        if (readingEl) readingEl.textContent = tuneOutdoorData.lux_smoothed != null
          ? Math.round(tuneOutdoorData.lux_smoothed).toLocaleString() + ' lx' : '--';
        const rangeEl = document.getElementById('tune-outdoor-range');
        if (rangeEl) {
          const c = tuneOutdoorData.lux_learned_ceiling, f = tuneOutdoorData.lux_learned_floor;
          rangeEl.textContent = (c != null && f != null) ? Math.round(f).toLocaleString() + ' \u2013 ' + Math.round(c).toLocaleString() : 'not learned';
        }
        // Update area previews
        document.querySelectorAll('.tune-area').forEach(el => {
          el.dataset.outdoorNorm = newNorm;
          updateTuneNowPreview(el, {});
        });
        updateSunMultiplierCard();
      } catch (err) {
        console.error('refreshOutdoorInPlace error:', err);
      }
    }

    async function refreshTuneBrightness() {
      try {
        const [zsResp, filtersResp] = await Promise.all([
          fetch('./api/zone-states'),
          fetch('./api/light-filters'),
          refreshOutdoorInPlace(),
        ]);
        // Update boost state from light-filters
        let boostByArea = {};
        if (filtersResp.ok) {
          const filtersData = await filtersResp.json();
          for (const zone of Object.values(filtersData.zones || {})) {
            for (const area of (zone.areas || [])) {
              boostByArea[area.id] = {
                is_on: area.is_on !== false,
                boosted: area.boosted || false,
                boost_brightness: area.boost_brightness || 0,
                bri_override: area.bri_override || 0,
              };
            }
          }
          // Also update tuneData boost fields
          if (tuneData?.zones) {
            for (const zone of Object.values(tuneData.zones)) {
              for (const area of (zone.areas || [])) {
                const b = boostByArea[area.id];
                if (b) {
                  area.is_on = b.is_on;
                  area.boosted = b.boosted;
                  area.boost_brightness = b.boost_brightness;
                  area.bri_override = b.bri_override;
                }
              }
            }
          }
        }
        if (zsResp.ok) {
          const zs = await zsResp.json();
          zoneStates = zs.zone_states || {};
          document.querySelectorAll('.tune-area').forEach(el => {
            const areaId = el.dataset.areaId;
            const zoneName = el.closest('.zone-group')?.querySelector('[data-zone]')?.dataset.zone;
            const zoneData = zoneStates?.[zoneName];
            const zoneBri = zoneData?.brightness;
            if (zoneBri != null) {
              el.dataset.rhythmBri = Math.round(zoneBri);
            }
            if (zoneData?.brightness_fade_weight != null) {
              el.dataset.briFadeWeight = zoneData.brightness_fade_weight;
            }
            if (zoneData?.min_brightness != null) el.dataset.zoneMinBri = zoneData.min_brightness;
            if (zoneData?.max_brightness != null) el.dataset.zoneMaxBri = zoneData.max_brightness;
            // Update boost and override data attributes
            const b = boostByArea[areaId];
            el.dataset.boostBri = (b?.boosted ? (b.boost_brightness || 0) : 0);
            el.dataset.briOverride = b?.bri_override || 0;
            updateTuneNowPreview(el, {});
            rebuildTuneLightValues(areaId);
          });
          document.querySelectorAll('.tune-zone-base-bri').forEach(el => {
            const zoneName = el.closest('[data-zone]')?.dataset.zone;
            const zoneBri = zoneStates?.[zoneName]?.brightness;
            if (zoneBri != null) el.textContent = Math.round(zoneBri) + '%';
          });
          // Update boost and override legends
          document.querySelectorAll('.zone-group').forEach(zoneEl => {
            const legendEl = zoneEl.querySelector('.tune-boost-legend');
            const anyBoosted = Array.from(zoneEl.querySelectorAll('.tune-area')).some(
              el => parseFloat(el.dataset.boostBri) > 0
            );
            if (legendEl) legendEl.style.display = anyBoosted ? '' : 'none';
            const overrideLegendEl = zoneEl.querySelector('.tune-override-legend');
            const anyOverride = Array.from(zoneEl.querySelectorAll('.tune-area')).some(
              el => Math.abs(parseFloat(el.dataset.briOverride) || 0) >= 0.5
            );
            if (overrideLegendEl) overrideLegendEl.style.display = anyOverride ? '' : 'none';
          });
        }
      } catch (err) {
        console.error('refreshTuneBrightness error:', err);
      }
      if (localStorage.getItem('tune_active_tab') === 'color') renderColorTab();
    }

    // ============================================================
    // Expandable lights per area
    // ============================================================
    let tuneLightSortOrder = 'name';
    let tuneLightSortAsc = true;
    let tuneExpandedLightKey = null;  // "areaId:idx"

    function toggleAreaLights(areaId, e) {
      // Don't toggle if click was inside the lights section
      if (e && e.target.closest('.tune-area-lights')) return;
      const wasExpanded = expandedAreas[areaId];
      // Collapse all others (accordion)
      for (const [otherId, isOpen] of Object.entries(expandedAreas)) {
        if (isOpen && otherId !== areaId) {
          expandedAreas[otherId] = false;
          const otherEl = document.getElementById('tune-lights-' + otherId);
          if (otherEl) otherEl.style.display = 'none';
        }
      }
      // Toggle this one
      expandedAreas[areaId] = !wasExpanded;
      const el = document.getElementById('tune-lights-' + areaId);
      if (el) el.style.display = expandedAreas[areaId] ? 'block' : 'none';
      // Also collapse any expanded light detail row when switching areas
      if (!wasExpanded) tuneExpandedLightKey = null;
    }

    function tunePresetMeta(presets, filterName) {
      if (!filterName || filterName === 'Standard') return 'No adjustment';
      const p = presets?.[filterName];
      if (!p) return '';
      const atDim = p.at_dim ?? 100;
      const atBright = p.at_bright ?? 100;
      const fmtD = (v) => v >= 0 ? '+' + v + '%' : v + '%';
      return 'at dim ' + fmtD(atDim - 100) + ' &middot; at bright ' + fmtD(atBright - 100);
    }

    function closeTuneBehaviourDropdown() {
      const existing = document.querySelector('.tune-light-dropdown');
      if (existing) existing.remove();
    }

    function openTuneBehaviourDropdown(areaId, idx, anchorEl) {
      closeTuneBehaviourDropdown();
      const tuneArea = getTuneArea(areaId);
      if (!tuneArea) return;
      const lights = tuneArea.lights || [];
      const light = lights[idx];
      if (!light) return;
      const presets = tuneData?.presets || {};
      const presetNames = Object.keys(presets);
      if (presetNames.indexOf('Standard') < 0) presetNames.unshift('Standard');

      const dropdown = document.createElement('div');
      dropdown.className = 'tune-light-dropdown';

      for (const pName of presetNames) {
        const preset = presets[pName] || {};
        const atDim = preset.at_dim ?? 100;
        const atBright = preset.at_bright ?? 100;
        const isSelected = pName === (light.filter || 'Standard');

        const item = document.createElement('div');
        item.className = 'tune-light-dropdown-item' + (isSelected ? ' selected' : '');
        const fmtD = (v) => v >= 0 ? '+' + v + '%' : v + '%';
        item.innerHTML = '<div class="tune-light-dropdown-name">' + pName + '</div>'
          + '<div class="tune-light-dropdown-meta">at dim ' + fmtD(atDim - 100) + ' &middot; at bright ' + fmtD(atBright - 100) + '</div>';
        item.addEventListener('click', () => {
          light.filter = pName;
          // Update label
          const labelEl = document.getElementById('tune-light-preset-label-' + areaId + '-' + idx);
          if (labelEl) labelEl.textContent = pName;
          // Update trigger button
          if (anchorEl) anchorEl.textContent = pName + ' \u25BE';
          // Update meta
          const metaEl = document.getElementById('tune-meta-' + areaId + '-' + idx);
          if (metaEl) metaEl.innerHTML = tunePresetMeta(presets, pName);
          // Recalc this area's lights
          rebuildTuneLightValues(areaId);
          updateTuneActionBar();
          closeTuneBehaviourDropdown();
        });
        dropdown.appendChild(item);
      }

      document.body.appendChild(dropdown);
      const rect = anchorEl.getBoundingClientRect();
      let left = rect.left;
      let top = rect.bottom + 4;
      if (left + dropdown.offsetWidth > window.innerWidth - 8) left = window.innerWidth - dropdown.offsetWidth - 8;
      if (top + dropdown.offsetHeight > window.innerHeight - 8) top = rect.top - dropdown.offsetHeight - 4;
      dropdown.style.left = left + 'px';
      dropdown.style.top = top + 'px';

      setTimeout(() => {
        const closeHandler = (e) => {
          if (!dropdown.contains(e.target) && e.target !== anchorEl) {
            closeTuneBehaviourDropdown();
            document.removeEventListener('click', closeHandler, true);
          }
        };
        document.addEventListener('click', closeHandler, true);
      }, 0);
    }

    function rebuildTuneLightValues(areaId) {
      const tuneArea = getTuneArea(areaId);
      if (!tuneArea) return;
      const lights = tuneArea.lights || [];
      const presets = tuneData?.presets || {};
      const sensitivity = tuneData?.brightness_sensitivity ?? 1.0;
      const outdoorNorm = tuneData?.outdoor_normalized ?? 0.0;
      const offThresh = tuneData?.off_threshold ?? 0;
      const areaFactor = tuneArea?.brightness_factor ?? 1.0;
      const exposure = tuneArea?.natural_light_exposure ?? 0.0;
      const zoneName = tuneArea?._zoneName;
      const zoneBri = zoneStates?.[zoneName]?.brightness ?? 50;
      const rhythmBri = Math.round(zoneBri);
      const fadeWeight = zoneStates?.[zoneName]?.brightness_fade_weight ?? 1.0;
      const nlFactor = computeNlFactor(exposure, outdoorNorm, sensitivity, fadeWeight);
      const zoneMinBri = zoneStates?.[zoneName]?.min_brightness ?? 1;
      const zoneMaxBri = zoneStates?.[zoneName]?.max_brightness ?? 100;
      const briRange = zoneMaxBri - zoneMinBri;
      const curvePos = briRange > 0 ? Math.max(0, Math.min(1, (rhythmBri - zoneMinBri) / briRange)) : 0;
      let hasCapped = false;

      const base = rhythmBri * nlFactor * areaFactor;
      for (let i = 0; i < lights.length; i++) {
        const light = lights[i];
        const filterName = light.filter || 'Standard';
        const filterMult = getPresetFilterMult(presets, filterName, curvePos);
        const afterFilter = base * filterMult;
        const impactPct = Math.round(afterFilter) - Math.round(base);
        let impactStr = impactPct === 0 ? '0%' : (impactPct < 0 ? '\u2193' + Math.abs(impactPct) + '%' : '\u2191' + impactPct + '%');
        const zoneKelvin = zoneStates?.[zoneName]?.kelvin;
        const ctFactor = getCtFactor(zoneKelvin);
        const finalBri = afterFilter * ctFactor;
        const isCapped = finalBri > 100;
        if (isCapped) hasCapped = true;
        const isOff = finalBri < offThresh;
        const finalVal = isOff ? 0 : Math.min(100, Math.round(finalBri));
        const capStar = isCapped ? '<span class="tune-capped-star">*</span>' : '';

        const impEl = document.getElementById('tune-light-impact-' + areaId + '-' + i);
        if (impEl) impEl.textContent = impactStr;
        const ctEl = document.getElementById('tune-light-ct-' + areaId + '-' + i);
        if (ctEl) ctEl.textContent = formatCtImpact(finalBri, ctFactor);
        const briEl = document.getElementById('tune-light-bri-' + areaId + '-' + i);
        if (briEl) briEl.innerHTML = finalVal + '%' + capStar;
      }
      const legendEl = document.getElementById('tune-lights-legend-' + areaId);
      if (legendEl) legendEl.style.display = hasCapped ? 'block' : 'none';
    }

    function sortTuneLightsList(areaId) {
      const list = document.getElementById('tune-lights-list-' + areaId);
      if (!list) return;
      const items = [...list.querySelectorAll('.tune-light-item')];
      if (items.length === 0) return;

      items.sort((a, b) => {
        let va, vb;
        if (tuneLightSortOrder === 'name') {
          va = a.querySelector('.tune-light-name')?.textContent || '';
          vb = b.querySelector('.tune-light-name')?.textContent || '';
          return tuneLightSortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
        }
        if (tuneLightSortOrder === 'behaviour') {
          va = a.querySelector('.tune-light-behaviour')?.textContent || '';
          vb = b.querySelector('.tune-light-behaviour')?.textContent || '';
          return tuneLightSortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
        }
        const colMap = { impact: '.tune-light-impact', ct: '.tune-light-ct', final: '.tune-light-bri' };
        va = parseFloat(a.querySelector(colMap[tuneLightSortOrder])?.textContent) || 0;
        vb = parseFloat(b.querySelector(colMap[tuneLightSortOrder])?.textContent) || 0;
        return tuneLightSortAsc ? va - vb : vb - va;
      });

      items.forEach(item => list.appendChild(item));

      // Update active-sort class on headers within this area's lights section
      const container = list.closest('.tune-area-lights');
      if (container) {
        container.querySelectorAll('.tune-light-sort').forEach(h => {
          h.classList.toggle('active-sort', h.dataset.sort === tuneLightSortOrder);
        });
      }
    }

    function buildLightsSection(areaId, tuneArea) {
      const lights = tuneArea?.lights || [];
      const presets = tuneData?.presets || {};
      const presetNames = Object.keys(presets);
      if (presetNames.indexOf('Standard') < 0) presetNames.unshift('Standard');
      const sensitivity = tuneData?.brightness_sensitivity ?? 1.0;
      const outdoorNorm = tuneData?.outdoor_normalized ?? 0.0;
      const offThresh = tuneData?.off_threshold ?? 0;

      if (lights.length === 0) return '';

      // Compute per-light values
      const areaFactor = tuneArea?.brightness_factor ?? 1.0;
      const exposure = tuneArea?.natural_light_exposure ?? 0.0;
      const zoneName = tuneArea?._zoneName;
      const zoneBri = zoneStates?.[zoneName]?.brightness ?? 50;
      const rhythmBri = Math.round(zoneBri);
      const fadeWeight = zoneStates?.[zoneName]?.brightness_fade_weight ?? 1.0;
      const nlFactor = computeNlFactor(exposure, outdoorNorm, sensitivity, fadeWeight);
      const zoneMinBri = zoneStates?.[zoneName]?.min_brightness ?? 1;
      const zoneMaxBri = zoneStates?.[zoneName]?.max_brightness ?? 100;
      const briRange = zoneMaxBri - zoneMinBri;
      const curvePos = briRange > 0 ? Math.max(0, Math.min(1, (rhythmBri - zoneMinBri) / briRange)) : 0;
      let hasCapped = false;

      let html = '';
      // Super-header
      html += '<div class="tune-light-col-super"><span></span><span></span><span class="tune-light-super-label">Adjustments</span></div>';
      // Column headers
      html += '<div class="tune-light-col-headers">'
        + '<span class="tune-light-sort' + (tuneLightSortOrder === 'name' ? ' active-sort' : '') + '" data-sort="name" data-area-id="' + areaId + '">light name</span>'
        + '<span class="tune-light-sort' + (tuneLightSortOrder === 'behaviour' ? ' active-sort' : '') + '" data-sort="behaviour" data-area-id="' + areaId + '">purpose</span>'
        + '<span class="tune-light-sort' + (tuneLightSortOrder === 'impact' ? ' active-sort' : '') + '" data-sort="impact" data-area-id="' + areaId + '">purpose</span>'
        + '<span class="tune-light-sort' + (tuneLightSortOrder === 'ct' ? ' active-sort' : '') + '" data-sort="ct" data-area-id="' + areaId + '">CT</span>'
        + '<span class="tune-light-sort tune-light-sort-final' + (tuneLightSortOrder === 'final' ? ' active-sort' : '') + '" data-sort="final" data-area-id="' + areaId + '">final</span>'
        + '</div>';

      // Items
      const base = rhythmBri * nlFactor * areaFactor;
      html += '<div id="tune-lights-list-' + areaId + '">';
      for (let i = 0; i < lights.length; i++) {
        const light = lights[i];
        const filterName = light.filter || 'Standard';
        const filterMult = getPresetFilterMult(presets, filterName, curvePos);
        const afterFilter = base * filterMult;
        const impactPct = Math.round(afterFilter) - Math.round(base);
        let impactStr = impactPct === 0 ? '0%' : (impactPct < 0 ? '\u2193' + Math.abs(impactPct) + '%' : '\u2191' + impactPct + '%');

        const zoneKelvin = zoneStates?.[zoneName]?.kelvin;
        const ctFactor = getCtFactor(zoneKelvin);
        const finalBri = afterFilter * ctFactor;
        const isCapped = finalBri > 100;
        if (isCapped) hasCapped = true;
        const isOff = finalBri < offThresh;
        const finalVal = isOff ? 0 : Math.min(100, Math.round(finalBri));
        const capStar = isCapped ? '<span class="tune-capped-star">*</span>' : '';
        const ctStr = formatCtImpact(finalBri, ctFactor);

        const meta = tunePresetMeta(presets, filterName);
        const lightKey = areaId + ':' + i;
        const isExpanded = tuneExpandedLightKey === lightKey;

        html += '<div class="tune-light-item" data-idx="' + i + '">';
        html += '<div class="tune-light-summary">'
          + '<span class="tune-light-name" title="' + light.entity_id + '">' + light.name + '</span>'
          + '<span class="tune-light-behaviour" id="tune-light-preset-label-' + areaId + '-' + i + '" data-area-id="' + areaId + '" data-idx="' + i + '">' + filterName + '</span>'
          + '<span class="tune-light-impact" id="tune-light-impact-' + areaId + '-' + i + '">' + impactStr + '</span>'
          + '<span class="tune-light-ct" id="tune-light-ct-' + areaId + '-' + i + '">' + ctStr + '</span>'
          + '<span class="tune-light-bri" id="tune-light-bri-' + areaId + '-' + i + '">' + finalVal + '%' + capStar + '</span>'
          + '</div>';
        html += '<div class="tune-light-expanded" id="tune-light-exp-' + areaId + '-' + i + '" style="display:' + (isExpanded ? 'block' : 'none') + ';">'
          + '<button class="tune-light-select" data-area-id="' + areaId + '" data-light-idx="' + i + '" onclick="openTuneBehaviourDropdown(\'' + areaId + '\', ' + i + ', this)">' + filterName + ' \u25BE</button>'
          + '<span class="tune-light-meta" id="tune-meta-' + areaId + '-' + i + '">' + meta + '</span>'
          + '</div>';
        html += '</div>';
      }
      html += '</div>';

      html += '<div id="tune-lights-legend-' + areaId + '" style="display:' + (hasCapped ? 'block' : 'none') + '; padding:4px 14px 6px; font-size:0.65rem; color:var(--muted2);">* capped at 100%</div>';

      return html;
    }

    // ============================================================
    // Render — Color tab
    // ============================================================
    // CT gradient string for picker background
    function ctGradientStyle(minK, maxK) {
      const stops = [];
      for (let i = 0; i <= 8; i++) {
        const k = minK + (maxK - minK) * (i / 8);
        stops.push(cctToRGB(k));
      }
      return 'linear-gradient(to right,' + stops.join(',') + ')';
    }

    let _activeCtPicker = null;
    function openCtPicker(badgeEl, inputId, minK, maxK, zoneName) {
      closeCtPicker();
      const inputEl = document.getElementById(inputId);
      if (!inputEl) return;
      const currentVal = parseInt(inputEl.value) || 3000;

      const popup = document.createElement('div');
      popup.className = 'ct-picker-popup visible';
      popup.id = 'ct-picker-active';
      popup.innerHTML = '<div class="ct-picker-gradient" style="background:' + ctGradientStyle(minK, maxK) + ';"></div>'
        + '<input type="range" class="ct-picker-slider" min="' + minK + '" max="' + maxK + '" step="100" value="' + currentVal + '">'
        + '<div class="ct-picker-val" id="ct-picker-val">' + currentVal + 'K</div>';
      popup.onclick = (e) => e.stopPropagation();

      const slider = popup.querySelector('.ct-picker-slider');
      slider.addEventListener('input', () => {
        const v = parseInt(slider.value);
        inputEl.value = v;
        popup.querySelector('#ct-picker-val').textContent = v + 'K';
        // Update badge color
        const bg = tintColorByBrightness(cctToRGB(v), 100);
        badgeEl.style.background = bg;
        badgeEl.style.color = readableTextColor(bg);
        // Trigger live update
        liveUpdateZoneColor(zoneName);
      });

      // Position below the badge
      badgeEl.style.position = 'relative';
      badgeEl.appendChild(popup);
      popup.style.top = '100%';
      popup.style.left = '50%';
      popup.style.transform = 'translateX(-50%)';
      popup.style.marginTop = '4px';
      _activeCtPicker = popup;
    }

    function closeCtPicker() {
      if (_activeCtPicker) {
        _activeCtPicker.remove();
        _activeCtPicker = null;
      }
    }

    // Close picker on outside click
    document.addEventListener('click', (e) => {
      if (_activeCtPicker && !e.target.closest('.ct-picker-popup') && !e.target.closest('.ct-target-badge')) {
        closeCtPicker();
      }
    });

    function ctBg(kelvin, alpha) {
      if (!kelvin) return 'transparent';
      const c = cctToRGB(kelvin);
      return 'rgba(' + c.r + ',' + c.g + ',' + c.b + ',' + (alpha || 0.12) + ')';
    }
    function ctTextColor(kelvin) {
      if (!kelvin) return 'var(--text)';
      const c = cctToRGB(kelvin);
      // Lighten the CT color for readable text on dark bg
      const mix = (v) => Math.min(255, Math.round(v * 0.6 + 255 * 0.4));
      return 'rgb(' + mix(c.r) + ',' + mix(c.g) + ',' + mix(c.b) + ')';
    }
    function fmtCtDelta(val) {
      if (val == null || Math.abs(val) < 1) return '\u2013';
      return (val > 0 ? '+' : '') + Math.round(val);
    }

    async function fetchColorData() {
      try {
        const resp = await fetch('./api/area-status');
        if (resp.ok) colorAreaData = await resp.json();
      } catch (e) { console.error('fetchColorData error:', e); }
    }

    function takeColorSnapshot() {
      if (!cachedGlozones) return;
      const snap = {};
      for (const [zoneName, zoneData] of Object.entries(cachedGlozones.zones || {})) {
        snap[zoneName] = {
          warm_night_enabled: zoneData.warm_night_enabled ?? false,
          daylight_enabled: zoneData.daylight_enabled ?? true,
          color_sensitivity: zoneData.color_sensitivity ?? 1.0,
          warm_night_target: zoneData.warm_night_target ?? 2700,
          daylight_cct: zoneData.daylight_cct ?? 5500,
        };
      }
      colorSnapshot = snap;
    }

    function hasZoneColorChanges(zoneName) {
      if (!colorSnapshot?.[zoneName]) return false;
      const snap = colorSnapshot[zoneName];
      const warmEl = document.getElementById('ct-warm-' + zoneName);
      if (warmEl && warmEl.checked !== snap.warm_night_enabled) return true;
      const coolEl = document.getElementById('ct-cool-' + zoneName);
      if (coolEl && coolEl.checked !== snap.daylight_enabled) return true;
      const sensEl = document.getElementById('ct-sens-' + zoneName);
      if (sensEl) {
        const newSens = SENSITIVITY_STEPS[parseInt(sensEl.value)].multiplier;
        if (Math.abs(newSens - snap.color_sensitivity) > 0.001) return true;
      }
      const warmTargetEl = document.getElementById('ct-warm-target-' + zoneName);
      if (warmTargetEl && parseInt(warmTargetEl.value) !== snap.warm_night_target) return true;
      const coolTargetEl = document.getElementById('ct-cool-target-' + zoneName);
      if (coolTargetEl && parseInt(coolTargetEl.value) !== snap.daylight_cct) return true;
      return false;
    }

    function hasColorChanges() {
      if (!colorSnapshot) return false;
      for (const zoneName of Object.keys(colorSnapshot)) {
        if (hasZoneColorChanges(zoneName)) return true;
      }
      return false;
    }

    async function saveZoneColor(zoneName) {
      const changes = {};
      const warmEl = document.getElementById('ct-warm-' + zoneName);
      if (warmEl) changes.warm_night_enabled = warmEl.checked;
      const coolEl = document.getElementById('ct-cool-' + zoneName);
      if (coolEl) changes.daylight_enabled = coolEl.checked;
      const sensEl = document.getElementById('ct-sens-' + zoneName);
      if (sensEl) changes.color_sensitivity = SENSITIVITY_STEPS[parseInt(sensEl.value)].multiplier;
      const warmTargetEl = document.getElementById('ct-warm-target-' + zoneName);
      if (warmTargetEl) changes.warm_night_target = parseInt(warmTargetEl.value);
      const coolTargetEl = document.getElementById('ct-cool-target-' + zoneName);
      if (coolTargetEl) changes.daylight_cct = parseInt(coolTargetEl.value);
      await fetch('./api/glozones/' + encodeURIComponent(zoneName) + '/settings', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(changes)
      });
      // Refresh
      const [gzResp] = await Promise.all([fetch('./api/glozones'), fetchColorData()]);
      if (gzResp.ok) cachedGlozones = await gzResp.json();
      takeColorSnapshot();
      renderColorTab();
      showTuneSaved();
    }

    function cancelZoneColor(zoneName) {
      const snap = colorSnapshot?.[zoneName];
      if (!snap) return;
      const warmEl = document.getElementById('ct-warm-' + zoneName);
      if (warmEl) warmEl.checked = snap.warm_night_enabled;
      const coolEl = document.getElementById('ct-cool-' + zoneName);
      if (coolEl) coolEl.checked = snap.daylight_enabled;
      const sensEl = document.getElementById('ct-sens-' + zoneName);
      if (sensEl) {
        sensEl.value = findClosestSensitivityStep(snap.color_sensitivity);
      }
      const warmTargetEl = document.getElementById('ct-warm-target-' + zoneName);
      if (warmTargetEl) warmTargetEl.value = snap.warm_night_target;
      const coolTargetEl = document.getElementById('ct-cool-target-' + zoneName);
      if (coolTargetEl) coolTargetEl.value = snap.daylight_cct;
      liveUpdateZoneColor(zoneName);
    }

    // Keep for brightness tab's shared action bar
    async function saveColorChanges() {}
    function cancelColorChanges() {
      if (!colorSnapshot) return;
      for (const zoneName of Object.keys(colorSnapshot)) cancelZoneColor(zoneName);
    }
    function updateColorActionBar() {}

    function setCtSort(sort) {
      if (ctSortOrder === sort) { ctSortAsc = !ctSortAsc; }
      else { ctSortOrder = sort; ctSortAsc = true; }
      renderColorTab();
    }

    function getCtCollapsedZones() {
      try { return JSON.parse(localStorage.getItem('ct_collapsed_zones') || '{}'); } catch { return {}; }
    }
    function toggleCtZone(zoneName, el) {
      const zoneGroup = el ? el.closest('.zone-group') : null;
      const header = zoneGroup
        ? zoneGroup.querySelector('[data-zone="' + zoneName + '"]')
        : document.querySelector('[data-zone="' + zoneName + '"]');
      const content = zoneGroup
        ? zoneGroup.querySelector('[data-zone-table="' + zoneName + '"]')
        : document.querySelector('[data-zone-table="' + zoneName + '"]');
      if (!header || !content) return;
      const willCollapse = !header.classList.contains('collapsed');
      if (willCollapse) {
        content.style.maxHeight = content.scrollHeight + 'px';
        content.offsetHeight;
        header.classList.add('collapsed');
        content.classList.add('hidden');
        content.style.maxHeight = '';
      } else {
        content.classList.remove('hidden');
        content.style.maxHeight = content.scrollHeight + 'px';
        header.classList.remove('collapsed');
        const onEnd = () => { content.style.maxHeight = ''; content.removeEventListener('transitionend', onEnd); };
        content.addEventListener('transitionend', onEnd);
      }
      const state = getCtCollapsedZones();
      state[zoneName] = willCollapse;
      localStorage.setItem('ct_collapsed_zones', JSON.stringify(state));
    }

    function liveUpdateZoneColor(zoneName) {
      // Recompute cool day impact and update all area rows in this zone
      const zoneData = cachedGlozones?.zones?.[zoneName];
      if (!zoneData) return;
      const outdoorNorm = tuneData?.outdoor_normalized ?? 0;
      const sensEl = document.getElementById('ct-sens-' + zoneName);
      const sensitivity = sensEl ? SENSITIVITY_STEPS[parseInt(sensEl.value)].multiplier : 1.0;
      const coolEnabled = document.getElementById('ct-cool-' + zoneName)?.checked ?? true;
      const warmEnabled = document.getElementById('ct-warm-' + zoneName)?.checked ?? false;
      const coolTargetEl = document.getElementById('ct-cool-target-' + zoneName);
      const coolTarget = coolTargetEl ? parseInt(coolTargetEl.value) : 5500;
      const warmTargetEl = document.getElementById('ct-warm-target-' + zoneName);
      const warmTarget = warmTargetEl ? parseInt(warmTargetEl.value) : 2700;

      // Get zone base CT from unshifted area
      const areas = zoneData.areas || [];
      let refArea = null;
      for (const a of areas) {
        const aid = typeof a === 'object' ? a.id : a;
        const ad = colorAreaData?.[aid];
        if (ad && ad.color_mid == null) { refArea = ad; break; }
      }
      if (!refArea) {
        const aid = typeof areas[0] === 'object' ? areas[0].id : areas[0];
        refArea = colorAreaData?.[aid];
      }
      const zoneCurveCt = refArea?.base_kelvin || 4000;

      // Recompute cool day blend
      const blend = coolEnabled ? Math.min(1.0, outdoorNorm * sensitivity) : 0;
      const refSb = refArea?.solar_breakdown || {};
      const daylightFade = refSb.daylight_fade_weight ?? 1.0;
      const effectiveBlend = blend * daylightFade;
      const newCoolShift = (coolTarget > zoneCurveCt && coolEnabled) ? Math.round((coolTarget - zoneCurveCt) * effectiveBlend) : 0;

      // Warm night: use stored breakdown (can't easily recompute time-based fade client-side)
      const nightStrength = refSb.night_strength ?? 0;
      const newWarmShift = warmEnabled ? -Math.round(Math.max(0, zoneCurveCt - warmTarget) * nightStrength) : 0;

      // Update sensitivity display
      const sensValEl = document.getElementById('ct-sens-val-' + zoneName);
      if (sensValEl) sensValEl.textContent = SENSITIVITY_STEPS[sensEl ? parseInt(sensEl.value) : 5].label + ' ' + fmtVal(sensitivity);

      // Update zone header CT
      const zoneFinalCt = zoneCurveCt + newCoolShift + newWarmShift;
      const zoneCtEl = document.getElementById('ct-zone-ct-' + zoneName);
      const zhColor = cctToRGB(zoneFinalCt);
      const zhBg = tintColorByBrightness(zhColor, 100);
      const zhText = readableTextColor(zhBg);
      if (zoneCtEl) {
        zoneCtEl.textContent = Math.round(zoneCurveCt) + 'K';
        zoneCtEl.style.color = zhText;
      }
      const zoneHeaderEl = document.getElementById('ct-zone-header-' + zoneName);
      if (zoneHeaderEl) zoneHeaderEl.style.background = zhBg;

      // Update area rows
      for (const area of areas) {
        const areaId = typeof area === 'object' ? area.id : area;
        const as = colorAreaData?.[areaId];
        const baseKelvin = as?.base_kelvin || zoneCurveCt;
        const shift = baseKelvin - zoneCurveCt;
        const colorOverride = as?.color_override_set_at != null ? (as.color_override || 0) : 0;
        // Per-area cool/warm shifts (may differ from zone if area has base shift)
        const areaCool = (coolTarget > baseKelvin && coolEnabled) ? Math.round((coolTarget - baseKelvin) * effectiveBlend) : 0;
        const areaWarm = warmEnabled ? -Math.round(Math.max(0, baseKelvin - warmTarget) * nightStrength) : 0;
        const areaFinalCt = baseKelvin + areaCool + areaWarm + colorOverride;

        const c = cctToRGB(areaFinalCt);
        const bg = tintColorByBrightness(c, 100);
        const txt = readableTextColor(bg);
        const rowEl = document.getElementById('ct-row-' + areaId);
        if (rowEl) {
          rowEl.style.background = bg;
          rowEl.style.color = txt;
        }
        const finalEl = document.getElementById('ct-final-' + areaId);
        if (finalEl) finalEl.textContent = Math.round(areaFinalCt) + 'K';
        const areaCoolEl = document.getElementById('ct-cool-' + areaId);
        if (areaCoolEl) { areaCoolEl.textContent = fmtCtDelta(areaCool); areaCoolEl.classList.toggle('muted', Math.abs(areaCool) < 1); }
        const areaWarmEl = document.getElementById('ct-warm-' + areaId);
        if (areaWarmEl) { areaWarmEl.textContent = fmtCtDelta(areaWarm); areaWarmEl.classList.toggle('muted', Math.abs(areaWarm) < 1); }
      }

      // Update per-zone save/cancel visibility
      const actionEl = document.getElementById('ct-zone-actions-' + zoneName);
      if (actionEl) actionEl.style.display = hasZoneColorChanges(zoneName) ? 'flex' : 'none';

      // Update target badge colors
      if (warmTargetEl) {
        const badge = warmTargetEl.closest('.ct-target-badge');
        if (badge) {
          const wb = tintColorByBrightness(cctToRGB(warmTarget), 100);
          badge.style.background = wb; badge.style.color = readableTextColor(wb);
        }
      }
      if (coolTargetEl) {
        const badge = coolTargetEl.closest('.ct-target-badge');
        if (badge) {
          const cb = tintColorByBrightness(cctToRGB(coolTarget), 100);
          badge.style.background = cb; badge.style.color = readableTextColor(cb);
        }
      }
    }

    async function renderColorTab() {
      const container = document.getElementById('tune-color-tab');
      if (!cachedGlozones) {
        container.innerHTML = '<div style="padding:32px;text-align:center;color:var(--muted);">Loading...</div>';

      // Use zone solar cache from zone-states (lightweight, no area-status needed)
      // Fall back to area-status fetch only if solar cache unavailable
      let hasSolarCache = Object.values(zoneStates || {}).some(z => z.solar_cache);
      if (!hasSolarCache && !colorAreaData) await fetchColorData();
      if (!colorSnapshot) takeColorSnapshot();

      const gzZonesObj = cachedGlozones.zones || {};
      const zoneNames = Object.keys(gzZonesObj);

      for (const zoneName of zoneNames) {

        if (!solarCache) {
          for (const a of areas) {

        }
        const zoneCurveCt = solarCache?.base_kelvin || refArea?.base_kelvin || zoneStates?.[zoneName]?.kelvin || 4000;
        const escapedZone = encodeURIComponent(zoneName);

        // Zone-level settings — snap sensitivity
        const warmEnabled = zoneData.warm_night_enabled ?? false;
        const coolEnabled = zoneData.daylight_enabled ?? true;
        const rawSens = zoneData.color_sensitivity ?? 1.0;
        const sensStep = findClosestSensitivityStep(rawSens);
        const snappedSens = SENSITIVITY_STEPS[sensStep].multiplier;

        // Compute zone-level cool day / warm night impact
        const refSb = solarCache || refArea?.solar_breakdown || {};
        const zoneCoolShift = refSb.daylight_shift || 0;
        const zoneWarmShift = (refSb.night_shift || 0) > 0 ? -(refSb.night_shift) : 0;
        const warmTarget = zoneData.warm_night_target || 2700;
        const coolTarget = zoneData.daylight_cct || 5500;
        const outdoorNorm = tuneData?.outdoor_normalized ?? 0;
        const sunBriPct = Math.round(outdoorNorm * 100);
        const warmTargetColor = ctBg(warmTarget, 0.5);
        const coolTargetColor = ctBg(coolTarget, 0.5);

        const ctCollapsed = getCtCollapsedZones();
        const ctIsCollapsed = ctCollapsed[zoneName] || false;

        html += '<div class="zone-group" style="margin-bottom:8px;">';

        // Zone final CT — use zone-states kelvin (authoritative, includes warm/cool)
        const zoneFinalCt = zoneStates?.[zoneName]?.kelvin || (zoneCurveCt + zoneCoolShift + zoneWarmShift);
        const zoneHeaderColor = cctToRGB(zoneFinalCt);
        const zoneHeaderBg = tintColorByBrightness(zoneHeaderColor, 100);
        const zoneHeaderText = readableTextColor(zoneHeaderBg);

        // Zone header with CT color + chevron
        html += '<div class="ct-zone-header zone-header' + (ctIsCollapsed ? ' collapsed' : '') + '" id="ct-zone-header-' + zoneName + '" data-zone="' + zoneName + '" style="background:' + zoneHeaderBg + ';cursor:pointer;" onclick="toggleCtZone(\'' + escapedZone + '\', this)">';
        html += '<span class="zone-chevron" style="color:' + zoneHeaderText + ';">&#x203A;</span>';
        html += '<a class="ct-zone-name" href="./zone/' + escapedZone + '?back=tune" onclick="event.stopPropagation()" style="color:' + zoneHeaderText + ';">' + zoneName + '</a>';
        html += '<span class="ct-zone-base-ct" id="ct-zone-ct-' + zoneName + '" style="color:' + zoneHeaderText + ';">' + Math.round(zoneFinalCt) + 'K</span>';
        html += '</div>';
        html += '<div class="zone-content' + (ctIsCollapsed ? ' hidden' : '') + '" data-zone-table="' + zoneName + '">';

        // Zone controls: three rows
        html += '<div class="ct-zone-controls">';
        // Row 1: Warm night
        html += '<div class="ct-zone-ctrl-row">';
        html += '<span class="ct-zone-ctrl-label" style="min-width:80px;">Warm night</span>';
        html += '<input type="checkbox" class="ct-toggle" id="ct-warm-' + zoneName + '" ' + (warmEnabled ? 'checked' : '') + '>';
        const warmBadgeBg = tintColorByBrightness(cctToRGB(warmTarget), 100);
        const warmBadgeText = readableTextColor(warmBadgeBg);
        html += '<span class="ct-target-badge" style="background:' + warmBadgeBg + ';color:' + warmBadgeText + ';cursor:pointer;" onclick="event.stopPropagation(); openCtPicker(this, \'ct-warm-target-' + zoneName + '\', 1500, 4000, \'' + escapedZone + '\')"><input type="number" class="ct-target-input" id="ct-warm-target-' + zoneName + '" value="' + warmTarget + '" min="1500" max="4000" step="100" readonly><span class="ct-target-unit">K</span></span>';
        html += '</div>';
        // Row 2: Cool day + sensitivity slider
        html += '<div class="ct-zone-ctrl-row">';
        html += '<span class="ct-zone-ctrl-label" style="min-width:80px;">Cool day</span>';
        html += '<input type="checkbox" class="ct-toggle" id="ct-cool-' + zoneName + '" ' + (coolEnabled ? 'checked' : '') + '>';
        const coolBadgeBg = tintColorByBrightness(cctToRGB(coolTarget), 100);
        const coolBadgeText = readableTextColor(coolBadgeBg);
        html += '<span class="ct-target-badge" style="background:' + coolBadgeBg + ';color:' + coolBadgeText + ';cursor:pointer;" onclick="event.stopPropagation(); openCtPicker(this, \'ct-cool-target-' + zoneName + '\', 4000, 7000, \'' + escapedZone + '\')"><input type="number" class="ct-target-input" id="ct-cool-target-' + zoneName + '" value="' + coolTarget + '" min="4000" max="7000" step="100" readonly><span class="ct-target-unit">K</span></span>';
        html += '<span class="ct-zone-ctrl-label" style="margin-left:12px;">Sun sensitivity</span>';
        html += '<input type="range" class="ct-sensitivity-slider tune-sensitivity-slider" id="ct-sens-' + zoneName + '" min="0" max="8" step="1" value="' + sensStep + '">';
        html += '<span class="ct-sensitivity-val" id="ct-sens-val-' + zoneName + '">' + SENSITIVITY_STEPS[sensStep].label + ' ' + fmtVal(snappedSens) + '</span>';
        html += '</div>';
        html += '</div>';

        // Column headers
        html += '<div class="ct-area-row" style="padding-top:4px;padding-bottom:2px;border-bottom:1px solid var(--line);background:var(--panel);">';
        html += '<span class="ct-col-area ct-col-header' + (ctSortOrder === 'custom' ? ' active-sort' : '') + '" onclick="setCtSort(\'custom\')">Area</span>';
        html += '<span class="ct-col-shift ct-col-header' + (ctSortOrder === 'shift' ? ' active-sort' : '') + '" onclick="setCtSort(\'shift\')">Shift</span>';
        html += '<span class="ct-col-adj ct-col-header' + (ctSortOrder === 'adj' ? ' active-sort' : '') + '" onclick="setCtSort(\'adj\')">Adj</span>';
        html += '<span class="ct-col-final ct-col-header' + (ctSortOrder === 'final' ? ' active-sort' : '') + '" style="text-align:right;" onclick="setCtSort(\'final\')">Final</span>';
        html += '</div>';

        // Sort areas
        let sortedCtAreas = [...areas];
        if (ctSortOrder !== 'custom') {
          const dir = ctSortAsc ? 1 : -1;
          sortedCtAreas.sort((a, b) => {
            const aidA = typeof a === 'object' ? a.id : a;
            const aidB = typeof b === 'object' ? b.id : b;
            const asA = colorAreaData?.[aidA] || {};
            const asB = colorAreaData?.[aidB] || {};
            const nameA = typeof a === 'object' ? (a.name || aidA) : aidA;
            const nameB = typeof b === 'object' ? (b.name || aidB) : aidB;
            if (ctSortOrder === 'shift') return dir * ((asA.base_kelvin || 0) - (asB.base_kelvin || 0));
            if (ctSortOrder === 'cool') return dir * ((asA.solar_breakdown?.daylight_shift || 0) - (asB.solar_breakdown?.daylight_shift || 0));
            if (ctSortOrder === 'warm') return dir * ((asA.solar_breakdown?.night_shift || 0) - (asB.solar_breakdown?.night_shift || 0));
            if (ctSortOrder === 'adj') { const ovA = asA.color_override_set_at != null ? (asA.color_override || 0) : 0; const ovB = asB.color_override_set_at != null ? (asB.color_override || 0) : 0; return dir * (ovA - ovB); }
            if (ctSortOrder === 'final') return dir * ((asA.kelvin || 0) - (asB.kelvin || 0));
            return 0;
          });
          if (ctSortOrder === 'custom' && !ctSortAsc) sortedCtAreas.reverse();
        }

        // Area rows
        for (const area of sortedCtAreas) {
          const areaId = typeof area === 'object' ? area.id : area;
          const areaName = typeof area === 'object' ? (area.name || areaId) : areaId;
          // Read from colorAreaData (expensive) or tuneData (lightweight)
          const as = colorAreaData?.[areaId];
          const tuneArea = getTuneArea(areaId);

          // Per-area color state from light-filters (tuneData) or area-status
          const areaColorMid = tuneArea?.color_mid ?? as?.color_mid;
          const areaColorOverride = tuneArea?.color_override ?? as?.color_override ?? 0;
          const areaColorSetAt = tuneArea?.color_override_set_at ?? as?.color_override_set_at;
          const lastKelvin = tuneArea?.last_sent_kelvin ?? as?.kelvin;

          // Compute area base kelvin: if area has color_mid shift, base differs from zone
          // Use last_sent_kelvin to derive: final = base + cool + warm + adj
          const sliderOverride = areaColorSetAt != null;
          const adj = sliderOverride ? areaColorOverride : 0;

          // If we have solar cache, compute per-area shifts from zone factors
          let areaCoolShift, areaWarmShift, baseKelvin, finalKelvin;
          if (solarCache) {
            // Estimate area base from last_sent_kelvin (reverse the pipeline)
            const nightStr = refSb.night_strength || 0;
            const dBlend = refSb.daylight_blend || 0;
            const wTarget = refSb.warm_night_target || 2700;
            const cTarget = refSb.daylight_cct || 5500;
            // If area has an individual color_mid shift (different from zone), derive from last_sent_kelvin
            const zoneColorMid = zoneStates?.[zoneName]?.runtime_state?.color_mid;
            const hasIndividualShift = areaColorMid != null && areaColorMid !== zoneColorMid;
            if (hasIndividualShift && lastKelvin != null) {
              baseKelvin = zoneCurveCt + Math.round(lastKelvin - zoneFinalCt);
            } else {
              baseKelvin = zoneCurveCt;
            }
            areaCoolShift = (cTarget > baseKelvin && coolEnabled) ? Math.round((cTarget - baseKelvin) * dBlend) : 0;
            areaWarmShift = warmEnabled ? -Math.round(Math.max(0, baseKelvin - wTarget) * nightStr) : 0;
            // Always compute final from formula for consistency
            finalKelvin = baseKelvin + areaCoolShift + areaWarmShift + adj;
          } else {
            baseKelvin = as?.base_kelvin || zoneCurveCt;
            const areaSb = as?.solar_breakdown || {};
            areaCoolShift = areaSb.daylight_shift || 0;
            areaWarmShift = (areaSb.night_shift || 0) > 0 ? -(areaSb.night_shift) : 0;
            finalKelvin = as?.kelvin || zoneFinalCt;
          }

          const shift = baseKelvin - zoneCurveCt;

          // CT color shading — solid bg like home page at 100% brightness
          const cctColor = cctToRGB(finalKelvin);
          const rowBg = tintColorByBrightness(cctColor, 100);
          const rowText = readableTextColor(rowBg);
          const shiftClass = Math.abs(shift) < 1 ? ' muted' : '';
          const coolClass = Math.abs(areaCoolShift) < 1 ? ' muted' : '';
          const warmClass = Math.abs(areaWarmShift) < 1 ? ' muted' : '';
          const adjClass = Math.abs(adj) < 1 ? ' muted' : '';

          html += '<div class="ct-area-row" id="ct-row-' + areaId + '" style="background:' + rowBg + ';color:' + rowText + ';">';
          html += '<span class="ct-col-area"><a href="./area/' + encodeURIComponent(areaId) + '?from=tune" class="ct-area-name" style="color:' + rowText + ';">' + areaName + '</a></span>';
          html += '<span class="ct-col-shift ct-area-val' + shiftClass + '">' + fmtCtDelta(shift) + '</span>';
          html += '<span class="ct-col-adj ct-area-val' + adjClass + '">' + fmtCtDelta(adj) + '</span>';
          html += '<span class="ct-col-final ct-area-final" id="ct-final-' + areaId + '">' + Math.round(finalKelvin) + 'K</span>';
          html += '</div>';
        }

        // Per-zone save/cancel
        const escZone = zoneName.replace(/'/g, "\\'");
        html += '<div class="ct-zone-actions" id="ct-zone-actions-' + zoneName + '">';
        html += '<button class="ct-zone-cancel" onclick="cancelZoneColor(\'' + escZone + '\')">Cancel</button>';
        html += '<button class="ct-zone-save" onclick="saveZoneColor(\'' + escZone + '\')">Save</button>';
        html += '</div>';

        html += '</div>'; // close zone-content
        html += '</div>'; // close zone-group
      }

      container.innerHTML = html;

      // Wire up toggle/slider/target events — all trigger live update
      function getZoneFromEvent(el) {
        // Extract zone name from element ID (ct-warm-ZoneName, ct-sens-ZoneName, etc.)
        const id = el.id || '';
        const prefixes = ['ct-warm-', 'ct-cool-', 'ct-sens-', 'ct-warm-target-', 'ct-cool-target-'];
        for (const p of prefixes) { if (id.startsWith(p)) return id.slice(p.length); }
        return null;
      }
      container.addEventListener('change', (e) => {
        const zn = getZoneFromEvent(e.target);
        if (zn) liveUpdateZoneColor(zn);
      });
      container.addEventListener('input', (e) => {
        const zn = getZoneFromEvent(e.target);
        if (zn) liveUpdateZoneColor(zn);
      });
    }

    function renderTune() {
      const container = document.getElementById('tune-container');
      if (!tuneData) {
        container.innerHTML = '<div class="loading">Loading tune data...</div>';
        return;
      }

      const gzZonesObj = cachedGlozones?.zones || {};
      const gzZoneNames = Object.keys(gzZonesObj);
      const sensitivity = tuneData?.brightness_sensitivity ?? 1.0;
      const outdoorNorm = tuneData?.outdoor_normalized ?? 0.0;
      const collapsedState = getCollapsedZones();
      // Build merged area list from glozone data
      let allAreas = [];
      for (const zoneName of gzZoneNames) {
        const gzData = gzZonesObj[zoneName];
        const zoneAreaIds = (gzData.areas || []).map(a => typeof a === 'object' ? a.id : a);
        const zoneAreaNames = {};
        (gzData.areas || []).forEach(a => {
          if (typeof a === 'object') zoneAreaNames[a.id] = a.name;
        });
        for (const areaId of zoneAreaIds) {
          const tuneArea = getTuneArea(areaId);
          allAreas.push({
            area_id: areaId,
            name: tuneArea?.name || zoneAreaNames[areaId] || areaId,
            zone_name: zoneName,
          });
        }
      }

      // Apply sort
      const dir = tuneSortAsc ? 1 : -1;
      let sortedAreas = [...allAreas];
      if (tuneSortOrder === 'custom') {
        if (!tuneSortAsc) sortedAreas.reverse();
      } else if (tuneSortOrder === 'light') {
        sortedAreas.sort((a, b) => {
          const fa = getTuneArea(a.area_id)?.brightness_factor ?? 1.0;
          const fb = getTuneArea(b.area_id)?.brightness_factor ?? 1.0;
          return dir * (fa - fb);
        });
      } else if (tuneSortOrder === 'sun') {
        sortedAreas.sort((a, b) => {
          const ea = getTuneArea(a.area_id)?.natural_light_exposure ?? 0.0;
          const eb = getTuneArea(b.area_id)?.natural_light_exposure ?? 0.0;
          return dir * (eb - ea);
        });
      } else if (tuneSortOrder === 'adj') {
        sortedAreas.sort((a, b) => {
          const ta = getTuneArea(a.area_id);
          const tb = getTuneArea(b.area_id);
          const adjA = (ta?.boosted ? (ta.boost_brightness || 0) : 0) + (ta?.bri_override || 0);
          const adjB = (tb?.boosted ? (tb.boost_brightness || 0) : 0) + (tb?.bri_override || 0);
          return dir * (adjA - adjB);
        });
      } else if (tuneSortOrder === 'bri') {
        sortedAreas.sort((a, b) => {
          const ta = getTuneArea(a.area_id);
          const tb = getTuneArea(b.area_id);
          const fa = ta?.brightness_factor ?? 1.0;
          const fb = tb?.brightness_factor ?? 1.0;
          const ea = ta?.natural_light_exposure ?? 0.0;
          const eb = tb?.natural_light_exposure ?? 0.0;
          const znA = a.zone_name, znB = b.zone_name;
          const boostA = ta?.boosted ? (ta.boost_brightness || 0) : 0;
          const boostB = tb?.boosted ? (tb.boost_brightness || 0) : 0;
          const ovrA = ta?.bri_override || 0, ovrB = tb?.bri_override || 0;
          const briA = Math.min(100, computeNowBrightness(zoneStates?.[znA]?.brightness ?? 50, fa, ea, outdoorNorm, sensitivity) + ovrA + boostA);
          const briB = Math.min(100, computeNowBrightness(zoneStates?.[znB]?.brightness ?? 50, fb, eb, outdoorNorm, sensitivity) + ovrB + boostB);
          return dir * (briA - briB);
        });
      }

      // Group by zone
      let zoneOrderedAreas = {};
      if (tuneSortOrder === 'custom') {
        // Preserve zone order
        for (const zoneName of gzZoneNames) {
          zoneOrderedAreas[zoneName] = allAreas.filter(a => a.zone_name === zoneName);
        }
      } else {
        // Re-group after sort
        const rendered = new Set();
        for (const area of sortedAreas) {
          const zn = area.zone_name;
          if (!rendered.has(zn)) {
            rendered.add(zn);
            zoneOrderedAreas[zn] = [];
          }
          zoneOrderedAreas[zn].push(area);
        }
      }

      let html = '';

      // Sun multiplier collapsible card
      const tuneSensStep = findClosestSensitivityStep(sensitivity);
      const d = tuneOutdoorData;
      const anglePct = d?.angle_factor != null ? Math.round(d.angle_factor * 100) : 0;
      const condPct = d?.condition_multiplier != null ? Math.round(d.condition_multiplier * 100) : 100;
      const sunBriPct = Math.round(outdoorNorm * 100);
      const snappedSens = SENSITIVITY_STEPS[tuneSensStep].multiplier;
      const sunMult = outdoorNorm * snappedSens;
      const condIcon = buildOutdoorIcon(d);
      const sensIsOpen = localStorage.getItem('tune_sensitivity_open') === '1';
      html += `
        <div class="tune-sensitivity-card ${sensIsOpen ? 'is-open' : ''}" id="tune-sensitivity-card">
          <div class="tune-sensitivity-header" onclick="toggleSensitivityBody()">
            <span class="tune-sensitivity-chevron" id="tune-sensitivity-chevron">&#x203A;</span>
            <span class="tune-sensitivity-title">Sun multiplier</span>
            <span class="tune-sensitivity-math" id="tune-sensitivity-math">${sunBriPct}% \u00d7 ${fmtVal(snappedSens)} =</span>
            <span class="tune-sensitivity-val" id="tune-sensitivity-summary">${fmtSunMultiplier(sunMult)}</span>
          </div>
          <div class="tune-sensitivity-body" id="tune-sensitivity-body">
            <div class="tune-sensitivity-slider-row">
              <span class="tune-zone-ctrl-label" style="margin-right:4px;">Sensitivity</span>
              <input type="range" class="tune-sensitivity-slider" id="tune-global-sensitivity" min="0" max="8" step="1" value="${tuneSensStep}" onclick="event.stopPropagation()">
              <span class="tune-zone-ctrl-word tune-sensitivity-word" id="tune-global-sensitivity-word">${SENSITIVITY_STEPS[tuneSensStep].label}</span>
              <span class="tune-zone-ctrl-val" id="tune-global-sensitivity-val">${fmtVal(snappedSens)}</span>
            </div>
          </div>
        </div>
      `;

      // Render zone groups
      for (const [zoneName, areasInZone] of Object.entries(zoneOrderedAreas)) {
        if (areasInZone.length === 0) continue;
        const isCollapsed = collapsedState[zoneName] || false;
        const escapedZoneName = zoneName.replace(/'/g, "\\'");
        const zoneBri = zoneStates?.[zoneName]?.brightness;
        const rhythmBri = zoneBri != null ? Math.round(zoneBri) : 50;
        const zoneMinBri = zoneStates?.[zoneName]?.min_brightness ?? 1;
        const zoneMaxBri = zoneStates?.[zoneName]?.max_brightness ?? 100;
        const briFadeWeight = zoneStates?.[zoneName]?.brightness_fade_weight ?? 1.0;

        const areaRows = areasInZone.map(area => {
          const tuneArea = getTuneArea(area.area_id);
          const factor = tuneArea?.brightness_factor ?? 1.0;
          const exposure = tuneArea?.natural_light_exposure ?? 0.0;
          const lumenStep = findClosestStep(LUMEN_STEPS, 'factor', factor);
          const solarStep = findClosestStep(SOLAR_STEPS, 'exposure', exposure);
          const isBoosted = tuneArea?.boosted || false;
          const boostBri = isBoosted ? (tuneArea.boost_brightness || 0) : 0;
          const briOverride = tuneArea?.bri_override || 0;
          // Pipeline: rhythm × nlFactor × factor + override + boost
          const baseBri = computeNowBrightness(rhythmBri, factor, exposure, outdoorNorm, sensitivity, briFadeWeight);
          const nowBri = Math.max(0, Math.min(100, Math.round(baseBri + briOverride + boostBri)));
          const factorImpact = formatImpactDelta(computeFactorImpact(rhythmBri, factor, exposure, outdoorNorm, sensitivity, briFadeWeight));
          const solarImpact = formatImpactDelta(computeSolarImpact(rhythmBri, factor, exposure, outdoorNorm, sensitivity, briFadeWeight));

          // Annotate tuneArea with zone name for light brightness calc
          if (tuneArea) tuneArea._zoneName = zoneName;
          const lights = tuneArea?.lights || [];
          const hasLights = lights.length > 0;
          const isExpanded = expandedAreas[area.area_id] || false;
          const lightsHtml = hasLights ? buildLightsSection(area.area_id, tuneArea) : '';

          const isOn = tuneArea?.is_on !== false; // default true if not present
          const adjVal = boostBri + briOverride;
          const adjIcons = (isBoosted ? '\u26A1' : '') + (Math.abs(briOverride) >= 0.5 ? '*' : '');
          const adjText = adjVal === 0 ? '0%' : (adjIcons + (adjVal > 0 ? '+' : '') + Math.round(adjVal));
          const adjClass = adjVal !== 0 ? ' has-value' : '';

          const finalHtml = isOn ? nowBri + '%' : nowBri + '%<div class="tune-off-label"><button class="tune-power-btn" onclick="event.stopPropagation(); turnOnArea(\'' + area.area_id + '\')" title="Turn on">&#x23FB;</button></div>';

          return `
            <div class="tune-area${hasLights ? ' expandable' : ''}${!isOn ? ' is-off' : ''}" data-area-id="${area.area_id}" data-rhythm-bri="${rhythmBri}" data-sensitivity="${sensitivity}" data-outdoor-norm="${outdoorNorm}" data-bri-fade-weight="${briFadeWeight}" data-zone-min-bri="${zoneMinBri}" data-zone-max-bri="${zoneMaxBri}" data-boost-bri="${isBoosted ? (tuneArea.boost_brightness || 0) : 0}" data-bri-override="${briOverride}" style="background:rgba(255,255,255,${(nowBri * 0.003).toFixed(4)});" ${hasLights ? `onclick="toggleAreaLights('${area.area_id}', event)"` : ''}>
              <div class="tune-area-inner">
                <span class="tune-name-col">
                  <a href="./area/${encodeURIComponent(area.area_id)}?from=tune" class="tune-area-name" onclick="event.stopPropagation()">${area.name}</a>
                </span>
                <span class="tune-se-col"><span class="tune-impact-delta tune-solar-meta">${solarImpact}</span></span>
                <span class="tune-balance-col"><span class="tune-impact-delta tune-factor-meta">${factorImpact}</span></span>
                <span class="tune-adj-col"><span class="tune-adj-val${adjClass}">${adjText}</span></span>
                <span class="tune-final-col tune-final-now tune-bri-now">${finalHtml}</span>
                <div class="tune-se-col" onclick="event.stopPropagation()">
                  <input type="range" class="tune-solar-slider" min="0" max="8" step="1" value="${solarStep}" data-area-id="${area.area_id}">
                </div>
                <div class="tune-balance-col" onclick="event.stopPropagation()">
                  <input type="range" class="tune-lumen-slider" min="0" max="8" step="1" value="${lumenStep}" data-area-id="${area.area_id}">
                </div>
                <span class="tune-adj-col"></span>
                <span class="tune-final-col"></span>
                <span class="tune-slider-label-col"><span class="tune-slider-word tune-solar-word">${SOLAR_STEPS[solarStep].label}</span> <span class="tune-slider-val tune-solar-val">(\u00d7 ${fmtVal(exposure)})</span></span>
                <span class="tune-slider-label-col"><span class="tune-slider-word tune-lumen-word">${LUMEN_STEPS[lumenStep].label} (\u00d7 ${fmtVal(factor)})</span></span>
                <span class="tune-adj-col"></span>
                <span class="tune-final-col"></span>
              </div>
              ${hasLights ? '<div class="tune-area-lights" id="tune-lights-' + area.area_id + '" style="display:' + (isExpanded ? 'block' : 'none') + ';">' + lightsHtml + '</div>' : ''}
            </div>
          `;
        }).join('');

        const zoneControlsHtml = `
          <div class="tune-zone-controls" data-zone="${zoneName}" onclick="event.stopPropagation()">
            <div class="tune-col-headers-row" style="display:grid;grid-template-columns:minmax(60px,1fr) 30% 30% 44px 40px;padding:4px 12px 2px;">
              <span class="tune-col-header ${tuneSortOrder === 'custom' ? 'active-sort' : ''}" onclick="setTuneSort('custom')">Area</span>
              <span class="tune-col-header ${tuneSortOrder === 'sun' ? 'active-sort' : ''}" style="text-align:center;" onclick="setTuneSort('sun')">Sun Exposure</span>
              <span class="tune-col-header ${tuneSortOrder === 'light' ? 'active-sort' : ''}" style="text-align:center;" onclick="setTuneSort('light')">Balance</span>
              <span class="tune-col-header ${tuneSortOrder === 'adj' ? 'active-sort' : ''}" style="text-align:center;" onclick="setTuneSort('adj')">Adj</span>
              <span class="tune-col-header ${tuneSortOrder === 'bri' ? 'active-sort' : ''}" style="text-align:right;" onclick="setTuneSort('bri')">Final</span>
            </div>
          </div>
        `;

        const hasAnyBoosted = areasInZone.some(a => getTuneArea(a.area_id)?.boosted);
        const hasAnyOverride = areasInZone.some(a => Math.abs(getTuneArea(a.area_id)?.bri_override || 0) >= 0.5);
        const boostLegend = '<div class="tune-boost-legend" style="padding:4px 16px 6px;font-size:0.65rem;color:var(--muted2);' + (hasAnyBoosted ? '' : 'display:none;') + '">&#x26A1; includes boost</div>';
        const overrideLegend = '<div class="tune-override-legend" style="padding:4px 16px 6px;font-size:0.65rem;color:var(--muted2);' + (hasAnyOverride ? '' : 'display:none;') + '">* brightness adjustment applied</div>';

        html += `
          <div class="zone-group">
            <div class="zone-header tune-zone-header ${isCollapsed ? 'collapsed' : ''}" data-zone="${zoneName}" style="cursor:pointer;" onclick="toggleZone('${escapedZoneName}', this)">
              <span class="zone-chevron">&#x203A;</span>
              <a class="zone-rhythm-link" href="./zone/${encodeURIComponent(zoneName)}?back=tune" onclick="event.stopPropagation()">${zoneName}</a>
              <span class="tune-zone-bri-group">
                <span class="tune-zone-base-bri">${rhythmBri}%</span>
              </span>
            </div>
            <div class="zone-content ${isCollapsed ? 'hidden' : ''}" data-zone-table="${zoneName}">
              ${zoneControlsHtml}
              ${areaRows}
              ${boostLegend}
              ${overrideLegend}
            </div>
          </div>
        `;
      }

      container.innerHTML = html;
      captureTuneSnapshot();
    }

    // ============================================================
    // Data loading
    // ============================================================
    async function loadData() {
      const container = document.getElementById('tune-container');
      container.innerHTML = '<div class="loading">Loading tune data...</div>';
      try {
        const [filtersResp, outdoorResp, zoneStatesResp, glozonesResp] = await Promise.all([
          fetch('./api/light-filters'),
          fetch('./api/outdoor-status'),
          fetch('./api/zone-states'),
          fetch('./api/glozones'),
        ]);
        if (filtersResp.ok) tuneData = await filtersResp.json();
        if (outdoorResp.ok) tuneOutdoorData = await outdoorResp.json();

        // Snap sensitivity to nearest valid step and persist if it changed
        if (tuneData?.brightness_sensitivity != null) {
          const step = findClosestSensitivityStep(tuneData.brightness_sensitivity);
          const snapped = SENSITIVITY_STEPS[step].multiplier;
          if (Math.abs(tuneData.brightness_sensitivity - snapped) > 0.001) {
            tuneData.brightness_sensitivity = snapped;
            fetch('./api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ brightness_sensitivity: snapped }) });
          }
        }
        if (zoneStatesResp.ok) {
          const zs = await zoneStatesResp.json();
          zoneStates = zs.zone_states || {};
        }
        if (glozonesResp.ok) cachedGlozones = await glozonesResp.json();

        // Snap zone color_sensitivity values to valid steps
        if (cachedGlozones?.zones) {
          for (const [zoneName, zd] of Object.entries(cachedGlozones.zones)) {
            if (zd.color_sensitivity != null) {
              const step = findClosestSensitivityStep(zd.color_sensitivity);
              const snapped = SENSITIVITY_STEPS[step].multiplier;
              if (Math.abs(zd.color_sensitivity - snapped) > 0.001) {
                zd.color_sensitivity = snapped;
                fetch('./api/glozones/' + encodeURIComponent(zoneName) + '/settings', {
                  method: 'POST', headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ color_sensitivity: snapped })
                });
              }
            }
          }
        }

        // Merge area_lights into zone area objects
        if (tuneData?.area_lights && tuneData?.zones) {
          const areaLights = tuneData.area_lights;
          for (const zone of Object.values(tuneData.zones)) {
            for (const area of (zone.areas || [])) {
              const filters = area.light_filters || {};
              const lights = areaLights[area.id] || [];
              area.lights = lights.map(l => ({
                ...l,
                filter: filters[l.entity_id] || 'Standard',
              }));
            }
          }
        }
      } catch (err) {
        console.error('Error loading tune data:', err);
      }
      renderTune();
      const savedTab = localStorage.getItem('tune_active_tab') || 'brightness';
      if (savedTab !== 'brightness') switchTab(savedTab);
    }

    // ============================================================
    // Event listeners
    // ============================================================
    function setupEventListeners() {
      const container = document.getElementById('tune-container');

      container.addEventListener('click', (e) => {
        // Behaviour label clicks — toggle expanded row
        if (e.target.classList.contains('tune-light-behaviour')) {
          e.stopPropagation();
          const areaId = e.target.dataset.areaId;
          const idx = parseInt(e.target.dataset.idx);
          const lightKey = areaId + ':' + idx;
          const wasExpanded = tuneExpandedLightKey === lightKey;
          // Collapse current
          if (tuneExpandedLightKey) {
            const prev = document.getElementById('tune-light-exp-' + tuneExpandedLightKey.replace(':', '-'));
            if (prev) prev.style.display = 'none';
          }
          if (wasExpanded) {
            tuneExpandedLightKey = null;
          } else {
            tuneExpandedLightKey = lightKey;
            const exp = document.getElementById('tune-light-exp-' + areaId + '-' + idx);
            if (exp) exp.style.display = 'flex';
          }
        }
        // Light column sort header clicks
        if (e.target.classList.contains('tune-light-sort')) {
          e.stopPropagation();
          const sort = e.target.dataset.sort;
          const areaId = e.target.dataset.areaId;
          if (tuneLightSortOrder === sort) {
            tuneLightSortAsc = !tuneLightSortAsc;
          } else {
            tuneLightSortOrder = sort;
            tuneLightSortAsc = (sort === 'name' || sort === 'behaviour');
          }
          // Sort all expanded areas
          document.querySelectorAll('.tune-area-lights').forEach(container => {
            const id = container.id.replace('tune-lights-', '');
            sortTuneLightsList(id);
          });
        }
        // Toggle outdoor settings panel
        if (e.target.closest('#tune-outdoor-toggle')) {
          e.stopPropagation();
          const panel = document.getElementById('tune-outdoor-panel');
          if (panel) panel.classList.toggle('visible');
        }
        // Outdoor panel buttons
        if (e.target.id === 'tune-outdoor-apply-override') {
          e.stopPropagation();
          const cond = document.getElementById('tune-outdoor-override-cond')?.value;
          const dur = document.getElementById('tune-outdoor-override-dur')?.value || '60';
          if (cond) {
            fetch('./api/outdoor-override', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ condition: cond, duration_minutes: parseInt(dur) }) })
              .then(() => refreshOutdoorInPlace());
          } else {
            // "Off" selected — clear override
            fetch('./api/outdoor-override', { method: 'DELETE' })
              .then(() => refreshOutdoorInPlace());
          }
        }
        if (e.target.id === 'tune-outdoor-clear-override') {
          e.stopPropagation();
          fetch('./api/outdoor-override', { method: 'DELETE' }).then(() => refreshOutdoorInPlace());
        }
        if (e.target.id === 'tune-outdoor-learn') {
          e.stopPropagation();
          const status = document.getElementById('tune-outdoor-learn-status');
          if (status) status.textContent = 'Learning...';
          const sinceInput = document.getElementById('tune-outdoor-learn-since');
          const sinceVal = sinceInput ? sinceInput.value : '';
          const body = sinceVal ? JSON.stringify({ since: sinceVal }) : '{}';
          pendingSensorSave
            .then(() => fetch('./api/learn-baselines', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body }))
            .then(r => r.json())
            .then(async data => {
              if (data.error) { if (status) status.textContent = data.error; }
              else {
                const sensorName = (data.sensor || '').replace(/^sensor\./, '').replace(/_/g, ' ');
                if (status) status.textContent = 'Learned from ' + data.samples + ' samples' + (sensorName ? ' (' + sensorName + ')' : '');
                try {
                  const resp = await fetch('./api/outdoor-status');
                  if (resp.ok) tuneOutdoorData = await resp.json();
                } catch (err) {}
                const rangeEl = document.getElementById('tune-outdoor-range');
                if (rangeEl && tuneOutdoorData?.lux_learned_ceiling != null) {
                  rangeEl.textContent = Math.round(tuneOutdoorData.lux_learned_floor).toLocaleString() + ' \u2013 ' + Math.round(tuneOutdoorData.lux_learned_ceiling).toLocaleString();
                }
              }
            })
            .catch(() => { if (status) status.textContent = 'Error'; });
        }
        if (e.target.id === 'tune-outdoor-clear-baselines') {
          e.stopPropagation();
          fetch('./api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ lux_learned_ceiling: null, lux_learned_floor: null }) })
            .then(() => refreshOutdoorAndRender());
        }
      });

      // Close outdoor panel when clicking outside
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.tune-outdoor-wrapper')) {
          const panel = document.getElementById('tune-outdoor-panel');
          if (panel) panel.classList.remove('visible');
        }
      });

      // Outdoor source change
      container.addEventListener('change', (e) => {
        if (e.target.id === 'tune-outdoor-source') {
          e.stopPropagation();
          const val = e.target.value;
          fetch('./api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ outdoor_brightness_source: val }) })
            .then(() => refreshOutdoorAndRender());
        }
        // (Light filter changes are now handled by the behaviour dropdown)
      });

      // Slider input events (live feedback)
      container.addEventListener('input', (e) => {
        // Global sensitivity slider
        if (e.target.id === 'tune-global-sensitivity') {
          const step = parseInt(e.target.value);
          const newSensitivity = SENSITIVITY_STEPS[step].multiplier;
          const wordEl = document.getElementById('tune-global-sensitivity-word');
          if (wordEl) wordEl.textContent = SENSITIVITY_STEPS[step].label;
          const valEl = document.getElementById('tune-global-sensitivity-val');
          if (valEl) valEl.textContent = fmtVal(newSensitivity);
          if (tuneData) tuneData.brightness_sensitivity = newSensitivity;
          document.querySelectorAll('.tune-area').forEach(el => {
            el.dataset.sensitivity = newSensitivity;
            updateTuneNowPreview(el, {});
          });
          updateSunMultiplierCard();
          updateTuneActionBar();
          return;
        }
        // Per-area controls
        const tuneArea = e.target.closest('.tune-area');
        if (!tuneArea) return;

        if (e.target.classList.contains('tune-lumen-slider')) {
          const step = parseInt(e.target.value);
          const newFactor = LUMEN_STEPS[step].factor;
          const word = tuneArea.querySelector('.tune-lumen-word');
          if (word) word.textContent = LUMEN_STEPS[step].label + ' (\u00d7 ' + fmtVal(newFactor) + ')';
          updateTuneNowPreview(tuneArea, { factor: newFactor });
          updateTuneActionBar();
        }
        if (e.target.classList.contains('tune-solar-slider')) {
          const step = parseInt(e.target.value);
          const word = tuneArea.querySelector('.tune-solar-word');
          if (word) word.textContent = SOLAR_STEPS[step].label;
          const newExposure = SOLAR_STEPS[step].exposure;
          const valEl = tuneArea.querySelector('.tune-solar-val');
          if (valEl) valEl.textContent = '(\u00d7 ' + fmtVal(newExposure) + ')';
          updateTuneNowPreview(tuneArea, { exposure: newExposure });
          updateTuneActionBar();
        }
      });

      // Slider change events (deferred — just update action bar)
      container.addEventListener('change', (e) => {
        if (e.target.id === 'tune-global-sensitivity' ||
            e.target.classList.contains('tune-lumen-slider') ||
            e.target.classList.contains('tune-solar-slider')) {
          updateTuneActionBar();
        }
      });
    }

    // ============================================================
    // Init
    // ============================================================
    let _autoRefreshTimer = null;

    async function autoRefresh() {
      const activeTab = localStorage.getItem('tune_active_tab') || 'brightness';
      // Don't auto-refresh if user has unsaved changes
      if (isTuneDirty() || hasColorChanges()) return;
      try {
        if (activeTab === 'brightness') {
          await refreshTuneBrightness();
        } else {
          // Refresh shared data, then re-render color tab
          const [zsResp, filtersResp] = await Promise.all([
            fetch('./api/zone-states'),
            fetch('./api/light-filters'),
            refreshOutdoorInPlace(),
          ]);
          if (zsResp.ok) { const zs = await zsResp.json(); zoneStates = zs.zone_states || {}; }
          if (filtersResp.ok) {
            const fd = await filtersResp.json();
            // Update tuneData areas with fresh color state
            if (tuneData?.zones && fd.zones) {
              for (const zone of Object.values(fd.zones)) {
                for (const area of (zone.areas || [])) {
                  const ta = getTuneArea(area.id);
                  if (ta) {
                    ta.is_on = area.is_on !== false;
                    ta.last_sent_kelvin = area.last_sent_kelvin;
                    ta.color_mid = area.color_mid;
                    ta.color_override = area.color_override;
                    ta.color_override_set_at = area.color_override_set_at;
                  }
                }
              }
            }
          }
          renderColorTab();
        }
      } catch (e) { console.error('autoRefresh error:', e); }
    }

    async function startAutoRefresh() {
      try {
        const resp = await fetch('./api/config');
        if (resp.ok) {
          const cfg = await resp.json();
          const interval = Math.max(2, Math.min(60, cfg.home_refresh_interval || 3));
          _autoRefreshTimer = setInterval(autoRefresh, interval * 1000);
        }
      } catch (e) {
        // Default to 3s if config fetch fails
        _autoRefreshTimer = setInterval(autoRefresh, 3000);
      }
    }

    // Sun info panel toggle
    document.addEventListener('click', (e) => {
      const toggle = e.target.closest('#tune-sun-info-toggle');
      const panel = document.getElementById('tune-sun-info-panel');
      if (toggle && panel) {
        e.stopPropagation();
        panel.classList.toggle('visible');
        return;
      }
      if (panel && !e.target.closest('#tune-sun-info-panel') && !e.target.closest('.tune-outdoor-panel')) {
        panel.classList.remove('visible');
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      setupEventListeners();
      loadData().then(() => startAutoRefresh());
    });

    window.addEventListener('beforeunload', (e) => {
      if (_autoRefreshTimer) clearInterval(_autoRefreshTimer);
      if (isTuneDirty() || hasColorChanges()) {
        e.preventDefault();
        e.returnValue = '';
      }
    });
  </script>
</body>
